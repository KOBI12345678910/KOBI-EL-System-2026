<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kobi Agent IDE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2128; --surface3: #21262d;
      --border: #30363d; --text: #c9d1d9; --dim: #8b949e; --accent: #7c3aed;
      --accent-glow: rgba(124,58,237,0.25); --success: #3fb950; --error: #f85149;
      --warn: #d29922; --blue: #58a6ff; --mono: 'Cascadia Code','Fira Code','JetBrains Mono',monospace;
      --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    }

    body { font-family:var(--sans); background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    .header { display:flex; align-items:center; justify-content:space-between; height:40px; padding:0 12px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
    .header-left { display:flex; align-items:center; gap:10px; }
    .header h1 { font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px; }
    .header-right { display:flex; align-items:center; gap:8px; }
    .status-dot { width:8px; height:8px; border-radius:50%; }
    .status-dot.on { background:var(--success); box-shadow:0 0 6px var(--success); }
    .status-dot.off { background:var(--error); }
    .btn-sm { padding:3px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px; cursor:pointer; transition:all .15s; }
    .btn-sm:hover { background:var(--surface3); }
    .btn-accent { background:var(--accent); border-color:var(--accent); color:#fff; }
    .btn-accent:hover { opacity:.9; }

    .main { display:flex; flex:1; overflow:hidden; }

    .sidebar { width:44px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:8px 0; gap:2px; flex-shrink:0; }
    .sidebar-btn { width:36px; height:36px; border-radius:8px; border:none; background:transparent; color:var(--dim); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; transition:all .15s; }
    .sidebar-btn:hover,.sidebar-btn.active { background:var(--surface2); color:var(--text); }
    .sidebar-btn.active { color:var(--accent); }

    .file-panel { width:240px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
    .file-panel.hidden { display:none; }
    .file-header { padding:10px 12px; font-size:11px; font-weight:600; text-transform:uppercase; color:var(--dim); letter-spacing:.5px; display:flex; justify-content:space-between; align-items:center; }
    .file-tree { flex:1; overflow-y:auto; padding:4px 0; font-size:13px; font-family:var(--sans); }
    .file-item { display:flex; align-items:center; gap:6px; padding:3px 12px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--dim); transition:all .1s; }
    .file-item:hover { background:var(--surface2); color:var(--text); }
    .file-item.active { background:var(--accent-glow); color:var(--accent); }
    .file-item.dir { color:var(--text); }
    .file-icon { width:16px; text-align:center; flex-shrink:0; font-size:12px; }
    .file-indent { width:16px; flex-shrink:0; }

    .center { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    .tabs { display:flex; height:35px; background:var(--surface); border-bottom:1px solid var(--border); overflow-x:auto; flex-shrink:0; }
    .tab { display:flex; align-items:center; gap:6px; padding:0 14px; font-size:12px; color:var(--dim); cursor:pointer; border-right:1px solid var(--border); white-space:nowrap; transition:all .1s; min-width:0; }
    .tab:hover { color:var(--text); background:var(--surface2); }
    .tab.active { color:var(--text); background:var(--bg); border-bottom:2px solid var(--accent); }
    .tab-close { opacity:0; font-size:10px; padding:2px; border-radius:3px; transition:all .1s; }
    .tab:hover .tab-close { opacity:.6; }
    .tab-close:hover { opacity:1; background:var(--surface3); }

    .editor-area { flex:1; overflow:hidden; position:relative; }
    #monacoEditor { width:100%; height:100%; }

    .h-splitter { height:4px; background:var(--border); cursor:row-resize; flex-shrink:0; transition:background .15s; }
    .h-splitter:hover { background:var(--accent); }

    .terminal-panel { height:220px; display:flex; flex-direction:column; background:#000; }
    .terminal-panel.hidden { display:none; }
    .terminal-header { display:flex; align-items:center; justify-content:space-between; padding:6px 12px; background:var(--surface); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
    .terminal-header span { font-size:11px; font-weight:600; text-transform:uppercase; color:var(--dim); letter-spacing:.5px; }
    .terminal-tabs { display:flex; gap:4px; }
    .terminal-tab { padding:2px 8px; font-size:11px; border-radius:4px; cursor:pointer; color:var(--dim); }
    .terminal-tab.active { background:var(--surface2); color:var(--text); }
    #terminalContainer { flex:1; padding:4px; }

    .right-panel { width:380px; background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
    .right-panel.hidden { display:none; }

    .chat-header { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .chat-header h3 { font-size:13px; font-weight:600; }
    .chat-tabs { display:flex; gap:4px; }
    .chat-tab { padding:3px 10px; font-size:11px; border-radius:5px; cursor:pointer; color:var(--dim); }
    .chat-tab.active { background:var(--accent); color:#fff; }
    .messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
    .msg { max-width:92%; padding:8px 12px; border-radius:10px; font-size:13px; line-height:1.5; word-break:break-word; }
    .msg.user { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:3px; }
    .msg.agent { align-self:flex-start; background:var(--surface2); border:1px solid var(--border); border-bottom-left-radius:3px; }
    .msg.system { align-self:center; color:var(--dim); font-size:11px; }
    .msg pre { background:rgba(0,0,0,.3); padding:6px 8px; border-radius:6px; font-size:12px; font-family:var(--mono); overflow-x:auto; margin:4px 0; }

    .chat-input { padding:10px; border-top:1px solid var(--border); }
    .chat-input-wrap { display:flex; gap:6px; }
    .chat-input textarea { flex:1; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:8px; font-family:var(--sans); font-size:13px; resize:none; outline:none; min-height:38px; max-height:150px; }
    .chat-input textarea:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-glow); }
    .send-btn { width:38px; height:38px; border-radius:8px; border:none; background:var(--accent); color:#fff; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }

    .kanban { flex:1; overflow-y:auto; padding:8px; }
    .kanban.hidden { display:none; }
    .kanban-col { margin-bottom:12px; }
    .kanban-col-title { font-size:11px; font-weight:600; text-transform:uppercase; color:var(--dim); letter-spacing:.5px; padding:4px 6px; display:flex; align-items:center; gap:6px; }
    .kanban-col-count { background:var(--surface3); border-radius:8px; padding:1px 6px; font-size:10px; }
    .kanban-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 10px; margin:4px 0; font-size:12px; cursor:pointer; transition:all .15s; }
    .kanban-card:hover { border-color:var(--accent); }
    .kanban-card .title { font-weight:500; margin-bottom:4px; }
    .kanban-card .meta { color:var(--dim); font-size:10px; display:flex; justify-content:space-between; }
    .kanban-card .progress-bar { height:3px; background:var(--surface3); border-radius:2px; margin-top:6px; }
    .kanban-card .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; }

    .preview-panel { display:none; flex:1; flex-direction:column; }
    .preview-panel.visible { display:flex; }
    .preview-toolbar { display:flex; align-items:center; gap:8px; padding:6px 12px; background:var(--surface); border-bottom:1px solid var(--border); }
    .preview-device-btn { padding:3px 8px; font-size:11px; border-radius:4px; border:1px solid var(--border); background:transparent; color:var(--dim); cursor:pointer; }
    .preview-device-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .preview-url { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:4px 8px; color:var(--text); font-size:11px; font-family:var(--mono); }
    .preview-frame { flex:1; background:#fff; }
    .preview-frame iframe { width:100%; height:100%; border:none; }

    .diff-container { display:none; flex:1; }
    .diff-container.visible { display:flex; }
    #diffEditor { width:100%; height:100%; }

    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--dim); }

    .statusbar { height:22px; background:var(--surface); border-top:1px solid var(--border); display:flex; align-items:center; padding:0 10px; font-size:11px; color:var(--dim); gap:16px; flex-shrink:0; }
    .statusbar .sep { width:1px; height:12px; background:var(--border); }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <h1>&#x1F916; Kobi Agent</h1>
      <span style="font-size:11px;color:var(--dim)">v6.0</span>
    </div>
    <div class="header-right">
      <span class="status-dot off" id="wsDot"></span>
      <span style="font-size:11px;color:var(--dim)" id="wsStatus">Disconnected</span>
      <button class="btn-sm btn-accent" onclick="runBuild()">&#x25B6; Run</button>
      <button class="btn-sm" onclick="stopAll()">&#x25A0; Stop</button>
    </div>
  </div>

  <div class="main">

    <div class="sidebar">
      <button class="sidebar-btn active" onclick="togglePanel('files')" title="Files">&#x1F4C1;</button>
      <button class="sidebar-btn" onclick="togglePanel('search')" title="Search">&#x1F50D;</button>
      <button class="sidebar-btn" onclick="togglePanel('git')" title="Git">&#x2441;</button>
      <button class="sidebar-btn" onclick="togglePanel('debug')" title="Debug">&#x1F41B;</button>
      <div style="flex:1"></div>
      <button class="sidebar-btn" onclick="togglePanel('kanban')" title="Tasks">&#x1F4CB;</button>
      <button class="sidebar-btn" onclick="togglePanel('chat')" title="Chat">&#x1F4AC;</button>
      <button class="sidebar-btn" onclick="togglePreview()" title="Preview">&#x1F441;</button>
      <button class="sidebar-btn" onclick="toggleTerminal()" title="Terminal">&#x2328;</button>
    </div>

    <div class="file-panel" id="filePanel">
      <div class="file-header">
        <span>Explorer</span>
        <button class="btn-sm" onclick="refreshFiles()" style="padding:1px 6px;font-size:10px;">&#x21BB;</button>
      </div>
      <div class="file-tree" id="fileTree">
        <div style="padding:20px;text-align:center;color:var(--dim);font-size:12px;">Loading...</div>
      </div>
    </div>

    <div class="center">
      <div class="tabs" id="editorTabs">
        <div class="tab active"><span>Welcome</span></div>
      </div>

      <div class="editor-area" id="editorArea">
        <div id="monacoEditor"></div>
      </div>

      <div class="diff-container" id="diffContainer">
        <div id="diffEditor"></div>
      </div>

      <div class="preview-panel" id="previewPanel">
        <div class="preview-toolbar">
          <button class="preview-device-btn active" onclick="setDevice('desktop')">&#x1F5A5; Desktop</button>
          <button class="preview-device-btn" onclick="setDevice('tablet')">&#x1F4F1; Tablet</button>
          <button class="preview-device-btn" onclick="setDevice('mobile')">&#x1F4F2; Mobile</button>
          <input class="preview-url" id="previewUrl" value="http://localhost:3000" />
          <button class="btn-sm" onclick="refreshPreview()">&#x21BB;</button>
        </div>
        <div class="preview-frame" id="previewFrame">
          <iframe id="previewIframe" src="about:blank"></iframe>
        </div>
      </div>

      <div class="h-splitter" id="hSplitter"></div>

      <div class="terminal-panel" id="terminalPanel">
        <div class="terminal-header">
          <span>Terminal</span>
          <div class="terminal-tabs">
            <div class="terminal-tab active">bash</div>
            <div class="terminal-tab" onclick="newTerminal()">+</div>
          </div>
        </div>
        <div id="terminalContainer"></div>
      </div>
    </div>

    <div class="right-panel" id="rightPanel">
      <div class="chat-header">
        <h3>Agent Chat</h3>
        <div class="chat-tabs">
          <div class="chat-tab active" onclick="showChatTab('chat')">Chat</div>
          <div class="chat-tab" onclick="showChatTab('kanban')">Tasks</div>
          <div class="chat-tab" onclick="showChatTab('logs')">Logs</div>
        </div>
      </div>

      <div class="messages" id="chatMessages">
        <div class="msg system">&#x1F44B; Describe what you want to build.</div>
      </div>

      <div class="kanban hidden" id="kanbanBoard">
        <div class="kanban-col">
          <div class="kanban-col-title">&#x1F4CB; Queued <span class="kanban-col-count" id="queuedCount">0</span></div>
          <div id="queuedTasks"></div>
        </div>
        <div class="kanban-col">
          <div class="kanban-col-title">&#x26A1; Active <span class="kanban-col-count" id="activeCount">0</span></div>
          <div id="activeTasks"></div>
        </div>
        <div class="kanban-col">
          <div class="kanban-col-title">&#x2705; Ready <span class="kanban-col-count" id="readyCount">0</span></div>
          <div id="readyTasks"></div>
        </div>
      </div>

      <div class="chat-input">
        <div class="chat-input-wrap">
          <textarea id="chatInput" placeholder="Describe your task..." rows="1"></textarea>
          <button class="send-btn" onclick="sendMessage()">&#x25B6;</button>
        </div>
      </div>
    </div>
  </div>

  <div class="statusbar">
    <span id="sbLang">TypeScript</span>
    <span class="sep"></span>
    <span id="sbLine">Ln 1, Col 1</span>
    <span class="sep"></span>
    <span id="sbFile">No file</span>
    <div style="flex:1"></div>
    <span id="sbAgent">Agent: Idle</span>
    <span class="sep"></span>
    <span id="sbTokens">Tokens: 0</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/addons/fit/fit.min.js"></script>
  <script>
    var ws = null;
    var editor = null;
    var diffEditor = null;
    var term = null;
    var openFiles = new Map();
    var activeFile = null;
    var tokenCount = 0;

    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
    require(['vs/editor/editor.main'], function() {
      monaco.editor.defineTheme('kobi-dark', {
        base: 'vs-dark',
        inherit: true,
        rules: [],
        colors: {
          'editor.background': '#0d1117',
          'editor.foreground': '#c9d1d9',
          'editorLineNumber.foreground': '#484f58',
          'editor.selectionBackground': '#264f78',
          'editor.lineHighlightBackground': '#161b2233',
          'editorCursor.foreground': '#7c3aed',
        }
      });
      monaco.editor.setTheme('kobi-dark');

      editor = monaco.editor.create(document.getElementById('monacoEditor'), {
        value: '// Welcome to Kobi Agent IDE\n// Describe what you want in the chat panel \u2192\n',
        language: 'typescript',
        theme: 'kobi-dark',
        fontSize: 13,
        fontFamily: "'Cascadia Code','Fira Code','JetBrains Mono',monospace",
        fontLigatures: true,
        minimap: { enabled: true, maxColumn: 80 },
        lineNumbers: 'on',
        renderWhitespace: 'selection',
        bracketPairColorization: { enabled: true },
        automaticLayout: true,
        smoothScrolling: true,
        cursorBlinking: 'smooth',
        cursorSmoothCaretAnimation: 'on',
        tabSize: 2,
        wordWrap: 'on',
        padding: { top: 8 },
        suggest: { preview: true, showMethods: true, showFunctions: true },
      });

      editor.onDidChangeCursorPosition(function(e) {
        document.getElementById('sbLine').textContent = 'Ln ' + e.position.lineNumber + ', Col ' + e.position.column;
      });

      editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function() { saveCurrentFile(); });
    });

    function initTerminal() {
      term = new window.Terminal({
        theme: {
          background: '#000000', foreground: '#c9d1d9', cursor: '#7c3aed',
          selectionBackground: '#264f78',
          black: '#484f58', red: '#f85149', green: '#3fb950', yellow: '#d29922',
          blue: '#58a6ff', magenta: '#bc8cff', cyan: '#39d2c0', white: '#c9d1d9',
        },
        fontFamily: "'Cascadia Code','Fira Code',monospace",
        fontSize: 13,
        cursorBlink: true,
        allowProposedApi: true,
      });

      var fitAddon = new window.FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById('terminalContainer'));
      fitAddon.fit();

      term.writeln('\x1b[1;35m\u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557\x1b[0m');
      term.writeln('\x1b[1;35m\u2551    \uD83E\uDD16 Kobi Agent Terminal     \u2551\x1b[0m');
      term.writeln('\x1b[1;35m\u255A\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255D\x1b[0m');
      term.writeln('');

      var currentLine = '';
      term.onKey(function(ev) {
        var key = ev.key;
        var domEvent = ev.domEvent;
        if (domEvent.key === 'Enter') {
          term.writeln('');
          if (currentLine.trim()) executeCommand(currentLine.trim());
          currentLine = '';
          term.write('\x1b[32m\u276F\x1b[0m ');
        } else if (domEvent.key === 'Backspace') {
          if (currentLine.length > 0) {
            currentLine = currentLine.slice(0, -1);
            term.write('\b \b');
          }
        } else if (key.length === 1) {
          currentLine += key;
          term.write(key);
        }
      });

      term.write('\x1b[32m\u276F\x1b[0m ');
      window.addEventListener('resize', function() { fitAddon.fit(); });
    }

    function executeCommand(cmd) {
      fetch('/api/terminal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: cmd }),
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.stdout) term.writeln(data.stdout);
        if (data.stderr) term.writeln('\x1b[31m' + data.stderr + '\x1b[0m');
        term.write('\x1b[32m\u276F\x1b[0m ');
      })
      .catch(function(err) {
        term.writeln('\x1b[31mError: ' + err.message + '\x1b[0m');
        term.write('\x1b[32m\u276F\x1b[0m ');
      });
    }

    function refreshFiles() {
      fetch('/api/files?recursive=true')
      .then(function(res) { return res.json(); })
      .then(function(data) { renderFileTree(data.output || ''); })
      .catch(function() { document.getElementById('fileTree').innerHTML = '<div style="padding:12px;color:var(--dim)">Error loading files</div>'; });
    }

    function renderFileTree(output) {
      var container = document.getElementById('fileTree');
      if (!output) { container.innerHTML = '<div style="padding:12px;color:var(--dim)">Empty workspace</div>'; return; }

      var lines = output.split('\n').filter(Boolean);
      container.innerHTML = lines.map(function(line) {
        var isDir = line.endsWith('/');
        var depth = (line.match(/\//g) || []).length;
        var parts = line.split('/');
        var name = parts[parts.length - 1].replace('/', '') || parts[parts.length - 2];
        var icon = isDir ? '\uD83D\uDCC1' : getFileIcon(name);
        var indent = '';
        for (var i = 0; i < Math.max(0, depth - 1); i++) indent += '<span class="file-indent"></span>';

        if (isDir) {
          return '<div class="file-item dir" title="' + line + '">' + indent + '<span class="file-icon">' + icon + '</span><span>' + name + '</span></div>';
        }
        return '<div class="file-item" onclick="openFile(\'' + line.replace(/'/g, "\\'") + '\')" title="' + line + '">' + indent + '<span class="file-icon">' + icon + '</span><span>' + name + '</span></div>';
      }).join('');
    }

    function getFileIcon(name) {
      var ext = name.split('.').pop();
      var icons = { ts:'\uD83D\uDD37', tsx:'\u269B', js:'\uD83D\uDFE1', jsx:'\u269B', json:'\uD83D\uDCCB', html:'\uD83C\uDF10', css:'\uD83C\uDFA8', md:'\uD83D\uDCDD', py:'\uD83D\uDC0D', sql:'\uD83D\uDDC3', yml:'\u2699', yaml:'\u2699', env:'\uD83D\uDD12', sh:'\u2328', prisma:'\uD83D\uDC8E' };
      return icons[ext] || '\uD83D\uDCC4';
    }

    function openFile(filePath) {
      fetch('/api/files/read?path=' + encodeURIComponent(filePath))
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (!data.success) return;

        var ext = filePath.split('.').pop();
        var langMap = { ts:'typescript', tsx:'typescript', js:'javascript', jsx:'javascript', json:'json', html:'html', css:'css', md:'markdown', py:'python', sql:'sql', yml:'yaml', yaml:'yaml', sh:'shell', prisma:'prisma' };
        var language = langMap[ext] || 'plaintext';

        var model;
        if (openFiles.has(filePath)) {
          model = openFiles.get(filePath).model;
          model.setValue(data.output);
        } else {
          model = monaco.editor.createModel(data.output, language);
          openFiles.set(filePath, { model: model, content: data.output, language: language });
        }

        editor.setModel(model);
        activeFile = filePath;

        updateTabs();
        document.getElementById('sbFile').textContent = filePath;
        document.getElementById('sbLang').textContent = language;

        document.querySelectorAll('.file-item').forEach(function(el) { el.classList.remove('active'); });
        document.querySelectorAll('.file-item').forEach(function(el) {
          if (el.title === filePath) el.classList.add('active');
        });
      })
      .catch(function() {});
    }

    function saveCurrentFile() {
      if (!activeFile || !editor) return;
      var content = editor.getValue();
      fetch('/api/files/write', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: activeFile, content: content }),
      })
      .then(function() {
        if (term) term.writeln('\x1b[32m\u2713 Saved ' + activeFile + '\x1b[0m');
      })
      .catch(function() {});
    }

    function updateTabs() {
      var container = document.getElementById('editorTabs');
      var html = '';
      openFiles.forEach(function(value, path) {
        var name = path.split('/').pop();
        var isActive = path === activeFile;
        html += '<div class="tab ' + (isActive ? 'active' : '') + '" onclick="openFile(\'' + path.replace(/'/g, "\\'") + '\')">' +
          '<span>' + name + '</span>' +
          '<span class="tab-close" onclick="event.stopPropagation();closeTab(\'' + path.replace(/'/g, "\\'") + '\')">\u2715</span>' +
          '</div>';
      });
      container.innerHTML = html;
    }

    function closeTab(path) {
      var file = openFiles.get(path);
      if (file) file.model.dispose();
      openFiles.delete(path);
      if (activeFile === path) {
        var remaining = Array.from(openFiles.keys());
        if (remaining.length > 0) openFile(remaining[remaining.length - 1]);
        else { editor.setModel(monaco.editor.createModel('', 'plaintext')); activeFile = null; }
      }
      updateTabs();
    }

    function sendMessage() {
      var input = document.getElementById('chatInput');
      var text = input.value.trim();
      if (!text) return;

      addChatMessage('user', text);
      input.value = '';
      input.style.height = 'auto';
      document.getElementById('sbAgent').textContent = 'Agent: Working...';

      fetch('/api/task', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task: text }),
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        addChatMessage('agent', data.success ? '\u2705 ' + data.summary : '\u26A0\uFE0F ' + data.summary);
        refreshFiles();
        document.getElementById('sbAgent').textContent = 'Agent: Idle';
      })
      .catch(function(err) {
        addChatMessage('agent', '\u274C ' + err.message);
        document.getElementById('sbAgent').textContent = 'Agent: Idle';
      });
    }

    function addChatMessage(type, text) {
      var el = document.createElement('div');
      el.className = 'msg ' + type;
      el.innerHTML = text.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,.3);padding:1px 4px;border-radius:3px;font-family:var(--mono);font-size:12px">$1</code>');
      var container = document.getElementById('chatMessages');
      container.appendChild(el);
      container.scrollTop = container.scrollHeight;
    }

    function updateKanban(board) {
      if (!board) return;
      ['queued', 'active', 'ready'].forEach(function(status) {
        var container = document.getElementById(status + 'Tasks');
        var count = document.getElementById(status + 'Count');
        var tasks = (board.columns && board.columns[status]) || [];
        count.textContent = tasks.length;
        container.innerHTML = tasks.map(function(t) {
          return '<div class="kanban-card">' +
            '<div class="title">' + t.title + '</div>' +
            '<div class="meta"><span>' + t.agentId + '</span><span>' + t.progress + '%</span></div>' +
            '<div class="progress-bar"><div class="progress-fill" style="width:' + t.progress + '%"></div></div>' +
            '</div>';
        }).join('');
      });
    }

    function togglePreview() {
      var panel = document.getElementById('previewPanel');
      var editorArea = document.getElementById('editorArea');
      if (panel.classList.contains('visible')) {
        panel.classList.remove('visible');
        editorArea.style.display = '';
      } else {
        panel.classList.add('visible');
        editorArea.style.display = 'none';
        refreshPreview();
      }
    }

    function refreshPreview() {
      var url = document.getElementById('previewUrl').value;
      document.getElementById('previewIframe').src = url;
    }

    function setDevice(device) {
      var frame = document.getElementById('previewFrame');
      var widths = { mobile: '375px', tablet: '768px', desktop: '100%' };
      frame.style.maxWidth = widths[device];
      frame.style.margin = device === 'desktop' ? '0' : '0 auto';
      document.querySelectorAll('.preview-device-btn').forEach(function(b) { b.classList.remove('active'); });
      event.target.classList.add('active');
    }

    function togglePanel(panel) {
      if (panel === 'files') {
        document.getElementById('filePanel').classList.toggle('hidden');
      } else if (panel === 'chat' || panel === 'kanban') {
        document.getElementById('rightPanel').classList.toggle('hidden');
      }
      document.querySelectorAll('.sidebar-btn').forEach(function(b) { b.classList.remove('active'); });
      event.target.classList.add('active');
    }

    function toggleTerminal() {
      document.getElementById('terminalPanel').classList.toggle('hidden');
      if (!term) initTerminal();
    }

    function showChatTab(tab) {
      document.getElementById('chatMessages').style.display = tab === 'chat' ? '' : 'none';
      document.getElementById('kanbanBoard').classList.toggle('hidden', tab !== 'kanban');
      document.querySelectorAll('.chat-tab').forEach(function(t) { t.classList.remove('active'); });
      event.target.classList.add('active');
    }

    function runBuild() {
      var input = document.getElementById('chatInput');
      var task = input.value.trim() || 'npm run dev';
      sendMessage();
    }

    function stopAll() {
      fetch('/api/stop', { method: 'POST' });
      addChatMessage('system', 'Stopped');
    }

    function newTerminal() {}

    function connectWS() {
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/ws');

      ws.onopen = function() {
        document.getElementById('wsDot').className = 'status-dot on';
        document.getElementById('wsStatus').textContent = 'Connected';
      };

      ws.onclose = function() {
        document.getElementById('wsDot').className = 'status-dot off';
        document.getElementById('wsStatus').textContent = 'Disconnected';
        setTimeout(connectWS, 3000);
      };

      ws.onmessage = function(e) {
        var event = JSON.parse(e.data);
        if (event.type === 'log' && term) {
          term.writeln(event.data.message);
        }
        if (event.type === 'stream' && term) {
          term.writeln(event.data);
        }
        if (event.type === 'step_complete' || event.type === 'step_failed') {
          addChatMessage('system', (event.type === 'step_complete' ? '\u2705' : '\u274C') + ' Step ' + event.data.stepId + ': ' + (event.data.result && event.data.result.type || ''));
        }
        if (event.type === 'complete') {
          addChatMessage('agent', event.data.summary);
          refreshFiles();
          document.getElementById('sbAgent').textContent = 'Agent: Idle';
        }
        if (event.type === 'phase') {
          document.getElementById('sbAgent').textContent = 'Agent: ' + event.data.phase;
        }
        if (event.type === 'parallel-task') {
          fetch('/api/parallel/board')
          .then(function(r) { return r.json(); })
          .then(function(d) { if (d.board) updateKanban(d.board); })
          .catch(function() {});
        }
      };
    }

    document.getElementById('chatInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('chatInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });

    connectWS();
    refreshFiles();
    setTimeout(function() { if (!term) initTerminal(); }, 500);
  </script>
</body>
</html>
