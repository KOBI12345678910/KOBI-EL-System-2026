kind = "mobile"
previewPath = "/mobile/"
title = "ERP Mobile App"
version = "1.0.0"
id = "artifacts/erp-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 20384
name = "expo"
paths = ["/mobile/"]

[services.development]
run = "pnpm --filter @workspace/erp-mobile run dev"

[services.env]
PORT = "20384"
BASE_PATH = "/mobile/"

[services.production]
build = ["pnpm", "--filter", "@workspace/erp-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/erp-mobile", "run", "serve"]
