    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #0f172a;
        color: #f8fafc;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      #root {
        min-height: 100vh;
      }
      @keyframes erp-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes erp-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      @keyframes erp-fadein {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes erp-bar {
        0% { width: 0%; }
        60% { width: 75%; }
        100% { width: 90%; }
      }
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        z-index: 9999;
        gap: 0;
      }
      #app-loader .splash-logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: erp-fadein 0.6s ease both;
      }
      #app-loader .splash-icon {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        box-shadow: 0 0 40px rgba(99, 102, 241, 0.4);
      }
      #app-loader .splash-icon svg {
        width: 40px;
        height: 40px;
      }
      #app-loader .splash-title-he {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 26px;
        font-weight: 700;
        color: #f8fafc;
        letter-spacing: -0.5px;
        direction: rtl;
        text-align: center;
        line-height: 1.2;
        margin: 0;
      }
      #app-loader .splash-title-en {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 11px;
        font-weight: 500;
        color: #6366f1;
        letter-spacing: 3px;
        text-transform: uppercase;
        text-align: center;
        margin: 6px 0 0;
      }
      #app-loader .splash-divider {
        width: 1px;
        height: 32px;
        background: linear-gradient(to bottom, transparent, rgba(99,102,241,0.4), transparent);
        margin: 24px 0;
      }
      #app-loader .splash-spinner-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        animation: erp-fadein 0.6s 0.2s ease both;
        opacity: 0;
      }
      #app-loader .splash-spinner {
        width: 36px;
        height: 36px;
        border: 2.5px solid rgba(99, 102, 241, 0.2);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: erp-spin 0.8s linear infinite;
      }
      #app-loader .splash-bar-track {
        width: 160px;
        height: 3px;
        background: rgba(99, 102, 241, 0.15);
        border-radius: 99px;
        overflow: hidden;
      }
      #app-loader .splash-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #6366f1, #8b5cf6);
        border-radius: 99px;
        animation: erp-bar 3s ease-out forwards;
      }
      #app-loader .splash-loading-text {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: rgba(248, 250, 252, 0.5);
        direction: rtl;
        animation: erp-pulse 2s ease-in-out infinite;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com/s/inter/v18/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyfAZ9hiJ-Ek-_EeA.woff2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function() {
        var origin = location.origin;
        var head = document.head;
        var preconnect = document.createElement('link');
        preconnect.rel = 'preconnect';
        preconnect.href = origin;
        head.appendChild(preconnect);
        var dnsPrefetch = document.createElement('link');
        dnsPrefetch.rel = 'dns-prefetch';
        dnsPrefetch.href = origin;
        head.appendChild(dnsPrefetch);
      })();
    </script>

  <body>
    <div id="app-loader">
      <div class="splash-logo-wrap">

        </div>
        <p class="splash-title-he">טכנו-כל עוזי</p>
        <p class="splash-title-en">TECHNO-KOL UZI</p>
      </div>
      <div class="splash-divider"></div>
      <div class="splash-spinner-wrap">
        <div class="splash-spinner"></div>
        <div class="splash-bar-track"><div class="splash-bar-fill"></div></div>
        <span class="splash-loading-text">טוען מערכת...</span>
      </div>
    </div>
    <div id="root"></div>
