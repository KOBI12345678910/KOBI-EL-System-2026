packages:
  "framer-motion": "Animations and page transitions"
  "recharts": "Data visualization and charts for dashboard"
  "date-fns": "Date formatting and manipulation"
  "lucide-react": "Icons for UI elements"
  "react-hook-form": "Form state management"
  "@hookform/resolvers": "Zod validation resolver for forms"
  "zod": "Schema validation"
  "clsx": "Utility for constructing className strings"
  "tailwind-merge": "Utility for merging tailwind classes"

images:
  - path: "artifacts/erp-app/public/images/auth-bg.png"
    description: "Abstract deep dark blue and purple gradient mesh background with high-tech enterprise feel and subtle glowing lines"
    aspect_ratio: "16:9"
  - path: "artifacts/erp-app/public/images/logo.png"
    description: "Minimalist modern geometric AI technology logo mark in vibrant blue on transparent background"
    aspect_ratio: "1:1"

notes:
  - App is a dark-mode enterprise AI ERP module with Hebrew (RTL) interface
  - Uses @workspace/api-client-react for TanStack Query hooks
