kind = "web"
previewPath = "/"
title = "ERP System"
version = "1.0.0"
id = "artifacts/erp-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23023
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/erp-app run dev"

[services.env]
PORT = "23023"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/erp-app", "run", "build"]
publicDir = "artifacts/erp-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
