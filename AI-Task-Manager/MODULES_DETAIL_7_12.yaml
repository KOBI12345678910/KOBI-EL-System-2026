          label: "עריכה"
          icon: edit
          target: "/billing/recurring/:id/edit"
        - action: pause
          label: "השהה"
          icon: pause
          condition: "status_id = recurring_active"
          sets: "status_id = recurring_paused"
        - action: resume
          label: "חדש"
          icon: play_arrow
          condition: "status_id = recurring_paused"
          sets: "status_id = recurring_active"
        - action: view_generated
          label: "מסמכים שנוצרו"
          icon: list
          target: "/finance/income?parent_recurring_id=:id"

    # === 11.3.16 RECURRING DOCUMENT CREATE ===
    recurring_document_create:
      route: /billing/recurring/create
      title: "מסמך מחזורי חדש"
      type: form_page

      form_sections:
        - section: template
          title: "מסמך תבנית"
          description: "First create the template document (same as income document), then define recurrence"
          layout: single_column
          fields:
            - name: document_type_id
              label: "סוג מסמך"
              type: select
              options:
                - value: invoice
                  label: "חשבונית"
                - value: receipt
                  label: "קבלה"
                - value: invoice_receipt
                  label: "חשבונית קבלה"
                - value: payment_request
                  label: "דרישת תשלום"
              required: true
            - name: customer_id
              label: "לקוח"
              type: search_select
              entity: customers
              display_field: full_name
              required: true
          sub_form: "embedded income_document_create form for template"

        - section: recurrence
          title: "הגדרות חזרה"
          layout: two_column
          fields:
            - name: frequency
              label: "תדירות"
              type: select
              options:
                - value: weekly
                  label: "שבועי"
                - value: monthly
                  label: "חודשי"
                - value: quarterly
                  label: "רבעוני"
                - value: yearly
                  label: "שנתי"
              required: true
              col_span: 1
            - name: interval_value
              label: "כל X תקופות"
              type: number_input
              default: 1
              min: 1
              required: true
              col_span: 1
              description: "לדוגמה: תדירות=חודשי, ערך=2 = כל חודשיים"
            - name: next_run_date
              label: "הרצה ראשונה"
              type: date_picker
              required: true
              col_span: 1
            - name: end_date
              label: "תאריך סיום (אופציונלי)"
              type: date_picker
              required: false
              col_span: 1
            - name: auto_send
              label: "שליחה אוטומטית ללקוח"
              type: toggle
              default: false
              col_span: 1

      form_actions:
        - action: save
          label: "צור מסמך מחזורי"
          variant: primary
          side_effects:
            - "creates template document with is_recurring_template = true"
            - "creates recurring_documents record"
          navigates_to: "/billing/recurring/:id"
        - action: cancel
          label: "ביטול"
          variant: text
          navigates_to: /billing/recurring

    # === 11.3.17 RECURRING DOCUMENT DETAILS ===
    recurring_document_details:
      route: "/billing/recurring/:id"
      title: "פרטי מסמך מחזורי"
      type: detail_page
      entity: recurring_documents

      header:
        layout: detail_header
        elements:
          - component: back_button
            target: /billing/recurring
          - component: title
            display: "template_document.document_number"
            subtitle: "מחזורי"
          - component: status_badge
            field: status_id
          - component: action_buttons
            actions:
              - action: edit
                label: "עריכה"
                icon: edit
              - action: pause
                label: "השהה"
                icon: pause
                condition: "status_id = recurring_active"
              - action: resume
                label: "חדש"
                icon: play_arrow
                condition: "status_id = recurring_paused"
              - action: run_now
                label: "הרץ עכשיו"
                icon: play_circle
                description: "generates document immediately"
              - action: delete
                label: "מחק"
                icon: delete
                type: confirm_dialog

      tabs:
        - tab: template
          label: "מסמך תבנית"
          icon: description
          content:
            description: "shows the template document details (line items, amounts, customer)"
            entity: documents
            filter: "id = :template_document_id"
            type: detail_card

        - tab: schedule
          label: "לוח זמנים"
          icon: schedule
          content:
            layout: detail_grid
            fields:
              - label: "תדירות"
                value: frequency
              - label: "כל X תקופות"
                value: interval_value
              - label: "הרצה הבאה"
                value: next_run_date
                format: date
              - label: "תאריך סיום"
                value: end_date
                format: date
              - label: "שליחה אוטומטית"
                value: auto_send
                type: boolean_badge
              - label: "סטטוס"
                value: status_id
                type: status_badge

        - tab: generated_documents
          label: "מסמכים שנוצרו"
          icon: list
          content:
            entity: documents
            filter: "parent_recurring_id = :template_document_id"
            type: table
            sort: issue_date DESC
            columns:
              - key: document_number
                label: "מספר מסמך"
                width: 130
                link_to: "/finance/income/:id"
              - key: issue_date
                label: "תאריך"
                width: 110
                format: date
              - key: total_amount
                label: "סכום"
                width: 120
                format: currency
              - key: status_id
                label: "סטטוס"
                width: 110
                type: status_badge
              - key: paid_amount
                label: "שולם"
                width: 120
                format: currency

        - tab: activity_log
          label: "לוג"
          icon: history
          content:
            entity: activity_logs
            filter: "entity_type = recurring_document AND entity_id = :id"
            view_type: timeline

  # ----------------------------------------------------------
  # 11.4 NAVIGATION MAP
  # ----------------------------------------------------------
  navigation_map:
    invoices_list:
      navigates_to:
        - target: /billing/invoices/create
          trigger: "click create"
        - target: "/billing/invoices/:id"
          trigger: "click invoice row"
        - target: "/customers/:customer_id"
          trigger: "click customer"
        - target: "/billing/receipts/create?based_on=:id"
          trigger: "click create receipt"
        - target: "/billing/credit-notes/create?based_on=:id"
          trigger: "click create credit note"
    invoice_details:
      navigates_to:
        - target: "/customers/:customer_id"
          trigger: "click customer"
        - target: "/billing/receipts/create?based_on=:id"
          trigger: "click create receipt"
        - target: "/billing/credit-notes/create?based_on=:id"
          trigger: "click create credit note"
        - target: "linked document"
          trigger: "click linked doc in tab"
    receipts_list:
      navigates_to:
        - target: /billing/receipts/create
          trigger: "click create"
        - target: "/billing/receipts/:id"
          trigger: "click receipt row"
    payment_requests_list:
      navigates_to:
        - target: /billing/payment-requests/create
          trigger: "click create"
        - target: "/billing/invoices/create?based_on=:id"
          trigger: "click convert to invoice"
    credit_notes_list:
      navigates_to:
        - target: /billing/credit-notes/create
          trigger: "click create"
        - target: "/billing/credit-notes/:id"
          trigger: "click credit note row"
    recurring_documents_list:
      navigates_to:
        - target: /billing/recurring/create
          trigger: "click create"
        - target: "/billing/recurring/:id"
          trigger: "click row"
        - target: "/finance/income?parent_recurring_id=:id"
          trigger: "click view generated"

# ============================================================
# MODULE 12: PAYMENTS
# ============================================================
module_12_payments:
  module_key: payments
  icon: payments
  label: "תשלומים"
  route: /payments
  priority: critical
  purpose: "סליקה, העברות, מס\"ב, הוראות קבע, שיוך תשלומים למסמכים"

  # ----------------------------------------------------------
  # 12.1 SIDEBAR SUBMENUS
  # ----------------------------------------------------------
  submenus:
    - key: transactions
      label: "כל התשלומים"
      route: /payments/transactions
      icon: list
    - key: credit_clearing
      label: "סליקת אשראי"
      route: /payments/credit-clearing
      icon: credit_card
    - key: bank_transfers
      label: "העברות בנקאיות"
      route: /payments/bank-transfers
      icon: account_balance
    - key: standing_orders
      label: "הוראות קבע"
      route: /payments/standing-orders
      icon: autorenew
    - key: masav
      label: "מס\"ב"
      route: /payments/masav
      icon: upload_file
    - key: unmatched_payments
      label: "תשלומים לא משויכים"
      route: /payments/unmatched
      icon: help_outline

  # ----------------------------------------------------------
  # 12.2 ENTITIES
  # ----------------------------------------------------------
  entities:

    payments:
      table_name: payments
      type: transactional
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: document_id
          type: uuid
          foreign_key: documents.id
          nullable: true
          description: "מסמך משויך"
        - name: payment_method_id
          type: uuid
          foreign_key: payment_methods.id
          required: true
          description: "אמצעי תשלום"
        - name: payment_date
          type: date
          required: true
          default: today
          description: "תאריך תשלום"
        - name: amount
          type: decimal
          precision: 12
          scale: 2
          required: true
          description: "סכום"
        - name: reference_number
          type: string
          max_length: 100
          nullable: true
          description: "מספר אסמכתא"
        - name: external_transaction_id
          type: string
          max_length: 255
          nullable: true
          description: "מזהה עסקה חיצוני"
        - name: status_id
          type: enum
          values: [pending, completed, failed, refunded, cancelled]
          default: completed
          required: true
          description: "סטטוס"
        - name: notes
          type: text
          required: false
          description: "הערות"
        - name: created_at
          type: datetime
          auto_generated: true
      indexes:
        - fields: [document_id]
        - fields: [payment_method_id]
        - fields: [payment_date]
        - fields: [status_id]
        - fields: [external_transaction_id]

    credit_transactions:
      table_name: credit_transactions
      type: transactional
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: customer_id
          type: uuid
          foreign_key: customers.id
          required: true
          description: "לקוח"
        - name: document_id
          type: uuid
          foreign_key: documents.id
          nullable: true
          description: "מסמך משויך"
        - name: transaction_date
          type: datetime
          required: true
          description: "תאריך עסקה"
        - name: amount
          type: decimal
          precision: 12
          scale: 2
          required: true
          description: "סכום"
        - name: transaction_code
          type: string
          max_length: 50
          nullable: true
          description: "קוד עסקה"
        - name: provider_reference
          type: string
          max_length: 255
          nullable: true
          description: "אסמכתא מחברת סליקה"
        - name: card_last_four
          type: string
          max_length: 4
          nullable: true
          description: "4 ספרות אחרונות"
        - name: card_type
          type: string
          max_length: 20
          nullable: true
          description: "סוג כרטיס (Visa, Mastercard, etc.)"
        - name: installments
          type: integer
          default: 1
          description: "מספר תשלומים"
        - name: status_id
          type: enum
          values: [pending, approved, declined, settled, refunded, cancelled]
          default: pending
          required: true
          description: "סטטוס"
        - name: notes
          type: text
          required: false
        - name: created_at
          type: datetime
          auto_generated: true
      indexes:
        - fields: [customer_id]
        - fields: [document_id]
        - fields: [transaction_date]
        - fields: [status_id]
        - fields: [transaction_code]

    bank_transfers:
      table_name: bank_transfers
      type: transactional
      auto_number:
        prefix: "BT-"
        padding: 5
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: transfer_number
          type: string
          auto_generated: true
          unique: true
          format: "BT-00001"
        - name: from_account
          type: string
          max_length: 50
          required: true
          description: "חשבון מקור"
        - name: to_account
          type: string
          max_length: 50
          required: true
          description: "חשבון יעד"
        - name: amount
          type: decimal
          precision: 12
          scale: 2
          required: true
          description: "סכום"
        - name: transfer_date
          type: date
          required: true
          default: today
          description: "תאריך העברה"
        - name: reference
          type: string
          max_length: 100
          nullable: true
          description: "אסמכתא"
        - name: document_id
          type: uuid
          foreign_key: documents.id
          nullable: true
          description: "מסמך משויך"
        - name: status_id
          type: enum
          values: [pending, completed, failed, cancelled]
          default: pending
          required: true
        - name: notes
          type: text
          required: false
        - name: created_at
          type: datetime
          auto_generated: true
      indexes:
        - fields: [transfer_number]
          unique: true
        - fields: [transfer_date]
        - fields: [status_id]

    standing_orders:
      table_name: standing_orders
      type: transactional
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: customer_id
          type: uuid
          foreign_key: customers.id
          required: true
          description: "לקוח"
        - name: related_document_id
          type: uuid
          foreign_key: documents.id
          nullable: true
          description: "מסמך קשור"
        - name: amount
          type: decimal
          precision: 12
          scale: 2
          required: true
          description: "סכום"
        - name: frequency
          type: enum
          values: [monthly, quarterly, yearly]
          required: true
          description: "תדירות"
        - name: start_date
          type: date
          required: true
          description: "תאריך התחלה"
        - name: end_date
          type: date
          nullable: true
          description: "תאריך סיום"
        - name: next_charge_date
          type: date
          required: true
          description: "חיוב הבא"
        - name: status_id
          type: enum
          values: [active, paused, cancelled, completed]
          default: active
          required: true
        - name: bank_details
          type: text
          nullable: true
          description: "פרטי בנק"
        - name: notes
          type: text
          required: false
        - name: created_at
          type: datetime
          auto_generated: true
      indexes:
        - fields: [customer_id]
        - fields: [status_id]
        - fields: [next_charge_date]

    masav_batches:
      table_name: masav_batches
      type: transactional
      auto_number:
        prefix: "MSV-"
        padding: 5
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: batch_number
          type: string
          auto_generated: true
          unique: true
          format: "MSV-00001"
        - name: batch_date
          type: date
          required: true
          default: today
          description: "תאריך אצווה"
        - name: total_amount
          type: decimal
          precision: 14
          scale: 2
          computed: "SUM(included payments.amount)"
          description: "סכום כולל"
        - name: transaction_count
          type: integer
          computed: "COUNT(included payments)"
          description: "מספר עסקאות"
        - name: file_path
          type: string
          max_length: 500
          nullable: true
          description: "נתיב קובץ מס\"ב"
        - name: status_id
          type: enum
          values: [draft, generated, sent, processed, failed]
          default: draft
          required: true
        - name: created_at
          type: datetime
          auto_generated: true
      indexes:
        - fields: [batch_number]
          unique: true
        - fields: [status_id]
        - fields: [batch_date]

    masav_batch_items:
      table_name: masav_batch_items
      type: junction
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: masav_batch_id
          type: uuid
          foreign_key: masav_batches.id
          required: true
          on_delete: cascade
        - name: payment_id
          type: uuid
          foreign_key: payments.id
          required: true
        - name: amount
          type: decimal
          precision: 12
          scale: 2
          required: true
        - name: bank_code
          type: string
          max_length: 10
        - name: branch_code
          type: string
          max_length: 10
        - name: account_number
          type: string
          max_length: 20
        - name: beneficiary_name
          type: string
          max_length: 100
      indexes:
        - fields: [masav_batch_id]
        - fields: [payment_id]

  # ----------------------------------------------------------
  # 12.3 PAGES
  # ----------------------------------------------------------
  pages:

    # === 12.3.1 ALL TRANSACTIONS ===
    transactions_page:
      route: /payments/transactions
      title: "כל התשלומים"
      type: list_page
      entity: payments

      toolbar:
        left:
          - component: search_input
            placeholder: "חיפוש לפי אסמכתא, מזהה עסקה..."
            searches_fields: [reference_number, external_transaction_id]
          - component: filter_dropdown
            key: method_filter
            label: "אמצעי תשלום"
            options_from: payment_methods
            display_field: name
          - component: date_range_picker
            key: date_filter
            label: "תאריך"
            applies_to: payment_date
          - component: filter_dropdown
            key: status_filter
            label: "סטטוס"
            options: [pending, completed, failed, refunded, cancelled]
            multi_select: true
          - component: amount_range_filter
            key: amount_filter
            label: "סכום"
            applies_to: amount
          - component: filter_dropdown
            key: matched_filter
            label: "שיוך"
            options:
              - value: matched
                label: "משויך למסמך"
              - value: unmatched
                label: "לא משויך"
        right:
          - component: button
            label: "ייצוא"
            icon: download
            action: export
            formats: [xlsx, csv]

      summary_cards:
        - label: "סה\"כ תשלומים"
          value: "SUM(amount WHERE status = completed)"
          format: currency
        - label: "עסקאות"
          value: "COUNT(*)"
        - label: "ממתינים"
          value: "COUNT(WHERE status = pending)"
          color: orange
        - label: "לא משויכים"
          value: "COUNT(WHERE document_id IS NULL AND status = completed)"
          color: red

      table_columns:
        - key: payment_date
          label: "תאריך"
          sortable: true
          width: 110
          format: date
        - key: payment_method
          label: "אמצעי"
          sortable: true
          width: 130
          display: "payment_method.name"
        - key: amount
          label: "סכום"
          sortable: true
          width: 120
          format: currency
        - key: reference_number
          label: "אסמכתא"
          width: 130
        - key: external_transaction_id
          label: "מזהה עסקה"
          width: 150
        - key: document
          label: "מסמך"
          width: 130
          display: "document.document_number"
          link_to: "dynamic: /finance/income/:document_id or /finance/expenses/:document_id"
        - key: customer_or_supplier
          label: "לקוח/ספק"
          width: 170
          computed: "via document"
        - key: status_id
          label: "סטטוס"
          sortable: true
          width: 110
          type: status_badge
          color_map:
            pending: orange
            completed: green
            failed: red
            refunded: blue
            cancelled: gray
        - key: notes
          label: "הערות"
          width: 180

      row_actions:
        - action: view_document
          label: "צפה במסמך"
          icon: visibility
          target: "dynamic document url"
          condition: "document_id IS NOT NULL"
        - action: match_to_document
          label: "שייך למסמך"
          icon: link
          type: modal
          condition: "document_id IS NULL"
          modal_fields:
            - name: document_id
              label: "מסמך"
              type: search_select
              entity: documents
              display_field: document_number
              filter: "balance_due > 0"
              required: true

    # === 12.3.2 CREDIT CLEARING LIST ===
    credit_clearing_list:
      route: /payments/credit-clearing
      title: "סליקת אשראי"
      type: list_page
      entity: credit_transactions

      toolbar:
        left:
          - component: search_input
            placeholder: "חיפוש לפי לקוח, קוד עסקה..."
            searches_fields: ["customer.full_name", transaction_code, provider_reference]
          - component: filter_dropdown
            key: customer_filter
            label: "לקוח"
            options_from: customers
            display_field: full_name
            searchable: true
          - component: date_range_picker
            key: date_filter
            label: "תאריך"
            applies_to: transaction_date
          - component: filter_dropdown
            key: status_filter
            label: "סטטוס"
            options: [pending, approved, declined, settled, refunded, cancelled]
            multi_select: true
          - component: amount_range_filter
            key: amount_filter
            label: "סכום"
            applies_to: amount
        right:
          - component: button
            label: "סליקה חדשה"
            icon: add
            action: navigate
            target: /payments/credit-clearing/create
            variant: primary
          - component: button
            label: "ייצוא"
            icon: download
            action: export
            formats: [xlsx, csv]

      table_columns:
        - key: transaction_date
          label: "תאריך"
          sortable: true
          width: 140
          format: datetime
        - key: customer
          label: "לקוח"
          sortable: true
          width: 180
          display: "customer.full_name"
          link_to: "/customers/:customer_id"
        - key: amount
          label: "סכום"
          sortable: true
          width: 120
          format: currency
        - key: card_type
          label: "סוג כרטיס"
          width: 100
        - key: card_last_four
          label: "4 ספרות"
          width: 80
        - key: installments
          label: "תשלומים"
          width: 80
        - key: transaction_code
          label: "קוד עסקה"
          width: 130
        - key: provider_reference
          label: "אסמכתא סליקה"
          width: 150
        - key: document
          label: "מסמך"
          width: 130
          display: "document.document_number"
          link_to: "/finance/income/:document_id"
        - key: status_id
          label: "סטטוס"
          sortable: true
          width: 110
          type: status_badge
          color_map:
            pending: orange
            approved: green
            declined: red
            settled: blue
            refunded: purple
            cancelled: gray

      row_actions:
        - action: view
          label: "צפייה"
          icon: visibility
        - action: match_to_document
          label: "שייך למסמך"
          icon: link
          type: modal
          condition: "document_id IS NULL"
        - action: refund
          label: "זיכוי"
          icon: undo
          type: confirm_dialog
          condition: "status_id IN (approved, settled)"

    # === 12.3.3 CREDIT CHARGE CREATE ===
    credit_charge_create:
      route: /payments/credit-clearing/create
      title: "סליקת אשראי חדשה"
      type: form_page
      entity: credit_transactions

      form_sections:
        - section: details
          title: "פרטי סליקה"
          layout: two_column
          fields:
            - name: customer_id
              label: "לקוח"
              type: search_select
              entity: customers
              display_field: full_name
              search_fields: [full_name, customer_number, phone]
              required: true
              col_span: 1
            - name: document_id
              label: "מסמך לחיוב"
              type: search_select
              entity: documents
              display_field: document_number
              filter: "direction = income AND balance_due > 0"
              allow_clear: true
              col_span: 1
              on_select_auto_fill:
                amount: "document.balance_due"
            - name: amount
              label: "סכום"
              type: currency_input
              required: true
              col_span: 1
            - name: installments
              label: "מספר תשלומים"
              type: number_input
              min: 1
              max: 36
              default: 1
              col_span: 1
            - name: card_type
              label: "סוג כרטיס"
              type: select
              options:
                - value: Visa
                  label: "Visa"
                - value: Mastercard
                  label: "Mastercard"
                - value: Amex
                  label: "American Express"
                - value: Diners
                  label: "Diners"
                - value: Isracard
                  label: "ישראכרט"
              col_span: 1
            - name: card_last_four
              label: "4 ספרות אחרונות"
              type: text_input
              max_length: 4
              col_span: 1
            - name: notes
              label: "הערות"
              type: textarea
              rows: 2
              col_span: 2

      form_actions:
        - action: charge
          label: "בצע סליקה"
          variant: primary
          side_effects:
            - "sends charge request to payment provider"
            - "on success: creates payment record, updates document.paid_amount"
          navigates_to: /payments/credit-clearing
        - action: cancel
          label: "ביטול"
          variant: text
          navigates_to: /payments/credit-clearing

    # === 12.3.4 BANK TRANSFERS LIST ===
    bank_transfers_list:
      route: /payments/bank-transfers
      title: "העברות בנקאיות"
      type: list_page
      entity: bank_transfers

      toolbar:
        left:
          - component: search_input
            placeholder: "חיפוש לפי מספר העברה, אסמכתא..."
            searches_fields: [transfer_number, reference]
          - component: date_range_picker
            key: date_filter
            label: "תאריך"
            applies_to: transfer_date
          - component: filter_dropdown
            key: status_filter
            label: "סטטוס"
            options: [pending, completed, failed, cancelled]
            multi_select: true
          - component: amount_range_filter
            key: amount_filter
            label: "סכום"
            applies_to: amount
        right:
          - component: button
            label: "העברה חדשה"
            icon: add
            action: navigate
            target: /payments/bank-transfers/create
            variant: primary
          - component: button
            label: "ייצוא"
            icon: download
            action: export
            formats: [xlsx, csv]

      table_columns:
        - key: transfer_number
          label: "מספר העברה"
          sortable: true
          width: 120
        - key: transfer_date
          label: "תאריך"
          sortable: true
          width: 110
          format: date
        - key: from_account
          label: "מחשבון"
          width: 130
        - key: to_account
          label: "לחשבון"
          width: 130
        - key: amount
          label: "סכום"
          sortable: true
          width: 120
          format: currency
        - key: reference
          label: "אסמכתא"
          width: 130
        - key: document
          label: "מסמך"
          width: 130
          display: "document.document_number"
          link_to: "dynamic"
        - key: status_id
          label: "סטטוס"
          sortable: true
          width: 110
          type: status_badge
          color_map:
            pending: orange
            completed: green
            failed: red
            cancelled: gray
        - key: notes
          label: "הערות"
          width: 180

      row_actions:
        - action: view
          label: "צפייה"
          icon: visibility
        - action: mark_completed
          label: "סמן כבוצע"
          icon: check_circle
          condition: "status_id = pending"
        - action: cancel
          label: "בטל"
          icon: cancel
          condition: "status_id = pending"

    # === 12.3.5 BANK TRANSFER CREATE ===
    bank_transfer_create:
      route: /payments/bank-transfers/create
      title: "העברה בנקאית חדשה"
      type: form_page
      entity: bank_transfers

      form_sections:
        - section: details
          title: "פרטי העברה"
          layout: two_column
          fields:
            - name: from_account
              label: "מחשבון"
              type: text_input
              required: true
              col_span: 1
            - name: to_account
              label: "לחשבון"
              type: text_input
              required: true
              col_span: 1
            - name: amount
              label: "סכום"
              type: currency_input
              required: true
              col_span: 1
            - name: transfer_date
              label: "תאריך"
              type: date_picker
              default: today
              required: true
              col_span: 1
            - name: reference
              label: "אסמכתא"
              type: text_input
              col_span: 1
            - name: document_id
              label: "מסמך משויך"
              type: search_select
              entity: documents
              display_field: document_number
              allow_clear: true
              col_span: 1
            - name: notes
              label: "הערות"
              type: textarea
              rows: 2
              col_span: 2

      form_actions:
        - action: save
          label: "שמור"
          variant: primary
          navigates_to: /payments/bank-transfers
        - action: cancel
          label: "ביטול"
          variant: text
          navigates_to: /payments/bank-transfers

    # === 12.3.6 STANDING ORDERS LIST ===
    standing_orders_list:
      route: /payments/standing-orders
      title: "הוראות קבע"
      type: list_page
      entity: standing_orders

      toolbar:
        left:
          - component: search_input
            placeholder: "חיפוש לפי לקוח..."
            searches_fields: ["customer.full_name", "customer.customer_number"]
          - component: filter_dropdown
            key: status_filter
            label: "סטטוס"
            options:
              - value: active
                label: "פעיל"
              - value: paused
                label: "מושהה"
              - value: cancelled
                label: "בוטל"
              - value: completed
                label: "הסתיים"
            multi_select: true
          - component: filter_dropdown
            key: frequency_filter
            label: "תדירות"
            options: [monthly, quarterly, yearly]
        right:
          - component: button
            label: "הוראת קבע חדשה"
            icon: add
            action: navigate
            target: /payments/standing-orders/create
            variant: primary

      table_columns:
        - key: customer
          label: "לקוח"
          sortable: true
          width: 180
          display: "customer.full_name"
          link_to: "/customers/:customer_id"
        - key: amount
          label: "סכום"
          sortable: true
          width: 120
          format: currency
        - key: frequency
          label: "תדירות"
          sortable: true
          width: 100
        - key: start_date
          label: "התחלה"
          sortable: true
          width: 110
          format: date
        - key: end_date
          label: "סיום"
          width: 110
          format: date
        - key: next_charge_date
          label: "חיוב הבא"
          sortable: true
          width: 120
          format: date
        - key: related_document
          label: "מסמך"
          width: 130
          display: "related_document.document_number"
          link_to: "/finance/income/:related_document_id"
        - key: status_id
          label: "סטטוס"
          sortable: true
          width: 110
          type: status_badge
          color_map:
            active: green
            paused: orange
            cancelled: red
            completed: gray
        - key: bank_details
          label: "פרטי בנק"
          width: 150

      row_actions:
        - action: view
          label: "צפייה"
          icon: visibility
          target: "/payments/standing-orders/:id"
        - action: edit
          label: "עריכה"
          icon: edit
          target: "/payments/standing-orders/:id/edit"
          condition: "status_id IN (active, paused)"
        - action: pause
          label: "השהה"
          icon: pause
          condition: "status_id = active"
          sets: "status_id = paused"
        - action: resume
          label: "חדש"
          icon: play_arrow
          condition: "status_id = paused"
          sets: "status_id = active"
        - action: cancel
          label: "בטל"
          icon: cancel
          type: confirm_dialog
          condition: "status_id IN (active, paused)"
          sets: "status_id = cancelled"

    # === 12.3.7 STANDING ORDER CREATE ===
    standing_order_create:
      route: /payments/standing-orders/create
      title: "הוראת קבע חדשה"
      type: form_page
      entity: standing_orders

      form_sections:
        - section: details
          title: "פרטי הוראת קבע"
          layout: two_column
          fields:
            - name: customer_id
              label: "לקוח"
              type: search_select
              entity: customers
              display_field: full_name
              required: true
              col_span: 1
            - name: related_document_id
              label: "מסמך קשור"
              type: search_select
              entity: documents
              display_field: document_number
              allow_clear: true
              col_span: 1
            - name: amount
              label: "סכום"
              type: currency_input
              required: true
              col_span: 1
            - name: frequency
              label: "תדירות"
              type: select
              options:
                - value: monthly
                  label: "חודשי"
                - value: quarterly
                  label: "רבעוני"
                - value: yearly
                  label: "שנתי"
              required: true
              col_span: 1
            - name: start_date
              label: "תאריך התחלה"
              type: date_picker
              required: true
              col_span: 1
            - name: end_date
              label: "תאריך סיום"
              type: date_picker
              required: false
              col_span: 1
            - name: bank_details
              label: "פרטי בנק"
              type: textarea
              rows: 2
              col_span: 2
            - name: notes
              label: "הערות"
              type: textarea
              rows: 2
              col_span: 2

      form_actions:
        - action: save
          label: "צור הוראת קבע"
          variant: primary
          sets: "status_id = active, next_charge_date = start_date"
          navigates_to: /payments/standing-orders
        - action: cancel
          label: "ביטול"
          variant: text
          navigates_to: /payments/standing-orders

    # === 12.3.8 STANDING ORDER DETAILS ===
    standing_order_details:
      route: "/payments/standing-orders/:id"
      title: "פרטי הוראת קבע"
      type: detail_page
      entity: standing_orders

      header:
        layout: detail_header
        elements:
          - component: back_button
            target: /payments/standing-orders
          - component: title
            display: "customer.full_name"
            subtitle: "הוראת קבע"
          - component: status_badge
            field: status_id
          - component: action_buttons
            actions:
              - action: edit
                label: "עריכה"
                icon: edit
                condition: "status_id IN (active, paused)"
              - action: pause
                label: "השהה"
                icon: pause
                condition: "status_id = active"
              - action: resume
                label: "חדש"
                icon: play_arrow
                condition: "status_id = paused"
              - action: cancel
                label: "בטל"
                icon: cancel
                condition: "status_id IN (active, paused)"

      tabs:
        - tab: details
          label: "פרטים"
          icon: info
          content:
            layout: detail_grid
            fields:
              - label: "לקוח"
                value: "customer.full_name"
                link_to: "/customers/:customer_id"
              - label: "סכום"
                value: amount
                format: currency
              - label: "תדירות"
                value: frequency
              - label: "תאריך התחלה"
                value: start_date
                format: date
              - label: "תאריך סיום"
                value: end_date
                format: date
              - label: "חיוב הבא"
                value: next_charge_date
                format: date
              - label: "מסמך קשור"
                value: "related_document.document_number"
                link_to: "/finance/income/:related_document_id"
              - label: "פרטי בנק"
                value: bank_details
              - label: "סטטוס"
                value: status_id
                type: status_badge
              - label: "הערות"
                value: notes

        - tab: payment_history
          label: "היסטוריית חיובים"
          icon: history
          content:
            entity: payments
            filter: "linked to this standing order"
            type: table
            sort: payment_date DESC
            columns:
              - key: payment_date
                label: "תאריך"
                width: 110
                format: date
              - key: amount
                label: "סכום"
                width: 120
                format: currency
              - key: status_id
                label: "סטטוס"
                width: 110
                type: status_badge
              - key: document
                label: "מסמך"
                width: 130
                display: "document.document_number"

        - tab: activity_log
          label: "לוג"
          icon: history
          content:
            entity: activity_logs
            filter: "entity_type = standing_order AND entity_id = :id"
            view_type: timeline

    # === 12.3.9 MASAV BATCHES LIST ===
    masav_batches_list:
      route: /payments/masav
      title: "מס\"ב"
      type: list_page
      entity: masav_batches

      toolbar:
        left:
          - component: search_input
            placeholder: "חיפוש לפי מספר אצווה..."
            searches_fields: [batch_number]
          - component: date_range_picker
            key: date_filter
            label: "תאריך"
            applies_to: batch_date
          - component: filter_dropdown
            key: status_filter
            label: "סטטוס"
            options: [draft, generated, sent, processed, failed]
            multi_select: true
        right:
          - component: button
            label: "אצווה חדשה"
            icon: add
            action: navigate
            target: /payments/masav/create
            variant: primary

      table_columns:
        - key: batch_number
          label: "מספר אצווה"
          sortable: true
          width: 120
          link_to: "/payments/masav/:id"
        - key: batch_date
          label: "תאריך"
          sortable: true
          width: 110
          format: date
        - key: transaction_count
          label: "עסקאות"
          sortable: true
          width: 90
        - key: total_amount
          label: "סכום כולל"
          sortable: true
          width: 130
          format: currency
        - key: status_id
          label: "סטטוס"
          sortable: true
          width: 110
          type: status_badge
          color_map:
            draft: gray
            generated: blue
            sent: orange
            processed: green
            failed: red
        - key: file_path
          label: "קובץ"
          width: 100
          type: file_link

      row_actions:
        - action: view
          label: "צפייה"
          icon: visibility
          target: "/payments/masav/:id"
        - action: generate_file
          label: "צור קובץ"
          icon: upload_file
          condition: "status_id = draft"
          sets: "status_id = generated"
        - action: mark_sent
          label: "סמן כנשלח"
          icon: send
          condition: "status_id = generated"
          sets: "status_id = sent"
        - action: mark_processed
          label: "סמן כעובד"
          icon: check_circle
          condition: "status_id = sent"
          sets: "status_id = processed"

    # === 12.3.10 MASAV BATCH CREATE ===
    masav_batch_create:
      route: /payments/masav/create
      title: "אצווה חדשה"
      type: form_page
      entity: masav_batches

      form_sections:
        - section: header
          title: "פרטי אצווה"
          layout: two_column
          fields:
            - name: batch_date
              label: "תאריך אצווה"
              type: date_picker
              default: today
              required: true
              col_span: 1

        - section: select_payments
          title: "בחר תשלומים"
          layout: full_width
          description: "Select payments to include in this MASAV batch"
          content:
            entity: payments
            filter: "payment_method = masav AND status = pending AND NOT in any batch"
            type: selectable_table
            columns:
              - key: payment_date
                label: "תאריך"
                width: 110
                format: date
              - key: customer_or_supplier
                label: "לקוח/ספק"
                width: 180
              - key: document
                label: "מסמך"
                width: 130
                display: "document.document_number"
              - key: amount
                label: "סכום"
                width: 120
                format: currency
              - key: bank_code
                label: "קוד בנק"
                width: 80
              - key: branch_code
                label: "סניף"
                width: 80
              - key: account_number
                label: "חשבון"
                width: 120
            selectable: true
            select_all: true

        - section: summary
          title: "סיכום"
          layout: single_column
          content:
            - label: "עסקאות נבחרות"
              value: "COUNT(selected)"
            - label: "סכום כולל"
              value: "SUM(selected.amount)"
              format: currency

      form_actions:
        - action: save_draft
          label: "שמור כטיוטה"
          variant: secondary
          navigates_to: "/payments/masav/:id"
        - action: save_and_generate
          label: "שמור וצור קובץ"
          variant: primary
          side_effects:
            - "creates masav_batch_items for selected payments"
            - "generates MASAV file"
            - "sets status = generated"
          navigates_to: "/payments/masav/:id"
        - action: cancel
          label: "ביטול"
          variant: text
          navigates_to: /payments/masav

    # === 12.3.11 MASAV BATCH DETAILS ===
    masav_batch_details:
      route: "/payments/masav/:id"
      title: "פרטי אצווה"
      type: detail_page
      entity: masav_batches

      header:
        layout: detail_header
        elements:
          - component: back_button
            target: /payments/masav
          - component: title
            display: "batch_number"
          - component: status_badge
            field: status_id
          - component: action_buttons
            actions:
              - action: generate_file
                label: "צור קובץ"
                icon: upload_file
                condition: "status_id = draft"
              - action: download_file
                label: "הורד קובץ"
                icon: download
                condition: "file_path IS NOT NULL"
              - action: mark_sent
                label: "סמן כנשלח"
                icon: send
                condition: "status_id = generated"
              - action: mark_processed
                label: "סמן כעובד"
                icon: check_circle
                condition: "status_id = sent"
              - action: delete
                label: "מחק"
                icon: delete
                condition: "status_id = draft"

      summary_cards:
        - label: "עסקאות"
          value: transaction_count
        - label: "סכום כולל"
          value: total_amount
          format: currency

      tabs:
        - tab: details
          label: "פרטים"
          icon: info
          content:
            layout: detail_grid
            fields:
              - label: "מספר אצווה"
                value: batch_number
              - label: "תאריך"
                value: batch_date
                format: date
              - label: "עסקאות"
                value: transaction_count
              - label: "סכום כולל"
                value: total_amount
                format: currency
              - label: "סטטוס"
                value: status_id
                type: status_badge
              - label: "קובץ"
                value: file_path
                type: file_link

        - tab: items
          label: "עסקאות"
          icon: list
          content:
            entity: masav_batch_items
            filter: "masav_batch_id = :id"
            type: table
            columns:
              - key: beneficiary_name
                label: "שם מוטב"
                width: 180
              - key: bank_code
                label: "בנק"
                width: 80
              - key: branch_code
                label: "סניף"
                width: 80
              - key: account_number
                label: "חשבון"
                width: 120
              - key: amount
                label: "סכום"
                width: 120
                format: currency
              - key: payment
                label: "תשלום"
                width: 130
                display: "payment details"

        - tab: activity_log
          label: "לוג"
          icon: history
          content:
            entity: activity_logs
            filter: "entity_type = masav_batch AND entity_id = :id"
            view_type: timeline

    # === 12.3.12 UNMATCHED PAYMENTS ===
    unmatched_payments_page:
      route: /payments/unmatched
      title: "תשלומים לא משויכים"
      type: special_page

      description: "Shows all payments that do not have a document_id assigned"

      toolbar:
        left:
          - component: search_input
            placeholder: "חיפוש..."
            searches_fields: [reference_number, external_transaction_id]
          - component: filter_dropdown
            key: method_filter
            label: "אמצעי"
            options_from: payment_methods
            display_field: name
          - component: date_range_picker
            key: date_filter
            label: "תאריך"
            applies_to: payment_date
          - component: amount_range_filter
            key: amount_filter
            label: "סכום"
            applies_to: amount

      summary_cards:
        - label: "תשלומים לא משויכים"
          value: "COUNT(payments WHERE document_id IS NULL AND status = completed)"
        - label: "סכום כולל"
          value: "SUM(amount WHERE document_id IS NULL AND status = completed)"
          format: currency

      table:
        entity: payments
        filter: "document_id IS NULL AND status_id = completed"
        sort: payment_date DESC
        columns:
          - key: payment_date
            label: "תאריך"
            sortable: true
            width: 110
            format: date
          - key: payment_method
            label: "אמצעי"
            width: 130
            display: "payment_method.name"
          - key: amount
            label: "סכום"
            sortable: true
            width: 120
            format: currency
          - key: reference_number
            label: "אסמכתא"
            width: 130
          - key: external_transaction_id
            label: "מזהה עסקה"
            width: 150
          - key: notes
            label: "הערות"
            width: 200
          - key: created_at
            label: "נרשם"
            width: 140
            format: datetime

      row_actions:
        - action: match_to_document
          label: "שייך למסמך"
          icon: link
          type: modal
          modal_fields:
            - name: document_id
              label: "מסמך"
              type: search_select
              entity: documents
              display_field: document_number
              search_fields: [document_number, "customer.full_name", "supplier.full_name"]
              filter: "balance_due > 0"
              required: true
              show_fields_in_dropdown: [document_number, customer_or_supplier, total_amount, balance_due]
            - name: match_amount
              label: "סכום לשיוך"
              type: currency_input
              default: "payment.amount"
              required: true
          side_effects:
            - "sets payment.document_id"
            - "creates payment record if partial"
            - "updates document.paid_amount"
            - "updates document.balance_due"
            - "updates document.status_id"
        - action: create_document
          label: "צור מסמך חדש"
          icon: add
          target: "/finance/income/create?payment_id=:id"
          description: "Creates a new income document and links this payment to it"
        - action: delete_payment
          label: "מחק תשלום"
          icon: delete
          type: confirm_dialog

      quick_match:
        description: "System suggests possible matches based on amount and date proximity"
        suggestion_algorithm: "find documents with balance_due = payment.amount OR close to it, same customer if identifiable"
        display: "suggestion badge next to each payment row"

  # ----------------------------------------------------------
  # 12.4 NAVIGATION MAP
  # ----------------------------------------------------------
  navigation_map:
    transactions_page:
      navigates_to:
        - target: "document details (dynamic)"
          trigger: "click document number"
        - target: "/customers/:customer_id"
          trigger: "click customer"
        - target: "/suppliers/:supplier_id"
          trigger: "click supplier"
    credit_clearing_list:
      navigates_to:
        - target: /payments/credit-clearing/create
          trigger: "click create"
        - target: "/customers/:customer_id"
          trigger: "click customer"
        - target: "/finance/income/:document_id"
          trigger: "click document"
    bank_transfers_list:
      navigates_to:
        - target: /payments/bank-transfers/create
          trigger: "click create"
        - target: "document details"
          trigger: "click document"
    standing_orders_list:
      navigates_to:
        - target: /payments/standing-orders/create
          trigger: "click create"
        - target: "/payments/standing-orders/:id"
          trigger: "click row"
        - target: "/customers/:customer_id"
          trigger: "click customer"
    masav_batches_list:
      navigates_to:
        - target: /payments/masav/create
          trigger: "click create"
        - target: "/payments/masav/:id"
          trigger: "click batch"
    unmatched_payments_page:
      navigates_to:
        - target: "document details"
          trigger: "click after matching"
        - target: "/finance/income/create?payment_id=:id"
          trigger: "click create document"

