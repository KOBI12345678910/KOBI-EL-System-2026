              - label: "מספר הזמנה"
                value: order_number
              - label: "ספק"
                value: "supplier.full_name"
                link_to: "/suppliers/:supplier_id"
              - label: "דרישת רכש"
                value: "purchase_request.request_number"
                link_to: "/procurement/requests/:purchase_request_id"
              - label: "תאריך הזמנה"
                value: order_date
                format: date
              - label: "אספקה צפויה"
                value: expected_delivery
                format: date
              - label: "סכום לפני מע\"מ"
                value: subtotal
                format: currency
              - label: "מע\"מ"
                value: tax_amount
                format: currency
              - label: "סה\"כ"
                value: total_amount
                format: currency
              - label: "כתובת אספקה"
                value: delivery_address
              - label: "נוצר על ידי"
                value: "creator_user.full_name"
              - label: "הערות"
                value: notes

        - tab: items
          label: "פריטים"
          icon: list
          content:
            entity: purchase_order_items
            filter: "purchase_order_id = :id"
            type: table
            columns:
              - key: product
                label: "מוצר"
                width: 200
                display: "product.name"
                link_to: "/products/:product_id"
              - key: description
                label: "תיאור"
                width: 220
              - key: quantity
                label: "כמות"
                width: 90
                format: decimal
              - key: unit_price
                label: "מחיר יחידה"
                width: 130
                format: currency
              - key: tax_rate
                label: "מע\"מ %"
                width: 80
                format: percentage
              - key: line_total
                label: "סה\"כ שורה"
                width: 130
                format: currency
              - key: received_quantity
                label: "כמות שהתקבלה"
                width: 120
                format: decimal
              - key: remaining
                label: "נותר לקבלה"
                width: 110
                computed: "quantity - received_quantity"
                format: decimal
                color_rules:
                  - condition: "value > 0"
                    color: orange
                  - condition: "value = 0"
                    color: green

        - tab: goods_receipts
          label: "קבלות סחורה"
          icon: inventory
          content:
            entity: goods_receipts
            filter: "purchase_order_id = :id"
            type: table
            columns:
              - key: receipt_number
                label: "מספר קבלה"
                width: 130
                link_to: "/procurement/receipts/:id"
              - key: receipt_date
                label: "תאריך קבלה"
                width: 120
                format: date
              - key: warehouse
                label: "מחסן"
                width: 150
                display: "warehouse.name"
              - key: status_id
                label: "סטטוס"
                width: 120
                type: status_badge
              - key: received_by
                label: "התקבל ע\"י"
                width: 150
                display: "receiver_user.full_name"

        - tab: linked_documents
          label: "מסמכים מקושרים"
          icon: link
          content:
            entity: document_links
            filter: "involves purchase_order :id"
            type: table
            columns:
              - key: document_type
                label: "סוג מסמך"
                width: 130
              - key: document_number
                label: "מספר"
                width: 150
                link_to: "dynamic"
              - key: link_type
                label: "סוג קשר"
                width: 130
              - key: total_amount
                label: "סכום"
                width: 130
                format: currency
              - key: status
                label: "סטטוס"
                width: 120
                type: status_badge
              - key: created_at
                label: "תאריך"
                width: 130
                format: datetime

        - tab: activity_log
          label: "לוג פעילות"
          icon: history
          content:
            entity: activity_logs
            filter: "entity_type = purchase_order AND entity_id = :id"
            view_type: timeline
            sort: created_at DESC

    # === 8.4.7 GOODS RECEIPTS LIST ===
    goods_receipts_list:
      route: /procurement/receipts
      title: "קבלות סחורה"
      type: list_page
      entity: goods_receipts

      toolbar:
        left:
          - component: search_input
            placeholder: "חיפוש לפי מספר קבלה, הזמנה, ספק..."
            searches_fields: [receipt_number, "purchase_order.order_number", "supplier.full_name"]
          - component: filter_dropdown
            key: status_filter
            label: "סטטוס"
            options: [draft, received, inspected, accepted, rejected]
            multi_select: true
          - component: filter_dropdown
            key: supplier_filter
            label: "ספק"
            options_from: suppliers
            display_field: full_name
            searchable: true
          - component: filter_dropdown
            key: warehouse_filter
            label: "מחסן"
            options_from: warehouses
            display_field: name
          - component: date_range_picker
            key: date_filter
            label: "תאריך קבלה"
            applies_to: receipt_date
        right:
          - component: button
            label: "קבלת סחורה חדשה"
            icon: add
            action: navigate
            target: /procurement/receipts/create
            variant: primary

      table_columns:
        - key: receipt_number
          label: "מספר קבלה"
          sortable: true
          width: 130
          link_to: "/procurement/receipts/:id"
        - key: purchase_order
          label: "הזמנת רכש"
          sortable: true
          width: 130
          display: "purchase_order.order_number"
          link_to: "/procurement/orders/:purchase_order_id"
        - key: supplier
          label: "ספק"
          sortable: true
          width: 180
          display: "supplier.full_name"
          link_to: "/suppliers/:supplier_id"
        - key: receipt_date
          label: "תאריך קבלה"
          sortable: true
          width: 120
          format: date
        - key: warehouse
          label: "מחסן"
          sortable: true
          width: 150
          display: "warehouse.name"
        - key: items_count
          label: "פריטים"
          width: 80
          computed: "COUNT(goods_receipt_items)"
        - key: status_id
          label: "סטטוס"
          sortable: true
          width: 120
          type: status_badge
          color_map:
            draft: gray
            received: blue
            inspected: orange
            accepted: green
            rejected: red
        - key: received_by
          label: "התקבל ע\"י"
          width: 150
          display: "receiver_user.full_name"

      row_actions:
        - action: view
          label: "צפייה"
          icon: visibility
          target: "/procurement/receipts/:id"
        - action: edit
          label: "עריכה"
          icon: edit
          target: "/procurement/receipts/:id/edit"
          condition: "status_id = draft"
        - action: accept
          label: "אשר קבלה"
          icon: check_circle
          sets: "status_id = accepted"
          condition: "status_id IN (received, inspected)"
        - action: reject
          label: "דחה"
          icon: cancel
          type: confirm_dialog
          condition: "status_id IN (received, inspected)"

    # === 8.4.8 GOODS RECEIPT CREATE ===
    goods_receipt_create:
      route: /procurement/receipts/create
      title: "קבלת סחורה חדשה"
      type: form_page
      entity: goods_receipts
      pre_fill_from: "purchase_order (if from_po param exists)"

      form_sections:
        - section: header
          title: "פרטי קבלה"
          layout: two_column
          fields:
            - name: purchase_order_id
              label: "הזמנת רכש"
              type: search_select
              entity: purchase_orders
              display_field: order_number
              filter: "status_id IN (sent, confirmed, partially_received)"
              required: true
              col_span: 1
              on_select_auto_fill:
                supplier_id: "purchase_order.supplier_id"
            - name: supplier_id
              label: "ספק"
              type: search_select
              entity: suppliers
              display_field: full_name
              required: true
              read_only_when: "purchase_order_id is set"
              col_span: 1
            - name: receipt_date
              label: "תאריך קבלה"
              type: date_picker
              default: today
              required: true
              col_span: 1
            - name: warehouse_id
              label: "מחסן יעד"
              type: select
              entity: warehouses
              display_field: name
              filter: "is_active = true"
              required: true
              col_span: 1
            - name: received_by
              label: "התקבל על ידי"
              type: select
              entity: users
              display_field: full_name
              default: current_user
              required: true
              col_span: 1

        - section: items
          title: "פריטים"
          layout: editable_table
          entity: goods_receipt_items
          auto_populate_from: "purchase_order_items WHERE purchase_order_id = :purchase_order_id"
          columns:
            - name: product_id
              label: "מוצר"
              type: display
              display: "product.name"
              width: 200
              read_only: true
            - name: purchase_order_item_id
              type: hidden
            - name: quantity_ordered
              label: "כמות שהוזמנה"
              type: display
              width: 120
              format: decimal
              read_only: true
            - name: already_received
              label: "כמות שהתקבלה קודם"
              type: display
              width: 130
              computed: "purchase_order_item.received_quantity"
              format: decimal
              read_only: true
            - name: quantity_received
              label: "כמות שהתקבלה כעת"
              type: number_input
              decimal_places: 2
              width: 130
              required: true
              validation: "quantity_received <= quantity_ordered - already_received"
            - name: quality_status
              label: "בדיקת איכות"
              type: select
              options:
                - value: pending
                  label: "ממתין"
                - value: passed
                  label: "עבר"
                - value: failed
                  label: "נכשל"
              default: pending
              width: 120
            - name: notes
              label: "הערות"
              type: text_input
              width: 180

        - section: notes
          title: "הערות"
          fields:
            - name: notes
              label: "הערות כלליות"
              type: textarea
              rows: 3

      form_actions:
        - action: save_draft
          label: "שמור כטיוטה"
          variant: secondary
          sets: "status_id = draft"
          navigates_to: "/procurement/receipts/:id"
        - action: confirm_receipt
          label: "אשר קבלה"
          variant: primary
          sets: "status_id = received"
          side_effects:
            - "update purchase_order_items.received_quantity"
            - "create stock_movements for each item"
            - "update stock_levels"
            - "update purchase_order status if fully received"
          navigates_to: "/procurement/receipts/:id"
        - action: cancel
          label: "ביטול"
          variant: text
          navigates_to: /procurement/receipts

    # === 8.4.9 GOODS RECEIPT DETAILS ===
    goods_receipt_details:
      route: "/procurement/receipts/:id"
      title: "פרטי קבלת סחורה"
      type: detail_page
      entity: goods_receipts

      header:
        layout: detail_header
        elements:
          - component: back_button
            target: /procurement/receipts
          - component: title
            display: "receipt_number"
          - component: status_badge
            field: status_id
          - component: action_buttons
            actions:
              - action: edit
                label: "עריכה"
                icon: edit
                condition: "status_id = draft"
              - action: accept
                label: "אשר קבלה"
                icon: check_circle
                condition: "status_id IN (received, inspected)"
              - action: reject
                label: "דחה"
                icon: cancel
                condition: "status_id IN (received, inspected)"
              - action: print
                label: "הדפסה"
                icon: print

      tabs:
        - tab: general_info
          label: "פרטים"
          icon: info
          content:
            layout: detail_grid
            fields:
              - label: "מספר קבלה"
                value: receipt_number
              - label: "הזמנת רכש"
                value: "purchase_order.order_number"
                link_to: "/procurement/orders/:purchase_order_id"
              - label: "ספק"
                value: "supplier.full_name"
                link_to: "/suppliers/:supplier_id"
              - label: "תאריך קבלה"
                value: receipt_date
                format: date
              - label: "מחסן"
                value: "warehouse.name"
              - label: "סטטוס"
                value: status_id
                type: status_badge
              - label: "התקבל ע\"י"
                value: "receiver_user.full_name"
              - label: "הערות"
                value: notes

        - tab: items
          label: "פריטים"
          icon: list
          content:
            entity: goods_receipt_items
            filter: "goods_receipt_id = :id"
            type: table
            columns:
              - key: product
                label: "מוצר"
                width: 200
                display: "product.name"
              - key: quantity_ordered
                label: "כמות שהוזמנה"
                width: 120
                format: decimal
              - key: quantity_received
                label: "כמות שהתקבלה"
                width: 120
                format: decimal
              - key: quality_status
                label: "בדיקת איכות"
                width: 120
                type: status_badge
                color_map:
                  pending: orange
                  passed: green
                  failed: red
              - key: notes
                label: "הערות"
                width: 200

        - tab: activity_log
          label: "לוג פעילות"
          icon: history
          content:
            entity: activity_logs
            filter: "entity_type = goods_receipt AND entity_id = :id"
            view_type: timeline
            sort: created_at DESC

    # === 8.4.10 SUPPLIER INVOICES ===
    supplier_invoices_list:
      route: /procurement/supplier-invoices
      title: "חשבוניות ספק"
      type: list_page
      entity: documents
      base_filter: "direction = expense AND document_type_id IN (expense_invoice)"
      description: "This page shows expense documents of type expense_invoice. Uses central documents table."

      toolbar:
        left:
          - component: search_input
            placeholder: "חיפוש לפי מספר מסמך, ספק..."
            searches_fields: [document_number, "supplier.full_name"]
          - component: filter_dropdown
            key: supplier_filter
            label: "ספק"
            options_from: suppliers
            display_field: full_name
            searchable: true
          - component: filter_dropdown
            key: status_filter
            label: "סטטוס"
            options: [draft, pending, open, paid, partially_paid, cancelled]
            multi_select: true
          - component: date_range_picker
            key: date_filter
            label: "תאריך"
            applies_to: issue_date
          - component: amount_range_filter
            key: amount_filter
            label: "סכום"
            applies_to: total_amount
        right:
          - component: button
            label: "חשבונית ספק חדשה"
            icon: add
            action: navigate
            target: "/finance/expenses/create?document_type=expense_invoice"
            variant: primary

      table_columns:
        - key: document_number
          label: "מספר מסמך"
          sortable: true
          width: 130
          link_to: "/finance/expenses/:id"
        - key: supplier
          label: "ספק"
          sortable: true
          width: 180
          display: "supplier.full_name"
          link_to: "/suppliers/:supplier_id"
        - key: issue_date
          label: "תאריך"
          sortable: true
          width: 120
          format: date
        - key: due_date
          label: "לתשלום עד"
          sortable: true
          width: 120
          format: date
        - key: total_amount
          label: "סה\"כ"
          sortable: true
          width: 130
          format: currency
        - key: paid_amount
          label: "שולם"
          width: 130
          format: currency
        - key: balance_due
          label: "יתרה"
          width: 130
          format: currency
        - key: status_id
          label: "סטטוס"
          sortable: true
          width: 120
          type: status_badge

    # === 8.4.11 PROCUREMENT APPROVALS ===
    procurement_approvals:
      route: /procurement/approvals
      title: "אישורים"
      type: list_page
      entity: purchase_requests
      base_filter: "status_id = pending_approval"

      toolbar:
        left:
          - component: search_input
            placeholder: "חיפוש..."
            searches_fields: [request_number, "requested_user.full_name"]
          - component: filter_dropdown
            key: department_filter
            label: "מחלקה"

      table_columns:
        - key: request_number
          label: "מספר דרישה"
          sortable: true
          width: 130
          link_to: "/procurement/requests/:id"
        - key: requested_by
          label: "מבקש"
          width: 150
          display: "requested_user.full_name"
        - key: department
          label: "מחלקה"
          width: 120
        - key: request_date
          label: "תאריך"
          sortable: true
          width: 120
          format: date
        - key: needed_by
          label: "נדרש עד"
          width: 120
          format: date
        - key: total_estimated
          label: "סכום מוערך"
          sortable: true
          width: 130
          format: currency
        - key: justification
          label: "הצדקה"
          width: 250

      row_actions:
        - action: view
          label: "צפייה"
          icon: visibility
          target: "/procurement/requests/:id"
        - action: approve
          label: "אשר"
          icon: check_circle
          type: action
          permission: approve_purchase_orders
        - action: reject
          label: "דחה"
          icon: cancel
          type: confirm_dialog
          permission: approve_purchase_orders

  # ----------------------------------------------------------
  # 8.5 NAVIGATION MAP
  # ----------------------------------------------------------
  navigation_map:
    purchase_requests_list:
      navigates_to:
        - target: /procurement/requests/create
          trigger: "click create button"
        - target: "/procurement/requests/:id"
          trigger: "click request row"
        - target: "/procurement/orders/create?from_request=:id"
          trigger: "click convert to PO"
    purchase_request_details:
      navigates_to:
        - target: "/procurement/requests/:id/edit"
          trigger: "click edit"
        - target: "/procurement/orders/create?from_request=:id"
          trigger: "click convert"
        - target: /procurement/requests
          trigger: "click back"
    purchase_orders_list:
      navigates_to:
        - target: /procurement/orders/create
          trigger: "click create button"
        - target: "/procurement/orders/:id"
          trigger: "click order row"
        - target: "/suppliers/:supplier_id"
          trigger: "click supplier name"
        - target: "/procurement/receipts/create?from_po=:id"
          trigger: "click create goods receipt"
    purchase_order_details:
      navigates_to:
        - target: "/procurement/orders/:id/edit"
          trigger: "click edit"
        - target: "/suppliers/:supplier_id"
          trigger: "click supplier"
        - target: "/procurement/requests/:purchase_request_id"
          trigger: "click purchase request"
        - target: "/procurement/receipts/create?from_po=:id"
          trigger: "click create goods receipt"
        - target: "/finance/expenses/create?from_po=:id"
          trigger: "click create supplier invoice"
        - target: "/procurement/receipts/:id"
          trigger: "click goods receipt in tab"
    goods_receipts_list:
      navigates_to:
        - target: /procurement/receipts/create
          trigger: "click create"
        - target: "/procurement/receipts/:id"
          trigger: "click receipt row"
        - target: "/procurement/orders/:purchase_order_id"
          trigger: "click PO number"
        - target: "/suppliers/:supplier_id"
          trigger: "click supplier"
    goods_receipt_details:
      navigates_to:
        - target: "/procurement/orders/:purchase_order_id"
          trigger: "click PO"
        - target: "/suppliers/:supplier_id"
          trigger: "click supplier"
        - target: /procurement/receipts
          trigger: "click back"
