            sort: created_at DESC

    # === 8.4.4 PURCHASE ORDERS LIST ===
    purchase_orders_list:
      route: /procurement/orders
      title: "הזמנות רכש"
      type: list_page
      entity: purchase_orders

      toolbar:
        left:
          - component: search_input
            placeholder: "חיפוש לפי מספר הזמנה, ספק..."
            searches_fields: [order_number, "supplier.full_name", "supplier.company_name"]
          - component: filter_dropdown
            key: status_filter
            label: "סטטוס"
            options:
              - value: draft
                label: "טיוטה"
              - value: sent
                label: "נשלח"
              - value: confirmed
                label: "אושר ע\"י ספק"
              - value: partially_received
                label: "התקבל חלקית"
              - value: received
                label: "התקבל"
              - value: cancelled
                label: "בוטל"
            multi_select: true
          - component: filter_dropdown
            key: supplier_filter
            label: "ספק"
            options_from: suppliers
            display_field: full_name
            searchable: true
          - component: date_range_picker
            key: date_filter
            label: "תאריך הזמנה"
            applies_to: order_date
          - component: amount_range_filter
            key: amount_filter
            label: "סכום"
            applies_to: total_amount
        right:
          - component: button
            label: "הזמנת רכש חדשה"
            icon: add
            action: navigate
            target: /procurement/orders/create
            variant: primary
          - component: button
            label: "ייצוא"
            icon: download
            action: export
            formats: [xlsx, csv, pdf]

      table_columns:
        - key: order_number
          label: "מספר הזמנה"
          sortable: true
          width: 130
          link_to: "/procurement/orders/:id"
        - key: supplier
          label: "ספק"
          sortable: true
          width: 200
          display: "supplier.full_name"
          link_to: "/suppliers/:supplier_id"
        - key: purchase_request
          label: "דרישת רכש"
          width: 130
          display: "purchase_request.request_number"
          link_to: "/procurement/requests/:purchase_request_id"
        - key: order_date
          label: "תאריך הזמנה"
          sortable: true
          width: 120
          format: date
        - key: expected_delivery
          label: "אספקה צפויה"
          sortable: true
          width: 120
          format: date
        - key: total_amount
          label: "סה\"כ"
          sortable: true
          width: 130
          format: currency
        - key: received_percent
          label: "% קבלה"
          width: 100
          type: progress_bar
          computed: "SUM(items.received_quantity) / SUM(items.quantity) * 100"
          format: percentage
        - key: status_id
          label: "סטטוס"
          sortable: true
          width: 130
          type: status_badge
          color_map:
            draft: gray
            sent: blue
            confirmed: teal
            partially_received: orange
            received: green
            cancelled: red

      row_actions:
        - action: view
          label: "צפייה"
          icon: visibility
          target: "/procurement/orders/:id"
        - action: edit
          label: "עריכה"
          icon: edit
          target: "/procurement/orders/:id/edit"
          condition: "status_id IN (draft)"
        - action: send_to_supplier
          label: "שלח לספק"
          icon: send
          type: action
          sets: "status_id = sent"
          condition: "status_id = draft"
        - action: create_goods_receipt
          label: "צור קבלת סחורה"
          icon: inventory
          target: "/procurement/receipts/create?from_po=:id"
          condition: "status_id IN (sent, confirmed, partially_received)"
        - action: create_supplier_invoice
          label: "צור חשבונית ספק"
          icon: receipt
          target: "/finance/expenses/create?from_po=:id"
          condition: "status_id IN (partially_received, received)"
        - action: cancel
          label: "ביטול"
          icon: cancel
          type: confirm_dialog
          condition: "status_id IN (draft, sent)"

    # === 8.4.5 PURCHASE ORDER CREATE ===
    purchase_order_create:
      route: /procurement/orders/create
      title: "הזמנת רכש חדשה"
      type: form_page
      entity: purchase_orders
      pre_fill_from: "purchase_request (if from_request param exists)"

      form_sections:
        - section: header
          title: "פרטי הזמנה"
          layout: two_column
          fields:
            - name: supplier_id
              label: "ספק"
              type: search_select
              entity: suppliers
              display_field: full_name
              search_fields: [full_name, company_name, supplier_number]
              required: true
              create_new_target: /suppliers/create
              col_span: 1
            - name: purchase_request_id
              label: "דרישת רכש"
              type: search_select
              entity: purchase_requests
              display_field: request_number
              filter: "status_id = approved"
              allow_clear: true
              col_span: 1
            - name: order_date
              label: "תאריך הזמנה"
              type: date_picker
              default: today
              required: true
              col_span: 1
            - name: expected_delivery
              label: "תאריך אספקה צפוי"
              type: date_picker
              col_span: 1
            - name: delivery_address
              label: "כתובת אספקה"
              type: textarea
              rows: 2
              col_span: 2

        - section: items
          title: "פריטים"
          layout: editable_table
          entity: purchase_order_items
          columns:
            - name: product_id
              label: "מוצר"
              type: search_select
              entity: products
              display_field: name
              search_fields: [name, sku]
              width: 200
              required: true
              on_select_auto_fill:
                description: "product.name"
                unit_price: "product.default_price"
                tax_rate: "product.tax_rate"
            - name: description
              label: "תיאור"
              type: text_input
              width: 220
              required: true
            - name: quantity
              label: "כמות"
              type: number_input
              decimal_places: 2
              width: 90
              required: true
            - name: unit_price
              label: "מחיר יחידה"
              type: currency_input
              width: 130
              required: true
            - name: tax_rate
              label: "מע\"מ %"
              type: number_input
              decimal_places: 2
              default: 17.00
              width: 80
            - name: line_total
              label: "סה\"כ"
              type: computed
              formula: "quantity * unit_price"
              width: 130
              format: currency
              read_only: true
          row_actions:
            - action: add_row
              label: "הוסף שורה"
              icon: add
            - action: delete_row
              label: "מחק שורה"
              icon: delete
          footer:
            - label: "סכום לפני מע\"מ"
              value: "SUM(line_total)"
              format: currency
            - label: "מע\"מ"
              value: "SUM(quantity * unit_price * tax_rate / 100)"
              format: currency
            - label: "סה\"כ כולל מע\"מ"
              value: "SUM(line_total) + SUM(quantity * unit_price * tax_rate / 100)"
              format: currency
              bold: true

        - section: notes
          title: "הערות"
          fields:
            - name: notes
              label: "הערות"
              type: textarea
              rows: 3

      form_actions:
        - action: save_draft
          label: "שמור כטיוטה"
          variant: secondary
          sets: "status_id = draft"
          navigates_to: "/procurement/orders/:id"
        - action: save_and_send
          label: "שמור ושלח לספק"
          variant: primary
          sets: "status_id = sent"
          navigates_to: "/procurement/orders/:id"
        - action: cancel
          label: "ביטול"
          variant: text
          navigates_to: /procurement/orders

    # === 8.4.6 PURCHASE ORDER DETAILS ===
    purchase_order_details:
      route: "/procurement/orders/:id"
      title: "פרטי הזמנת רכש"
      type: detail_page
      entity: purchase_orders

      header:
        layout: detail_header
        elements:
          - component: back_button
            target: /procurement/orders
          - component: title
