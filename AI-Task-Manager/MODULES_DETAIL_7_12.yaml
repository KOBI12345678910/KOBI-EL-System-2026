              - key: target_document_number
                label: "מספר מסמך"
                width: 150
                link_to: "dynamic based on entity type"
              - key: link_type
                label: "סוג קשר"
                width: 130
              - key: created_at
                label: "תאריך קישור"
                width: 140
                format: datetime

        - tab: activity_log
          label: "לוג פעילות"
          icon: history
          content:
            entity: activity_logs
            filter: "entity_type = purchase_request AND entity_id = :id"
