# ============================================================
# KOBI EL - Full ERP System Specification
# Enterprise Product Architecture - SAP/Oracle/Priority Level
# ============================================================
# Source of Truth:
#   UI/UX → New system design
#   Business Logic → Old system (AI-Task-Manager)
# ============================================================

# ============================================================
# LAYER 1: FULL SYSTEM MAP
# ============================================================
system_map:
  dashboard:
    purpose: "מסך על מרכזי עם KPI, קיצורי דרך, משימות פתוחות, חריגים והתראות"
    priority: critical

  crm:
    purpose: "ניהול לקוחות, לידים, אנשי קשר, פעילויות, תקשורת ומסמכים"
    priority: high

  sales:
    purpose: "ניהול הצעות מחיר, הזדמנויות, הזמנות לקוח, pipeline ומעקב מכירות"
    priority: high

  customers:
    purpose: "ניהול לקוחות פעילים, כרטיס לקוח, מסמכים, יתרות והיסטוריה"
    priority: critical

  suppliers:
    purpose: "ניהול ספקים, התקשרויות, מסמכי רכש, תשלומים והיסטוריה"
    priority: critical

  products_services:
    purpose: "קטלוג מוצרים ושירותים, מחירים, קטגוריות, יחידות מידה ומדיניות"
    priority: high

  projects:
    purpose: "ניהול פרויקטים, משימות, אבני דרך, תקציב, רווחיות וקבצים"
    priority: medium

  procurement:
    purpose: "דרישות רכש, הזמנות רכש, קבלת סחורה/שירות, התאמות ומעקב"
    priority: high

  inventory:
    purpose: "מלאי, מחסנים, תנועות, מקטים, רמות מלאי, הקצאות וספירות"
    priority: medium

  finance:
    purpose: "הכנסות, הוצאות, מסמכים, תשלומים, התאמות, גבייה וחשבונאות"
    priority: critical

  billing:
    purpose: "חשבוניות, קבלות, דרישות תשלום, מסמכים מחזוריים, זיכויים"
    priority: critical

  payments:
    purpose: "סליקה, העברות, מס\"ב, הוראות קבע, שיוך תשלומים למסמכים"
    priority: critical

  hr:
    purpose: "עובדים, תפקידים, נוכחות, שכר, משימות והרשאות"
    priority: medium

  operations:
    purpose: "תהליכי עבודה, סטטוסים, SLA, תורים, ביצוע ותפעול"
    priority: medium

  documents:
    purpose: "מרכז מסמכים, קבצים, חתימות, גרסאות, שיוכים וישויות קשורות"
    priority: high

  reports:
    purpose: "דוחות, KPI, חתכים, ייצוא, בקרה וניתוחים"
    priority: high

  automations:
    purpose: "טריגרים, חוקים, אוטומציות, תזמונים, webhooks, integrations"
    priority: medium

  settings:
    purpose: "הגדרות מערכת, מאסטר דאטה, הרשאות, סטטוסים, מספור, לוגים"
    priority: critical

