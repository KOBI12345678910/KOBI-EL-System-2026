  main_dashboard:
    quick_actions:
      - {action: create_customer, target: /customers/create}
      - {action: create_supplier, target: /suppliers/create}
      - {action: create_income_document, target: /finance/income/create}
      - {action: upload_expense, target: /finance/expenses/create}
      - {action: create_invoice, target: /billing/invoices/create}
      - {action: create_invoice_receipt, target: /billing/receipts/create}
      - {action: create_recurring_document, target: /billing/recurring/create}
      - {action: create_standing_order, target: /payments/standing-orders/create}
      - {action: quick_credit_charge, target: /payments/credit-clearing/create}

  # Customers
  customers_list:
    actions:
      - {action: create, target: /customers/create}
      - {action: edit, target: "/customers/:id/edit"}
      - {action: view_profile, target: "/customers/:id"}
      - {action: export, type: bulk}
      - {action: search, type: filter}
      - {action: filter_by_status, type: filter}

  customer_profile:
    actions:
      - {action: edit, target: "/customers/:id/edit"}
      - {action: create_document, target: "/finance/income/create?customer_id=:id"}
      - {action: create_quote, target: "/sales/quotes/create?customer_id=:id"}
      - {action: view_documents, tab: documents}
      - {action: view_payments, tab: payments}
      - {action: view_standing_orders, tab: standing_orders}
      - {action: view_activity, tab: activity_log}

  # Suppliers
  suppliers_list:
    actions:
      - {action: create, target: /suppliers/create}
      - {action: edit, target: "/suppliers/:id/edit"}
      - {action: view_profile, target: "/suppliers/:id"}
      - {action: export, type: bulk}

  supplier_profile:
    actions:
      - {action: edit, target: "/suppliers/:id/edit"}
      - {action: create_expense, target: "/finance/expenses/create?supplier_id=:id"}
      - {action: create_purchase_order, target: "/procurement/orders/create?supplier_id=:id"}
      - {action: view_documents, tab: documents}
      - {action: view_payments, tab: payments}
      - {action: view_activity, tab: activity_log}

  # Income Documents
  income_documents_list:
    actions:
      - {action: create, target: /finance/income/create}
      - {action: view, target: "/finance/income/:id"}
      - {action: duplicate, type: inline}
      - {action: link_document, type: modal}
      - {action: record_payment, type: modal}
      - {action: filter_by_type, type: filter}
      - {action: filter_by_customer, type: filter}
      - {action: filter_by_date, type: filter}
      - {action: filter_by_status, type: filter}
      - {action: filter_by_amount, type: filter}

  income_document_details:
    actions:
      - {action: edit, target: "/finance/income/:id/edit"}
      - {action: record_payment, type: modal}
      - {action: link_document, type: modal}
      - {action: upload_attachment, type: modal}
      - {action: duplicate, type: action}
      - {action: cancel_document, type: action}
      - {action: convert_to_invoice, type: action, condition: "type=payment_request"}
      - {action: create_receipt, type: action, condition: "type=invoice"}

  # Expense Documents
  expense_documents_list:
    actions:
      - {action: upload_expense, target: /finance/expenses/create}
      - {action: create_expense, target: /finance/expenses/create}
      - {action: view, target: "/finance/expenses/:id"}
      - {action: attach_file, type: modal}
      - {action: link_document, type: modal}

  expense_document_details:
    actions:
      - {action: edit, target: "/finance/expenses/:id/edit"}
      - {action: record_payment, type: modal}
      - {action: link_document, type: modal}
      - {action: upload_attachment, type: modal}

  # Billing
  invoices_list:
    actions:
      - {action: create, target: /billing/invoices/create}
      - {action: view, target: "/billing/invoices/:id"}
      - {action: send_to_customer, type: action}
      - {action: record_payment, type: modal}
      - {action: create_credit_note, type: action}

  # Payments
  credit_transactions_list:
    actions:
      - {action: create_charge, target: /payments/credit-clearing/create}
      - {action: view, target: "/payments/credit-clearing/:id"}
      - {action: match_to_document, type: modal}

  standing_orders_list:
    actions:
      - {action: create, target: /payments/standing-orders/create}
      - {action: view, target: "/payments/standing-orders/:id"}
      - {action: pause, type: action}
      - {action: resume, type: action}
      - {action: cancel, type: action}

  payment_matching_screen:
    actions:
      - {action: match_payment_to_document, type: modal}
      - {action: mark_as_paid, type: action}
      - {action: mark_as_partial, type: action}
      - {action: unmatch, type: action}

# ============================================================
# LAYER 8: NAVIGATION MAP
# ============================================================
navigation_map:
  dashboard:
    navigates_to:
      - customers_list
      - suppliers_list
      - income_documents_list
      - expense_documents_list
      - credit_transactions_list
      - standing_orders_list
      - billing_invoices_list
      - reports_kpi

  customer_profile:
    navigates_to:
      - customer_edit
      - income_document_create
      - quote_create
      - document_details (via documents tab)
      - payment_details (via payments tab)
      - standing_order_details (via standing_orders tab)

  supplier_profile:
    navigates_to:
      - supplier_edit
      - expense_document_create
      - purchase_order_create
      - document_details (via documents tab)

  income_document_details:
    navigates_to:
      - customer_profile (click customer name)
      - linked_document_details (via links tab)
      - attachment_download (via attachments tab)
      - payment_details (via payments tab)
      - income_document_edit

  expense_document_details:
    navigates_to:
      - supplier_profile (click supplier name)
      - linked_document_details (via links tab)
      - attachment_download (via attachments tab)
      - payment_details (via payments tab)

  invoice_details:
    navigates_to:
      - customer_profile
      - receipt_create (action: create receipt)
      - credit_note_create (action: create credit note)
      - payment_record (action: record payment)
      - quote_details (if based on quote)
      - sales_order_details (if based on order)

  purchase_order_details:
    navigates_to:
      - supplier_profile
      - goods_receipt_create
      - purchase_request_details (if based on request)
      - expense_document_create

  project_details:
    navigates_to:
      - project_tasks_list
      - project_milestones_list
      - project_budget
      - project_files
      - customer_profile
      - document_details (linked invoices/expenses)

# ============================================================
# LAYER 9: RELATED RECORDS (TABS/RELATIONS/CARDS)
# ============================================================
related_records:
  customer_profile:
    tabs:
      - {name: "פרטים", entity: customers, type: detail_card}
      - {name: "מסמכים", entity: documents, filter: "customer_id=:id", type: table}
      - {name: "הצעות מחיר", entity: quotes, filter: "customer_id=:id", type: table}
      - {name: "הזמנות", entity: sales_orders, filter: "customer_id=:id", type: table}
      - {name: "תשלומים", entity: payments, filter: "via documents.customer_id=:id", type: table}
      - {name: "הוראות קבע", entity: standing_orders, filter: "customer_id=:id", type: table}
      - {name: "סליקות", entity: credit_transactions, filter: "customer_id=:id", type: table}
      - {name: "אנשי קשר", entity: contacts, filter: "customer_id=:id", type: table}
      - {name: "לוג פעילות", entity: activity_logs, filter: "entity_type=customer,entity_id=:id", type: timeline}

  supplier_profile:
    tabs:
      - {name: "פרטים", entity: suppliers, type: detail_card}
      - {name: "מסמכי הוצאה", entity: documents, filter: "supplier_id=:id,direction=expense", type: table}
      - {name: "הזמנות רכש", entity: purchase_orders, filter: "supplier_id=:id", type: table}
      - {name: "קבלות סחורה", entity: goods_receipts, filter: "supplier_id=:id", type: table}
      - {name: "תשלומים", entity: payments, filter: "via documents.supplier_id=:id", type: table}
      - {name: "אנשי קשר", entity: contacts, filter: "supplier_id=:id", type: table}
      - {name: "לוג פעילות", entity: activity_logs, filter: "entity_type=supplier,entity_id=:id", type: timeline}

  income_document_details:
    tabs:
      - {name: "פרטי מסמך", entity: documents, type: detail_card}
      - {name: "שורות מסמך", entity: document_items, filter: "document_id=:id", type: editable_table}
      - {name: "מסמכים מקושרים", entity: document_links, filter: "source_document_id=:id OR target_document_id=:id", type: table}
      - {name: "קבצים", entity: attachments, filter: "document_id=:id", type: file_grid}
      - {name: "תשלומים", entity: payments, filter: "document_id=:id", type: table}
      - {name: "לוג פעילות", entity: activity_logs, filter: "entity_type=document,entity_id=:id", type: timeline}

  project_details:
    tabs:
      - {name: "פרטי פרויקט", entity: projects, type: detail_card}
      - {name: "משימות", entity: project_tasks, filter: "project_id=:id", type: kanban_or_table}
      - {name: "אבני דרך", entity: project_milestones, filter: "project_id=:id", type: timeline}
      - {name: "תקציב", type: budget_summary}
      - {name: "קבצים", entity: attachments, filter: "entity_type=project,entity_id=:id", type: file_grid}
      - {name: "לוג פעילות", entity: activity_logs, filter: "entity_type=project,entity_id=:id", type: timeline}

# ============================================================
# LAYER 10: STATUSES, FILTERS, SEARCH, VIEWS
# ============================================================
statuses:
  global:
    seed: [draft, pending, open, paid, partially_paid, cancelled, archived, failed, recurring_active, recurring_paused]

  opportunities:
    stages: [new, qualification, proposal, negotiation, closed_won, closed_lost]

  purchase_orders:
    statuses: [draft, sent, confirmed, partially_received, received, cancelled]

  projects:
    statuses: [planning, active, on_hold, completed, cancelled]

  tasks:
    statuses: [todo, in_progress, review, done, cancelled]

  inventory_movements:
    types: [in, out, transfer, adjustment, count]

filters:
  customers_list: [status, city, created_date_range, search_name_phone_email]
  suppliers_list: [status, city, search_name_phone_email]
  income_documents: [document_type, customer, date_range, status, amount_range, payment_method]
  expense_documents: [supplier, document_type, date_range, status, category]
  invoices: [customer, date_range, status, amount_range, due_date_range]
  payments: [payment_method, date_range, status, amount_range]
  products: [category, is_active, price_range]
  projects: [status, manager, customer, date_range]
  employees: [department, status, role]
  purchase_orders: [supplier, status, date_range]
  inventory: [warehouse, product, movement_type, date_range]

search:
  global_search:
    searches_in: [customers, suppliers, documents, products, projects, employees]
    fields: [name, number, phone, email, reference]

views:
  list_view: default
  kanban_view: [opportunities, tasks]
  calendar_view: [tasks, milestones, attendance]
  timeline_view: [activity_logs, project_milestones]

# ============================================================
# LAYER 11: SETTINGS / PERMISSIONS / AUDIT
# ============================================================
settings:
  general:
    - company_name
    - company_logo
    - default_currency
    - default_tax_rate
    - fiscal_year_start
    - date_format
    - language

  auto_numbering:
    entities:
      - {entity: customers, prefix: "CUS-", padding: 5}
      - {entity: suppliers, prefix: "SUP-", padding: 5}
      - {entity: invoices, prefix: "INV-", padding: 6}
      - {entity: receipts, prefix: "RCP-", padding: 6}
      - {entity: payment_requests, prefix: "PRQ-", padding: 6}
      - {entity: credit_notes, prefix: "CRN-", padding: 6}
      - {entity: quotes, prefix: "QUO-", padding: 5}
      - {entity: sales_orders, prefix: "SO-", padding: 5}
      - {entity: purchase_orders, prefix: "PO-", padding: 5}
      - {entity: projects, prefix: "PRJ-", padding: 4}

  master_data:
    - statuses
    - document_types
    - payment_methods
    - categories
    - warehouses
    - departments
    - roles

permissions:
  model: RBAC (Role-Based Access Control)
  actions: [view, create, edit, delete, export, approve]
  modules: [dashboard, crm, sales, customers, suppliers, products, projects, procurement, inventory, finance, billing, payments, hr, operations, documents, reports, automations, settings]
  special_permissions:
    - approve_purchase_orders
    - approve_credit_notes
    - run_payroll
    - access_audit_log
    - manage_users
    - manage_automations

audit:
  activity_logs:
    tracked_entities: [customers, suppliers, documents, payments, products, projects, employees, purchase_orders, sales_orders, quotes, inventory_movements]
    tracked_actions: [created, updated, deleted, linked, unlinked, uploaded_file, payment_recorded, status_changed]
    retention: 365_days
    fields: [entity_type, entity_id, action_type, old_value_json, new_value_json, actor, created_at]

# ============================================================
# LAYER 12: MISSING ASSUMPTIONS
# ============================================================
missing_assumptions:
  - name: "multi_tenant"
    question: "האם המערכת תומכת במספר חברות/סניפים?"
    default: "single company"

  - name: "multi_currency"
    question: "האם יש תמיכה במטבעות מרובים? שערי חליפין?"
    default: "ILS primary, USD/EUR supported"

  - name: "tax_engine"
    question: "חישוב מע\"מ - שיעור אחיד או מרובה? פטורים?"
    default: "17% VAT default, configurable per product"

  - name: "israeli_compliance"
    question: "חיבור לרשות המיסים? חשבונית ממוחשבת? e-invoice?"
    default: "not in phase 1, planned for phase 2"

  - name: "document_numbering"
    question: "מספור רציף לפי חוק? reset שנתי?"
    default: "sequential per type, no reset"

  - name: "approval_workflows"
    question: "אישור הזמנות רכש מעל סכום מסוים?"
    default: "simple approval, no multi-level"

  - name: "email_integration"
    question: "שליחת מסמכים במייל?"
    default: "planned for phase 2"

  - name: "api_external"
    question: "API חיצוני לאינטגרציות?"
    default: "REST API, planned for phase 2"

  - name: "mobile"
    question: "גרסת מובייל?"
    default: "responsive web, no native app"

  - name: "backup_strategy"
    question: "גיבויים ו-disaster recovery?"
    default: "daily DB backup, GitHub code backup"
