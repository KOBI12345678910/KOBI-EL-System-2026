# ============================================================
# LAYER 5: ALL ENTITIES/TABLES
# ============================================================
entities:
  # === Foundation ===
  statuses:
    type: seed_table
    seed: [draft, pending, open, paid, partially_paid, cancelled, archived, failed, recurring_active, recurring_paused]

  document_types:
    type: seed_table
    seed: [receipt, invoice, invoice_receipt, payment_request, expense_invoice, expense_receipt, credit_note, other_document, recurring_document_template]

  payment_methods:
    type: seed_table
    seed: [cash, credit_card, bank_transfer, check, standing_order, masav, other]

  categories:
    type: hierarchical
    fields: [id, name, direction, parent_category_id, is_active]

  # === Core Business ===
  customers:
    type: master_data
    fields: [id, customer_number, full_name, phone, email, company_name, tax_id, address, city, zip_code, notes, status_id, created_at, updated_at]

  suppliers:
    type: master_data
    fields: [id, supplier_number, full_name, company_name, phone, email, tax_id, address, city, zip_code, notes, status_id, created_at, updated_at]

  contacts:
    type: master_data
    fields: [id, first_name, last_name, phone, email, company, position, customer_id, supplier_id, notes, created_at, updated_at]

  leads:
    type: transactional
    fields: [id, name, company, phone, email, source, status_id, assigned_to, notes, created_at, updated_at]

  # === Products & Services ===
  products:
    type: master_data
    fields: [id, sku, name, description, category_id, unit_of_measure, default_price, tax_rate, is_active, created_at, updated_at]

  price_lists:
    type: master_data
    fields: [id, name, currency, effective_from, effective_to, is_active, created_at]

  price_list_items:
    type: junction
    fields: [id, price_list_id, product_id, price, min_quantity, created_at]

  # === Sales ===
  opportunities:
    type: transactional
    fields: [id, name, customer_id, contact_id, stage, probability, expected_amount, expected_close_date, assigned_to, notes, status_id, created_at, updated_at]

  quotes:
    type: transactional
    fields: [id, quote_number, customer_id, contact_id, opportunity_id, issue_date, valid_until, subtotal, tax_amount, total_amount, status_id, notes, created_at, updated_at]

  quote_items:
    type: line_items
    fields: [id, quote_id, product_id, description, quantity, unit_price, discount_percent, tax_rate, line_total, sort_order]

  sales_orders:
    type: transactional
    fields: [id, order_number, customer_id, quote_id, order_date, delivery_date, subtotal, tax_amount, total_amount, status_id, notes, created_at, updated_at]

  sales_order_items:
    type: line_items
    fields: [id, sales_order_id, product_id, description, quantity, unit_price, discount_percent, tax_rate, line_total, delivered_quantity, sort_order]

  # === Documents (Central) ===
  documents:
    type: central_transactional
    fields: [id, document_number, document_type_id, direction, customer_id, supplier_id, issue_date, due_date, reference_number, title, description, currency, subtotal_amount, tax_amount, total_amount, paid_amount, balance_due, payment_method_id, status_id, is_recurring_template, parent_recurring_id, created_by, created_at, updated_at]
    rules:
      - "direction=income → customer_id required"
      - "direction=expense → supplier_id required"
      - "document_number unique per document_type"
      - "status auto-updates based on payment"

  document_items:
    type: line_items
    fields: [id, document_id, product_id, description, quantity, unit_price, discount_percent, tax_rate, line_total, sort_order]

  document_links:
    type: junction
    fields: [id, source_document_id, target_document_id, link_type, notes, created_at]
    link_types: [based_on, converted_to, paid_by, receipt_for, related_to, attachment_reference]

  attachments:
    type: supporting
    fields: [id, document_id, file_name, file_url, file_type, uploaded_at, uploaded_by]

  # === Payments ===
  payments:
    type: transactional
    fields: [id, document_id, payment_method_id, payment_date, amount, reference_number, external_transaction_id, status_id, notes, created_at]
    rules:
      - "full payment → status = paid"
      - "partial payment → status = partially_paid"
      - "updates paid_amount and balance_due on document"

  credit_transactions:
    type: transactional
    fields: [id, customer_id, document_id, transaction_date, amount, transaction_code, provider_reference, status_id, notes, created_at]

  standing_orders:
    type: transactional
    fields: [id, customer_id, related_document_id, amount, frequency, start_date, end_date, status_id, notes, created_at]

  recurring_documents:
    type: transactional
    fields: [id, template_document_id, frequency, interval_value, next_run_date, end_date, auto_send, status_id, created_at, updated_at]

  # === Procurement ===
  purchase_requests:
    type: transactional
    fields: [id, request_number, requested_by, department, request_date, needed_by, status_id, notes, approved_by, approved_at, created_at, updated_at]

  purchase_request_items:
    type: line_items
    fields: [id, purchase_request_id, product_id, description, quantity, estimated_price, supplier_id, sort_order]

  purchase_orders:
    type: transactional
    fields: [id, order_number, supplier_id, purchase_request_id, order_date, expected_delivery, subtotal, tax_amount, total_amount, status_id, notes, created_at, updated_at]

  purchase_order_items:
    type: line_items
    fields: [id, purchase_order_id, product_id, description, quantity, unit_price, tax_rate, line_total, received_quantity, sort_order]

  goods_receipts:
    type: transactional
    fields: [id, receipt_number, purchase_order_id, supplier_id, receipt_date, warehouse_id, status_id, notes, received_by, created_at]

  goods_receipt_items:
    type: line_items
    fields: [id, goods_receipt_id, purchase_order_item_id, product_id, quantity_received, quality_status, notes, sort_order]

  # === Inventory ===
  warehouses:
    type: master_data
    fields: [id, name, code, address, city, manager, is_active, created_at]

  stock_levels:
    type: computed
    fields: [id, product_id, warehouse_id, quantity_on_hand, quantity_reserved, quantity_available, reorder_level, last_updated]

  inventory_movements:
    type: transactional
    fields: [id, product_id, warehouse_from_id, warehouse_to_id, movement_type, quantity, reference_type, reference_id, notes, performed_by, created_at]
    movement_types: [in, out, transfer, adjustment, count]

  inventory_counts:
    type: transactional
    fields: [id, count_number, warehouse_id, count_date, status_id, counted_by, approved_by, notes, created_at]

  inventory_count_items:
    type: line_items
    fields: [id, inventory_count_id, product_id, system_quantity, counted_quantity, variance, notes]

  # === Projects ===
  projects:
    type: transactional
    fields: [id, project_number, name, customer_id, start_date, end_date, budget, actual_cost, status_id, manager, description, created_at, updated_at]

  project_tasks:
    type: transactional
    fields: [id, project_id, name, description, assigned_to, start_date, due_date, actual_hours, estimated_hours, status_id, priority, parent_task_id, sort_order, created_at, updated_at]

  project_milestones:
    type: transactional
    fields: [id, project_id, name, due_date, completed_date, status_id, deliverable, notes, created_at]

  # === HR ===
  employees:
    type: master_data
    fields: [id, employee_number, first_name, last_name, email, phone, department, position, manager_id, hire_date, status_id, created_at, updated_at]

  attendance:
    type: transactional
    fields: [id, employee_id, date, clock_in, clock_out, total_hours, status_id, notes, created_at]

  payroll_runs:
    type: transactional
    fields: [id, period_start, period_end, run_date, total_gross, total_deductions, total_net, status_id, created_by, created_at]

  payroll_items:
    type: line_items
    fields: [id, payroll_run_id, employee_id, gross_pay, deductions, net_pay, notes]

  # === Operations ===
  workflows:
    type: master_data
    fields: [id, name, description, trigger_entity, trigger_event, is_active, created_at, updated_at]

  workflow_steps:
    type: master_data
    fields: [id, workflow_id, step_order, action_type, action_config_json, condition_json]

  work_queues:
    type: transactional
    fields: [id, name, entity_type, assigned_team, priority, sla_hours, is_active, created_at]

  # === System ===
  users:
    type: master_data
    fields: [id, username, email, full_name, role_id, is_active, last_login, created_at, updated_at]

  roles:
    type: master_data
    fields: [id, name, description, created_at]

  role_permissions:
    type: junction
    fields: [id, role_id, module, action, is_allowed]

  activity_logs:
    type: audit
    fields: [id, entity_type, entity_id, action_type, old_value_json, new_value_json, actor, created_at]
    action_types: [created, updated, deleted, linked, unlinked, uploaded_file, payment_recorded, status_changed]

  auto_number_sequences:
    type: system
    fields: [id, entity_type, prefix, next_value, padding_length]

  notifications:
    type: system
    fields: [id, user_id, title, message, entity_type, entity_id, is_read, created_at]

