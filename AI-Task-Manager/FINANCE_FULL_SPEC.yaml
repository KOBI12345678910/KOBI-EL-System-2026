# ============================================================
# MONTE CARLO ENGINE REQUIREMENTS
# ============================================================
monte_carlo:
  minimum_scenarios: 50000
  models: [cashflow_forecast, project_profitability, customer_payment_delay, supplier_cost_inflation, revenue_variability, margin_variability, working_capital, liquidity_runway, portfolio_of_projects, full_company_pnl]
  distributions: [normal, lognormal, triangular, uniform, beta, custom_empirical]
  outputs: [mean, median, mode, std_dev, variance, min, max, p1, p5, p10, p25, p50, p75, p90, p95, p99, prob_negative_cash, prob_loss, prob_margin_breach, prob_covenant_breach, expected_shortfall, var]
  stress_dimensions: [revenue_drop, raw_material_increase, payroll_increase, collection_delay, supplier_failure, fx_move, financing_cost_increase, project_delay, cancellation_rate]

# ============================================================
# CALCULATION RULES
# ============================================================
calculation_rules:
  - "gross_profit = revenue - cost_of_sales"
  - "gross_margin = gross_profit / revenue"
  - "operating_profit = gross_profit - operating_expenses"
  - "net_profit = pre_tax_profit - taxes"
  - "current_ratio = current_assets / current_liabilities"
  - "quick_ratio = (current_assets - inventory) / current_liabilities"
  - "debt_to_equity = total_debt / total_equity"
  - "roe = net_profit / equity"
  - "roa = net_profit / total_assets"
  - "hedge_ratio = hedged_amount / gross_exposure"
  - "unhedged_exposure = gross_exposure - hedged_amount"
  - "probability_of_loss = loss_scenarios / total_scenarios"
  - "value_at_risk = percentile(loss_distribution, confidence_level)"
  - "expected_shortfall = average(losses_beyond_var)"
  - "cash_runway_months = available_cash / monthly_net_burn"

