    revenue: [operating_revenue, recurring_revenue, other_income]
    cost_of_sales: [material_cost, labor_cost, subcontractor_cost, logistics_cost]
    gross_profit: [gross_profit_value, gross_margin_percent]
    operating_expenses: [sales_expenses, marketing_expenses, admin_expenses, rent, software, utilities, salaries, depreciation]
