openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ERP API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai-providers
    description: AI Provider management
  - name: ai-models
    description: AI Model management
  - name: ai-api-keys
    description: AI API Key management
  - name: ai-usage-logs
    description: AI Usage Log tracking
  - name: ai-queries
    description: AI Query management
  - name: ai-responses
    description: AI Response management
  - name: ai-recommendations
    description: AI Recommendations
  - name: ai-permissions
    description: AI Permission management
  - name: ai-prompt-templates
    description: AI Prompt Template management
  - name: system-modules
    description: System Builder - Module management
  - name: system-tables
    description: System Builder - Table management
  - name: system-fields
    description: System Builder - Field management
  - name: system-forms
    description: System Builder - Form management
  - name: system-views
    description: System Builder - View management
  - name: system-workflows
    description: System Builder - Workflow management
  - name: system-widgets
    description: System Builder - Widget management
  - name: system-records
    description: System Builder - Record management
  - name: claude-provider
    description: Claude AI Provider management and connection testing
  - name: claude-audit
    description: Claude AI audit logs and session management
  - name: claude-system
    description: Claude System Read API — raw access to all platform metadata
  - name: claude-knowledge
    description: Claude Knowledge/Schema API — semantic summaries and maps
  - name: claude-context
    description: Claude Runtime Context API — user location context resolution
  - name: claude-builder
    description: Claude Builder API — create and update metadata objects
  - name: claude-dev-support
    description: Claude Development Support API — structured development context
  - name: claude-governance
    description: Claude Governance API — draft-only mode, validation, publish flow
  - name: claude-preview
    description: Claude Preview/Simulation API — dry-run changes and impact analysis
  - name: claude-changesets
    description: Claude Change Set/Diff API — track changes between draft and published
  - name: claude-diagnostics
    description: Claude Diagnostics API — system integrity scanning and issue detection
  - name: claude-gaps
    description: Claude Gap Analysis API — find missing components across the system
  - name: claude-repair
    description: Claude Repair API — controlled repair pipeline for fixing system issues
  - name: claude-management
    description: Claude System Management API — operational health and module status overview
  - name: claude-dataflow
    description: Claude Data Flow API — data flow mapping and system graph
  - name: claude-security
    description: Claude Security & Permissions API — role-based access and permission checks
  - name: claude-capabilities
    description: Claude Capability/Tool Registry — register and discover capabilities
  - name: claude-health
    description: Claude Health Check API — system-wide health dashboard
  - name: claude-suggestions
    description: Claude Suggestion Engine — gap-based recommendations
  - name: claude-dependencies
    description: Claude Dependency Graph Service — queryable metadata dependency graph
  - name: claude-execution-policy
    description: Claude Execution Policy Layer — autonomous vs approval-required actions
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
