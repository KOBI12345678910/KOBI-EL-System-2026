        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                role:
                  type: string
                targetType:
                  type: string
                targetId:
                  type: integer
      responses:
        "200":
          description: Policy evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaudeExecutionPolicyDecision"

  /claude/execution-policy/can-execute:
    get:
      operationId: claudeExecutionPolicyCanExecute
      tags: [claude-execution-policy]
      summary: Quick check if an action can be executed
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Execution check result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /platform/users:
    get:
      tags: [system-modules]
      summary: Search users for reference pickers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    email:
                      type: string
                    department:
                      type: string
                    avatarUrl:
                      type: string

  /platform/modules/check-slug/{slug}:
    get:
      tags: [system-modules]
      summary: Check module slug uniqueness
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: excludeId
          in: query
          schema:
            type: integer
          description: Module ID to exclude from the uniqueness check (for edits)
      responses:
        "200":
          description: Slug availability result
          content:
            application/json:
              schema:
                type: object
                properties:
                  exists:
                    type: boolean
                  slug:
                    type: string

  /platform/modules/{id}/clone:
    post:
      tags: [system-modules]
      summary: Clone a module with all its entities and fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Cloned module
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Module not found
        "500":
          description: Server error

  /platform/entities/{id}/clone:
    post:
      tags: [system-tables]
      summary: Clone an entity with all its fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Cloned entity
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Entity not found
        "500":
          description: Server error

  /platform/entities/reorder:
    put:
      tags: [system-tables]
      summary: Reorder entities within a module
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                moduleId:
                  type: integer
                  description: Optional module ID for scoping validation
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      sortOrder:
                        type: integer
              required: [items]
      responses:
        "200":
          description: Reorder success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /platform/fields/{id}/clone:
    post:
      tags: [system-fields]
      summary: Clone a field
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Cloned field
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Field not found
        "500":
          description: Server error

  /platform/fields/reorder:
    put:
      tags: [system-fields]
      summary: Reorder fields within an entity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entityId:
                  type: integer
                  description: Entity ID for scoping validation
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      sortOrder:
                        type: integer
              required: [items]
      responses:
        "200":
          description: Reorder success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

