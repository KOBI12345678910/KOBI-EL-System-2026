# ============================================================
# KOBI EL - ERP System Modules 13-18 DETAILED Specification
# Enterprise Product Architecture - SAP/Oracle/Priority Level
# Modules: HR, Operations, Documents, Reports, Automations, Settings
# ============================================================

# ============================================================
# MODULE 13: HR (Human Resources)
# ============================================================
module_13_hr:
  module_id: 13
  name: "HR"
  label_he: "משאבי אנוש"
  icon: groups
  route: /hr
  priority: medium
  purpose: "ניהול עובדים, תפקידים, נוכחות, שכר, משימות והרשאות"

  # ----------------------------------------------------------
  # SUBMENU
  # ----------------------------------------------------------
  submenus:
    - label: "עובדים"
      route: /hr/employees
      icon: person
    - label: "תפקידים"
      route: /hr/roles
      icon: badge
    - label: "נוכחות"
      route: /hr/attendance
      icon: schedule
    - label: "שכר"
      route: /hr/payroll
      icon: payments
    - label: "משימות עובדים"
      route: /hr/employee-tasks
      icon: task_alt

  # ----------------------------------------------------------
  # ENTITIES
  # ----------------------------------------------------------
  entities:

    # === DEPARTMENTS ===
    departments:
      type: master_data
      table_name: departments
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: name
          type: varchar(100)
          required: true
          unique: true
          label_he: "שם מחלקה"
        - name: code
          type: varchar(20)
          required: true
          unique: true
          label_he: "קוד מחלקה"
        - name: manager_id
          type: uuid
          nullable: true
          foreign_key: employees.id
          label_he: "מנהל מחלקה"
        - name: parent_department_id
          type: uuid
          nullable: true
          foreign_key: departments.id
          self_referencing: true
          label_he: "מחלקת אב"
        - name: is_active
          type: boolean
          default: true
          label_he: "פעיל"
        - name: created_at
          type: timestamp
          auto_generated: true
      indexes:
        - columns: [code]
          unique: true
        - columns: [parent_department_id]
        - columns: [manager_id]

    # === EMPLOYEES ===
    employees:
      type: master_data
      table_name: employees
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: employee_number
          type: varchar(20)
          auto_generated: true
          unique: true
          label_he: "מספר עובד"
          auto_number_config:
            prefix: "EMP-"
            padding: 5
            example: "EMP-00001"
        - name: first_name
          type: varchar(50)
          required: true
          label_he: "שם פרטי"
        - name: last_name
          type: varchar(50)
          required: true
          label_he: "שם משפחה"
        - name: full_name
          type: varchar(101)
          computed: true
          formula: "first_name || ' ' || last_name"
          label_he: "שם מלא"
        - name: id_number
          type: varchar(20)
          required: true
          unique: true
          label_he: "תעודת זהות"
        - name: email
          type: varchar(100)
          required: true
          unique: true
          label_he: "אימייל"
          validation: email_format
        - name: phone
          type: varchar(20)
          nullable: true
          label_he: "טלפון"
        - name: mobile
          type: varchar(20)
          nullable: true
          label_he: "נייד"
        - name: address
          type: varchar(200)
          nullable: true
          label_he: "כתובת"
        - name: city
          type: varchar(100)
          nullable: true
          label_he: "עיר"
        - name: zip_code
          type: varchar(10)
          nullable: true
          label_he: "מיקוד"
        - name: date_of_birth
          type: date
          nullable: true
          label_he: "תאריך לידה"
        - name: gender
          type: enum
          values: [male, female, other]
          required: true
          label_he: "מין"
          display_values_he:
            male: "זכר"
            female: "נקבה"
            other: "אחר"
        - name: hire_date
          type: date
          required: true
          label_he: "תאריך גיוס"
        - name: termination_date
          type: date
          nullable: true
          label_he: "תאריך סיום העסקה"
        - name: department_id
          type: uuid
          required: true
          foreign_key: departments.id
          label_he: "מחלקה"
        - name: position
          type: varchar(100)
          required: true
          label_he: "תפקיד"
        - name: manager_id
          type: uuid
          nullable: true
          foreign_key: employees.id
          self_referencing: true
          label_he: "מנהל ישיר"
        - name: employment_type
          type: enum
          values: [full_time, part_time, contractor, intern]
          required: true
          label_he: "סוג העסקה"
          display_values_he:
            full_time: "משרה מלאה"
            part_time: "משרה חלקית"
            contractor: "קבלן"
            intern: "מתמחה"
        - name: salary
          type: decimal(12,2)
          required: true
          label_he: "שכר"
        - name: bank_name
          type: varchar(100)
          nullable: true
          label_he: "שם בנק"
        - name: bank_branch
          type: varchar(20)
          nullable: true
          label_he: "סניף בנק"
        - name: bank_account
          type: varchar(30)
          nullable: true
          label_he: "מספר חשבון"
        - name: tax_id
          type: varchar(20)
          nullable: true
          label_he: "מספר תיק ניכויים"
        - name: status_id
          type: enum
          values: [active, on_leave, suspended, terminated]
          required: true
          default: active
          label_he: "סטטוס"
          display_values_he:
            active: "פעיל"
            on_leave: "בחופשה"
            suspended: "מושעה"
            terminated: "סיום העסקה"
        - name: emergency_contact_name
          type: varchar(100)
          nullable: true
          label_he: "איש קשר לחירום"
        - name: emergency_contact_phone
          type: varchar(20)
          nullable: true
          label_he: "טלפון חירום"
        - name: notes
          type: text
          nullable: true
          label_he: "הערות"
        - name: created_at
          type: timestamp
          auto_generated: true
        - name: updated_at
          type: timestamp
          auto_generated: true
          on_update: true
      indexes:
        - columns: [employee_number]
          unique: true
        - columns: [id_number]
          unique: true
        - columns: [email]
          unique: true
        - columns: [department_id]
        - columns: [manager_id]
        - columns: [status_id]
        - columns: [hire_date]

    # === ATTENDANCE ===
    attendance:
      type: transactional
      table_name: attendance
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: employee_id
          type: uuid
          required: true
          foreign_key: employees.id
          label_he: "עובד"
        - name: date
          type: date
          required: true
          label_he: "תאריך"
        - name: clock_in
          type: time
          required: true
          label_he: "שעת כניסה"
        - name: clock_out
          type: time
          nullable: true
          label_he: "שעת יציאה"
        - name: total_hours
          type: decimal(5,2)
          computed: true
          formula: "EXTRACT(EPOCH FROM (clock_out - clock_in)) / 3600"
          label_he: "סה\"כ שעות"
        - name: overtime_hours
          type: decimal(5,2)
          default: 0
          label_he: "שעות נוספות"
        - name: absence_type
          type: enum
          values: [none, sick, vacation, personal, other]
          nullable: true
          label_he: "סוג היעדרות"
          display_values_he:
            none: "ללא"
            sick: "מחלה"
            vacation: "חופשה"
            personal: "אישי"
            other: "אחר"
        - name: status_id
          type: enum
          values: [present, absent, late, half_day]
          required: true
          label_he: "סטטוס"
          display_values_he:
            present: "נוכח"
            absent: "נעדר"
            late: "איחור"
            half_day: "חצי יום"
        - name: notes
          type: text
          nullable: true
          label_he: "הערות"
        - name: approved_by
          type: uuid
          nullable: true
          foreign_key: users.id
          label_he: "אושר על ידי"
        - name: created_at
          type: timestamp
          auto_generated: true
      indexes:
        - columns: [employee_id, date]
          unique: true
        - columns: [date]
        - columns: [status_id]
        - columns: [absence_type]

    # === PAYROLL RUNS ===
    payroll_runs:
      type: transactional
      table_name: payroll_runs
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: run_number
          type: varchar(20)
          auto_generated: true
          unique: true
          label_he: "מספר ריצה"
          auto_number_config:
            prefix: "PAY-"
            padding: 5
            example: "PAY-00001"
        - name: period_start
          type: date
          required: true
          label_he: "תחילת תקופה"
        - name: period_end
          type: date
          required: true
          label_he: "סוף תקופה"
        - name: run_date
          type: date
          required: true
          label_he: "תאריך ריצה"
        - name: total_gross
          type: decimal(14,2)
          default: 0
          label_he: "סה\"כ ברוטו"
        - name: total_deductions
          type: decimal(14,2)
          default: 0
          label_he: "סה\"כ ניכויים"
        - name: total_net
          type: decimal(14,2)
          default: 0
          label_he: "סה\"כ נטו"
        - name: status_id
          type: enum
          values: [draft, calculated, approved, paid, cancelled]
          required: true
          default: draft
          label_he: "סטטוס"
          display_values_he:
            draft: "טיוטה"
            calculated: "חושב"
            approved: "מאושר"
            paid: "שולם"
            cancelled: "מבוטל"
        - name: created_by
          type: uuid
          required: true
          foreign_key: users.id
          label_he: "נוצר על ידי"
        - name: approved_by
          type: uuid
          nullable: true
          foreign_key: users.id
          label_he: "אושר על ידי"
        - name: created_at
          type: timestamp
          auto_generated: true
      indexes:
        - columns: [run_number]
          unique: true
        - columns: [period_start, period_end]
        - columns: [status_id]

    # === PAYROLL ITEMS ===
    payroll_items:
      type: line_items
      table_name: payroll_items
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: payroll_run_id
          type: uuid
          required: true
          foreign_key: payroll_runs.id
          on_delete: cascade
          label_he: "ריצת שכר"
        - name: employee_id
          type: uuid
          required: true
          foreign_key: employees.id
          label_he: "עובד"
        - name: base_salary
          type: decimal(12,2)
          required: true
          label_he: "שכר בסיס"
        - name: overtime_pay
          type: decimal(12,2)
          default: 0
          label_he: "תשלום שעות נוספות"
        - name: bonuses
          type: decimal(12,2)
          default: 0
          label_he: "בונוסים"
        - name: gross_pay
          type: decimal(12,2)
          required: true
          computed: true
          formula: "base_salary + overtime_pay + bonuses"
          label_he: "ברוטו"
        - name: tax_deduction
          type: decimal(12,2)
          default: 0
          label_he: "ניכוי מס"
        - name: social_security
          type: decimal(12,2)
          default: 0
          label_he: "ביטוח לאומי"
        - name: pension
          type: decimal(12,2)
          default: 0
          label_he: "פנסיה"
        - name: other_deductions
          type: decimal(12,2)
          default: 0
          label_he: "ניכויים אחרים"
        - name: net_pay
          type: decimal(12,2)
          required: true
          computed: true
          formula: "gross_pay - tax_deduction - social_security - pension - other_deductions"
          label_he: "נטו"
        - name: notes
          type: text
          nullable: true
          label_he: "הערות"
      indexes:
        - columns: [payroll_run_id, employee_id]
          unique: true
        - columns: [employee_id]

    # === EMPLOYEE TASKS ===
    employee_tasks:
      type: transactional
      table_name: employee_tasks
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: employee_id
          type: uuid
          required: true
          foreign_key: employees.id
          label_he: "עובד"
        - name: title
          type: varchar(200)
          required: true
          label_he: "כותרת"
        - name: description
          type: text
          nullable: true
          label_he: "תיאור"
        - name: assigned_by
          type: uuid
          required: true
          foreign_key: users.id
          label_he: "שויך על ידי"
        - name: due_date
          type: date
          required: true
          label_he: "תאריך יעד"
        - name: priority
          type: enum
          values: [low, medium, high, critical]
          required: true
          default: medium
          label_he: "עדיפות"
          display_values_he:
            low: "נמוכה"
            medium: "בינונית"
            high: "גבוהה"
            critical: "קריטית"
        - name: status_id
          type: enum
          values: [todo, in_progress, done, cancelled]
          required: true
          default: todo
          label_he: "סטטוס"
          display_values_he:
            todo: "לביצוע"
            in_progress: "בתהליך"
            done: "הושלם"
            cancelled: "בוטל"
        - name: notes
          type: text
          nullable: true
          label_he: "הערות"
        - name: created_at
          type: timestamp
          auto_generated: true
        - name: updated_at
          type: timestamp
          auto_generated: true
          on_update: true
      indexes:
        - columns: [employee_id]
        - columns: [assigned_by]
        - columns: [due_date]
        - columns: [status_id]
        - columns: [priority]

  # ----------------------------------------------------------
  # PAGES
  # ----------------------------------------------------------
  pages:

    # === EMPLOYEES LIST ===
    employees_list:
      route: /hr/employees
      title: "עובדים"
      layout: standard_list
      description: "רשימת כל העובדים במערכת"
      toolbar:
        primary_action:
          label: "עובד חדש"
          icon: add
          target: /hr/employees/create
          permission: hr.employees.create
        secondary_actions:
          - label: "ייצוא Excel"
            icon: download
            action: export_excel
            permission: hr.employees.export
          - label: "ייצוא CSV"
            icon: download
            action: export_csv
            permission: hr.employees.export
          - label: "ייבוא עובדים"
            icon: upload
            action: import_employees
            permission: hr.employees.create
        search:
          placeholder: "חיפוש לפי שם, מספר עובד, אימייל, טלפון..."
          searches_in: [employee_number, full_name, first_name, last_name, email, phone, mobile, id_number]
      filters:
        - field: department_id
          type: select
          label: "מחלקה"
          source: departments
          display_field: name
        - field: status_id
          type: multi_select
          label: "סטטוס"
          options:
            - {value: active, label: "פעיל"}
            - {value: on_leave, label: "בחופשה"}
            - {value: suspended, label: "מושעה"}
            - {value: terminated, label: "סיום העסקה"}
        - field: employment_type
          type: multi_select
          label: "סוג העסקה"
          options:
            - {value: full_time, label: "משרה מלאה"}
            - {value: part_time, label: "משרה חלקית"}
            - {value: contractor, label: "קבלן"}
            - {value: intern, label: "מתמחה"}
        - field: manager_id
          type: select
          label: "מנהל ישיר"
          source: employees
          display_field: full_name
        - field: hire_date
          type: date_range
          label: "תאריך גיוס"
        - field: position
          type: text
          label: "תפקיד"
      table:
        columns:
          - {field: employee_number, label: "מס' עובד", sortable: true, width: 100}
          - {field: full_name, label: "שם מלא", sortable: true, width: 180, link_to: "/hr/employees/:id"}
          - {field: department_id, label: "מחלקה", sortable: true, width: 130, display: departments.name}
          - {field: position, label: "תפקיד", sortable: true, width: 140}
          - {field: employment_type, label: "סוג העסקה", sortable: true, width: 110}
          - {field: phone, label: "טלפון", sortable: false, width: 120}
          - {field: email, label: "אימייל", sortable: false, width: 180}
          - {field: manager_id, label: "מנהל ישיר", sortable: true, width: 150, display: employees.full_name}
          - {field: hire_date, label: "תאריך גיוס", sortable: true, width: 110, format: date}
          - {field: status_id, label: "סטטוס", sortable: true, width: 100, display: badge}
        default_sort: {field: full_name, direction: asc}
        row_actions:
          - {action: view, label: "צפייה", icon: visibility, target: "/hr/employees/:id"}
          - {action: edit, label: "עריכה", icon: edit, target: "/hr/employees/:id/edit", permission: hr.employees.edit}
          - {action: delete, label: "מחיקה", icon: delete, confirmation: "האם למחוק את העובד?", permission: hr.employees.delete}
        bulk_actions:
          - {action: export, label: "ייצוא נבחרים"}
          - {action: change_status, label: "שינוי סטטוס"}
          - {action: change_department, label: "שינוי מחלקה"}
        pagination:
          default_page_size: 25
          page_size_options: [10, 25, 50, 100]

    # === EMPLOYEE CREATE ===
    employee_create:
      route: /hr/employees/create
      title: "עובד חדש"
      layout: standard_form
      permission: hr.employees.create
      form:
        sections:
          - title: "פרטים אישיים"
            icon: person
            columns: 2
            fields:
              - name: first_name
                type: text
                label: "שם פרטי"
                required: true
                placeholder: "הזן שם פרטי"
                max_length: 50
                grid_column: 1
              - name: last_name
                type: text
                label: "שם משפחה"
                required: true
                placeholder: "הזן שם משפחה"
                max_length: 50
                grid_column: 2
              - name: id_number
                type: text
                label: "תעודת זהות"
                required: true
                placeholder: "הזן ת.ז."
                max_length: 20
                validation: israeli_id
                grid_column: 1
              - name: gender
                type: select
                label: "מין"
                required: true
                options:
                  - {value: male, label: "זכר"}
                  - {value: female, label: "נקבה"}
                  - {value: other, label: "אחר"}
                grid_column: 2
              - name: date_of_birth
                type: date
                label: "תאריך לידה"
                required: false
                grid_column: 1
              - name: email
                type: email
                label: "אימייל"
                required: true
                placeholder: "example@company.com"
                grid_column: 2
              - name: phone
                type: phone
                label: "טלפון"
                required: false
                grid_column: 1
              - name: mobile
                type: phone
                label: "נייד"
                required: false
                grid_column: 2
              - name: address
                type: text
                label: "כתובת"
                required: false
                max_length: 200
                grid_column: 1
              - name: city
                type: text
                label: "עיר"
                required: false
                max_length: 100
                grid_column: 2
              - name: zip_code
                type: text
                label: "מיקוד"
                required: false
                max_length: 10
                grid_column: 1

          - title: "פרטי העסקה"
            icon: work
            columns: 2
            fields:
              - name: department_id
                type: select
                label: "מחלקה"
                required: true
                source: departments
                display_field: name
                filter: "is_active=true"
                grid_column: 1
              - name: position
                type: text
                label: "תפקיד"
                required: true
                max_length: 100
                grid_column: 2
              - name: manager_id
                type: select
                label: "מנהל ישיר"
                required: false
                source: employees
                display_field: full_name
                filter: "status_id=active"
                grid_column: 1
              - name: employment_type
                type: select
                label: "סוג העסקה"
                required: true
                options:
                  - {value: full_time, label: "משרה מלאה"}
                  - {value: part_time, label: "משרה חלקית"}
                  - {value: contractor, label: "קבלן"}
                  - {value: intern, label: "מתמחה"}
                grid_column: 2
              - name: hire_date
                type: date
                label: "תאריך גיוס"
                required: true
                default: today
                grid_column: 1
              - name: salary
                type: currency
                label: "שכר"
                required: true
                currency: ILS
                grid_column: 2
              - name: status_id
                type: select
                label: "סטטוס"
                required: true
                default: active
                options:
                  - {value: active, label: "פעיל"}
                  - {value: on_leave, label: "בחופשה"}
                  - {value: suspended, label: "מושעה"}
                  - {value: terminated, label: "סיום העסקה"}
                grid_column: 1

          - title: "פרטי בנק"
            icon: account_balance
            columns: 2
            fields:
              - name: bank_name
                type: text
                label: "שם בנק"
                required: false
                max_length: 100
                grid_column: 1
              - name: bank_branch
                type: text
                label: "סניף"
                required: false
                max_length: 20
                grid_column: 2
              - name: bank_account
                type: text
                label: "מספר חשבון"
                required: false
                max_length: 30
                grid_column: 1
              - name: tax_id
                type: text
                label: "מספר תיק ניכויים"
                required: false
                max_length: 20
                grid_column: 2

          - title: "איש קשר לחירום"
            icon: emergency
            columns: 2
            fields:
              - name: emergency_contact_name
                type: text
                label: "שם איש קשר"
                required: false
                max_length: 100
                grid_column: 1
              - name: emergency_contact_phone
                type: phone
                label: "טלפון חירום"
                required: false
                grid_column: 2

          - title: "הערות"
            icon: notes
            columns: 1
            fields:
              - name: notes
                type: textarea
                label: "הערות"
                required: false
                rows: 4
                grid_column: 1

        actions:
          submit:
            label: "שמירה"
            icon: save
            action: create_employee
            redirect_to: "/hr/employees/:id"
          cancel:
            label: "ביטול"
            icon: close
            target: /hr/employees

    # === EMPLOYEE PROFILE ===
    employee_profile:
      route: "/hr/employees/:id"
      title: "כרטיס עובד"
      layout: profile_with_tabs
      permission: hr.employees.view
      header:
        display_fields:
          - {field: full_name, type: title}
          - {field: employee_number, type: subtitle}
          - {field: position, type: info}
          - {field: department_id, type: info, display: departments.name}
          - {field: status_id, type: badge}
        actions:
          - {label: "עריכה", icon: edit, target: "/hr/employees/:id/edit", permission: hr.employees.edit}
          - {label: "מחיקה", icon: delete, action: delete_employee, confirmation: "האם למחוק את העובד?", permission: hr.employees.delete}
          - {label: "שליחת מייל", icon: email, action: send_email}
          - {label: "יצירת משימה", icon: add_task, target: "/hr/employee-tasks/create?employee_id=:id"}
      tabs:
        - name: personal_details
          label: "פרטים אישיים"
          icon: person
          type: detail_card
          entity: employees
          display_sections:
            - title: "מידע אישי"
              fields:
                - {field: first_name, label: "שם פרטי"}
                - {field: last_name, label: "שם משפחה"}
                - {field: id_number, label: "תעודת זהות"}
                - {field: gender, label: "מין"}
                - {field: date_of_birth, label: "תאריך לידה", format: date}
                - {field: email, label: "אימייל"}
                - {field: phone, label: "טלפון"}
                - {field: mobile, label: "נייד"}
                - {field: address, label: "כתובת"}
                - {field: city, label: "עיר"}
                - {field: zip_code, label: "מיקוד"}
            - title: "פרטי בנק"
              fields:
                - {field: bank_name, label: "שם בנק"}
                - {field: bank_branch, label: "סניף"}
                - {field: bank_account, label: "מספר חשבון"}
                - {field: tax_id, label: "תיק ניכויים"}
            - title: "איש קשר לחירום"
              fields:
                - {field: emergency_contact_name, label: "שם"}
                - {field: emergency_contact_phone, label: "טלפון"}
            - title: "הערות"
              fields:
                - {field: notes, label: "הערות", type: rich_text}

        - name: employment_details
          label: "פרטי העסקה"
          icon: work
          type: detail_card
          entity: employees
          display_sections:
            - title: "העסקה"
              fields:
                - {field: employee_number, label: "מספר עובד"}
                - {field: department_id, label: "מחלקה", display: departments.name, link_to: "/settings/departments/:department_id"}
                - {field: position, label: "תפקיד"}
                - {field: manager_id, label: "מנהל ישיר", display: employees.full_name, link_to: "/hr/employees/:manager_id"}
                - {field: employment_type, label: "סוג העסקה"}
                - {field: hire_date, label: "תאריך גיוס", format: date}
                - {field: termination_date, label: "תאריך סיום", format: date}
                - {field: salary, label: "שכר", format: currency}
                - {field: status_id, label: "סטטוס", display: badge}

        - name: attendance_history
          label: "נוכחות"
          icon: schedule
          type: table
          entity: attendance
          filter: "employee_id=:id"
          table_columns:
            - {field: date, label: "תאריך", sortable: true, format: date}
            - {field: clock_in, label: "כניסה", sortable: true, format: time}
            - {field: clock_out, label: "יציאה", sortable: true, format: time}
            - {field: total_hours, label: "סה\"כ שעות", sortable: true}
            - {field: overtime_hours, label: "שעות נוספות", sortable: true}
            - {field: absence_type, label: "סוג היעדרות", sortable: true}
            - {field: status_id, label: "סטטוס", sortable: true, display: badge}
            - {field: notes, label: "הערות"}
          table_filters:
            - {field: date, type: date_range, label: "תאריך"}
            - {field: status_id, type: multi_select, label: "סטטוס"}
            - {field: absence_type, type: multi_select, label: "סוג היעדרות"}
          table_actions:
            - {action: add_attendance, label: "הוספת רשומת נוכחות", icon: add}

        - name: payroll_history
          label: "שכר"
          icon: payments
          type: table
          entity: payroll_items
          filter: "employee_id=:id"
          join: "payroll_runs ON payroll_items.payroll_run_id = payroll_runs.id"
          table_columns:
            - {field: payroll_runs.run_number, label: "מספר ריצה", sortable: true, link_to: "/hr/payroll/:payroll_run_id"}
            - {field: payroll_runs.period_start, label: "תחילת תקופה", format: date}
            - {field: payroll_runs.period_end, label: "סוף תקופה", format: date}
            - {field: base_salary, label: "שכר בסיס", format: currency}
            - {field: overtime_pay, label: "שעות נוספות", format: currency}
            - {field: bonuses, label: "בונוסים", format: currency}
            - {field: gross_pay, label: "ברוטו", format: currency}
            - {field: tax_deduction, label: "מס", format: currency}
            - {field: social_security, label: "ביטוח לאומי", format: currency}
            - {field: pension, label: "פנסיה", format: currency}
            - {field: other_deductions, label: "ניכויים אחרים", format: currency}
            - {field: net_pay, label: "נטו", format: currency, highlight: true}
          table_filters:
            - {field: payroll_runs.period_start, type: date_range, label: "תקופה"}

        - name: tasks
          label: "משימות"
          icon: task_alt
          type: table
          entity: employee_tasks
          filter: "employee_id=:id"
          table_columns:
            - {field: title, label: "כותרת", sortable: true, link_to: "/hr/employee-tasks/:id"}
            - {field: due_date, label: "תאריך יעד", sortable: true, format: date}
            - {field: priority, label: "עדיפות", sortable: true, display: badge}
            - {field: status_id, label: "סטטוס", sortable: true, display: badge}
            - {field: assigned_by, label: "שויך ע\"י", display: users.full_name}
            - {field: created_at, label: "נוצר", format: datetime}
          table_filters:
            - {field: status_id, type: multi_select, label: "סטטוס"}
            - {field: priority, type: multi_select, label: "עדיפות"}
            - {field: due_date, type: date_range, label: "תאריך יעד"}
          table_actions:
            - {action: create_task, label: "משימה חדשה", icon: add, target: "/hr/employee-tasks/create?employee_id=:id"}

        - name: documents_files
          label: "מסמכים וקבצים"
          icon: folder
          type: file_grid
          entity: files
          filter: "entity_type=employee AND entity_id=:id"
          actions:
            - {action: upload_file, label: "העלאת קובץ", icon: upload}
            - {action: link_document, label: "קישור מסמך", icon: link}
          display:
            grid_fields: [file_name, file_type, file_size, uploaded_by, created_at]
            preview: true
            download: true
            delete: true

        - name: activity_log
          label: "לוג פעילות"
          icon: history
          type: timeline
          entity: activity_logs
          filter: "entity_type=employee AND entity_id=:id"
          display_fields:
            - {field: action_type, label: "פעולה"}
            - {field: actor, label: "משתמש", display: users.full_name}
            - {field: created_at, label: "תאריך", format: datetime}
            - {field: old_value_json, label: "ערך ישן", type: json_diff}
            - {field: new_value_json, label: "ערך חדש", type: json_diff}

    # === EMPLOYEE EDIT ===
    employee_edit:
      route: "/hr/employees/:id/edit"
      title: "עריכת עובד"
      layout: standard_form
      permission: hr.employees.edit
      form:
        inherits: employee_create
        pre_populated: true
        actions:
          submit:
            label: "עדכון"
            icon: save
            action: update_employee
            redirect_to: "/hr/employees/:id"
          cancel:
            label: "ביטול"
            icon: close
            target: "/hr/employees/:id"

    # === ROLES LIST ===
    roles_list:
      route: /hr/roles
      title: "תפקידים ומחלקות"
      layout: standard_list
      description: "ניהול מחלקות ותפקידים בארגון"
      toolbar:
        primary_action:
          label: "מחלקה חדשה"
          icon: add
          target: /hr/roles/create-department
          permission: hr.roles.create
      sections:
        - title: "מחלקות"
          type: tree_view
          entity: departments
          display_fields:
            - {field: name, label: "שם מחלקה"}
            - {field: code, label: "קוד"}
            - {field: manager_id, label: "מנהל", display: employees.full_name}
            - {field: is_active, label: "פעיל", display: toggle}
          child_field: parent_department_id
          actions:
            - {action: add_child, label: "הוספת תת-מחלקה", icon: add}
            - {action: edit, label: "עריכה", icon: edit}
            - {action: toggle_active, label: "הפעלה/כיבוי", icon: toggle_on}
            - {action: delete, label: "מחיקה", icon: delete, confirmation: "האם למחוק את המחלקה?"}

    # === ATTENDANCE LIST ===
    attendance_list:
      route: /hr/attendance
      title: "נוכחות"
      layout: dual_view
      description: "מעקב נוכחות עובדים - תצוגת לוח שנה ורשימה"
      view_toggle:
        options:
          - {value: calendar, label: "לוח שנה", icon: calendar_month}
          - {value: list, label: "רשימה", icon: list}
        default: list
      toolbar:
        primary_action:
          label: "רשומת נוכחות חדשה"
          icon: add
          action: open_attendance_form
          permission: hr.attendance.create
        secondary_actions:
          - label: "ייצוא דוח נוכחות"
            icon: download
            action: export_attendance_report
            permission: hr.attendance.export
      filters:
        - field: employee_id
          type: select
          label: "עובד"
          source: employees
          display_field: full_name
          filter: "status_id=active"
        - field: department_id
          type: select
          label: "מחלקה"
          source: departments
          display_field: name
        - field: date
          type: date_range
          label: "טווח תאריכים"
        - field: status_id
          type: multi_select
          label: "סטטוס"
          options:
            - {value: present, label: "נוכח"}
            - {value: absent, label: "נעדר"}
            - {value: late, label: "איחור"}
            - {value: half_day, label: "חצי יום"}
        - field: absence_type
          type: multi_select
          label: "סוג היעדרות"
          options:
            - {value: none, label: "ללא"}
            - {value: sick, label: "מחלה"}
            - {value: vacation, label: "חופשה"}
            - {value: personal, label: "אישי"}
            - {value: other, label: "אחר"}
      calendar_view:
        entity: attendance
        date_field: date
        title_field: "employees.full_name"
        color_coding:
          present: "#4CAF50"
          absent: "#F44336"
          late: "#FF9800"
          half_day: "#2196F3"
        on_day_click: open_attendance_form
        on_event_click: open_attendance_detail
      list_view:
        table_columns:
          - {field: date, label: "תאריך", sortable: true, format: date}
          - {field: employee_id, label: "עובד", sortable: true, display: employees.full_name, link_to: "/hr/employees/:employee_id"}
          - {field: clock_in, label: "כניסה", sortable: true, format: time}
          - {field: clock_out, label: "יציאה", sortable: true, format: time}
          - {field: total_hours, label: "סה\"כ שעות", sortable: true}
          - {field: overtime_hours, label: "שעות נוספות", sortable: true}
          - {field: absence_type, label: "סוג היעדרות", sortable: true}
          - {field: status_id, label: "סטטוס", sortable: true, display: badge}
          - {field: approved_by, label: "אושר ע\"י", display: users.full_name}
          - {field: notes, label: "הערות"}
        default_sort: {field: date, direction: desc}
        row_actions:
          - {action: edit, label: "עריכה", icon: edit, permission: hr.attendance.edit}
          - {action: approve, label: "אישור", icon: check, permission: hr.attendance.approve}
          - {action: delete, label: "מחיקה", icon: delete, permission: hr.attendance.delete}
      attendance_form_modal:
        title: "רשומת נוכחות"
        fields:
          - {name: employee_id, type: select, label: "עובד", required: true, source: employees, display_field: full_name}
          - {name: date, type: date, label: "תאריך", required: true, default: today}
          - {name: clock_in, type: time, label: "שעת כניסה", required: true}
          - {name: clock_out, type: time, label: "שעת יציאה", required: false}
          - {name: overtime_hours, type: number, label: "שעות נוספות", required: false, default: 0}
          - {name: absence_type, type: select, label: "סוג היעדרות", required: false, options: [{value: none, label: "ללא"}, {value: sick, label: "מחלה"}, {value: vacation, label: "חופשה"}, {value: personal, label: "אישי"}, {value: other, label: "אחר"}]}
          - {name: status_id, type: select, label: "סטטוס", required: true, options: [{value: present, label: "נוכח"}, {value: absent, label: "נעדר"}, {value: late, label: "איחור"}, {value: half_day, label: "חצי יום"}]}
          - {name: notes, type: textarea, label: "הערות", required: false}

    # === PAYROLL LIST ===
    payroll_list:
      route: /hr/payroll
      title: "שכר"
      layout: standard_list
      description: "ניהול ריצות שכר"
      toolbar:
        primary_action:
          label: "ריצת שכר חדשה"
          icon: add
          target: /hr/payroll/create
          permission: hr.payroll.create
        secondary_actions:
          - label: "ייצוא"
            icon: download
            action: export_payroll
            permission: hr.payroll.export
      filters:
        - field: status_id
          type: multi_select
          label: "סטטוס"
          options:
            - {value: draft, label: "טיוטה"}
            - {value: calculated, label: "חושב"}
            - {value: approved, label: "מאושר"}
            - {value: paid, label: "שולם"}
            - {value: cancelled, label: "מבוטל"}
        - field: period_start
          type: date_range
          label: "תקופה"
      table:
        columns:
          - {field: run_number, label: "מספר ריצה", sortable: true, link_to: "/hr/payroll/:id"}
          - {field: period_start, label: "תחילת תקופה", sortable: true, format: date}
          - {field: period_end, label: "סוף תקופה", sortable: true, format: date}
          - {field: run_date, label: "תאריך ריצה", sortable: true, format: date}
          - {field: total_gross, label: "סה\"כ ברוטו", sortable: true, format: currency}
          - {field: total_deductions, label: "סה\"כ ניכויים", sortable: true, format: currency}
          - {field: total_net, label: "סה\"כ נטו", sortable: true, format: currency, highlight: true}
          - {field: status_id, label: "סטטוס", sortable: true, display: badge}
          - {field: created_by, label: "נוצר ע\"י", display: users.full_name}
        default_sort: {field: run_date, direction: desc}
        row_actions:
          - {action: view, label: "צפייה", icon: visibility, target: "/hr/payroll/:id"}
          - {action: approve, label: "אישור", icon: check, permission: hr.payroll.approve, condition: "status_id=calculated"}
          - {action: mark_paid, label: "סימון כשולם", icon: payments, permission: hr.payroll.approve, condition: "status_id=approved"}
          - {action: cancel, label: "ביטול", icon: cancel, permission: hr.payroll.approve, condition: "status_id IN (draft,calculated)"}

    # === PAYROLL CREATE ===
    payroll_create:
      route: /hr/payroll/create
      title: "ריצת שכר חדשה"
      layout: standard_form
      permission: hr.payroll.create
      form:
        sections:
          - title: "פרטי ריצה"
            columns: 2
            fields:
              - name: period_start
                type: date
                label: "תחילת תקופה"
                required: true
                grid_column: 1
              - name: period_end
                type: date
                label: "סוף תקופה"
                required: true
                grid_column: 2
              - name: run_date
                type: date
                label: "תאריך ריצה"
                required: true
                default: today
                grid_column: 1
        actions:
          submit:
            label: "יצירה וחישוב"
            icon: calculate
            action: create_and_calculate_payroll
            redirect_to: "/hr/payroll/:id"
          cancel:
            label: "ביטול"
            icon: close
            target: /hr/payroll

    # === PAYROLL DETAILS ===
    payroll_details:
      route: "/hr/payroll/:id"
      title: "ריצת שכר"
      layout: detail_with_items
      permission: hr.payroll.view
      header:
        display_fields:
          - {field: run_number, type: title}
          - {field: period_start, type: info, label: "מ-", format: date}
          - {field: period_end, type: info, label: "עד", format: date}
          - {field: status_id, type: badge}
        summary_cards:
          - {label: "סה\"כ ברוטו", field: total_gross, format: currency, color: blue}
          - {label: "סה\"כ ניכויים", field: total_deductions, format: currency, color: orange}
          - {label: "סה\"כ נטו", field: total_net, format: currency, color: green}
        actions:
          - {label: "חישוב מחדש", icon: calculate, action: recalculate_payroll, permission: hr.payroll.edit, condition: "status_id=draft"}
          - {label: "אישור", icon: check, action: approve_payroll, permission: hr.payroll.approve, condition: "status_id=calculated"}
          - {label: "סימון כשולם", icon: payments, action: mark_payroll_paid, permission: hr.payroll.approve, condition: "status_id=approved"}
          - {label: "ביטול", icon: cancel, action: cancel_payroll, permission: hr.payroll.approve, condition: "status_id IN (draft,calculated)"}
          - {label: "ייצוא PDF", icon: picture_as_pdf, action: export_payroll_pdf}
          - {label: "ייצוא Excel", icon: download, action: export_payroll_excel}
      items_table:
        entity: payroll_items
        filter: "payroll_run_id=:id"
        columns:
          - {field: employee_id, label: "עובד", display: employees.full_name, link_to: "/hr/employees/:employee_id"}
          - {field: base_salary, label: "שכר בסיס", format: currency, editable: true, condition: "payroll_run.status_id=draft"}
          - {field: overtime_pay, label: "שעות נוספות", format: currency, editable: true, condition: "payroll_run.status_id=draft"}
          - {field: bonuses, label: "בונוסים", format: currency, editable: true, condition: "payroll_run.status_id=draft"}
          - {field: gross_pay, label: "ברוטו", format: currency}
          - {field: tax_deduction, label: "מס", format: currency}
          - {field: social_security, label: "ביטוח לאומי", format: currency}
          - {field: pension, label: "פנסיה", format: currency}
          - {field: other_deductions, label: "ניכויים אחרים", format: currency, editable: true, condition: "payroll_run.status_id=draft"}
          - {field: net_pay, label: "נטו", format: currency, highlight: true}
          - {field: notes, label: "הערות", editable: true}
        default_sort: {field: employees.full_name, direction: asc}

    # === EMPLOYEE TASKS LIST ===
    employee_tasks_list:
      route: /hr/employee-tasks
      title: "משימות עובדים"
      layout: standard_list
      description: "ניהול משימות שהוקצו לעובדים"
      toolbar:
        primary_action:
          label: "משימה חדשה"
          icon: add
          target: /hr/employee-tasks/create
          permission: hr.employee_tasks.create
      filters:
        - field: employee_id
          type: select
          label: "עובד"
          source: employees
          display_field: full_name
        - field: assigned_by
          type: select
          label: "שויך ע\"י"
          source: users
          display_field: full_name
        - field: status_id
          type: multi_select
          label: "סטטוס"
          options:
            - {value: todo, label: "לביצוע"}
            - {value: in_progress, label: "בתהליך"}
            - {value: done, label: "הושלם"}
            - {value: cancelled, label: "בוטל"}
        - field: priority
          type: multi_select
          label: "עדיפות"
          options:
            - {value: low, label: "נמוכה"}
            - {value: medium, label: "בינונית"}
            - {value: high, label: "גבוהה"}
            - {value: critical, label: "קריטית"}
        - field: due_date
          type: date_range
          label: "תאריך יעד"
      table:
        columns:
          - {field: title, label: "כותרת", sortable: true, link_to: "/hr/employee-tasks/:id"}
          - {field: employee_id, label: "עובד", sortable: true, display: employees.full_name, link_to: "/hr/employees/:employee_id"}
          - {field: due_date, label: "תאריך יעד", sortable: true, format: date}
          - {field: priority, label: "עדיפות", sortable: true, display: badge}
          - {field: status_id, label: "סטטוס", sortable: true, display: badge}
          - {field: assigned_by, label: "שויך ע\"י", display: users.full_name}
          - {field: created_at, label: "נוצר", sortable: true, format: datetime}
        default_sort: {field: due_date, direction: asc}
        row_actions:
          - {action: edit, label: "עריכה", icon: edit, permission: hr.employee_tasks.edit}
          - {action: change_status, label: "שינוי סטטוס", icon: swap_horiz}
          - {action: delete, label: "מחיקה", icon: delete, permission: hr.employee_tasks.delete}

    # === EMPLOYEE TASK CREATE ===
    employee_task_create:
      route: /hr/employee-tasks/create
      title: "משימה חדשה"
      layout: standard_form
      permission: hr.employee_tasks.create
      form:
        sections:
          - title: "פרטי משימה"
            columns: 2
            fields:
              - name: employee_id
                type: select
                label: "עובד"
                required: true
                source: employees
                display_field: full_name
                filter: "status_id=active"
                grid_column: 1
                pre_fill_from_query: employee_id
              - name: title
                type: text
                label: "כותרת"
                required: true
                max_length: 200
                grid_column: 2
              - name: description
                type: textarea
                label: "תיאור"
                required: false
                rows: 4
                grid_column: "1-2"
              - name: due_date
                type: date
                label: "תאריך יעד"
                required: true
                grid_column: 1
              - name: priority
                type: select
                label: "עדיפות"
                required: true
                default: medium
                options:
                  - {value: low, label: "נמוכה"}
                  - {value: medium, label: "בינונית"}
                  - {value: high, label: "גבוהה"}
                  - {value: critical, label: "קריטית"}
                grid_column: 2
              - name: status_id
                type: select
                label: "סטטוס"
                required: true
                default: todo
                options:
                  - {value: todo, label: "לביצוע"}
                  - {value: in_progress, label: "בתהליך"}
                  - {value: done, label: "הושלם"}
                  - {value: cancelled, label: "בוטל"}
                grid_column: 1
              - name: notes
                type: textarea
                label: "הערות"
                required: false
                rows: 3
                grid_column: "1-2"
        actions:
          submit:
            label: "יצירה"
            icon: save
            action: create_employee_task
            redirect_to: "/hr/employee-tasks/:id"
          cancel:
            label: "ביטול"
            icon: close
            target: /hr/employee-tasks

  # ----------------------------------------------------------
  # NAVIGATION MAP
  # ----------------------------------------------------------
  navigation_map:
    employees_list:
      navigates_to:
        - {target: employee_create, trigger: "primary action button"}
        - {target: employee_profile, trigger: "click row name"}
        - {target: employee_edit, trigger: "row action edit"}
    employee_profile:
      navigates_to:
        - {target: employee_edit, trigger: "header edit button"}
        - {target: attendance_list, trigger: "attendance tab filtered"}
        - {target: payroll_details, trigger: "click payroll run link"}
        - {target: employee_task_create, trigger: "create task action"}
    payroll_list:
      navigates_to:
        - {target: payroll_create, trigger: "primary action button"}
        - {target: payroll_details, trigger: "click row"}
    payroll_details:
      navigates_to:
        - {target: employee_profile, trigger: "click employee name"}


# ============================================================
# MODULE 14: OPERATIONS
# ============================================================
module_14_operations:
  module_id: 14
  name: "Operations"
  label_he: "תפעול"
  icon: engineering
  route: /operations
  priority: medium
  purpose: "תהליכי עבודה, סטטוסים, SLA, תורים, ביצוע ותפעול"

  # ----------------------------------------------------------
  # SUBMENU
  # ----------------------------------------------------------
  submenus:
    - label: "תהליכי עבודה"
      route: /operations/workflows
      icon: account_tree
    - label: "תורי עבודה"
      route: /operations/queues
      icon: queue
    - label: "מעקב SLA"
      route: /operations/sla
      icon: timer
    - label: "לוח ביצוע"
      route: /operations/execution-board
      icon: dashboard
    - label: "חריגות"
      route: /operations/exceptions
      icon: warning

  # ----------------------------------------------------------
  # ENTITIES
  # ----------------------------------------------------------
  entities:

    workflows:
      type: master_data
      table_name: workflows
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: name
          type: varchar(200)
          required: true
          label_he: "שם תהליך"
        - name: description
          type: text
          nullable: true
          label_he: "תיאור"
        - name: trigger_entity
          type: enum
          values: [document, customer, supplier, project, task, purchase_order, sales_order]
          required: true
          label_he: "ישות מפעילה"
          display_values_he:
            document: "מסמך"
            customer: "לקוח"
            supplier: "ספק"
            project: "פרויקט"
            task: "משימה"
            purchase_order: "הזמנת רכש"
            sales_order: "הזמנת לקוח"
        - name: trigger_event
          type: enum
          values: [created, updated, status_changed, amount_exceeded, due_date_approaching]
          required: true
          label_he: "אירוע מפעיל"
          display_values_he:
            created: "נוצר"
            updated: "עודכן"
            status_changed: "שינוי סטטוס"
            amount_exceeded: "חריגת סכום"
            due_date_approaching: "תאריך יעד מתקרב"
        - name: conditions_json
          type: json
          nullable: true
          label_he: "תנאים"
        - name: is_active
          type: boolean
          default: true
          label_he: "פעיל"
        - name: created_by
          type: uuid
          required: true
          foreign_key: users.id
          label_he: "נוצר על ידי"
        - name: created_at
          type: timestamp
          auto_generated: true
        - name: updated_at
          type: timestamp
          auto_generated: true
          on_update: true
      indexes:
        - columns: [trigger_entity, trigger_event]
        - columns: [is_active]

    workflow_steps:
      type: master_data
      table_name: workflow_steps
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: workflow_id
          type: uuid
          required: true
          foreign_key: workflows.id
          on_delete: cascade
          label_he: "תהליך"
        - name: step_order
          type: integer
          required: true
          label_he: "סדר שלב"
        - name: step_type
          type: enum
          values: [send_notification, change_status, assign_user, create_task, send_email, webhook, approval]
          required: true
          label_he: "סוג שלב"
          display_values_he:
            send_notification: "שליחת התראה"
            change_status: "שינוי סטטוס"
            assign_user: "שיוך משתמש"
            create_task: "יצירת משימה"
            send_email: "שליחת אימייל"
            webhook: "Webhook"
            approval: "אישור"
        - name: config_json
          type: json
          required: true
          label_he: "הגדרות שלב"
        - name: delay_minutes
          type: integer
          nullable: true
          label_he: "השהייה (דקות)"
        - name: condition_json
          type: json
          nullable: true
          label_he: "תנאי שלב"
      indexes:
        - columns: [workflow_id, step_order]
          unique: true

    workflow_executions:
      type: transactional
      table_name: workflow_executions
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: workflow_id
          type: uuid
          required: true
          foreign_key: workflows.id
          label_he: "תהליך"
        - name: entity_type
          type: varchar(50)
          required: true
          label_he: "סוג ישות"
        - name: entity_id
          type: uuid
          required: true
          label_he: "מזהה ישות"
        - name: started_at
          type: timestamp
          required: true
          auto_generated: true
          label_he: "התחלה"
        - name: completed_at
          type: timestamp
          nullable: true
          label_he: "סיום"
        - name: status
          type: enum
          values: [running, completed, failed, cancelled]
          required: true
          default: running
          label_he: "סטטוס"
          display_values_he:
            running: "פועל"
            completed: "הושלם"
            failed: "נכשל"
            cancelled: "בוטל"
        - name: current_step
          type: integer
          default: 1
          label_he: "שלב נוכחי"
        - name: error_message
          type: text
          nullable: true
          label_he: "הודעת שגיאה"
      indexes:
        - columns: [workflow_id]
        - columns: [entity_type, entity_id]
        - columns: [status]
        - columns: [started_at]

    work_queues:
      type: master_data
      table_name: work_queues
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: name
          type: varchar(200)
          required: true
          label_he: "שם תור"
        - name: description
          type: text
          nullable: true
          label_he: "תיאור"
        - name: entity_type
          type: varchar(50)
          required: true
          label_he: "סוג ישות"
        - name: assigned_team
          type: varchar(100)
          nullable: true
          label_he: "צוות אחראי"
        - name: priority
          type: enum
          values: [low, medium, high, critical]
          required: true
          default: medium
          label_he: "עדיפות"
          display_values_he:
            low: "נמוכה"
            medium: "בינונית"
            high: "גבוהה"
            critical: "קריטית"
        - name: sla_hours
          type: integer
          nullable: true
          label_he: "SLA (שעות)"
        - name: is_active
          type: boolean
          default: true
          label_he: "פעיל"
        - name: created_at
          type: timestamp
          auto_generated: true
      indexes:
        - columns: [entity_type]
        - columns: [is_active]

    queue_items:
      type: transactional
      table_name: queue_items
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: queue_id
          type: uuid
          required: true
          foreign_key: work_queues.id
          label_he: "תור"
        - name: entity_type
          type: varchar(50)
          required: true
          label_he: "סוג ישות"
        - name: entity_id
          type: uuid
          required: true
          label_he: "מזהה ישות"
        - name: assigned_to
          type: uuid
          nullable: true
          foreign_key: users.id
          label_he: "מוקצה ל"
        - name: priority
          type: enum
          values: [low, medium, high, critical]
          required: true
          default: medium
          label_he: "עדיפות"
        - name: status
          type: enum
          values: [pending, in_progress, completed, escalated]
          required: true
          default: pending
          label_he: "סטטוס"
          display_values_he:
            pending: "ממתין"
            in_progress: "בטיפול"
            completed: "הושלם"
            escalated: "הועלה לטיפול"
        - name: entered_at
          type: timestamp
          required: true
          auto_generated: true
          label_he: "נכנס לתור"
        - name: due_at
          type: timestamp
          nullable: true
          label_he: "דדליין"
        - name: completed_at
          type: timestamp
          nullable: true
          label_he: "הושלם"
      indexes:
        - columns: [queue_id, status]
        - columns: [assigned_to]
        - columns: [due_at]

    sla_definitions:
      type: master_data
      table_name: sla_definitions
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: name
          type: varchar(200)
          required: true
          label_he: "שם SLA"
        - name: entity_type
          type: varchar(50)
          required: true
          label_he: "סוג ישות"
        - name: condition_json
          type: json
          required: true
          label_he: "תנאים"
        - name: target_hours
          type: integer
          required: true
          label_he: "שעות יעד"
        - name: warning_hours
          type: integer
          required: true
          label_he: "שעות אזהרה"
        - name: is_active
          type: boolean
          default: true
          label_he: "פעיל"
        - name: created_at
          type: timestamp
          auto_generated: true
      indexes:
        - columns: [entity_type]
        - columns: [is_active]

    sla_tracking:
      type: transactional
      table_name: sla_tracking
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: sla_definition_id
          type: uuid
          required: true
          foreign_key: sla_definitions.id
          label_he: "הגדרת SLA"
        - name: entity_type
          type: varchar(50)
          required: true
          label_he: "סוג ישות"
        - name: entity_id
          type: uuid
          required: true
          label_he: "מזהה ישות"
        - name: started_at
          type: timestamp
          required: true
          label_he: "התחלה"
        - name: target_at
          type: timestamp
          required: true
          label_he: "יעד"
        - name: warning_at
          type: timestamp
          required: true
          label_he: "אזהרה"
        - name: completed_at
          type: timestamp
          nullable: true
          label_he: "הושלם"
        - name: status
          type: enum
          values: [on_track, warning, breached, completed]
          required: true
          default: on_track
          label_he: "סטטוס"
          display_values_he:
            on_track: "בזמן"
            warning: "אזהרה"
            breached: "חריגה"
            completed: "הושלם"
      indexes:
        - columns: [sla_definition_id]
        - columns: [entity_type, entity_id]
        - columns: [status]
        - columns: [target_at]

  # ----------------------------------------------------------
  # PAGES
  # ----------------------------------------------------------
  pages:

    # === WORKFLOWS LIST ===
    workflows_list:
      route: /operations/workflows
      title: "תהליכי עבודה"
      layout: standard_list
      toolbar:
        primary_action:
          label: "תהליך חדש"
          icon: add
          target: /operations/workflows/create
          permission: operations.workflows.create
      filters:
        - field: trigger_entity
          type: multi_select
          label: "ישות מפעילה"
          options:
            - {value: document, label: "מסמך"}
            - {value: customer, label: "לקוח"}
            - {value: supplier, label: "ספק"}
            - {value: project, label: "פרויקט"}
            - {value: task, label: "משימה"}
            - {value: purchase_order, label: "הזמנת רכש"}
            - {value: sales_order, label: "הזמנת לקוח"}
        - field: trigger_event
          type: multi_select
          label: "אירוע"
          options:
            - {value: created, label: "נוצר"}
            - {value: updated, label: "עודכן"}
            - {value: status_changed, label: "שינוי סטטוס"}
            - {value: amount_exceeded, label: "חריגת סכום"}
            - {value: due_date_approaching, label: "תאריך יעד מתקרב"}
        - field: is_active
          type: toggle
          label: "פעיל בלבד"
          default: true
      table:
        columns:
          - {field: name, label: "שם תהליך", sortable: true, link_to: "/operations/workflows/:id"}
          - {field: trigger_entity, label: "ישות", sortable: true}
          - {field: trigger_event, label: "אירוע", sortable: true}
          - {field: steps_count, label: "מספר שלבים", computed: true, formula: "COUNT(workflow_steps WHERE workflow_id=:id)"}
          - {field: is_active, label: "פעיל", sortable: true, display: toggle, action: toggle_active}
          - {field: executions_count, label: "ריצות", computed: true, formula: "COUNT(workflow_executions WHERE workflow_id=:id)"}
          - {field: created_by, label: "נוצר ע\"י", display: users.full_name}
          - {field: created_at, label: "נוצר", sortable: true, format: datetime}
        default_sort: {field: name, direction: asc}
        row_actions:
          - {action: view, label: "צפייה", icon: visibility, target: "/operations/workflows/:id"}
          - {action: edit, label: "עריכה", icon: edit, target: "/operations/workflows/:id/edit", permission: operations.workflows.edit}
          - {action: duplicate, label: "שכפול", icon: content_copy, permission: operations.workflows.create}
          - {action: test_run, label: "ריצת ניסיון", icon: play_arrow, permission: operations.workflows.edit}
          - {action: delete, label: "מחיקה", icon: delete, permission: operations.workflows.delete}

    # === WORKFLOW CREATE ===
    workflow_create:
      route: /operations/workflows/create
      title: "תהליך עבודה חדש"
      layout: standard_form
      permission: operations.workflows.create
      form:
        sections:
          - title: "פרטי תהליך"
            columns: 2
            fields:
              - name: name
                type: text
                label: "שם תהליך"
                required: true
                max_length: 200
                grid_column: "1-2"
              - name: description
                type: textarea
                label: "תיאור"
                required: false
                rows: 3
                grid_column: "1-2"
              - name: trigger_entity
                type: select
                label: "ישות מפעילה"
                required: true
                options:
                  - {value: document, label: "מסמך"}
                  - {value: customer, label: "לקוח"}
                  - {value: supplier, label: "ספק"}
                  - {value: project, label: "פרויקט"}
                  - {value: task, label: "משימה"}
                  - {value: purchase_order, label: "הזמנת רכש"}
                  - {value: sales_order, label: "הזמנת לקוח"}
                grid_column: 1
              - name: trigger_event
                type: select
                label: "אירוע מפעיל"
                required: true
                options:
                  - {value: created, label: "נוצר"}
                  - {value: updated, label: "עודכן"}
                  - {value: status_changed, label: "שינוי סטטוס"}
                  - {value: amount_exceeded, label: "חריגת סכום"}
                  - {value: due_date_approaching, label: "תאריך יעד מתקרב"}
                grid_column: 2
              - name: conditions_json
                type: condition_builder
                label: "תנאים"
                required: false
                config:
                  fields_source: "dynamic based on trigger_entity"
                  operators: [equals, not_equals, greater_than, less_than, contains, starts_with, is_empty, is_not_empty]
                grid_column: "1-2"
              - name: is_active
                type: toggle
                label: "פעיל"
                default: true
                grid_column: 1
          - title: "שלבים"
            type: step_editor
            entity: workflow_steps
            step_card_fields:
              - name: step_type
                type: select
                label: "סוג שלב"
                required: true
                options:
                  - {value: send_notification, label: "שליחת התראה", icon: notifications}
                  - {value: change_status, label: "שינוי סטטוס", icon: swap_horiz}
                  - {value: assign_user, label: "שיוך משתמש", icon: person_add}
                  - {value: create_task, label: "יצירת משימה", icon: add_task}
                  - {value: send_email, label: "שליחת אימייל", icon: email}
                  - {value: webhook, label: "Webhook", icon: webhook}
                  - {value: approval, label: "אישור", icon: check_circle}
              - name: config_json
                type: dynamic_config
                label: "הגדרות"
                config_per_type:
                  send_notification:
                    fields:
                      - {name: user_ids, type: multi_select, label: "נמענים", source: users}
                      - {name: message, type: textarea, label: "הודעה"}
                  change_status:
                    fields:
                      - {name: new_status, type: select, label: "סטטוס חדש", source: "dynamic based on entity"}
                  assign_user:
                    fields:
                      - {name: user_id, type: select, label: "משתמש", source: users}
                  create_task:
                    fields:
                      - {name: title, type: text, label: "כותרת משימה"}
                      - {name: assignee_id, type: select, label: "מבצע", source: users}
                      - {name: due_days, type: number, label: "ימים לביצוע"}
                  send_email:
                    fields:
                      - {name: to, type: text, label: "נמען"}
                      - {name: subject, type: text, label: "נושא"}
                      - {name: body, type: rich_text, label: "תוכן"}
                  webhook:
                    fields:
                      - {name: url, type: text, label: "URL"}
                      - {name: method, type: select, label: "Method", options: [POST, PUT, PATCH]}
                      - {name: headers_json, type: json_editor, label: "Headers"}
                  approval:
                    fields:
                      - {name: approver_id, type: select, label: "מאשר", source: users}
                      - {name: timeout_hours, type: number, label: "זמן המתנה (שעות)"}
              - name: delay_minutes
                type: number
                label: "השהייה (דקות)"
                required: false
              - name: condition_json
                type: condition_builder
                label: "תנאי שלב"
                required: false
            actions:
              add_step:
                label: "הוספת שלב"
                icon: add
              reorder:
                type: drag_drop
              remove_step:
                icon: delete
        actions:
          submit:
            label: "שמירה"
            icon: save
            action: create_workflow
            redirect_to: "/operations/workflows/:id"
          cancel:
            label: "ביטול"
            target: /operations/workflows

    # === WORKFLOW DETAILS ===
    workflow_details:
      route: "/operations/workflows/:id"
      title: "תהליך עבודה"
      layout: detail_with_tabs
      permission: operations.workflows.view
      header:
        display_fields:
          - {field: name, type: title}
          - {field: trigger_entity, type: info, label: "ישות"}
          - {field: trigger_event, type: info, label: "אירוע"}
          - {field: is_active, type: badge}
        actions:
          - {label: "עריכה", icon: edit, target: "/operations/workflows/:id/edit", permission: operations.workflows.edit}
          - {label: "ריצת ניסיון", icon: play_arrow, action: test_run_workflow, permission: operations.workflows.edit}
          - {label: "הפעלה/כיבוי", icon: toggle_on, action: toggle_active, permission: operations.workflows.edit}
          - {label: "מחיקה", icon: delete, action: delete_workflow, confirmation: "האם למחוק את התהליך?", permission: operations.workflows.delete}
      tabs:
        - name: steps
          label: "שלבים"
          icon: account_tree
          type: visual_step_editor
          entity: workflow_steps
          filter: "workflow_id=:id"
          display: step_cards_in_sequence
          step_card_fields:
            - {field: step_order, label: "#"}
            - {field: step_type, label: "סוג", display: icon_with_label}
            - {field: config_json, label: "הגדרות", display: summary}
            - {field: delay_minutes, label: "השהייה"}
            - {field: condition_json, label: "תנאי", display: badge_if_present}

        - name: execution_history
          label: "היסטוריית ריצות"
          icon: history
          type: table
          entity: workflow_executions
          filter: "workflow_id=:id"
          table_columns:
            - {field: entity_type, label: "סוג ישות"}
            - {field: entity_id, label: "מזהה ישות", link_to: "/:entity_type/:entity_id"}
            - {field: started_at, label: "התחלה", sortable: true, format: datetime}
            - {field: completed_at, label: "סיום", format: datetime}
            - {field: current_step, label: "שלב נוכחי"}
            - {field: status, label: "סטטוס", display: badge}
            - {field: error_message, label: "שגיאה"}
          default_sort: {field: started_at, direction: desc}

    # === QUEUES LIST ===
    queues_list:
      route: /operations/queues
      title: "תורי עבודה"
      layout: standard_list
      toolbar:
        primary_action:
          label: "תור חדש"
          icon: add
          target: /operations/queues/create
          permission: operations.queues.create
      filters:
        - field: entity_type
          type: select
          label: "סוג ישות"
        - field: priority
          type: multi_select
          label: "עדיפות"
          options:
            - {value: low, label: "נמוכה"}
            - {value: medium, label: "בינונית"}
            - {value: high, label: "גבוהה"}
            - {value: critical, label: "קריטית"}
        - field: is_active
          type: toggle
          label: "פעיל בלבד"
          default: true
      table:
        columns:
          - {field: name, label: "שם תור", sortable: true, link_to: "/operations/queues/:id"}
          - {field: entity_type, label: "סוג ישות", sortable: true}
          - {field: assigned_team, label: "צוות", sortable: true}
          - {field: priority, label: "עדיפות", sortable: true, display: badge}
          - {field: sla_hours, label: "SLA (שעות)", sortable: true}
          - {field: pending_count, label: "ממתינים", computed: true, formula: "COUNT(queue_items WHERE queue_id=:id AND status=pending)"}
          - {field: in_progress_count, label: "בטיפול", computed: true, formula: "COUNT(queue_items WHERE queue_id=:id AND status=in_progress)"}
          - {field: is_active, label: "פעיל", display: toggle, action: toggle_active}
        default_sort: {field: priority, direction: desc}
        row_actions:
          - {action: view, label: "צפייה", icon: visibility, target: "/operations/queues/:id"}
          - {action: edit, label: "עריכה", icon: edit, permission: operations.queues.edit}
          - {action: delete, label: "מחיקה", icon: delete, permission: operations.queues.delete}

    # === QUEUE DETAILS ===
    queue_details:
      route: "/operations/queues/:id"
      title: "תור עבודה"
      layout: detail_with_items
      permission: operations.queues.view
      header:
        display_fields:
          - {field: name, type: title}
          - {field: entity_type, type: info}
          - {field: assigned_team, type: info}
          - {field: priority, type: badge}
        summary_cards:
          - {label: "ממתינים", value: pending_count, color: orange}
          - {label: "בטיפול", value: in_progress_count, color: blue}
          - {label: "הושלמו", value: completed_count, color: green}
          - {label: "הועלו לטיפול", value: escalated_count, color: red}
      items_table:
        entity: queue_items
        filter: "queue_id=:id"
        columns:
          - {field: entity_type, label: "סוג"}
          - {field: entity_id, label: "פריט", link_to: "/:entity_type/:entity_id"}
          - {field: assigned_to, label: "מוקצה ל", display: users.full_name}
          - {field: priority, label: "עדיפות", display: badge}
          - {field: status, label: "סטטוס", display: badge}
          - {field: entered_at, label: "נכנס לתור", format: datetime}
          - {field: due_at, label: "דדליין", format: datetime}
          - {field: completed_at, label: "הושלם", format: datetime}
        row_actions:
          - {action: assign, label: "שיוך", icon: person_add, action_type: drag_drop_or_select}
          - {action: escalate, label: "העלאה לטיפול", icon: arrow_upward}
          - {action: complete, label: "סימון כהושלם", icon: check}
        filters:
          - {field: status, type: multi_select, label: "סטטוס"}
          - {field: assigned_to, type: select, label: "מוקצה ל", source: users}
          - {field: priority, type: multi_select, label: "עדיפות"}

    # === SLA MONITORING ===
    sla_monitoring:
      route: /operations/sla
      title: "מעקב SLA"
      layout: dashboard_with_table
      permission: operations.sla.view
      dashboard_cards:
        - {label: "בזמן", metric: "COUNT(sla_tracking WHERE status=on_track)", color: green, icon: check_circle}
        - {label: "אזהרה", metric: "COUNT(sla_tracking WHERE status=warning)", color: orange, icon: warning}
        - {label: "חריגה", metric: "COUNT(sla_tracking WHERE status=breached)", color: red, icon: error}
        - {label: "הושלם", metric: "COUNT(sla_tracking WHERE status=completed)", color: blue, icon: done_all}
      toolbar:
        primary_action:
          label: "הגדרת SLA חדשה"
          icon: add
          target: /operations/sla/create
          permission: operations.sla.create
      filters:
        - field: status
          type: multi_select
          label: "סטטוס"
          options:
            - {value: on_track, label: "בזמן"}
            - {value: warning, label: "אזהרה"}
            - {value: breached, label: "חריגה"}
            - {value: completed, label: "הושלם"}
        - field: entity_type
          type: select
          label: "סוג ישות"
        - field: sla_definition_id
          type: select
          label: "הגדרת SLA"
          source: sla_definitions
          display_field: name
        - field: started_at
          type: date_range
          label: "תאריך"
      table:
        columns:
          - {field: sla_definition_id, label: "SLA", display: sla_definitions.name}
          - {field: entity_type, label: "סוג ישות"}
          - {field: entity_id, label: "פריט", link_to: "/:entity_type/:entity_id"}
          - {field: started_at, label: "התחלה", format: datetime, sortable: true}
          - {field: warning_at, label: "אזהרה", format: datetime, sortable: true}
          - {field: target_at, label: "יעד", format: datetime, sortable: true}
          - {field: completed_at, label: "הושלם", format: datetime}
          - {field: remaining_time, label: "זמן נותר", computed: true, format: duration}
          - {field: status, label: "סטטוס", display: badge, sortable: true}
        default_sort: {field: target_at, direction: asc}

    # === EXECUTION BOARD ===
    execution_board:
      route: /operations/execution-board
      title: "לוח ביצוע"
      layout: kanban
      permission: operations.executions.view
      kanban_config:
        entity: workflow_executions
        columns:
          - {status: running, label: "פועל", color: blue}
          - {status: completed, label: "הושלם", color: green}
          - {status: failed, label: "נכשל", color: red}
          - {status: cancelled, label: "בוטל", color: grey}
        card_fields:
          - {field: workflow_id, display: workflows.name, type: title}
          - {field: entity_type, type: subtitle}
          - {field: current_step, type: info, label: "שלב"}
          - {field: started_at, type: info, format: datetime}
          - {field: error_message, type: error, condition: "status=failed"}
        card_actions:
          - {action: retry, label: "נסה שוב", icon: refresh, condition: "status=failed"}
          - {action: cancel, label: "ביטול", icon: cancel, condition: "status=running"}
          - {action: view_details, label: "פרטים", icon: visibility}
      filters:
        - field: workflow_id
          type: select
          label: "תהליך"
          source: workflows
          display_field: name
        - field: entity_type
          type: select
          label: "סוג ישות"
        - field: started_at
          type: date_range
          label: "תאריך"

    # === EXCEPTIONS ===
    exceptions_list:
      route: /operations/exceptions
      title: "חריגות"
      layout: standard_list
      description: "ריצות שנכשלו, SLA שנחרגו, ופריטים שדורשים טיפול"
      sections:
        - title: "ריצות שנכשלו"
          entity: workflow_executions
          filter: "status=failed"
          table_columns:
            - {field: workflow_id, label: "תהליך", display: workflows.name}
            - {field: entity_type, label: "סוג ישות"}
            - {field: entity_id, label: "פריט", link_to: "/:entity_type/:entity_id"}
            - {field: started_at, label: "התחלה", format: datetime}
            - {field: error_message, label: "שגיאה"}
          row_actions:
            - {action: retry, label: "נסה שוב", icon: refresh}
            - {action: dismiss, label: "התעלם", icon: close}
        - title: "SLA שנחרגו"
          entity: sla_tracking
          filter: "status=breached"
          table_columns:
            - {field: sla_definition_id, label: "SLA", display: sla_definitions.name}
            - {field: entity_type, label: "סוג ישות"}
            - {field: entity_id, label: "פריט", link_to: "/:entity_type/:entity_id"}
            - {field: target_at, label: "יעד", format: datetime}
            - {field: overdue_time, label: "חריגה", computed: true, format: duration}
        - title: "פריטים שהועלו לטיפול"
          entity: queue_items
          filter: "status=escalated"
          table_columns:
            - {field: queue_id, label: "תור", display: work_queues.name}
            - {field: entity_type, label: "סוג ישות"}
            - {field: entity_id, label: "פריט", link_to: "/:entity_type/:entity_id"}
            - {field: entered_at, label: "נכנס לתור", format: datetime}
            - {field: due_at, label: "דדליין", format: datetime}

  navigation_map:
    workflows_list:
      navigates_to:
        - {target: workflow_create, trigger: "primary action"}
        - {target: workflow_details, trigger: "click row"}
    workflow_details:
      navigates_to:
        - {target: workflow_edit, trigger: "edit button"}
        - {target: entity_detail, trigger: "click execution entity link"}
    queues_list:
      navigates_to:
        - {target: queue_details, trigger: "click row"}
    execution_board:
      navigates_to:
        - {target: workflow_details, trigger: "click card"}


# ============================================================
# MODULE 15: DOCUMENTS (Center)
# ============================================================
module_15_documents:
  module_id: 15
  name: "Documents"
  label_he: "מסמכים"
  icon: folder
  route: /documents
  priority: high
  purpose: "מרכז מסמכים, קבצים, חתימות, גרסאות, שיוכים וישויות קשורות"

  submenus:
    - label: "כל הקבצים"
      route: /documents/files
      icon: description
    - label: "תיקיות"
      route: /documents/folders
      icon: folder
    - label: "תבניות"
      route: /documents/templates
      icon: article
    - label: "חתימות"
      route: /documents/signatures
      icon: draw
    - label: "גרסאות"
      route: /documents/versions
      icon: history
    - label: "מסמכים מקושרים"
      route: /documents/linked
      icon: link

  entities:

    files:
      type: master_data
      table_name: files
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: file_name
          type: varchar(255)
          required: true
          label_he: "שם קובץ"
        - name: file_url
          type: text
          required: true
          label_he: "כתובת קובץ"
        - name: file_type
          type: varchar(50)
          required: true
          label_he: "סוג קובץ"
        - name: file_size
          type: integer
          required: true
          label_he: "גודל קובץ"
        - name: folder_id
          type: uuid
          nullable: true
          foreign_key: folders.id
          label_he: "תיקייה"
        - name: entity_type
          type: varchar(50)
          nullable: true
          label_he: "סוג ישות מקושרת"
        - name: entity_id
          type: uuid
          nullable: true
          label_he: "מזהה ישות מקושרת"
        - name: uploaded_by
          type: uuid
          required: true
          foreign_key: users.id
          label_he: "הועלה ע\"י"
        - name: description
          type: text
          nullable: true
          label_he: "תיאור"
        - name: tags
          type: text[]
          nullable: true
          label_he: "תגיות"
        - name: is_public
          type: boolean
          default: false
          label_he: "ציבורי"
        - name: created_at
          type: timestamp
          auto_generated: true
      indexes:
        - columns: [folder_id]
        - columns: [entity_type, entity_id]
        - columns: [file_type]
        - columns: [uploaded_by]

    folders:
      type: master_data
      table_name: folders
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: name
          type: varchar(200)
          required: true
          label_he: "שם תיקייה"
        - name: parent_folder_id
          type: uuid
          nullable: true
          foreign_key: folders.id
          self_referencing: true
          label_he: "תיקיית אב"
        - name: created_by
          type: uuid
          required: true
          foreign_key: users.id
          label_he: "נוצר ע\"י"
        - name: is_system
          type: boolean
          default: false
          label_he: "תיקיית מערכת"
        - name: created_at
          type: timestamp
          auto_generated: true
      indexes:
        - columns: [parent_folder_id]
        - columns: [name, parent_folder_id]
          unique: true

    document_templates:
      type: master_data
      table_name: document_templates
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: name
          type: varchar(200)
          required: true
          label_he: "שם תבנית"
        - name: description
          type: text
          nullable: true
          label_he: "תיאור"
        - name: template_type
          type: enum
          values: [invoice, receipt, quote, contract, letter, report, other]
          required: true
          label_he: "סוג תבנית"
          display_values_he:
            invoice: "חשבונית"
            receipt: "קבלה"
            quote: "הצעת מחיר"
            contract: "חוזה"
            letter: "מכתב"
            report: "דוח"
            other: "אחר"
        - name: content_html
          type: text
          required: true
          label_he: "תוכן HTML"
        - name: variables_json
          type: json
          nullable: true
          label_he: "משתנים"
        - name: is_active
          type: boolean
          default: true
          label_he: "פעיל"
        - name: created_by
          type: uuid
          required: true
          foreign_key: users.id
          label_he: "נוצר ע\"י"
        - name: created_at
          type: timestamp
          auto_generated: true
        - name: updated_at
          type: timestamp
          auto_generated: true
          on_update: true
      indexes:
        - columns: [template_type]
        - columns: [is_active]

    signatures:
      type: transactional
      table_name: signatures
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: document_id
          type: uuid
          nullable: true
          foreign_key: documents.id
          label_he: "מסמך"
        - name: file_id
          type: uuid
          nullable: true
          foreign_key: files.id
          label_he: "קובץ"
        - name: signer_name
          type: varchar(200)
          required: true
          label_he: "שם חותם"
        - name: signer_email
          type: varchar(100)
          required: true
          label_he: "אימייל חותם"
        - name: signed_at
          type: timestamp
          nullable: true
          label_he: "תאריך חתימה"
        - name: status
          type: enum
          values: [pending, signed, declined, expired]
          required: true
          default: pending
          label_he: "סטטוס"
          display_values_he:
            pending: "ממתין"
            signed: "נחתם"
            declined: "סורב"
            expired: "פג תוקף"
        - name: token
          type: text
          required: true
          unique: true
          label_he: "טוקן"
        - name: expires_at
          type: timestamp
          required: true
          label_he: "תוקף"
        - name: created_at
          type: timestamp
          auto_generated: true
      indexes:
        - columns: [token]
          unique: true
        - columns: [document_id]
        - columns: [file_id]
        - columns: [status]

    file_versions:
      type: transactional
      table_name: file_versions
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: file_id
          type: uuid
          required: true
          foreign_key: files.id
          on_delete: cascade
          label_he: "קובץ"
        - name: version_number
          type: integer
          required: true
          label_he: "מספר גרסה"
        - name: file_url
          type: text
          required: true
          label_he: "כתובת קובץ"
        - name: file_size
          type: integer
          required: true
          label_he: "גודל"
        - name: change_notes
          type: text
          nullable: true
          label_he: "הערות שינוי"
        - name: uploaded_by
          type: uuid
          required: true
          foreign_key: users.id
          label_he: "הועלה ע\"י"
        - name: created_at
          type: timestamp
          auto_generated: true
      indexes:
        - columns: [file_id, version_number]
          unique: true

  pages:

    # === ALL FILES ===
    all_files:
      route: /documents/files
      title: "כל הקבצים"
      layout: dual_view
      view_toggle:
        options:
          - {value: grid, label: "רשת", icon: grid_view}
          - {value: list, label: "רשימה", icon: list}
        default: grid
      toolbar:
        primary_action:
          label: "העלאת קובץ"
          icon: upload
          action: open_upload_modal
          permission: documents.files.create
        secondary_actions:
          - label: "תיקייה חדשה"
            icon: create_new_folder
            action: create_folder_modal
            permission: documents.folders.create
      filters:
        - field: file_type
          type: multi_select
          label: "סוג קובץ"
          options:
            - {value: pdf, label: "PDF"}
            - {value: doc, label: "Word"}
            - {value: xls, label: "Excel"}
            - {value: img, label: "תמונה"}
            - {value: other, label: "אחר"}
        - field: folder_id
          type: select
          label: "תיקייה"
          source: folders
          display_field: name
        - field: entity_type
          type: select
          label: "ישות מקושרת"
          options:
            - {value: customer, label: "לקוח"}
            - {value: supplier, label: "ספק"}
            - {value: project, label: "פרויקט"}
            - {value: employee, label: "עובד"}
            - {value: document, label: "מסמך"}
        - field: created_at
          type: date_range
          label: "תאריך העלאה"
        - field: uploaded_by
          type: select
          label: "הועלה ע\"י"
          source: users
          display_field: full_name
        - field: tags
          type: tags_input
          label: "תגיות"
      grid_view:
        card_fields:
          - {field: file_name, type: title}
          - {field: file_type, type: icon}
          - {field: file_size, type: info, format: file_size}
          - {field: uploaded_by, type: info, display: users.full_name}
          - {field: created_at, type: info, format: date}
        preview_on_click: true
        actions:
          - {action: download, icon: download}
          - {action: preview, icon: visibility}
          - {action: share, icon: share}
          - {action: delete, icon: delete}
      list_view:
        table_columns:
          - {field: file_name, label: "שם קובץ", sortable: true}
          - {field: file_type, label: "סוג", sortable: true}
          - {field: file_size, label: "גודל", sortable: true, format: file_size}
          - {field: folder_id, label: "תיקייה", display: folders.name, link_to: "/documents/folders/:folder_id"}
          - {field: entity_type, label: "ישות מקושרת"}
          - {field: tags, label: "תגיות", display: tag_chips}
          - {field: uploaded_by, label: "הועלה ע\"י", display: users.full_name}
          - {field: created_at, label: "תאריך", sortable: true, format: datetime}
        default_sort: {field: created_at, direction: desc}
        row_actions:
          - {action: download, label: "הורדה", icon: download}
          - {action: preview, label: "תצוגה מקדימה", icon: visibility}
          - {action: edit, label: "עריכה", icon: edit}
          - {action: move, label: "העברה לתיקייה", icon: drive_file_move}
          - {action: delete, label: "מחיקה", icon: delete, confirmation: "האם למחוק את הקובץ?"}
      preview_panel:
        position: right
        width: 400
        fields:
          - {field: file_name, label: "שם"}
          - {field: file_type, label: "סוג"}
          - {field: file_size, label: "גודל", format: file_size}
          - {field: description, label: "תיאור"}
          - {field: tags, label: "תגיות"}
          - {field: uploaded_by, label: "הועלה ע\"י"}
          - {field: created_at, label: "תאריך"}
          - {field: entity_type, label: "ישות מקושרת"}
        preview_types:
          pdf: inline_viewer
          image: image_viewer
          doc: download_prompt
          other: download_prompt
      upload_modal:
        title: "העלאת קובץ"
        fields:
          - {name: file, type: file_upload, label: "קובץ", required: true, accept: "*/*", max_size_mb: 50, multiple: true}
          - {name: folder_id, type: select, label: "תיקייה", source: folders, display_field: name}
          - {name: entity_type, type: select, label: "ישות מקושרת", options: [{value: "", label: "ללא"}, {value: customer, label: "לקוח"}, {value: supplier, label: "ספק"}, {value: project, label: "פרויקט"}, {value: employee, label: "עובד"}]}
          - {name: entity_id, type: dynamic_select, label: "ישות", depends_on: entity_type}
          - {name: description, type: textarea, label: "תיאור"}
          - {name: tags, type: tags_input, label: "תגיות"}

    # === FOLDERS ===
    folders_page:
      route: /documents/folders
      title: "תיקיות"
      layout: tree_with_content
      sidebar:
        type: tree_navigation
        entity: folders
        display_field: name
        child_field: parent_folder_id
        actions:
          - {action: create_folder, label: "תיקייה חדשה", icon: create_new_folder}
          - {action: rename, label: "שינוי שם", icon: edit}
          - {action: delete, label: "מחיקה", icon: delete, confirmation: "האם למחוק את התיקייה?"}
        drag_drop:
          enabled: true
          type: files_to_folders
      content:
        entity: files
        filter: "folder_id=:selected_folder_id"
        display: grid_or_list
        columns:
          - {field: file_name, label: "שם קובץ", sortable: true}
          - {field: file_type, label: "סוג"}
          - {field: file_size, label: "גודל", format: file_size}
          - {field: uploaded_by, label: "הועלה ע\"י", display: users.full_name}
          - {field: created_at, label: "תאריך", format: datetime}
        actions:
          - {action: upload, label: "העלאה לתיקייה", icon: upload}
          - {action: download, label: "הורדה", icon: download}
          - {action: move, label: "העברה", icon: drive_file_move}
          - {action: delete, label: "מחיקה", icon: delete}

    # === TEMPLATES ===
    templates_list:
      route: /documents/templates
      title: "תבניות מסמכים"
      layout: standard_list
      toolbar:
        primary_action:
          label: "תבנית חדשה"
          icon: add
          target: /documents/templates/create
          permission: documents.templates.create
      filters:
        - field: template_type
          type: multi_select
          label: "סוג תבנית"
          options:
            - {value: invoice, label: "חשבונית"}
            - {value: receipt, label: "קבלה"}
            - {value: quote, label: "הצעת מחיר"}
            - {value: contract, label: "חוזה"}
            - {value: letter, label: "מכתב"}
            - {value: report, label: "דוח"}
            - {value: other, label: "אחר"}
        - field: is_active
          type: toggle
          label: "פעיל בלבד"
          default: true
      table:
        columns:
          - {field: name, label: "שם תבנית", sortable: true, link_to: "/documents/templates/:id"}
          - {field: template_type, label: "סוג", sortable: true}
          - {field: description, label: "תיאור"}
          - {field: is_active, label: "פעיל", display: toggle}
          - {field: created_by, label: "נוצר ע\"י", display: users.full_name}
          - {field: updated_at, label: "עודכן", format: datetime, sortable: true}
        row_actions:
          - {action: edit, label: "עריכה", icon: edit, target: "/documents/templates/:id/edit"}
          - {action: preview, label: "תצוגה מקדימה", icon: visibility}
          - {action: duplicate, label: "שכפול", icon: content_copy}
          - {action: delete, label: "מחיקה", icon: delete}

    # === TEMPLATE CREATE/EDIT ===
    template_create:
      route: /documents/templates/create
      title: "תבנית חדשה"
      layout: editor_with_preview
      permission: documents.templates.create
      form:
        sections:
          - title: "פרטי תבנית"
            columns: 2
            fields:
              - name: name
                type: text
                label: "שם תבנית"
                required: true
                grid_column: 1
              - name: template_type
                type: select
                label: "סוג תבנית"
                required: true
                options:
                  - {value: invoice, label: "חשבונית"}
                  - {value: receipt, label: "קבלה"}
                  - {value: quote, label: "הצעת מחיר"}
                  - {value: contract, label: "חוזה"}
                  - {value: letter, label: "מכתב"}
                  - {value: report, label: "דוח"}
                  - {value: other, label: "אחר"}
                grid_column: 2
              - name: description
                type: textarea
                label: "תיאור"
                required: false
                rows: 2
                grid_column: "1-2"
          - title: "תוכן תבנית"
            type: rich_text_editor
            fields:
              - name: content_html
                type: rich_text
                label: "תוכן"
                required: true
                toolbar: [bold, italic, underline, heading, list, table, image, link, variable_insert]
                variable_insert:
                  label: "הוספת משתנה"
                  variables:
                    - {name: "{{company_name}}", label: "שם חברה"}
                    - {name: "{{company_address}}", label: "כתובת חברה"}
                    - {name: "{{company_phone}}", label: "טלפון חברה"}
                    - {name: "{{company_email}}", label: "אימייל חברה"}
                    - {name: "{{customer_name}}", label: "שם לקוח"}
                    - {name: "{{customer_address}}", label: "כתובת לקוח"}
                    - {name: "{{customer_phone}}", label: "טלפון לקוח"}
                    - {name: "{{customer_email}}", label: "אימייל לקוח"}
                    - {name: "{{document_number}}", label: "מספר מסמך"}
                    - {name: "{{document_date}}", label: "תאריך מסמך"}
                    - {name: "{{total_amount}}", label: "סכום כולל"}
                    - {name: "{{items_table}}", label: "טבלת פריטים"}
                    - {name: "{{current_date}}", label: "תאריך נוכחי"}
                    - {name: "{{signer_name}}", label: "שם חותם"}
              - name: is_active
                type: toggle
                label: "פעיל"
                default: true
      preview_panel:
        position: right
        width: "50%"
        renders: content_html with sample data
      actions:
        submit:
          label: "שמירה"
          icon: save
          action: create_template
          redirect_to: "/documents/templates/:id"
        cancel:
          label: "ביטול"
          target: /documents/templates

    # === SIGNATURES ===
    signatures_page:
      route: /documents/signatures
      title: "חתימות"
      layout: tabbed_list
      tabs:
        - name: pending
          label: "ממתינים"
          filter: "status=pending"
          badge_count: true
        - name: signed
          label: "נחתמו"
          filter: "status=signed"
        - name: declined
          label: "סורבו"
          filter: "status=declined"
        - name: expired
          label: "פג תוקף"
          filter: "status=expired"
      toolbar:
        primary_action:
          label: "שליחה לחתימה"
          icon: draw
          action: open_signature_request_modal
          permission: documents.signatures.create
      table:
        columns:
          - {field: document_id, label: "מסמך", display: documents.document_number, link_to: "/finance/:document_id"}
          - {field: file_id, label: "קובץ", display: files.file_name, link_to: "/documents/files/:file_id"}
          - {field: signer_name, label: "שם חותם"}
          - {field: signer_email, label: "אימייל חותם"}
          - {field: status, label: "סטטוס", display: badge}
          - {field: expires_at, label: "תוקף", format: datetime}
          - {field: signed_at, label: "תאריך חתימה", format: datetime}
          - {field: created_at, label: "נשלח", format: datetime, sortable: true}
        row_actions:
          - {action: resend, label: "שליחה מחדש", icon: send, condition: "status=pending"}
          - {action: cancel, label: "ביטול", icon: cancel, condition: "status=pending"}
          - {action: view_signed, label: "צפייה", icon: visibility, condition: "status=signed"}
      signature_request_modal:
        title: "שליחה לחתימה"
        fields:
          - {name: document_id, type: select, label: "מסמך", source: documents, display_field: document_number}
          - {name: file_id, type: select, label: "קובץ", source: files, display_field: file_name}
          - {name: signer_name, type: text, label: "שם חותם", required: true}
          - {name: signer_email, type: email, label: "אימייל חותם", required: true}
          - {name: expires_at, type: datetime, label: "תוקף", required: true, default: "7 days from now"}
          - {name: message, type: textarea, label: "הודעה לחותם"}

    # === VERSIONS ===
    versions_page:
      route: /documents/versions
      title: "גרסאות"
      layout: file_select_with_detail
      sidebar:
        type: file_search
        entity: files
        search_fields: [file_name]
        display_field: file_name
      content:
        entity: file_versions
        filter: "file_id=:selected_file_id"
        table_columns:
          - {field: version_number, label: "גרסה", sortable: true}
          - {field: file_size, label: "גודל", format: file_size}
          - {field: change_notes, label: "הערות שינוי"}
          - {field: uploaded_by, label: "הועלה ע\"י", display: users.full_name}
          - {field: created_at, label: "תאריך", format: datetime, sortable: true}
        row_actions:
          - {action: download, label: "הורדה", icon: download}
          - {action: preview, label: "תצוגה מקדימה", icon: visibility}
          - {action: compare, label: "השוואה", icon: compare, type: select_two}
          - {action: restore, label: "שחזור גרסה", icon: restore, confirmation: "האם לשחזר גרסה זו?"}
        compare_view:
          type: side_by_side_diff
          supports: [text, pdf]

    # === LINKED DOCUMENTS ===
    linked_documents:
      route: /documents/linked
      title: "מסמכים מקושרים"
      layout: graph_with_table
      entity: document_links
      visual_graph:
        node_types:
          - {entity: documents, color: blue, icon: description}
          - {entity: files, color: green, icon: attach_file}
        edge_types:
          - {link_type: based_on, label: "מבוסס על", color: blue}
          - {link_type: converted_to, label: "הומר ל", color: green}
          - {link_type: paid_by, label: "שולם ע\"י", color: purple}
          - {link_type: receipt_for, label: "קבלה עבור", color: orange}
          - {link_type: related_to, label: "קשור ל", color: grey}
          - {link_type: attachment_reference, label: "קובץ מצורף", color: teal}
        on_node_click: navigate_to_entity
      table:
        columns:
          - {field: source_document_id, label: "מסמך מקור", display: documents.document_number, link_to: "/finance/:source_document_id"}
          - {field: link_type, label: "סוג קישור"}
          - {field: target_document_id, label: "מסמך יעד", display: documents.document_number, link_to: "/finance/:target_document_id"}
          - {field: notes, label: "הערות"}
          - {field: created_at, label: "תאריך", format: datetime}
      filters:
        - {field: link_type, type: multi_select, label: "סוג קישור"}
        - {field: source_document_id, type: select, label: "מסמך מקור", source: documents}

  navigation_map:
    all_files:
      navigates_to:
        - {target: file_detail, trigger: "click file"}
        - {target: folders_page, trigger: "click folder link"}
    folders_page:
      navigates_to:
        - {target: file_detail, trigger: "click file in folder"}
    templates_list:
      navigates_to:
        - {target: template_create, trigger: "primary action"}
        - {target: template_edit, trigger: "click row"}
    signatures_page:
      navigates_to:
        - {target: document_detail, trigger: "click document link"}
        - {target: file_detail, trigger: "click file link"}


# ============================================================
# MODULE 16: REPORTS
# ============================================================
module_16_reports:
  module_id: 16
  name: "Reports"
  label_he: "דוחות"
  icon: bar_chart
  route: /reports
  priority: high
  purpose: "דוחות, KPI, חתכים, ייצוא, בקרה וניתוחים"

  submenus:
    - label: "דוחות הנהלה"
      route: /reports/executive
      icon: business
    - label: "דוחות מכירות"
      route: /reports/sales
      icon: trending_up
    - label: "דוחות כספיים"
      route: /reports/finance
      icon: account_balance
    - label: "דוחות פרויקטים"
      route: /reports/projects
      icon: assignment
    - label: "דוחות תפעוליים"
      route: /reports/operational
      icon: engineering
    - label: "דוחות מותאמים"
      route: /reports/custom
      icon: tune

  pages:

    # === EXECUTIVE REPORTS ===
    executive_reports:
      route: /reports/executive
      title: "דוחות הנהלה"
      layout: report_gallery
      reports:

        - name: revenue_trend
          label: "מגמת הכנסות"
          route: /reports/executive/revenue-trend
          description: "מגמת הכנסות לאורך זמן"
          chart_type: line
          data_source: documents
          data_filter: "direction=income AND status_id NOT IN (draft, cancelled)"
          date_field: issue_date
          metric_field: total_amount
          aggregation: sum
          date_range_selector:
            default: last_12_months
            options: [last_30_days, last_3_months, last_6_months, last_12_months, current_year, last_year, custom]
          filters:
            - {field: document_type_id, type: multi_select, label: "סוג מסמך"}
            - {field: customer_id, type: select, label: "לקוח", source: customers}
          chart_config:
            x_axis: date
            y_axis: total_amount
            group_by: [day, week, month, quarter]
            default_group: month
          data_table:
            columns:
              - {field: period, label: "תקופה"}
              - {field: total_revenue, label: "הכנסות", format: currency}
              - {field: count, label: "מספר מסמכים"}
              - {field: avg_amount, label: "ממוצע", format: currency}
              - {field: change_percent, label: "שינוי %", format: percent}
          export_options: [pdf, excel, csv]

        - name: expense_trend
          label: "מגמת הוצאות"
          route: /reports/executive/expense-trend
          description: "מגמת הוצאות לאורך זמן"
          chart_type: line
          data_source: documents
          data_filter: "direction=expense AND status_id NOT IN (draft, cancelled)"
          date_field: issue_date
          metric_field: total_amount
          aggregation: sum
          date_range_selector:
            default: last_12_months
            options: [last_30_days, last_3_months, last_6_months, last_12_months, current_year, last_year, custom]
          filters:
            - {field: category_id, type: multi_select, label: "קטגוריה", source: categories}
            - {field: supplier_id, type: select, label: "ספק", source: suppliers}
          chart_config:
            x_axis: date
            y_axis: total_amount
            group_by: [day, week, month, quarter]
            default_group: month
          data_table:
            columns:
              - {field: period, label: "תקופה"}
              - {field: total_expenses, label: "הוצאות", format: currency}
              - {field: count, label: "מספר מסמכים"}
              - {field: avg_amount, label: "ממוצע", format: currency}
              - {field: change_percent, label: "שינוי %", format: percent}
          export_options: [pdf, excel, csv]

        - name: profit_loss
          label: "רווח והפסד"
          route: /reports/executive/profit-loss
          description: "דוח רווח והפסד"
          chart_type: bar_stacked
          data_source: documents
          date_range_selector:
            default: current_year
            options: [last_3_months, last_6_months, current_year, last_year, custom]
          filters:
            - {field: category_id, type: multi_select, label: "קטגוריה"}
          chart_config:
            x_axis: period
            y_axis: [revenue, expenses, profit]
            colors: {revenue: green, expenses: red, profit: blue}
          data_table:
            columns:
              - {field: period, label: "תקופה"}
              - {field: revenue, label: "הכנסות", format: currency}
              - {field: expenses, label: "הוצאות", format: currency}
              - {field: profit, label: "רווח", format: currency}
              - {field: profit_margin, label: "מרווח רווח %", format: percent}
          export_options: [pdf, excel, csv]

        - name: cash_flow
          label: "תזרים מזומנים"
          route: /reports/executive/cash-flow
          description: "דוח תזרים מזומנים"
          chart_type: waterfall
          date_range_selector:
            default: current_year
            options: [last_3_months, last_6_months, current_year, last_year, custom]
          chart_config:
            categories: [opening_balance, income_received, expenses_paid, net_flow, closing_balance]
          data_table:
            columns:
              - {field: period, label: "תקופה"}
              - {field: opening_balance, label: "יתרת פתיחה", format: currency}
              - {field: income_received, label: "הכנסות שהתקבלו", format: currency}
              - {field: expenses_paid, label: "הוצאות ששולמו", format: currency}
              - {field: net_flow, label: "תזרים נטו", format: currency}
              - {field: closing_balance, label: "יתרת סגירה", format: currency}
          export_options: [pdf, excel, csv]

        - name: top_customers
          label: "לקוחות מובילים"
          route: /reports/executive/top-customers
          description: "לקוחות לפי היקף הכנסות"
          chart_type: horizontal_bar
          data_source: documents
          data_filter: "direction=income"
          group_by_field: customer_id
          metric_field: total_amount
          aggregation: sum
          date_range_selector:
            default: current_year
            options: [last_3_months, last_6_months, current_year, last_year, custom]
          filters:
            - {field: limit, type: number, label: "מספר לקוחות", default: 10}
          data_table:
            columns:
              - {field: rank, label: "#"}
              - {field: customer_name, label: "לקוח", link_to: "/customers/:customer_id"}
              - {field: total_revenue, label: "הכנסות", format: currency}
              - {field: document_count, label: "מספר מסמכים"}
              - {field: avg_amount, label: "ממוצע למסמך", format: currency}
              - {field: percent_of_total, label: "אחוז מסך", format: percent}
          export_options: [pdf, excel, csv]

        - name: top_products
          label: "מוצרים מובילים"
          route: /reports/executive/top-products
          description: "מוצרים ושירותים לפי היקף מכירות"
          chart_type: horizontal_bar
          data_source: document_items
          group_by_field: product_id
          metric_field: line_total
          aggregation: sum
          date_range_selector:
            default: current_year
            options: [last_3_months, last_6_months, current_year, last_year, custom]
          filters:
            - {field: category_id, type: select, label: "קטגוריה", source: categories}
            - {field: limit, type: number, label: "מספר מוצרים", default: 10}
          data_table:
            columns:
              - {field: rank, label: "#"}
              - {field: product_name, label: "מוצר", link_to: "/products/:product_id"}
              - {field: total_sales, label: "מכירות", format: currency}
              - {field: quantity_sold, label: "כמות"}
              - {field: avg_price, label: "מחיר ממוצע", format: currency}
              - {field: percent_of_total, label: "אחוז מסך", format: percent}
          export_options: [pdf, excel, csv]

    # === SALES REPORTS ===
    sales_reports:
      route: /reports/sales
      title: "דוחות מכירות"
      layout: report_gallery
      reports:

        - name: sales_by_customer
          label: "מכירות לפי לקוח"
          route: /reports/sales/by-customer
          chart_type: bar
          date_range_selector:
            default: current_year
            options: [last_30_days, last_3_months, last_6_months, current_year, last_year, custom]
          filters:
            - {field: customer_id, type: multi_select, label: "לקוחות", source: customers}
          data_table:
            columns:
              - {field: customer_name, label: "לקוח", link_to: "/customers/:customer_id"}
              - {field: total_sales, label: "סה\"כ מכירות", format: currency}
              - {field: invoice_count, label: "חשבוניות"}
              - {field: avg_sale, label: "ממוצע", format: currency}
              - {field: last_sale_date, label: "מכירה אחרונה", format: date}
          export_options: [pdf, excel, csv]

        - name: sales_by_product
          label: "מכירות לפי מוצר"
          route: /reports/sales/by-product
          chart_type: bar
          date_range_selector:
            default: current_year
            options: [last_30_days, last_3_months, last_6_months, current_year, last_year, custom]
          filters:
            - {field: category_id, type: select, label: "קטגוריה", source: categories}
          data_table:
            columns:
              - {field: product_name, label: "מוצר", link_to: "/products/:product_id"}
              - {field: quantity_sold, label: "כמות"}
              - {field: total_sales, label: "סה\"כ מכירות", format: currency}
              - {field: avg_price, label: "מחיר ממוצע", format: currency}
          export_options: [pdf, excel, csv]

        - name: sales_by_period
          label: "מכירות לפי תקופה"
          route: /reports/sales/by-period
          chart_type: line
          date_range_selector:
            default: last_12_months
            options: [last_30_days, last_3_months, last_6_months, last_12_months, current_year, custom]
          chart_config:
            group_by: [day, week, month, quarter]
            default_group: month
          data_table:
            columns:
              - {field: period, label: "תקופה"}
              - {field: total_sales, label: "מכירות", format: currency}
              - {field: order_count, label: "הזמנות"}
