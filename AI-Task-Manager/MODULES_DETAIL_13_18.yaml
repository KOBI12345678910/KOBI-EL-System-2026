          - {field: name, label: "שם דוח", link_to: "/reports/custom/:id"}
          - {field: entity_type, label: "ישות"}
          - {field: created_by, label: "נוצר ע\"י", display: users.full_name}
          - {field: created_at, label: "נוצר", format: datetime}
          - {field: last_run, label: "ריצה אחרונה", format: datetime}
        row_actions:
          - {action: run, label: "הרצה", icon: play_arrow}
          - {action: edit, label: "עריכה", icon: edit}
          - {action: duplicate, label: "שכפול", icon: content_copy}
          - {action: delete, label: "מחיקה", icon: delete}
      report_builder:
        step_1_entity_select:
          label: "בחירת ישות"
          options:
            - {value: customers, label: "לקוחות"}
            - {value: suppliers, label: "ספקים"}
            - {value: documents, label: "מסמכים"}
            - {value: products, label: "מוצרים"}
            - {value: projects, label: "פרויקטים"}
            - {value: employees, label: "עובדים"}
            - {value: opportunities, label: "הזדמנויות"}
            - {value: quotes, label: "הצעות מחיר"}
            - {value: sales_orders, label: "הזמנות לקוח"}
            - {value: purchase_orders, label: "הזמנות רכש"}
            - {value: payments, label: "תשלומים"}
            - {value: attendance, label: "נוכחות"}
            - {value: inventory_movements, label: "תנועות מלאי"}
        step_2_field_select:
          label: "בחירת שדות"
          type: multi_select_with_reorder
          source: "dynamic based on entity"
          includes_related: true
          allow_computed_fields: true
          computed_field_types: [count, sum, avg, min, max]
        step_3_filter_builder:
          label: "סינון"
          type: condition_builder
          operators: [equals, not_equals, greater_than, less_than, between, contains, starts_with, ends_with, is_empty, is_not_empty, in_list]
          allow_and_or: true
        step_4_grouping:
          label: "קיבוץ"
          type: multi_select
          source: "selected fields"
          aggregations: [count, sum, avg, min, max]
        step_5_sorting:
          label: "מיון"
          type: multi_select_with_direction
          source: "selected fields"
          directions: [asc, desc]
        step_6_charting:
          label: "תרשים"
          chart_types: [none, bar, line, pie, donut, area, scatter, horizontal_bar]
          config:
            x_axis: "select from fields"
            y_axis: "select from fields"
            group_by: "select from fields"
        step_7_save:
          fields:
            - {name: name, type: text, label: "שם הדוח", required: true}
            - {name: description, type: textarea, label: "תיאור"}
            - {name: is_shared, type: toggle, label: "שיתוף עם כולם"}
        actions:
          run: {label: "הרצה", icon: play_arrow}
          save: {label: "שמירה", icon: save}
          save_as_template: {label: "שמירה כתבנית", icon: save_as}
          export_pdf: {label: "ייצוא PDF", icon: picture_as_pdf}
          export_excel: {label: "ייצוא Excel", icon: download}
          export_csv: {label: "ייצוא CSV", icon: download}

  navigation_map:
    executive_reports:
      navigates_to:
        - {target: individual_report, trigger: "click report card"}
    custom_reports:
      navigates_to:
        - {target: report_builder, trigger: "create new"}
        - {target: saved_report_view, trigger: "click saved report"}


# ============================================================
# MODULE 17: AUTOMATIONS
# ============================================================
module_17_automations:
  module_id: 17
  name: "Automations"
  label_he: "אוטומציות"
  icon: smart_toy
  route: /automations
  priority: medium
  purpose: "טריגרים, חוקים, אוטומציות, תזמונים, webhooks, integrations"

  submenus:
    - label: "חוקים"
      route: /automations/rules
      icon: rule
    - label: "טריגרים"
      route: /automations/triggers
      icon: bolt
    - label: "תזמונים"
      route: /automations/schedules
      icon: schedule
    - label: "Webhook Logs"
      route: /automations/webhook-logs
      icon: webhook
    - label: "ריצות אינטגרציה"
      route: /automations/integration-runs
      icon: sync

  entities:

    automation_rules:
      type: master_data
      table_name: automation_rules
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: name
          type: varchar(200)
          required: true
          label_he: "שם חוק"
        - name: description
          type: text
          nullable: true
          label_he: "תיאור"
        - name: entity_type
          type: varchar(50)
          required: true
          label_he: "סוג ישות"
        - name: trigger_event
          type: varchar(50)
          required: true
          label_he: "אירוע מפעיל"
        - name: conditions_json
          type: json
          nullable: true
          label_he: "תנאים"
        - name: actions_json
          type: json
          required: true
          label_he: "פעולות"
        - name: is_active
          type: boolean
          default: true
          label_he: "פעיל"
        - name: execution_count
          type: integer
          default: 0
          label_he: "מספר ריצות"
        - name: last_executed_at
          type: timestamp
          nullable: true
          label_he: "ריצה אחרונה"
        - name: created_by
          type: uuid
          required: true
          foreign_key: users.id
          label_he: "נוצר ע\"י"
        - name: created_at
          type: timestamp
          auto_generated: true
        - name: updated_at
          type: timestamp
          auto_generated: true
          on_update: true
      indexes:
        - columns: [entity_type, trigger_event]
        - columns: [is_active]

    scheduled_tasks:
      type: master_data
      table_name: scheduled_tasks
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: name
          type: varchar(200)
          required: true
          label_he: "שם תזמון"
        - name: description
          type: text
          nullable: true
          label_he: "תיאור"
        - name: cron_expression
          type: varchar(100)
          required: true
          label_he: "ביטוי Cron"
        - name: task_type
          type: enum
          values: [generate_recurring, send_reminders, cleanup, sync, report]
          required: true
          label_he: "סוג משימה"
          display_values_he:
            generate_recurring: "יצירת מסמכים מחזוריים"
            send_reminders: "שליחת תזכורות"
            cleanup: "ניקוי נתונים"
            sync: "סנכרון"
            report: "דוח"
        - name: task_config_json
          type: json
          required: true
          label_he: "הגדרות משימה"
        - name: is_active
          type: boolean
          default: true
          label_he: "פעיל"
        - name: last_run_at
          type: timestamp
          nullable: true
          label_he: "ריצה אחרונה"
        - name: next_run_at
          type: timestamp
          required: true
          label_he: "ריצה הבאה"
        - name: created_at
          type: timestamp
          auto_generated: true
      indexes:
        - columns: [is_active]
        - columns: [next_run_at]

    webhooks:
      type: master_data
      table_name: webhooks
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: name
          type: varchar(200)
          required: true
          label_he: "שם Webhook"
        - name: url
          type: text
          required: true
          label_he: "URL"
        - name: method
          type: enum
          values: [POST, PUT, PATCH]
          required: true
          default: POST
          label_he: "Method"
        - name: entity_type
          type: varchar(50)
          required: true
          label_he: "סוג ישות"
        - name: trigger_event
          type: varchar(50)
          required: true
          label_he: "אירוע"
        - name: headers_json
          type: json
          nullable: true
          label_he: "Headers"
        - name: is_active
          type: boolean
          default: true
          label_he: "פעיל"
        - name: secret_key
          type: text
          required: true
          auto_generated: true
          label_he: "Secret Key"
        - name: created_at
          type: timestamp
          auto_generated: true
      indexes:
        - columns: [entity_type, trigger_event]
        - columns: [is_active]

    webhook_logs:
      type: audit
      table_name: webhook_logs
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: webhook_id
          type: uuid
          required: true
          foreign_key: webhooks.id
          label_he: "Webhook"
        - name: request_url
          type: text
          required: true
          label_he: "URL"
        - name: request_body
          type: json
          required: true
          label_he: "Request Body"
        - name: response_status
          type: integer
          required: true
          label_he: "Response Status"
        - name: response_body
          type: text
          nullable: true
          label_he: "Response Body"
        - name: executed_at
          type: timestamp
          required: true
          label_he: "זמן ביצוע"
        - name: duration_ms
          type: integer
          required: true
          label_he: "משך (ms)"
      indexes:
        - columns: [webhook_id]
        - columns: [executed_at]
        - columns: [response_status]

    integration_connections:
      type: master_data
      table_name: integration_connections
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: name
          type: varchar(200)
          required: true
          label_he: "שם חיבור"
        - name: provider
          type: enum
          values: [priority, hashavshevet, green_invoice, rivhit, cardcom, tranzila, payplus, google, whatsapp]
          required: true
          label_he: "ספק"
          display_values_he:
            priority: "Priority"
            hashavshevet: "חשבשבת"
            green_invoice: "Green Invoice"
            rivhit: "רווחית"
            cardcom: "Cardcom"
            tranzila: "Tranzila"
            payplus: "PayPlus"
            google: "Google"
            whatsapp: "WhatsApp"
        - name: config_json
          type: json
          required: true
          label_he: "הגדרות חיבור"
        - name: status
          type: enum
          values: [active, inactive, error]
          required: true
          default: inactive
          label_he: "סטטוס"
          display_values_he:
            active: "פעיל"
            inactive: "לא פעיל"
            error: "שגיאה"
        - name: last_sync_at
          type: timestamp
          nullable: true
          label_he: "סנכרון אחרון"
        - name: created_at
          type: timestamp
          auto_generated: true
      indexes:
        - columns: [provider]
        - columns: [status]

    integration_runs:
      type: transactional
      table_name: integration_runs
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: connection_id
          type: uuid
          required: true
          foreign_key: integration_connections.id
          label_he: "חיבור"
        - name: direction
          type: enum
          values: [inbound, outbound]
          required: true
          label_he: "כיוון"
          display_values_he:
            inbound: "נכנס"
            outbound: "יוצא"
        - name: entity_type
          type: varchar(50)
          required: true
          label_he: "סוג ישות"
        - name: records_processed
          type: integer
          default: 0
          label_he: "רשומות שעובדו"
        - name: records_failed
          type: integer
          default: 0
          label_he: "רשומות שנכשלו"
        - name: started_at
          type: timestamp
          required: true
          label_he: "התחלה"
        - name: completed_at
          type: timestamp
          nullable: true
          label_he: "סיום"
        - name: status
          type: enum
          values: [running, completed, failed]
          required: true
          default: running
          label_he: "סטטוס"
          display_values_he:
            running: "פועל"
            completed: "הושלם"
            failed: "נכשל"
        - name: error_log
          type: text
          nullable: true
          label_he: "לוג שגיאות"
      indexes:
        - columns: [connection_id]
        - columns: [status]
        - columns: [started_at]

  pages:

    # === RULES LIST ===
    rules_list:
      route: /automations/rules
      title: "חוקי אוטומציה"
      layout: standard_list
      toolbar:
        primary_action:
          label: "חוק חדש"
          icon: add
          target: /automations/rules/create
          permission: automations.rules.create
      filters:
        - field: entity_type
          type: select
          label: "סוג ישות"
          options:
            - {value: document, label: "מסמך"}
            - {value: customer, label: "לקוח"}
            - {value: supplier, label: "ספק"}
            - {value: project, label: "פרויקט"}
            - {value: task, label: "משימה"}
            - {value: purchase_order, label: "הזמנת רכש"}
            - {value: sales_order, label: "הזמנת לקוח"}
            - {value: employee, label: "עובד"}
            - {value: payment, label: "תשלום"}
        - field: trigger_event
          type: select
          label: "אירוע"
        - field: is_active
          type: toggle
          label: "פעיל בלבד"
          default: true
      table:
        columns:
          - {field: name, label: "שם חוק", sortable: true, link_to: "/automations/rules/:id"}
          - {field: entity_type, label: "ישות", sortable: true}
          - {field: trigger_event, label: "אירוע", sortable: true}
          - {field: is_active, label: "פעיל", display: toggle, action: toggle_active}
          - {field: execution_count, label: "ריצות", sortable: true}
          - {field: last_executed_at, label: "ריצה אחרונה", format: datetime, sortable: true}
          - {field: created_by, label: "נוצר ע\"י", display: users.full_name}
        default_sort: {field: name, direction: asc}
        row_actions:
          - {action: edit, label: "עריכה", icon: edit, target: "/automations/rules/:id/edit"}
          - {action: duplicate, label: "שכפול", icon: content_copy}
          - {action: test, label: "ריצת ניסיון", icon: play_arrow}
          - {action: delete, label: "מחיקה", icon: delete}

    # === RULE CREATE/EDIT ===
    rule_create:
      route: /automations/rules/create
      title: "חוק אוטומציה חדש"
      layout: form_builder
      permission: automations.rules.create
      form:
        sections:
          - title: "פרטי חוק"
            columns: 2
            fields:
              - name: name
                type: text
                label: "שם חוק"
                required: true
                max_length: 200
                grid_column: "1-2"
              - name: description
                type: textarea
                label: "תיאור"
                required: false
                grid_column: "1-2"
              - name: entity_type
                type: select
                label: "סוג ישות"
                required: true
                options:
                  - {value: document, label: "מסמך"}
                  - {value: customer, label: "לקוח"}
                  - {value: supplier, label: "ספק"}
                  - {value: project, label: "פרויקט"}
                  - {value: task, label: "משימה"}
                  - {value: purchase_order, label: "הזמנת רכש"}
                  - {value: sales_order, label: "הזמנת לקוח"}
                  - {value: employee, label: "עובד"}
                  - {value: payment, label: "תשלום"}
                grid_column: 1
              - name: trigger_event
                type: select
                label: "אירוע מפעיל"
                required: true
                options:
                  - {value: created, label: "נוצר"}
                  - {value: updated, label: "עודכן"}
                  - {value: status_changed, label: "שינוי סטטוס"}
                  - {value: deleted, label: "נמחק"}
                  - {value: amount_exceeded, label: "חריגת סכום"}
                  - {value: due_date_reached, label: "תאריך יעד הגיע"}
                grid_column: 2
              - name: is_active
                type: toggle
                label: "פעיל"
                default: true
                grid_column: 1
          - title: "תנאים"
            type: condition_builder
            field_name: conditions_json
            config:
              fields_source: "dynamic based on entity_type"
              operators: [equals, not_equals, greater_than, less_than, between, contains, is_empty, is_not_empty, in_list]
              allow_and_or: true
              allow_nested_groups: true
          - title: "פעולות"
            type: actions_builder
            field_name: actions_json
            action_types:
              - name: send_notification
                label: "שליחת התראה"
                icon: notifications
                fields:
                  - {name: user_ids, type: multi_select, label: "נמענים", source: users}
                  - {name: message, type: textarea, label: "הודעה", supports_variables: true}
              - name: change_status
                label: "שינוי סטטוס"
                icon: swap_horiz
                fields:
                  - {name: new_status, type: select, label: "סטטוס חדש", source: "dynamic based on entity_type"}
              - name: create_record
                label: "יצירת רשומה"
                icon: add_circle
                fields:
                  - {name: target_entity, type: select, label: "ישות יעד"}
                  - {name: field_mappings, type: mapping_editor, label: "מיפוי שדות"}
              - name: send_email
                label: "שליחת אימייל"
                icon: email
                fields:
                  - {name: to, type: text, label: "נמען", supports_variables: true}
                  - {name: subject, type: text, label: "נושא", supports_variables: true}
                  - {name: body, type: rich_text, label: "תוכן", supports_variables: true}
              - name: webhook
                label: "Webhook"
                icon: webhook
                fields:
                  - {name: url, type: text, label: "URL"}
                  - {name: method, type: select, label: "Method", options: [POST, PUT, PATCH]}
                  - {name: headers_json, type: json_editor, label: "Headers"}
                  - {name: body_template, type: json_editor, label: "Body Template", supports_variables: true}
              - name: assign_user
                label: "שיוך משתמש"
                icon: person_add
                fields:
                  - {name: user_id, type: select, label: "משתמש", source: users}
              - name: create_task
                label: "יצירת משימה"
                icon: add_task
                fields:
                  - {name: title, type: text, label: "כותרת", supports_variables: true}
                  - {name: assignee_id, type: select, label: "מבצע", source: users}
                  - {name: due_days, type: number, label: "ימים לביצוע"}
                  - {name: priority, type: select, label: "עדיפות", options: [low, medium, high, critical]}
        actions:
          submit:
            label: "שמירה"
            icon: save
            action: create_rule
            redirect_to: "/automations/rules/:id"
          test:
            label: "ריצת ניסיון"
            icon: play_arrow
            action: test_rule
          cancel:
            label: "ביטול"
            target: /automations/rules

    # === SCHEDULES ===
    schedules_list:
      route: /automations/schedules
      title: "תזמונים"
      layout: standard_list
      toolbar:
        primary_action:
          label: "תזמון חדש"
          icon: add
          target: /automations/schedules/create
          permission: automations.schedules.create
      table:
        columns:
          - {field: name, label: "שם", sortable: true, link_to: "/automations/schedules/:id"}
          - {field: task_type, label: "סוג משימה", sortable: true}
          - {field: cron_expression, label: "Cron", sortable: false}
          - {field: cron_readable, label: "תזמון", computed: true, format: cron_human_readable}
          - {field: is_active, label: "פעיל", display: toggle, action: toggle_active}
          - {field: last_run_at, label: "ריצה אחרונה", format: datetime, sortable: true}
          - {field: next_run_at, label: "ריצה הבאה", format: datetime, sortable: true}
        default_sort: {field: next_run_at, direction: asc}
        row_actions:
          - {action: edit, label: "עריכה", icon: edit}
          - {action: run_now, label: "הרצה עכשיו", icon: play_arrow}
          - {action: toggle_active, label: "הפעלה/כיבוי", icon: toggle_on}
          - {action: delete, label: "מחיקה", icon: delete}

    # === SCHEDULE CREATE ===
    schedule_create:
      route: /automations/schedules/create
      title: "תזמון חדש"
      layout: standard_form
      permission: automations.schedules.create
      form:
        sections:
          - title: "פרטי תזמון"
            columns: 2
            fields:
              - name: name
                type: text
                label: "שם"
                required: true
                grid_column: "1-2"
              - name: description
                type: textarea
                label: "תיאור"
                required: false
                grid_column: "1-2"
              - name: task_type
                type: select
                label: "סוג משימה"
                required: true
                options:
                  - {value: generate_recurring, label: "יצירת מסמכים מחזוריים"}
                  - {value: send_reminders, label: "שליחת תזכורות"}
                  - {value: cleanup, label: "ניקוי נתונים"}
                  - {value: sync, label: "סנכרון"}
                  - {value: report, label: "דוח"}
                grid_column: 1
              - name: cron_expression
                type: cron_editor
                label: "תזמון"
                required: true
                cron_presets:
                  - {value: "0 0 * * *", label: "כל יום בחצות"}
                  - {value: "0 8 * * *", label: "כל יום ב-8:00"}
                  - {value: "0 0 * * 0", label: "כל יום ראשון"}
                  - {value: "0 0 1 * *", label: "כל ראשון לחודש"}
                grid_column: 2
              - name: task_config_json
                type: dynamic_config
                label: "הגדרות משימה"
                required: true
                config_per_task_type:
                  generate_recurring:
                    fields:
                      - {name: template_id, type: select, label: "תבנית מסמך", source: recurring_documents}
                  send_reminders:
                    fields:
                      - {name: entity_type, type: select, label: "סוג ישות"}
                      - {name: days_before_due, type: number, label: "ימים לפני מועד"}
                      - {name: notification_type, type: select, label: "סוג התראה", options: [email, in_app, both]}
                  cleanup:
                    fields:
                      - {name: entity_type, type: select, label: "סוג ישות"}
                      - {name: older_than_days, type: number, label: "ישן מ (ימים)"}
                      - {name: status_filter, type: multi_select, label: "סטטוס"}
                  sync:
                    fields:
                      - {name: connection_id, type: select, label: "חיבור", source: integration_connections}
                      - {name: entity_type, type: select, label: "סוג ישות"}
                      - {name: direction, type: select, label: "כיוון", options: [{value: inbound, label: "נכנס"}, {value: outbound, label: "יוצא"}]}
                  report:
                    fields:
                      - {name: report_id, type: select, label: "דוח"}
                      - {name: recipients, type: multi_select, label: "נמענים", source: users}
                      - {name: format, type: select, label: "פורמט", options: [pdf, excel]}
                grid_column: "1-2"
              - name: is_active
                type: toggle
                label: "פעיל"
                default: true
                grid_column: 1
        actions:
          submit:
            label: "שמירה"
            icon: save
            action: create_schedule
            redirect_to: /automations/schedules
          cancel:
            label: "ביטול"
            target: /automations/schedules

    # === WEBHOOK LOGS ===
    webhook_logs_list:
      route: /automations/webhook-logs
      title: "Webhook Logs"
      layout: standard_list
      filters:
        - field: webhook_id
          type: select
          label: "Webhook"
          source: webhooks
          display_field: name
        - field: response_status
          type: multi_select
          label: "Status Code"
          options:
            - {value: "2xx", label: "2xx Success"}
            - {value: "4xx", label: "4xx Client Error"}
            - {value: "5xx", label: "5xx Server Error"}
        - field: executed_at
          type: date_range
          label: "תאריך"
      table:
        columns:
          - {field: executed_at, label: "זמן", sortable: true, format: datetime}
          - {field: webhook_id, label: "Webhook", display: webhooks.name}
          - {field: request_url, label: "URL"}
          - {field: response_status, label: "Status", sortable: true, display: status_code_badge}
          - {field: duration_ms, label: "משך (ms)", sortable: true}
        default_sort: {field: executed_at, direction: desc}
        expandable_row:
          sections:
            - {title: "Request Body", field: request_body, type: json_viewer}
            - {title: "Response Body", field: response_body, type: code_viewer}

    # === INTEGRATION RUNS ===
    integration_runs_list:
      route: /automations/integration-runs
      title: "ריצות אינטגרציה"
      layout: standard_list
      toolbar:
        primary_action:
          label: "ריצה ידנית"
          icon: play_arrow
          action: open_manual_run_modal
          permission: automations.integrations.create
      filters:
        - field: connection_id
          type: select
          label: "חיבור"
          source: integration_connections
          display_field: name
        - field: direction
          type: multi_select
          label: "כיוון"
          options:
            - {value: inbound, label: "נכנס"}
            - {value: outbound, label: "יוצא"}
        - field: status
          type: multi_select
          label: "סטטוס"
          options:
            - {value: running, label: "פועל"}
            - {value: completed, label: "הושלם"}
            - {value: failed, label: "נכשל"}
        - field: started_at
          type: date_range
          label: "תאריך"
      table:
        columns:
          - {field: connection_id, label: "חיבור", display: integration_connections.name, sortable: true}
          - {field: direction, label: "כיוון", sortable: true}
          - {field: entity_type, label: "סוג ישות", sortable: true}
          - {field: records_processed, label: "עובדו", sortable: true}
          - {field: records_failed, label: "נכשלו", sortable: true}
          - {field: started_at, label: "התחלה", format: datetime, sortable: true}
          - {field: completed_at, label: "סיום", format: datetime}
          - {field: duration, label: "משך", computed: true, format: duration}
          - {field: status, label: "סטטוס", display: badge, sortable: true}
        default_sort: {field: started_at, direction: desc}
        row_actions:
          - {action: view_log, label: "צפייה בלוג", icon: visibility}
          - {action: retry, label: "נסה שוב", icon: refresh, condition: "status=failed"}
        expandable_row:
          sections:
            - {title: "לוג שגיאות", field: error_log, type: code_viewer, condition: "error_log IS NOT NULL"}
      manual_run_modal:
        title: "ריצה ידנית"
        fields:
          - {name: connection_id, type: select, label: "חיבור", required: true, source: integration_connections, display_field: name}
          - {name: direction, type: select, label: "כיוון", required: true, options: [{value: inbound, label: "נכנס"}, {value: outbound, label: "יוצא"}]}
          - {name: entity_type, type: select, label: "סוג ישות", required: true}

  navigation_map:
    rules_list:
      navigates_to:
        - {target: rule_create, trigger: "primary action"}
        - {target: rule_detail, trigger: "click row"}
    schedules_list:
      navigates_to:
        - {target: schedule_create, trigger: "primary action"}


# ============================================================
# MODULE 18: SETTINGS
# ============================================================
module_18_settings:
  module_id: 18
  name: "Settings"
  label_he: "הגדרות"
  icon: settings
  route: /settings
  priority: critical
  purpose: "הגדרות מערכת, מאסטר דאטה, הרשאות, סטטוסים, מספור, לוגים"

  submenus:
    - label: "פרופיל חברה"
      route: /settings/company
      icon: business
    - label: "משתמשים"
      route: /settings/users
      icon: people
    - label: "הרשאות"
      route: /settings/permissions
      icon: security
    - label: "סטטוסים"
      route: /settings/statuses
      icon: label
    - label: "קטגוריות"
      route: /settings/categories
      icon: category
    - label: "מספור אוטומטי"
      route: /settings/numbering
      icon: format_list_numbered
    - label: "אמצעי תשלום"
      route: /settings/payment-methods
      icon: credit_card
    - label: "הגדרות מס"
      route: /settings/tax
      icon: receipt
    - label: "תבניות"
      route: /settings/templates
      icon: article
    - label: "לוג מערכת"
      route: /settings/audit-log
      icon: history

  entities:

    company_settings:
      type: singleton
      table_name: company_settings
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: company_name
          type: varchar(200)
          required: true
          label_he: "שם חברה"
        - name: logo_url
          type: text
          nullable: true
          label_he: "לוגו"
        - name: address
          type: varchar(200)
          nullable: true
          label_he: "כתובת"
        - name: city
          type: varchar(100)
          nullable: true
          label_he: "עיר"
        - name: phone
          type: varchar(20)
          nullable: true
          label_he: "טלפון"
        - name: email
          type: varchar(100)
          nullable: true
          label_he: "אימייל"
        - name: website
          type: varchar(200)
          nullable: true
          label_he: "אתר"
        - name: tax_id
          type: varchar(20)
          nullable: true
          label_he: "ח.פ. / עוסק מורשה"
        - name: default_currency
          type: varchar(3)
          default: "ILS"
          label_he: "מטבע ברירת מחדל"
        - name: default_tax_rate
          type: decimal(5,2)
          default: 17.00
          label_he: "שיעור מע\"מ ברירת מחדל"
        - name: fiscal_year_start_month
          type: integer
          default: 1
          label_he: "חודש תחילת שנת כספים"
        - name: date_format
          type: varchar(20)
          default: "DD/MM/YYYY"
          label_he: "פורמט תאריך"
        - name: language
          type: varchar(5)
          default: "he"
          label_he: "שפה"

    users:
      type: master_data
      table_name: users
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: username
          type: varchar(50)
          required: true
          unique: true
          label_he: "שם משתמש"
        - name: email
          type: varchar(100)
          required: true
          unique: true
          label_he: "אימייל"
        - name: full_name
          type: varchar(100)
          required: true
          label_he: "שם מלא"
        - name: password_hash
          type: text
          required: true
          label_he: "סיסמה"
          write_only: true
        - name: role_id
          type: uuid
          required: true
          foreign_key: roles.id
          label_he: "תפקיד"
        - name: department_id
          type: uuid
          nullable: true
          foreign_key: departments.id
          label_he: "מחלקה"
        - name: is_active
          type: boolean
          default: true
          label_he: "פעיל"
        - name: last_login
          type: timestamp
          nullable: true
          label_he: "כניסה אחרונה"
        - name: avatar_url
          type: text
          nullable: true
          label_he: "תמונת פרופיל"
        - name: created_at
          type: timestamp
          auto_generated: true
        - name: updated_at
          type: timestamp
          auto_generated: true
          on_update: true
      indexes:
        - columns: [username]
          unique: true
        - columns: [email]
          unique: true
        - columns: [role_id]
        - columns: [is_active]

    roles:
      type: master_data
      table_name: roles
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: name
          type: varchar(100)
          required: true
          unique: true
          label_he: "שם תפקיד"
        - name: description
          type: text
          nullable: true
          label_he: "תיאור"
        - name: is_system
          type: boolean
          default: false
          label_he: "תפקיד מערכת"
        - name: created_at
          type: timestamp
          auto_generated: true
      indexes:
        - columns: [name]
          unique: true

    role_permissions:
      type: junction
      table_name: role_permissions
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: role_id
          type: uuid
          required: true
          foreign_key: roles.id
          on_delete: cascade
          label_he: "תפקיד"
        - name: module
          type: varchar(50)
          required: true
          label_he: "מודול"
        - name: action
          type: enum
          values: [view, create, edit, delete, export, approve, admin]
          required: true
          label_he: "פעולה"
          display_values_he:
            view: "צפייה"
            create: "יצירה"
            edit: "עריכה"
            delete: "מחיקה"
            export: "ייצוא"
            approve: "אישור"
            admin: "ניהול"
        - name: is_allowed
          type: boolean
          default: false
          label_he: "מותר"
      indexes:
        - columns: [role_id, module, action]
          unique: true

    statuses:
      type: master_data
      table_name: statuses
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: name
          type: varchar(100)
          required: true
          label_he: "שם סטטוס"
        - name: color
          type: varchar(7)
          required: true
          label_he: "צבע"
        - name: entity_type
          type: varchar(50)
          required: true
          label_he: "סוג ישות"
        - name: sort_order
          type: integer
          required: true
          label_he: "סדר"
        - name: is_default
          type: boolean
          default: false
          label_he: "ברירת מחדל"
        - name: is_final
          type: boolean
          default: false
          label_he: "סטטוס סופי"
        - name: is_active
          type: boolean
          default: true
          label_he: "פעיל"
      indexes:
        - columns: [entity_type, sort_order]
        - columns: [entity_type, is_default]

    auto_number_sequences:
      type: system
      table_name: auto_number_sequences
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: entity_type
          type: varchar(50)
          required: true
          unique: true
          label_he: "סוג ישות"
        - name: prefix
          type: varchar(20)
          required: true
          label_he: "קידומת"
        - name: next_value
          type: integer
          required: true
          default: 1
          label_he: "ערך הבא"
        - name: padding_length
          type: integer
          required: true
          default: 5
          label_he: "אורך ריפוד"
        - name: reset_yearly
          type: boolean
          default: false
          label_he: "איפוס שנתי"
      indexes:
        - columns: [entity_type]
          unique: true

    tax_codes:
      type: master_data
      table_name: tax_codes
      fields:
        - name: id
          type: uuid
          primary_key: true
          auto_generated: true
        - name: name
          type: varchar(100)
          required: true
          label_he: "שם קוד מס"
        - name: rate
          type: decimal(5,2)
          required: true
          label_he: "שיעור"
        - name: is_default
          type: boolean
          default: false
          label_he: "ברירת מחדל"
        - name: is_active
          type: boolean
          default: true
          label_he: "פעיל"
      indexes:
        - columns: [is_default]
        - columns: [is_active]

  pages:

    # === COMPANY PROFILE ===
    company_profile:
      route: /settings/company
      title: "פרופיל חברה"
      layout: standard_form
      permission: settings.company.edit
      form:
        sections:
          - title: "פרטי חברה"
            icon: business
            columns: 2
            fields:
              - name: company_name
                type: text
                label: "שם חברה"
                required: true
                grid_column: "1-2"
              - name: logo_url
                type: image_upload
                label: "לוגו"
                accept: "image/*"
                max_size_mb: 5
                preview: true
                grid_column: "1-2"
              - name: address
                type: text
                label: "כתובת"
                grid_column: 1
              - name: city
                type: text
                label: "עיר"
                grid_column: 2
              - name: phone
                type: phone
                label: "טלפון"
                grid_column: 1
              - name: email
                type: email
                label: "אימייל"
                grid_column: 2
              - name: website
                type: url
                label: "אתר"
                grid_column: 1
              - name: tax_id
                type: text
                label: "ח.פ. / עוסק מורשה"
                grid_column: 2
          - title: "הגדרות ברירת מחדל"
            icon: tune
            columns: 2
            fields:
              - name: default_currency
                type: select
                label: "מטבע ברירת מחדל"
                options:
                  - {value: ILS, label: "שקל (ILS)"}
                  - {value: USD, label: "דולר (USD)"}
                  - {value: EUR, label: "אירו (EUR)"}
                grid_column: 1
              - name: default_tax_rate
                type: number
                label: "שיעור מע\"מ (%)"
                step: 0.01
                grid_column: 2
              - name: fiscal_year_start_month
                type: select
                label: "חודש תחילת שנת כספים"
                options:
                  - {value: 1, label: "ינואר"}
                  - {value: 2, label: "פברואר"}
                  - {value: 3, label: "מרץ"}
                  - {value: 4, label: "אפריל"}
                  - {value: 5, label: "מאי"}
                  - {value: 6, label: "יוני"}
                  - {value: 7, label: "יולי"}
                  - {value: 8, label: "אוגוסט"}
                  - {value: 9, label: "ספטמבר"}
                  - {value: 10, label: "אוקטובר"}
                  - {value: 11, label: "נובמבר"}
                  - {value: 12, label: "דצמבר"}
                grid_column: 1
              - name: date_format
                type: select
                label: "פורמט תאריך"
                options:
                  - {value: "DD/MM/YYYY", label: "DD/MM/YYYY"}
                  - {value: "MM/DD/YYYY", label: "MM/DD/YYYY"}
                  - {value: "YYYY-MM-DD", label: "YYYY-MM-DD"}
                grid_column: 2
              - name: language
                type: select
                label: "שפה"
                options:
                  - {value: he, label: "עברית"}
                  - {value: en, label: "English"}
                grid_column: 1
        actions:
          submit:
            label: "שמירה"
            icon: save
            action: update_company_settings

    # === USERS LIST ===
    users_list:
      route: /settings/users
      title: "משתמשים"
      layout: standard_list
      permission: settings.users.view
      toolbar:
        primary_action:
          label: "משתמש חדש"
          icon: add
          target: /settings/users/create
          permission: settings.users.create
      filters:
        - field: role_id
          type: select
          label: "תפקיד"
          source: roles
          display_field: name
        - field: department_id
          type: select
          label: "מחלקה"
          source: departments
          display_field: name
        - field: is_active
          type: toggle
          label: "פעיל בלבד"
          default: true
      table:
        columns:
          - {field: full_name, label: "שם מלא", sortable: true, link_to: "/settings/users/:id"}
          - {field: username, label: "שם משתמש", sortable: true}
          - {field: email, label: "אימייל", sortable: true}
          - {field: role_id, label: "תפקיד", display: roles.name, sortable: true}
          - {field: department_id, label: "מחלקה", display: departments.name}
          - {field: is_active, label: "פעיל", display: toggle}
          - {field: last_login, label: "כניסה אחרונה", format: datetime, sortable: true}
          - {field: created_at, label: "נוצר", format: date, sortable: true}
        default_sort: {field: full_name, direction: asc}
        row_actions:
          - {action: view, label: "צפייה", icon: visibility, target: "/settings/users/:id"}
          - {action: edit, label: "עריכה", icon: edit, target: "/settings/users/:id/edit", permission: settings.users.edit}
          - {action: reset_password, label: "איפוס סיסמה", icon: lock_reset, permission: settings.users.edit}
          - {action: deactivate, label: "השבתה", icon: block, confirmation: "האם להשבית את המשתמש?", permission: settings.users.edit}

    # === USER CREATE ===
    user_create:
      route: /settings/users/create
      title: "משתמש חדש"
      layout: standard_form
      permission: settings.users.create
      form:
        sections:
          - title: "פרטי משתמש"
            columns: 2
            fields:
              - name: full_name
                type: text
                label: "שם מלא"
                required: true
                grid_column: 1
              - name: username
                type: text
                label: "שם משתמש"
                required: true
                unique: true
                grid_column: 2
              - name: email
                type: email
                label: "אימייל"
                required: true
                unique: true
                grid_column: 1
              - name: password
                type: password
                label: "סיסמה"
                required: true
                min_length: 8
                grid_column: 2
              - name: role_id
                type: select
                label: "תפקיד"
                required: true
                source: roles
                display_field: name
                grid_column: 1
              - name: department_id
                type: select
                label: "מחלקה"
                required: false
                source: departments
                display_field: name
                grid_column: 2
              - name: avatar_url
                type: image_upload
                label: "תמונת פרופיל"
                accept: "image/*"
                max_size_mb: 2
                grid_column: "1-2"
              - name: is_active
                type: toggle
                label: "פעיל"
                default: true
                grid_column: 1
        actions:
          submit:
            label: "יצירה"
            icon: save
            action: create_user
            redirect_to: "/settings/users/:id"
          cancel:
            label: "ביטול"
            target: /settings/users

    # === USER DETAILS ===
    user_details:
      route: "/settings/users/:id"
      title: "פרטי משתמש"
      layout: profile_with_tabs
      permission: settings.users.view
      header:
        display_fields:
          - {field: full_name, type: title}
          - {field: username, type: subtitle}
          - {field: role_id, type: info, display: roles.name}
          - {field: is_active, type: badge}
        actions:
          - {label: "עריכה", icon: edit, target: "/settings/users/:id/edit", permission: settings.users.edit}
          - {label: "איפוס סיסמה", icon: lock_reset, action: reset_password, permission: settings.users.edit}
      tabs:
        - name: details
          label: "פרטים"
          type: detail_card
          fields:
            - {field: full_name, label: "שם מלא"}
            - {field: username, label: "שם משתמש"}
            - {field: email, label: "אימייל"}
            - {field: role_id, label: "תפקיד", display: roles.name}
            - {field: department_id, label: "מחלקה", display: departments.name}
            - {field: is_active, label: "פעיל"}
            - {field: last_login, label: "כניסה אחרונה", format: datetime}
            - {field: created_at, label: "נוצר", format: datetime}
        - name: activity_log
          label: "לוג פעילות"
          type: timeline
          entity: activity_logs
          filter: "actor=:id"
          display_fields:
            - {field: action_type, label: "פעולה"}
            - {field: entity_type, label: "ישות"}
            - {field: entity_id, label: "מזהה"}
            - {field: created_at, label: "תאריך", format: datetime}

    # === PERMISSIONS MATRIX ===
    permissions_matrix:
      route: /settings/permissions
      title: "הרשאות"
      layout: matrix_view
      permission: settings.permissions.admin
      matrix:
        rows:
          entity: roles
          display_field: name
          filter: "is_system=false OR is_system=true"
        columns:
          modules:
            - {value: dashboard, label: "דשבורד"}
            - {value: crm, label: "CRM"}
            - {value: sales, label: "מכירות"}
            - {value: customers, label: "לקוחות"}
            - {value: suppliers, label: "ספקים"}
            - {value: products, label: "מוצרים"}
            - {value: projects, label: "פרויקטים"}
            - {value: procurement, label: "רכש"}
            - {value: inventory, label: "מלאי"}
            - {value: finance, label: "פיננסים"}
            - {value: billing, label: "חיוב"}
            - {value: payments, label: "תשלומים"}
            - {value: hr, label: "משאבי אנוש"}
            - {value: operations, label: "תפעול"}
            - {value: documents, label: "מסמכים"}
            - {value: reports, label: "דוחות"}
            - {value: automations, label: "אוטומציות"}
            - {value: settings, label: "הגדרות"}
          actions:
            - {value: view, label: "צפייה", icon: visibility}
            - {value: create, label: "יצירה", icon: add}
            - {value: edit, label: "עריכה", icon: edit}
            - {value: delete, label: "מחיקה", icon: delete}
            - {value: export, label: "ייצוא", icon: download}
            - {value: approve, label: "אישור", icon: check}
            - {value: admin, label: "ניהול", icon: admin_panel_settings}
        cell:
          type: checkbox
          entity: role_permissions
          field: is_allowed
          save_on_toggle: true
        toolbar:
          actions:
            - {label: "תפקיד חדש", icon: add, action: create_role_modal}
            - {label: "שמירת הכל", icon: save, action: save_all_permissions}
        create_role_modal:
          title: "תפקיד חדש"
          fields:
            - {name: name, type: text, label: "שם תפקיד", required: true}
            - {name: description, type: textarea, label: "תיאור"}

    # === STATUSES ===
    statuses_page:
      route: /settings/statuses
      title: "סטטוסים"
      layout: grouped_inline_editor
      permission: settings.statuses.edit
      grouping:
        field: entity_type
        groups:
          - {value: document, label: "מסמכים"}
          - {value: customer, label: "לקוחות"}
          - {value: supplier, label: "ספקים"}
          - {value: project, label: "פרויקטים"}
          - {value: task, label: "משימות"}
          - {value: opportunity, label: "הזדמנויות"}
          - {value: purchase_order, label: "הזמנות רכש"}
          - {value: employee, label: "עובדים"}
          - {value: payroll, label: "שכר"}
          - {value: attendance, label: "נוכחות"}
      inline_fields:
        - {field: name, type: text, label: "שם", width: 200}
        - {field: color, type: color_picker, label: "צבע", width: 80}
        - {field: sort_order, type: number, label: "סדר", width: 60}
        - {field: is_default, type: radio_per_group, label: "ברירת מחדל", width: 80}
        - {field: is_final, type: checkbox, label: "סופי", width: 60}
        - {field: is_active, type: toggle, label: "פעיל", width: 60}
      reorderable: true
      reorder_method: drag_drop
      actions:
        add:
          label: "הוספת סטטוס"
          icon: add
          position: per_group
        delete:
          icon: delete
          confirmation: "האם למחוק את הסטטוס?"
          condition: "is_system=false"

    # === CATEGORIES ===
    categories_page:
      route: /settings/categories
      title: "קטגוריות"
      layout: tree_inline_editor
      permission: settings.categories.edit
      tree:
        entity: categories
        display_field: name
        child_field: parent_category_id
        additional_fields:
          - {field: direction, label: "כיוון", type: select, options: [{value: income, label: "הכנסה"}, {value: expense, label: "הוצאה"}, {value: both, label: "הכנסה והוצאה"}]}
          - {field: is_active, label: "פעיל", type: toggle}
        drag_drop: true
        actions:
          - {action: add_root, label: "קטגוריה ראשית חדשה", icon: add}
          - {action: add_child, label: "תת-קטגוריה", icon: add}
          - {action: edit, label: "עריכה", icon: edit, inline: true}
          - {action: delete, label: "מחיקה", icon: delete, confirmation: "האם למחוק? כל תתי-הקטגוריות יימחקו"}

    # === NUMBERING ===
    numbering_page:
      route: /settings/numbering
      title: "מספור אוטומטי"
      layout: inline_table_editor
      permission: settings.numbering.edit
      table:
        entity: auto_number_sequences
        columns:
          - {field: entity_type, label: "סוג ישות", type: text, editable: false, width: 180}
          - {field: prefix, label: "קידומת", type: text, editable: true, width: 100}
          - {field: next_value, label: "ערך הבא", type: number, editable: true, width: 100}
          - {field: padding_length, label: "אורך ריפוד", type: number, editable: true, width: 100}
          - {field: reset_yearly, label: "איפוס שנתי", type: toggle, editable: true, width: 100}
          - {field: preview, label: "תצוגה מקדימה", type: computed, computed_format: "prefix + padded(next_value, padding_length)", width: 150}
        seed_data:
          - {entity_type: customers, prefix: "CUS-", next_value: 1, padding_length: 5}
          - {entity_type: suppliers, prefix: "SUP-", next_value: 1, padding_length: 5}
          - {entity_type: invoices, prefix: "INV-", next_value: 1, padding_length: 6}
          - {entity_type: receipts, prefix: "RCP-", next_value: 1, padding_length: 6}
          - {entity_type: payment_requests, prefix: "PRQ-", next_value: 1, padding_length: 6}
          - {entity_type: credit_notes, prefix: "CRN-", next_value: 1, padding_length: 6}
          - {entity_type: quotes, prefix: "QUO-", next_value: 1, padding_length: 5}
          - {entity_type: sales_orders, prefix: "SO-", next_value: 1, padding_length: 5}
          - {entity_type: purchase_orders, prefix: "PO-", next_value: 1, padding_length: 5}
          - {entity_type: projects, prefix: "PRJ-", next_value: 1, padding_length: 4}
          - {entity_type: employees, prefix: "EMP-", next_value: 1, padding_length: 5}
          - {entity_type: payroll_runs, prefix: "PAY-", next_value: 1, padding_length: 5}
        actions:
          save:
            label: "שמירה"
            icon: save
            action: save_numbering

    # === PAYMENT METHODS ===
    payment_methods_page:
      route: /settings/payment-methods
      title: "אמצעי תשלום"
      layout: inline_table_editor
      permission: settings.payment_methods.edit
      table:
        entity: payment_methods
        columns:
          - {field: name, label: "שם", type: text, editable: true, width: 200}
          - {field: code, label: "קוד", type: text, editable: true, width: 100}
          - {field: is_active, label: "פעיל", type: toggle, editable: true, width: 80}
        actions:
          add:
            label: "אמצעי תשלום חדש"
            icon: add
          save:
            label: "שמירה"
            icon: save
          delete:
            icon: delete
            confirmation: "האם למחוק?"

    # === TAX SETTINGS ===
    tax_settings:
      route: /settings/tax
      title: "הגדרות מס"
      layout: inline_table_editor
      permission: settings.tax.edit
      table:
        entity: tax_codes
        columns:
          - {field: name, label: "שם קוד מס", type: text, editable: true, width: 200}
          - {field: rate, label: "שיעור (%)", type: number, editable: true, step: 0.01, width: 100}
          - {field: is_default, label: "ברירת מחדל", type: radio, editable: true, width: 100}
          - {field: is_active, label: "פעיל", type: toggle, editable: true, width: 80}
        actions:
          add:
            label: "קוד מס חדש"
            icon: add
          save:
            label: "שמירה"
            icon: save

    # === TEMPLATES ===
    templates_settings:
      route: /settings/templates
      title: "תבניות מסמכים"
      layout: redirect
      redirect_to: /documents/templates
      description: "מפנה לניהול תבניות במודול מסמכים"

    # === AUDIT LOG ===
    audit_log:
      route: /settings/audit-log
      title: "לוג מערכת"
      layout: searchable_table
      permission: settings.audit_log.view
      toolbar:
        search:
          placeholder: "חיפוש לפי ישות, פעולה, משתמש..."
          searches_in: [entity_type, entity_id, action_type, actor]
        secondary_actions:
          - label: "ייצוא"
            icon: download
            action: export_audit_log
            permission: settings.audit_log.export
      filters:
        - field: entity_type
          type: multi_select
          label: "סוג ישות"
          options:
