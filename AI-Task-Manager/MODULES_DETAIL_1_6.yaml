          - { key: "subject", label: "Subject", type: "text", required: true, default: "Quotation {quote_number}" }
          - { key: "body", label: "Message", type: "rich_text_editor", required: true }
          - { key: "attach_pdf", label: "Attach PDF", type: "checkbox", default: true }
        actions:
          - { id: "send", label: "Send", type: "submit", action: "api_call", target: "POST /api/sales/quotations/{id}/send" }
          - { id: "cancel", label: "Cancel", type: "cancel", action: "close_modal" }
      tabs:
        - id: "items"
          label: "Items"
          icon: "list"
          content:
            layout: "table"
            entity: "quote_items"
            table_columns:
              - { key: "sort_order", label: "#", type: "integer" }
              - { key: "product_name", label: "Product", type: "text", clickable: true, click_action: { type: "navigate", target: "/app/products/{product_id}" } }
              - { key: "description", label: "Description", type: "text" }
              - { key: "quantity", label: "Qty", type: "decimal" }
              - { key: "unit_price", label: "Unit Price", type: "currency" }
              - { key: "discount_percent", label: "Disc %", type: "percentage" }
              - { key: "tax_rate", label: "Tax %", type: "percentage" }
              - { key: "line_total", label: "Total", type: "currency" }
        - id: "related"
          label: "Related"
          icon: "link"
          content:
            sections:
              - label: "Opportunity"
                visible_when: "opportunity_id IS NOT NULL"
                link: { target: "/app/sales/opportunities/{opportunity_id}" }
              - label: "Sales Orders"
                data_source: "GET /api/sales/sales-orders?quote_id={id}"
                table_columns:
                  - { key: "order_number", label: "Order #", clickable: true, click_action: { type: "navigate", target: "/app/sales/sales-orders/{id}" } }
                  - { key: "total_amount", label: "Amount", type: "currency" }
                  - { key: "status_id", label: "Status", type: "enum_badge" }
        - { id: "files", label: "Files", icon: "attach_file", content: { layout: "file_grid", data_source: "GET /api/files?entity_type=quotation&entity_id={id}" } }
        - { id: "activity_log", label: "Activity Log", icon: "history", content: { layout: "timeline", data_source: "GET /api/activity-log?entity_type=quotation&entity_id={id}" } }

    sales_orders_list:
      route: "/app/sales/sales-orders"
      title: "Sales Orders"
      layout: "table_with_filters"
      permission: "sales.sales_orders.view"
      default_sort: "created_at desc"
      table_columns:
