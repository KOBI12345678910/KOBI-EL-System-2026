        - { key: "expected_amount", label: "Amount", type: "currency", sortable: true }
        - { key: "weighted_amount", label: "Weighted", type: "currency", calculated: "expected_amount * probability / 100", sortable: true }
        - { key: "expected_close_date", label: "Close Date", type: "date", sortable: true, highlight_rule: "red if < today AND stage NOT IN ('closed_won','closed_lost')" }
