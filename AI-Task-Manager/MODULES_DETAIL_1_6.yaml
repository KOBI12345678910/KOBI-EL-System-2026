# ============================================================================
# MODULE 3: SALES
# ============================================================================
module_3_sales:
  id: 3
  name: "Sales"
  icon: "point_of_sale"
  route: "/app/sales"
  description: "Full sales lifecycle: opportunities, quotations, sales orders, kanban pipeline, and forecasting."
  permissions: { view: "sales.view", create: "sales.create", edit: "sales.edit", delete: "sales.delete" }
  submenus:
    - { id: "opportunities", label: "Opportunities", icon: "flag", route: "/app/sales/opportunities" }
    - { id: "quotations", label: "Quotations", icon: "request_quote", route: "/app/sales/quotations" }
    - { id: "sales_orders", label: "Sales Orders", icon: "shopping_cart", route: "/app/sales/sales-orders" }
    - { id: "sales_pipeline", label: "Pipeline", icon: "view_kanban", route: "/app/sales/pipeline" }
    - { id: "forecasts", label: "Forecasts", icon: "trending_up", route: "/app/sales/forecasts" }

  entities:
    opportunities:
      table_name: "opportunities"
      primary_key: "id"
      auto_number_prefix: "OPP"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "opportunity_number", type: "string", auto_generated: true, unique: true, label: "Opportunity #" }
        - { key: "name", type: "string", max_length: 255, required: true, label: "Name" }
        - { key: "customer_id", type: "uuid", foreign_key: "customers.id", required: true, label: "Customer" }
        - { key: "contact_id", type: "uuid", foreign_key: "contacts.id", nullable: true, label: "Contact" }
        - { key: "stage", type: "enum", enum_values: ["new","qualification","proposal","negotiation","closed_won","closed_lost"], required: true, default: "new", label: "Stage" }
        - { key: "probability", type: "integer", min: 0, max: 100, required: true, default: 10, label: "Probability (%)" }
        - { key: "expected_amount", type: "decimal", precision: 2, required: true, label: "Expected Amount" }
        - { key: "expected_close_date", type: "date", required: true, label: "Expected Close Date" }
        - { key: "assigned_to", type: "uuid", foreign_key: "users.id", required: true, label: "Assigned To" }
        - { key: "source", type: "string", max_length: 100, required: false, label: "Source" }
        - { key: "notes", type: "text", required: false, label: "Notes" }
        - { key: "status_id", type: "string", required: true, default: "active", label: "Status" }
        - { key: "created_at", type: "datetime", auto_generated: true }
        - { key: "updated_at", type: "datetime", auto_generated: true, auto_updated: true }

    quotations:
      table_name: "quotations"
      primary_key: "id"
      auto_number_prefix: "QT"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "quote_number", type: "string", auto_generated: true, unique: true, label: "Quote #" }
        - { key: "customer_id", type: "uuid", foreign_key: "customers.id", required: true, label: "Customer" }
        - { key: "contact_id", type: "uuid", foreign_key: "contacts.id", nullable: true, label: "Contact" }
        - { key: "opportunity_id", type: "uuid", foreign_key: "opportunities.id", nullable: true, label: "Opportunity" }
        - { key: "issue_date", type: "date", required: true, default: "{today}", label: "Issue Date" }
        - { key: "valid_until", type: "date", required: true, label: "Valid Until" }
        - { key: "subtotal", type: "decimal", precision: 2, calculated: true, label: "Subtotal" }
        - { key: "discount_amount", type: "decimal", precision: 2, default: 0, label: "Discount Amount" }
        - { key: "tax_amount", type: "decimal", precision: 2, calculated: true, label: "Tax Amount" }
        - { key: "total_amount", type: "decimal", precision: 2, calculated: true, label: "Total Amount" }
        - { key: "status_id", type: "enum", enum_values: ["draft","sent","accepted","rejected","expired"], required: true, default: "draft", label: "Status" }
        - { key: "notes", type: "text", required: false, label: "Notes" }
        - { key: "created_by", type: "uuid", foreign_key: "users.id", auto_generated: true, label: "Created By" }
        - { key: "created_at", type: "datetime", auto_generated: true }
        - { key: "updated_at", type: "datetime", auto_generated: true, auto_updated: true }

    quote_items:
      table_name: "quote_items"
      primary_key: "id"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "quote_id", type: "uuid", foreign_key: "quotations.id", required: true }
        - { key: "product_id", type: "uuid", foreign_key: "products.id", required: true }
        - { key: "description", type: "string", max_length: 500, required: false }
        - { key: "quantity", type: "decimal", precision: 3, required: true, min: 0.001 }
        - { key: "unit_price", type: "decimal", precision: 2, required: true }
        - { key: "discount_percent", type: "decimal", precision: 2, default: 0, min: 0, max: 100 }
        - { key: "tax_rate", type: "decimal", precision: 2, required: true }
        - { key: "line_total", type: "decimal", precision: 2, calculated: true, calculation: "(quantity * unit_price) * (1 - discount_percent/100)" }
        - { key: "sort_order", type: "integer", required: true, default: 0 }

    sales_orders:
      table_name: "sales_orders"
      primary_key: "id"
      auto_number_prefix: "SO"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "order_number", type: "string", auto_generated: true, unique: true, label: "Order #" }
        - { key: "customer_id", type: "uuid", foreign_key: "customers.id", required: true }
        - { key: "quote_id", type: "uuid", foreign_key: "quotations.id", nullable: true }
        - { key: "order_date", type: "date", required: true, default: "{today}" }
        - { key: "delivery_date", type: "date", required: true }
        - { key: "subtotal", type: "decimal", precision: 2, calculated: true }
        - { key: "tax_amount", type: "decimal", precision: 2, calculated: true }
        - { key: "total_amount", type: "decimal", precision: 2, calculated: true }
        - { key: "status_id", type: "enum", enum_values: ["draft","confirmed","in_progress","shipped","delivered","cancelled"], required: true, default: "draft" }
        - { key: "shipping_address", type: "text", required: false }
        - { key: "notes", type: "text", required: false }
        - { key: "created_by", type: "uuid", foreign_key: "users.id", auto_generated: true }
        - { key: "created_at", type: "datetime", auto_generated: true }
        - { key: "updated_at", type: "datetime", auto_generated: true, auto_updated: true }

    sales_order_items:
      table_name: "sales_order_items"
      primary_key: "id"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "sales_order_id", type: "uuid", foreign_key: "sales_orders.id", required: true }
        - { key: "product_id", type: "uuid", foreign_key: "products.id", required: true }
        - { key: "description", type: "string", max_length: 500, required: false }
        - { key: "quantity", type: "decimal", precision: 3, required: true, min: 0.001 }
        - { key: "unit_price", type: "decimal", precision: 2, required: true }
        - { key: "discount_percent", type: "decimal", precision: 2, default: 0, min: 0, max: 100 }
        - { key: "tax_rate", type: "decimal", precision: 2, required: true }
        - { key: "line_total", type: "decimal", precision: 2, calculated: true, calculation: "(quantity * unit_price) * (1 - discount_percent/100)" }
        - { key: "delivered_quantity", type: "decimal", precision: 3, default: 0 }
        - { key: "sort_order", type: "integer", required: true, default: 0 }

  pages:
    opportunities_list:
      route: "/app/sales/opportunities"
      title: "Opportunities"
      layout: "table_with_filters"
      permission: "sales.opportunities.view"
      default_sort: "expected_close_date asc"
      table_columns:
        - { key: "opportunity_number", label: "Opp #", type: "text", sortable: true, clickable: true, click_action: { type: "navigate", target: "/app/sales/opportunities/{id}" } }
        - { key: "name", label: "Opportunity Name", type: "text", sortable: true }
