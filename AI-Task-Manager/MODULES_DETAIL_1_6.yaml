        - { key: "delivery_date", label: "Delivery", type: "date", sortable: true, highlight_rule: "red if < today AND status NOT IN ('delivered','cancelled')" }
        - { key: "total_amount", label: "Total", type: "currency", sortable: true }
        - { key: "status_id", label: "Status", type: "enum_badge", colors: { draft: "gray", confirmed: "blue", in_progress: "cyan", shipped: "orange", delivered: "green", cancelled: "red" }, sortable: true }
        - { key: "created_at", label: "Created", type: "datetime", sortable: true }
      filters:
        - { key: "status_id", label: "Status", type: "multi_select", options: ["draft","confirmed","in_progress","shipped","delivered","cancelled"] }
        - { key: "customer_id", label: "Customer", type: "searchable_select", data_source: "customers" }
        - { key: "order_date_range", label: "Order Date", type: "date_range" }
        - { key: "delivery_date_range", label: "Delivery Date", type: "date_range" }
        - { key: "search", label: "Search", type: "text", placeholder: "Search by order #, customer..." }
      actions:
        - { id: "create_order", label: "New Sales Order", icon: "add", type: "button_primary", action: "navigate", target: "/app/sales/sales-orders/create" }
        - { id: "export", label: "Export", icon: "download", type: "button_secondary", action: "export", formats: ["csv","xlsx"] }

    sales_orders_create:
      route: "/app/sales/sales-orders/create"
      title: "Create Sales Order"
      layout: "document_form"
      permission: "sales.sales_orders.create"
      header_fields:
        - { key: "customer_id", label: "Customer", type: "searchable_select", data_source: "customers", required: true, grid_column: "1/2" }
        - { key: "quote_id", label: "Source Quote", type: "searchable_select", data_source: "quotations", filter: "customer_id={customer_id} AND status_id='accepted'", depends_on: "customer_id", required: false, grid_column: "2/2", on_change: "auto_fill_from_quote" }
        - { key: "order_date", label: "Order Date", type: "date", required: true, default: "{today}", grid_column: "1/3" }
        - { key: "delivery_date", label: "Delivery Date", type: "date", required: true, grid_column: "2/3" }
        - { key: "status_id", label: "Status", type: "select", required: true, default: "draft", options: ["draft","confirmed"], grid_column: "3/3" }
        - { key: "shipping_address", label: "Shipping Address", type: "textarea", required: false, auto_fill_from: "customer.address", grid_column: "1/1" }
      line_items:
        entity: "sales_order_items"
        add_button_label: "Add Line Item"
        columns:
          - { key: "product_id", label: "Product/Service", type: "searchable_select", data_source: "products", required: true, width: "25%", on_change: "auto_fill_product_details" }
          - { key: "description", label: "Description", type: "text", width: "18%", auto_fill_from: "product.description" }
          - { key: "quantity", label: "Qty", type: "decimal", required: true, precision: 3, default: 1, width: "8%" }
          - { key: "unit_price", label: "Unit Price", type: "decimal", required: true, precision: 2, width: "11%", auto_fill_from: "product.default_price" }
          - { key: "discount_percent", label: "Disc %", type: "decimal", precision: 2, default: 0, width: "7%" }
          - { key: "tax_rate", label: "Tax %", type: "decimal", required: true, precision: 2, width: "7%", auto_fill_from: "product.tax_rate" }
          - { key: "delivered_quantity", label: "Delivered", type: "decimal", default: 0, read_only: true, width: "8%" }
          - { key: "line_total", label: "Total", type: "decimal", calculated: true, read_only: true, width: "12%" }
      summary_fields:
        - { key: "subtotal", label: "Subtotal", type: "currency", calculated: "SUM(line_totals)", read_only: true }
        - { key: "tax_amount", label: "Tax", type: "currency", calculated: true, read_only: true }
        - { key: "total_amount", label: "Grand Total", type: "currency", calculated: "subtotal + tax", read_only: true, bold: true }
      footer_fields: [{ key: "notes", label: "Notes", type: "textarea", required: false }]
      actions:
        - { id: "save_draft", label: "Save Draft", type: "submit", color: "secondary", action: "api_call", target: "POST /api/sales/sales-orders", payload_override: { "status_id": "draft" } }
        - { id: "save_confirmed", label: "Save & Confirm", type: "submit", color: "primary", action: "api_call", target: "POST /api/sales/sales-orders", payload_override: { "status_id": "confirmed" } }
        - { id: "cancel", label: "Cancel", type: "cancel", action: "navigate", target: "/app/sales/sales-orders" }

    sales_orders_edit:
      route: "/app/sales/sales-orders/{id}/edit"
      title: "Edit Sales Order"
      layout: "document_form"
      permission: "sales.sales_orders.edit"
      data_source: "GET /api/sales/sales-orders/{id}?include=items"
      note: "Same as create form, pre-populated."

    sales_orders_details:
      route: "/app/sales/sales-orders/{id}"
      title: "Sales Order Details"
      layout: "document_detail"
      permission: "sales.sales_orders.view"
      data_source: "GET /api/sales/sales-orders/{id}?include=items"
      header:
        title_field: "order_number"
        subtitle_field: "customer_name"
        status_badge: "status_id"
        meta_fields: [{ key: "order_date", label: "Order Date", type: "date" }, { key: "delivery_date", label: "Delivery", type: "date" }, { key: "total_amount", label: "Total", type: "currency" }]
      header_actions:
        - { id: "edit", label: "Edit", icon: "edit", type: "button_primary", action: "navigate", target: "/app/sales/sales-orders/{id}/edit", visible_when: "status_id IN ('draft','confirmed')" }
        - { id: "confirm", label: "Confirm", icon: "check", type: "button_success", action: "api_call", target: "PATCH /api/sales/sales-orders/{id}", payload: { "status_id": "confirmed" }, visible_when: "status_id='draft'" }
        - { id: "start_processing", label: "Start Processing", icon: "play_arrow", type: "button_secondary", action: "api_call", target: "PATCH /api/sales/sales-orders/{id}", payload: { "status_id": "in_progress" }, visible_when: "status_id='confirmed'" }
        - { id: "mark_shipped", label: "Shipped", icon: "local_shipping", type: "button_secondary", action: "api_call", target: "PATCH /api/sales/sales-orders/{id}", payload: { "status_id": "shipped" }, visible_when: "status_id='in_progress'" }
        - { id: "mark_delivered", label: "Delivered", icon: "check_circle", type: "button_success", action: "api_call", target: "PATCH /api/sales/sales-orders/{id}", payload: { "status_id": "delivered" }, visible_when: "status_id='shipped'" }
        - { id: "create_invoice", label: "Create Invoice", icon: "receipt", type: "button_primary", action: "navigate", target: "/app/finance/income-documents/create?type=invoice&sales_order_id={id}&customer_id={customer_id}", visible_when: "status_id IN ('confirmed','in_progress','shipped','delivered')" }
        - { id: "cancel_order", label: "Cancel", icon: "cancel", type: "button_danger", action: "api_call", target: "PATCH /api/sales/sales-orders/{id}", payload: { "status_id": "cancelled" }, visible_when: "status_id NOT IN ('delivered','cancelled')" }
        - { id: "print_pdf", label: "PDF", icon: "print", type: "button_secondary", action: "download", target: "/api/sales/sales-orders/{id}/pdf" }
      tabs:
        - id: "items"
          label: "Items"
          icon: "list"
          content:
            table_columns:
              - { key: "sort_order", label: "#", type: "integer" }
              - { key: "product_name", label: "Product", type: "text", clickable: true, click_action: { type: "navigate", target: "/app/products/{product_id}" } }
              - { key: "description", label: "Description", type: "text" }
              - { key: "quantity", label: "Ordered", type: "decimal" }
              - { key: "delivered_quantity", label: "Delivered", type: "decimal" }
              - { key: "remaining", label: "Remaining", type: "decimal", calculated: "quantity - delivered_quantity" }
              - { key: "unit_price", label: "Unit Price", type: "currency" }
              - { key: "discount_percent", label: "Disc %", type: "percentage" }
              - { key: "tax_rate", label: "Tax %", type: "percentage" }
              - { key: "line_total", label: "Total", type: "currency" }
        - id: "details"
          label: "Details"
          icon: "info"
          content:
            layout: "two_column"
            left_column:
              - section: "Order"
                fields: [{ key: "order_number", label: "Order #" }, { key: "order_date", label: "Date", type: "date" }, { key: "delivery_date", label: "Delivery", type: "date" }, { key: "shipping_address", label: "Ship To" }, { key: "status_id", label: "Status", type: "enum_badge" }]
            right_column:
              - section: "Customer"
                fields: [{ key: "customer_name", label: "Customer", type: "link", click_action: { type: "navigate", target: "/app/customers/{customer_id}" } }]
              - section: "Source"
                visible_when: "quote_id IS NOT NULL"
                fields: [{ key: "quote_number", label: "Quote", type: "link", click_action: { type: "navigate", target: "/app/sales/quotations/{quote_id}" } }]
              - section: "Totals"
                fields: [{ key: "subtotal", label: "Subtotal", type: "currency" }, { key: "tax_amount", label: "Tax", type: "currency" }, { key: "total_amount", label: "Total", type: "currency", bold: true }]
              - section: "Notes"
                fields: [{ key: "notes", type: "rich_text" }]
        - id: "invoices"
          label: "Invoices"
          icon: "receipt"
          content:
            data_source: "GET /api/finance/income-documents?sales_order_id={id}"
            table_columns:
              - { key: "document_number", label: "Invoice #", clickable: true, click_action: { type: "navigate", target: "/app/finance/income-documents/{id}" } }
              - { key: "document_date", label: "Date", type: "date" }
              - { key: "total_amount", label: "Amount", type: "currency" }
              - { key: "balance_due", label: "Balance", type: "currency" }
              - { key: "status_id", label: "Status", type: "enum_badge" }
        - { id: "files", label: "Files", icon: "attach_file", content: { layout: "file_grid", data_source: "GET /api/files?entity_type=sales_order&entity_id={id}" } }
        - { id: "activity_log", label: "Activity Log", icon: "history", content: { layout: "timeline", data_source: "GET /api/activity-log?entity_type=sales_order&entity_id={id}" } }

    sales_pipeline:
      route: "/app/sales/pipeline"
      title: "Sales Pipeline"
      layout: "kanban"
      permission: "sales.pipeline.view"
      kanban_config:
        group_by: "stage"
        drag_and_drop: true
        on_drop_action: "PATCH /api/sales/opportunities/{id}"
        on_drop_payload: { "stage": "{target_column}" }
        columns:
          - { id: "new", label: "New", color: "gray", default_probability: 10 }
          - { id: "qualification", label: "Qualification", color: "blue", default_probability: 25 }
          - { id: "proposal", label: "Proposal", color: "cyan", default_probability: 50 }
          - { id: "negotiation", label: "Negotiation", color: "orange", default_probability: 75 }
        column_summary:
          - { key: "count", label: "Deals", aggregation: "COUNT(*)" }
          - { key: "total_value", label: "Value", aggregation: "SUM(expected_amount)", type: "currency" }
          - { key: "weighted", label: "Weighted", aggregation: "SUM(expected_amount*probability/100)", type: "currency" }
        card_fields:
          - { key: "name", type: "text", bold: true, clickable: true, click_action: { type: "navigate", target: "/app/sales/opportunities/{id}" } }
          - { key: "customer_name", type: "text" }
          - { key: "expected_amount", type: "currency" }
          - { key: "probability", type: "percentage_bar" }
          - { key: "expected_close_date", type: "date", highlight_rule: "red if < today" }
          - { key: "assigned_to", type: "user_avatar" }
      filters:
        - { key: "assigned_to", label: "Owner", type: "user_select", allow_multiple: true }
        - { key: "customer_id", label: "Customer", type: "searchable_select", data_source: "customers" }
        - { key: "expected_close_date_range", label: "Close Date", type: "date_range" }
      actions:
        - { id: "create", label: "New Opportunity", icon: "add", type: "button_primary", action: "navigate", target: "/app/sales/opportunities/create" }
        - { id: "list_view", label: "List View", icon: "list", type: "button_secondary", action: "navigate", target: "/app/sales/opportunities" }

    sales_forecasts:
      route: "/app/sales/forecasts"
      title: "Sales Forecasts"
      layout: "chart_with_table"
      permission: "sales.forecasts.view"
      chart_config:
        type: "stacked_bar"
        x_axis: "month"
        y_axis: "amount"
        group_by: "stage"
        default_period: "current_quarter"
        periods: ["current_month","current_quarter","current_year","next_quarter","next_year","custom"]
        colors: { new: "#9E9E9E", qualification: "#2196F3", proposal: "#00BCD4", negotiation: "#FF9800", closed_won: "#4CAF50" }
      summary_cards:
        - { id: "total_pipeline", label: "Total Pipeline", type: "currency", aggregation: "SUM(expected_amount) WHERE open" }
        - { id: "weighted_pipeline", label: "Weighted Pipeline", type: "currency", aggregation: "SUM(expected_amount*probability/100) WHERE open" }
        - { id: "closed_won", label: "Closed Won (Period)", type: "currency" }
        - { id: "win_rate", label: "Win Rate", type: "percentage" }
        - { id: "avg_deal", label: "Avg Deal Size", type: "currency" }
        - { id: "avg_cycle", label: "Avg Sales Cycle", type: "days" }
      forecast_table:
        columns: ["month","new_amount","qualification_amount","proposal_amount","negotiation_amount","total_pipeline","weighted_total","closed_won"]
      filters:
        - { key: "period", label: "Period", type: "select", options: ["current_month","current_quarter","current_year","next_quarter","next_year","custom"], default: "current_quarter" }
        - { key: "custom_range", label: "Custom", type: "date_range", visible_when: "period='custom'" }
        - { key: "assigned_to", label: "Sales Rep", type: "user_select", allow_multiple: true }
      actions:
        - { id: "export", label: "Export", icon: "download", action: "export", formats: ["csv","xlsx","pdf"] }

# ============================================================================
# MODULE 4: CUSTOMERS
# ============================================================================
module_4_customers:
  id: 4
  name: "Customers"
  icon: "people"
  route: "/app/customers"
  description: "Full customer management with segmentation, balances, document tracking, and interaction history."
  permissions: { view: "customers.view", create: "customers.create", edit: "customers.edit", delete: "customers.delete" }
  submenus:
    - { id: "customers_list", label: "All Customers", icon: "people", route: "/app/customers" }
    - { id: "customer_segments", label: "Segments", icon: "label", route: "/app/customers/segments" }
    - { id: "customer_balances", label: "Balances", icon: "account_balance_wallet", route: "/app/customers/balances" }
    - { id: "customer_documents", label: "Documents", icon: "description", route: "/app/customers/documents" }
    - { id: "customer_interactions", label: "Interactions", icon: "forum", route: "/app/customers/interactions" }

  entities:
    customers:
      table_name: "customers"
      primary_key: "id"
      auto_number_field: "customer_number"
      auto_number_prefix: "C"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "customer_number", type: "string", auto_generated: true, unique: true, label: "Customer #" }
        - { key: "full_name", type: "string", max_length: 200, required: true, label: "Full Name" }
        - { key: "company_name", type: "string", max_length: 200, required: false, label: "Company Name" }
        - { key: "phone", type: "string", max_length: 30, required: false, label: "Phone" }
        - { key: "mobile", type: "string", max_length: 30, required: false, label: "Mobile" }
        - { key: "email", type: "string", max_length: 255, required: false, format: "email", label: "Email" }
        - { key: "tax_id", type: "string", max_length: 50, required: false, label: "Tax ID" }
        - { key: "address", type: "string", max_length: 500, required: false, label: "Address" }
        - { key: "city", type: "string", max_length: 100, required: false, label: "City" }
        - { key: "zip_code", type: "string", max_length: 20, required: false, label: "ZIP Code" }
        - { key: "country", type: "string", max_length: 100, required: false, label: "Country" }
        - { key: "website", type: "string", max_length: 255, required: false, format: "url", label: "Website" }
        - { key: "industry", type: "string", max_length: 100, required: false, label: "Industry" }
        - { key: "customer_type", type: "enum", enum_values: ["individual","company"], required: true, default: "individual", label: "Type" }
        - { key: "credit_limit", type: "decimal", precision: 2, required: false, default: 0, label: "Credit Limit" }
        - { key: "payment_terms", type: "integer", required: false, default: 30, label: "Payment Terms (days)" }
        - { key: "default_currency", type: "string", max_length: 3, required: false, label: "Default Currency" }
        - { key: "assigned_to", type: "uuid", foreign_key: "users.id", required: false, label: "Account Manager" }
        - { key: "status_id", type: "enum", enum_values: ["active","inactive","suspended"], required: true, default: "active", label: "Status" }
        - { key: "notes", type: "text", required: false, label: "Notes" }
        - { key: "created_at", type: "datetime", auto_generated: true }
        - { key: "updated_at", type: "datetime", auto_generated: true, auto_updated: true }

  pages:
    customers_list:
      route: "/app/customers"
      title: "Customers"
      layout: "table_with_filters"
      permission: "customers.view"
      default_sort: "created_at desc"
      table_columns:
        - { key: "customer_number", label: "Customer #", type: "text", sortable: true, clickable: true, click_action: { type: "navigate", target: "/app/customers/{id}" } }
        - { key: "full_name", label: "Name", type: "text", sortable: true }
        - { key: "company_name", label: "Company", type: "text", sortable: true }
        - { key: "phone", label: "Phone", type: "phone", clickable: true, click_action: { type: "tel" } }
        - { key: "email", label: "Email", type: "email", clickable: true, click_action: { type: "mailto" } }
        - { key: "city", label: "City", type: "text", sortable: true }
        - { key: "customer_type", label: "Type", type: "enum_badge", colors: { individual: "blue", company: "purple" }, sortable: true }
        - { key: "credit_limit", label: "Credit Limit", type: "currency", sortable: true }
        - { key: "balance_due", label: "Balance Due", type: "currency", sortable: true, color_rule: "red if > 0" }
        - { key: "assigned_to", label: "Manager", type: "user_avatar_name", sortable: true }
        - { key: "status_id", label: "Status", type: "enum_badge", colors: { active: "green", inactive: "gray", suspended: "red" }, sortable: true }
        - { key: "created_at", label: "Created", type: "datetime", sortable: true }
      filters:
        - { key: "status_id", label: "Status", type: "multi_select", options: ["active","inactive","suspended"], default: ["active"] }
        - { key: "customer_type", label: "Type", type: "multi_select", options: ["individual","company"] }
        - { key: "assigned_to", label: "Account Manager", type: "user_select", allow_multiple: true }
        - { key: "city", label: "City", type: "text" }
        - { key: "country", label: "Country", type: "text" }
        - { key: "industry", label: "Industry", type: "text" }
        - { key: "balance_due_min", label: "Min Balance Due", type: "decimal" }
        - { key: "created_date_range", label: "Created Date", type: "date_range" }
        - { key: "segment_tags", label: "Segments", type: "multi_select", data_source: "customer_segments" }
        - { key: "search", label: "Search", type: "text", placeholder: "Search by name, company, phone, email, tax ID...", search_fields: ["full_name","company_name","phone","mobile","email","tax_id","customer_number"] }
      actions:
        - { id: "create_customer", label: "New Customer", icon: "person_add", type: "button_primary", action: "navigate", target: "/app/customers/create", permission: "customers.create" }
        - { id: "import", label: "Import", icon: "upload", type: "button_secondary", action: "navigate", target: "/app/customers/import" }
        - { id: "export", label: "Export", icon: "download", type: "button_secondary", action: "export", formats: ["csv","xlsx"] }
        - { id: "bulk_assign", label: "Assign", icon: "person_add", type: "bulk_action", requires_selection: true }
        - { id: "bulk_delete", label: "Delete", icon: "delete", type: "bulk_action", requires_selection: true, confirmation: "Delete selected customers?" }

    customers_create:
      route: "/app/customers/create"
      title: "Create Customer"
      layout: "form"
      permission: "customers.create"
      form_fields:
        - { key: "customer_type", label: "Customer Type", type: "select", required: true, default: "individual", options: [{value: "individual", label: "Individual"},{value: "company", label: "Company"}], grid_column: "1/2" }
        - { key: "full_name", label: "Full Name", type: "text", required: true, max_length: 200, grid_column: "2/2" }
        - { key: "company_name", label: "Company Name", type: "text", required: false, max_length: 200, grid_column: "1/2" }
        - { key: "tax_id", label: "Tax ID / VAT #", type: "text", required: false, max_length: 50, grid_column: "2/2" }
        - { key: "phone", label: "Phone", type: "tel", required: false, max_length: 30, grid_column: "1/3" }
        - { key: "mobile", label: "Mobile", type: "tel", required: false, max_length: 30, grid_column: "2/3" }
        - { key: "email", label: "Email", type: "email", required: false, max_length: 255, validation: "email_format", grid_column: "3/3" }
        - { key: "website", label: "Website", type: "url", required: false, max_length: 255, grid_column: "1/2" }
        - { key: "industry", label: "Industry", type: "text", required: false, max_length: 100, grid_column: "2/2" }
        - { key: "address", label: "Address", type: "textarea", required: false, max_length: 500, rows: 2, grid_column: "1/1" }
        - { key: "city", label: "City", type: "text", required: false, max_length: 100, grid_column: "1/3" }
        - { key: "zip_code", label: "ZIP Code", type: "text", required: false, max_length: 20, grid_column: "2/3" }
        - { key: "country", label: "Country", type: "country_select", required: false, grid_column: "3/3" }
        - { key: "credit_limit", label: "Credit Limit", type: "decimal", required: false, precision: 2, default: 0, grid_column: "1/3" }
        - { key: "payment_terms", label: "Payment Terms (days)", type: "integer", required: false, default: 30, min: 0, grid_column: "2/3" }
        - { key: "default_currency", label: "Currency", type: "currency_select", required: false, grid_column: "3/3" }
        - { key: "assigned_to", label: "Account Manager", type: "user_select", required: false, grid_column: "1/2" }
        - { key: "status_id", label: "Status", type: "select", required: true, default: "active", options: [{value: "active", label: "Active"},{value: "inactive", label: "Inactive"}], grid_column: "2/2" }
        - { key: "notes", label: "Notes", type: "textarea", required: false, max_length: 5000, rows: 4, grid_column: "1/1" }
      actions:
        - { id: "save", label: "Create Customer", type: "submit", color: "primary", action: "api_call", target: "POST /api/customers", on_success: "navigate", success_target: "/app/customers/{id}" }
        - { id: "save_and_new", label: "Save & Create Another", type: "submit", color: "secondary", on_success: "reset_form" }
        - { id: "cancel", label: "Cancel", type: "cancel", action: "navigate", target: "/app/customers" }

    customers_edit:
      route: "/app/customers/{id}/edit"
      title: "Edit Customer"
      layout: "form"
      permission: "customers.edit"
      data_source: "GET /api/customers/{id}"
      note: "Same fields as create form, pre-populated."

    customers_details:
      route: "/app/customers/{id}"
      title: "Customer Profile"
      layout: "detail_with_tabs"
      permission: "customers.view"
      data_source: "GET /api/customers/{id}"
      header:
        title_field: "full_name"
        subtitle_field: "company_name"
        status_badge: "status_id"
        meta_fields:
          - { key: "customer_number", label: "Customer #" }
          - { key: "customer_type", label: "Type", type: "enum_badge" }
          - { key: "balance_due", label: "Balance Due", type: "currency" }
          - { key: "assigned_to", label: "Manager", type: "user_avatar_name" }
      header_actions:
        - { id: "edit", label: "Edit", icon: "edit", type: "button_primary", action: "navigate", target: "/app/customers/{id}/edit" }
        - { id: "create_invoice", label: "New Invoice", icon: "receipt", type: "button_secondary", action: "navigate", target: "/app/finance/income-documents/create?type=invoice&customer_id={id}" }
        - { id: "create_quote", label: "New Quote", icon: "request_quote", type: "button_secondary", action: "navigate", target: "/app/sales/quotations/create?customer_id={id}" }
        - { id: "log_activity", label: "Log Activity", icon: "event", type: "button_secondary", action: "open_modal", target: "create_activity_modal" }
        - { id: "send_email", label: "Email", icon: "mail", type: "button_secondary", action: "open_modal", target: "send_email_modal", visible_when: "email IS NOT NULL" }
        - { id: "delete", label: "Delete", icon: "delete", type: "button_danger", action: "api_call", target: "DELETE /api/customers/{id}", confirmation: "Delete this customer and all related data?" }
      tabs:
        - id: "details"
          label: "Details"
          icon: "info"
          content:
            layout: "two_column"
            left_column:
              - section: "Contact Information"
                fields:
                  - { key: "full_name", label: "Full Name", type: "text" }
                  - { key: "company_name", label: "Company", type: "text" }
                  - { key: "customer_type", label: "Type", type: "enum_badge" }
                  - { key: "phone", label: "Phone", type: "phone", clickable: true }
                  - { key: "mobile", label: "Mobile", type: "phone", clickable: true }
                  - { key: "email", label: "Email", type: "email", clickable: true }
                  - { key: "website", label: "Website", type: "url", clickable: true }
                  - { key: "industry", label: "Industry", type: "text" }
              - section: "Address"
                fields:
                  - { key: "address", label: "Address", type: "text" }
                  - { key: "city", label: "City", type: "text" }
                  - { key: "zip_code", label: "ZIP", type: "text" }
                  - { key: "country", label: "Country", type: "text" }
            right_column:
              - section: "Financial"
                fields:
                  - { key: "tax_id", label: "Tax ID", type: "text" }
                  - { key: "credit_limit", label: "Credit Limit", type: "currency" }
                  - { key: "payment_terms", label: "Payment Terms", type: "text", display: "{value} days" }
                  - { key: "default_currency", label: "Currency", type: "text" }
              - section: "Assignment"
                fields:
                  - { key: "assigned_to", label: "Account Manager", type: "user_avatar_name" }
                  - { key: "status_id", label: "Status", type: "enum_badge" }
              - section: "Notes"
                fields: [{ key: "notes", label: "", type: "rich_text" }]
              - section: "System"
                fields:
                  - { key: "customer_number", label: "Customer #", type: "text" }
                  - { key: "created_at", label: "Created", type: "datetime" }
                  - { key: "updated_at", label: "Updated", type: "datetime" }
        - id: "documents"
          label: "Documents (Income)"
          icon: "description"
          content:
            layout: "table"
            data_source: "GET /api/finance/income-documents?customer_id={id}"
            table_columns:
              - { key: "document_number", label: "Doc #", type: "text", clickable: true, click_action: { type: "navigate", target: "/app/finance/income-documents/{id}" } }
              - { key: "document_type", label: "Type", type: "enum_badge" }
              - { key: "document_date", label: "Date", type: "date", sortable: true }
              - { key: "due_date", label: "Due Date", type: "date" }
              - { key: "total_amount", label: "Amount", type: "currency", sortable: true }
              - { key: "balance_due", label: "Balance", type: "currency" }
              - { key: "status_id", label: "Status", type: "enum_badge" }
            actions:
              - { id: "create_document", label: "New Document", icon: "add", type: "button_primary", action: "navigate", target: "/app/finance/income-documents/create?customer_id={id}" }
        - id: "quotes"
          label: "Quotes"
          icon: "request_quote"
          content:
            layout: "table"
            data_source: "GET /api/sales/quotations?customer_id={id}"
            table_columns:
              - { key: "quote_number", label: "Quote #", clickable: true, click_action: { type: "navigate", target: "/app/sales/quotations/{id}" } }
              - { key: "issue_date", label: "Date", type: "date" }
              - { key: "total_amount", label: "Amount", type: "currency" }
              - { key: "status_id", label: "Status", type: "enum_badge" }
            actions:
              - { id: "create_quote", label: "New Quote", icon: "add", type: "button_primary", action: "navigate", target: "/app/sales/quotations/create?customer_id={id}" }
        - id: "sales_orders"
          label: "Sales Orders"
          icon: "shopping_cart"
          content:
            layout: "table"
            data_source: "GET /api/sales/sales-orders?customer_id={id}"
            table_columns:
              - { key: "order_number", label: "Order #", clickable: true, click_action: { type: "navigate", target: "/app/sales/sales-orders/{id}" } }
              - { key: "order_date", label: "Date", type: "date" }
              - { key: "total_amount", label: "Amount", type: "currency" }
              - { key: "status_id", label: "Status", type: "enum_badge" }
        - id: "payments"
          label: "Payments"
          icon: "payments"
          content:
            layout: "table"
            data_source: "GET /api/payments?customer_id={id}"
            table_columns:
              - { key: "payment_reference", label: "Ref #", type: "text" }
              - { key: "payment_date", label: "Date", type: "date", sortable: true }
              - { key: "amount", label: "Amount", type: "currency", sortable: true }
              - { key: "payment_method", label: "Method", type: "text" }
              - { key: "document_number", label: "Applied To", type: "text", clickable: true }
              - { key: "status_id", label: "Status", type: "enum_badge" }
        - id: "standing_orders"
          label: "Standing Orders"
          icon: "event_repeat"
          content:
            layout: "table"
            data_source: "GET /api/finance/standing-orders?customer_id={id}"
            table_columns:
              - { key: "name", label: "Name", type: "text" }
              - { key: "amount", label: "Amount", type: "currency" }
              - { key: "frequency", label: "Frequency", type: "text" }
              - { key: "next_date", label: "Next Charge", type: "date" }
              - { key: "status_id", label: "Status", type: "enum_badge" }
        - id: "credit_transactions"
          label: "Credit Transactions"
          icon: "credit_card"
          content:
            layout: "table"
            data_source: "GET /api/payments/credit-transactions?customer_id={id}"
            table_columns:
              - { key: "transaction_reference", label: "Ref", type: "text" }
              - { key: "date", label: "Date", type: "datetime", sortable: true }
              - { key: "amount", label: "Amount", type: "currency" }
              - { key: "card_last_four", label: "Card", type: "text" }
              - { key: "num_payments", label: "Payments", type: "integer" }
              - { key: "status_id", label: "Status", type: "enum_badge", colors: { success: "green", failed: "red", pending: "yellow" } }
        - id: "contacts"
          label: "Contacts"
          icon: "contacts"
          content:
            layout: "table"
            data_source: "GET /api/crm/contacts?customer_id={id}"
            table_columns:
              - { key: "first_name", label: "First Name", type: "text", clickable: true, click_action: { type: "navigate", target: "/app/crm/contacts/{id}" } }
              - { key: "last_name", label: "Last Name", type: "text" }
              - { key: "position", label: "Position", type: "text" }
              - { key: "phone", label: "Phone", type: "phone" }
              - { key: "email", label: "Email", type: "email" }
              - { key: "is_primary", label: "Primary", type: "boolean_icon" }
            actions:
              - { id: "add_contact", label: "Add Contact", icon: "add", type: "button_primary", action: "navigate", target: "/app/crm/contacts/create?customer_id={id}" }
        - id: "projects"
          label: "Projects"
          icon: "folder"
          content:
            layout: "table"
            data_source: "GET /api/projects?customer_id={id}"
            table_columns:
              - { key: "project_name", label: "Project", type: "text", clickable: true, click_action: { type: "navigate", target: "/app/projects/{id}" } }
              - { key: "start_date", label: "Start", type: "date" }
              - { key: "end_date", label: "End", type: "date" }
              - { key: "budget", label: "Budget", type: "currency" }
              - { key: "status_id", label: "Status", type: "enum_badge" }
        - id: "activity_log"
          label: "Activity Log"
          icon: "history"
          content:
            layout: "timeline"
            data_source: "GET /api/activity-log?entity_type=customer&entity_id={id}"

    customer_segments:
      route: "/app/customers/segments"
      title: "Customer Segments"
      layout: "tag_management"
      permission: "customers.segments.view"
      description: "Tag-based grouping of customers (VIP, Enterprise, SMB, etc.)."
      table_columns:
        - { key: "name", label: "Segment Name", type: "text", sortable: true }
        - { key: "description", label: "Description", type: "text" }
        - { key: "color", label: "Color", type: "color_swatch" }
        - { key: "customer_count", label: "Customers", type: "integer", sortable: true }
        - { key: "created_at", label: "Created", type: "datetime" }
      actions:
        - { id: "create_segment", label: "New Segment", icon: "add", type: "button_primary" }
      create_form:
        fields:
          - { key: "name", label: "Segment Name", type: "text", required: true, max_length: 100 }
          - { key: "description", label: "Description", type: "textarea", required: false, max_length: 500 }
          - { key: "color", label: "Color", type: "color_picker", required: true, default: "#2196F3" }

    customer_balances:
      route: "/app/customers/balances"
      title: "Customer Balances"
      layout: "table_with_filters"
      permission: "customers.balances.view"
      default_sort: "balance_due desc"
      table_columns:
        - { key: "customer_number", label: "Customer #", type: "text", clickable: true, click_action: { type: "navigate", target: "/app/customers/{id}" } }
        - { key: "full_name", label: "Name", type: "text", sortable: true }
        - { key: "company_name", label: "Company", type: "text" }
        - { key: "total_invoiced", label: "Total Invoiced", type: "currency", sortable: true }
        - { key: "total_paid", label: "Total Paid", type: "currency", sortable: true }
        - { key: "balance_due", label: "Balance Due", type: "currency", sortable: true, color_rule: "red if > 0" }
        - { key: "overdue_amount", label: "Overdue", type: "currency", sortable: true, color_rule: "red if > 0" }
        - { key: "credit_limit", label: "Credit Limit", type: "currency" }
        - { key: "available_credit", label: "Available Credit", type: "currency", calculated: "credit_limit - balance_due" }
      filters:
        - { key: "balance_due_min", label: "Min Balance", type: "decimal" }
        - { key: "has_overdue", label: "Has Overdue", type: "checkbox" }
        - { key: "search", label: "Search", type: "text", placeholder: "Search..." }
      actions:
        - { id: "export", label: "Export", icon: "download", type: "button_secondary", action: "export", formats: ["csv","xlsx","pdf"] }
        - { id: "send_statements", label: "Send Statements", icon: "mail", type: "bulk_action", requires_selection: true }

    customer_documents:
      route: "/app/customers/documents"
      title: "Customer Documents"
      layout: "table_with_filters"
      permission: "customers.documents.view"
      description: "All income documents across all customers."
      table_columns:
        - { key: "document_number", label: "Doc #", type: "text", clickable: true, click_action: { type: "navigate", target: "/app/finance/income-documents/{id}" } }
        - { key: "document_type", label: "Type", type: "enum_badge" }
        - { key: "customer_name", label: "Customer", type: "text", clickable: true, click_action: { type: "navigate", target: "/app/customers/{customer_id}" } }
        - { key: "document_date", label: "Date", type: "date", sortable: true }
        - { key: "total_amount", label: "Amount", type: "currency", sortable: true }
        - { key: "balance_due", label: "Balance", type: "currency" }
        - { key: "status_id", label: "Status", type: "enum_badge" }
      filters:
        - { key: "document_type", label: "Type", type: "multi_select", options: ["invoice","receipt","invoice_receipt","credit_note","delivery_note","proforma"] }
        - { key: "customer_id", label: "Customer", type: "searchable_select", data_source: "customers" }
        - { key: "status_id", label: "Status", type: "multi_select" }
        - { key: "date_range", label: "Date", type: "date_range" }

    customer_interactions:
      route: "/app/customers/interactions"
      title: "Customer Interactions"
      layout: "table_with_filters"
      permission: "customers.interactions.view"
      description: "All activities and communications for all customers."
      table_columns:
        - { key: "type", label: "Type", type: "enum_badge", enum_values: ["activity","communication"] }
        - { key: "customer_name", label: "Customer", type: "text", clickable: true, click_action: { type: "navigate", target: "/app/customers/{customer_id}" } }
        - { key: "subject", label: "Subject", type: "text" }
        - { key: "channel_or_type", label: "Channel", type: "enum_badge" }
        - { key: "direction", label: "Direction", type: "enum_badge", visible_when: "type='communication'" }
        - { key: "assigned_to", label: "User", type: "user_avatar_name" }
        - { key: "date", label: "Date", type: "datetime", sortable: true }
      filters:
        - { key: "customer_id", label: "Customer", type: "searchable_select", data_source: "customers" }
        - { key: "type", label: "Record Type", type: "multi_select", options: ["activity","communication"] }
        - { key: "date_range", label: "Date", type: "date_range" }

# ============================================================================
# MODULE 5: SUPPLIERS
# ============================================================================
module_5_suppliers:
  id: 5
  name: "Suppliers"
  icon: "business"
  route: "/app/suppliers"
  description: "Supplier management with categorization, balance tracking, document management, and performance metrics."
  permissions: { view: "suppliers.view", create: "suppliers.create", edit: "suppliers.edit", delete: "suppliers.delete" }
  submenus:
    - { id: "suppliers_list", label: "All Suppliers", icon: "business", route: "/app/suppliers" }
    - { id: "supplier_categories", label: "Categories", icon: "category", route: "/app/suppliers/categories" }
    - { id: "supplier_balances", label: "Balances", icon: "account_balance_wallet", route: "/app/suppliers/balances" }
    - { id: "supplier_documents", label: "Documents", icon: "description", route: "/app/suppliers/documents" }
    - { id: "supplier_performance", label: "Performance", icon: "insights", route: "/app/suppliers/performance" }

  entities:
    suppliers:
      table_name: "suppliers"
      primary_key: "id"
      auto_number_field: "supplier_number"
      auto_number_prefix: "S"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "supplier_number", type: "string", auto_generated: true, unique: true, label: "Supplier #" }
        - { key: "full_name", type: "string", max_length: 200, required: true, label: "Full Name" }
        - { key: "company_name", type: "string", max_length: 200, required: false, label: "Company Name" }
        - { key: "phone", type: "string", max_length: 30, required: false, label: "Phone" }
        - { key: "email", type: "string", max_length: 255, required: false, format: "email", label: "Email" }
        - { key: "tax_id", type: "string", max_length: 50, required: false, label: "Tax ID" }
        - { key: "address", type: "string", max_length: 500, required: false, label: "Address" }
        - { key: "city", type: "string", max_length: 100, required: false, label: "City" }
        - { key: "zip_code", type: "string", max_length: 20, required: false, label: "ZIP Code" }
        - { key: "country", type: "string", max_length: 100, required: false, label: "Country" }
        - { key: "bank_name", type: "string", max_length: 100, required: false, label: "Bank Name" }
        - { key: "bank_branch", type: "string", max_length: 50, required: false, label: "Bank Branch" }
        - { key: "bank_account", type: "string", max_length: 50, required: false, label: "Bank Account #" }
        - { key: "payment_terms", type: "integer", required: false, default: 30, label: "Payment Terms (days)" }
        - { key: "default_currency", type: "string", max_length: 3, required: false, label: "Default Currency" }
        - { key: "status_id", type: "enum", enum_values: ["active","inactive","suspended"], required: true, default: "active", label: "Status" }
        - { key: "notes", type: "text", required: false, label: "Notes" }
        - { key: "created_at", type: "datetime", auto_generated: true }
        - { key: "updated_at", type: "datetime", auto_generated: true, auto_updated: true }

  pages:
    suppliers_list:
      route: "/app/suppliers"
      title: "Suppliers"
      layout: "table_with_filters"
      permission: "suppliers.view"
      default_sort: "created_at desc"
      table_columns:
        - { key: "supplier_number", label: "Supplier #", type: "text", sortable: true, clickable: true, click_action: { type: "navigate", target: "/app/suppliers/{id}" } }
        - { key: "full_name", label: "Name", type: "text", sortable: true }
        - { key: "company_name", label: "Company", type: "text", sortable: true }
        - { key: "phone", label: "Phone", type: "phone", clickable: true, click_action: { type: "tel" } }
        - { key: "email", label: "Email", type: "email", clickable: true, click_action: { type: "mailto" } }
        - { key: "city", label: "City", type: "text", sortable: true }
        - { key: "balance_due", label: "Balance Due", type: "currency", sortable: true }
        - { key: "status_id", label: "Status", type: "enum_badge", colors: { active: "green", inactive: "gray", suspended: "red" }, sortable: true }
        - { key: "created_at", label: "Created", type: "datetime", sortable: true }
      filters:
        - { key: "status_id", label: "Status", type: "multi_select", options: ["active","inactive","suspended"], default: ["active"] }
        - { key: "category_id", label: "Category", type: "multi_select", data_source: "supplier_categories" }
        - { key: "city", label: "City", type: "text" }
        - { key: "country", label: "Country", type: "text" }
        - { key: "search", label: "Search", type: "text", placeholder: "Search by name, company, phone, email...", search_fields: ["full_name","company_name","phone","email","tax_id","supplier_number"] }
      actions:
        - { id: "create_supplier", label: "New Supplier", icon: "add", type: "button_primary", action: "navigate", target: "/app/suppliers/create" }
        - { id: "import", label: "Import", icon: "upload", type: "button_secondary", action: "navigate", target: "/app/suppliers/import" }
        - { id: "export", label: "Export", icon: "download", type: "button_secondary", action: "export", formats: ["csv","xlsx"] }

    suppliers_create:
      route: "/app/suppliers/create"
      title: "Create Supplier"
      layout: "form"
      permission: "suppliers.create"
      form_fields:
        - { key: "full_name", label: "Full Name", type: "text", required: true, max_length: 200, grid_column: "1/2" }
        - { key: "company_name", label: "Company Name", type: "text", required: false, max_length: 200, grid_column: "2/2" }
        - { key: "phone", label: "Phone", type: "tel", required: false, max_length: 30, grid_column: "1/2" }
        - { key: "email", label: "Email", type: "email", required: false, max_length: 255, grid_column: "2/2" }
        - { key: "tax_id", label: "Tax ID / VAT #", type: "text", required: false, max_length: 50, grid_column: "1/2" }
        - { key: "status_id", label: "Status", type: "select", required: true, default: "active", options: ["active","inactive"], grid_column: "2/2" }
        - { key: "address", label: "Address", type: "textarea", required: false, max_length: 500, rows: 2, grid_column: "1/1" }
        - { key: "city", label: "City", type: "text", required: false, grid_column: "1/3" }
        - { key: "zip_code", label: "ZIP Code", type: "text", required: false, grid_column: "2/3" }
        - { key: "country", label: "Country", type: "country_select", required: false, grid_column: "3/3" }
        - { key: "bank_name", label: "Bank Name", type: "text", required: false, max_length: 100, grid_column: "1/3" }
        - { key: "bank_branch", label: "Branch", type: "text", required: false, max_length: 50, grid_column: "2/3" }
        - { key: "bank_account", label: "Account #", type: "text", required: false, max_length: 50, grid_column: "3/3" }
        - { key: "payment_terms", label: "Payment Terms (days)", type: "integer", required: false, default: 30, grid_column: "1/2" }
        - { key: "default_currency", label: "Currency", type: "currency_select", required: false, grid_column: "2/2" }
        - { key: "notes", label: "Notes", type: "textarea", required: false, max_length: 5000, rows: 4, grid_column: "1/1" }
      actions:
        - { id: "save", label: "Create Supplier", type: "submit", color: "primary", action: "api_call", target: "POST /api/suppliers", on_success: "navigate", success_target: "/app/suppliers/{id}" }
        - { id: "save_and_new", label: "Save & Create Another", type: "submit", color: "secondary", on_success: "reset_form" }
        - { id: "cancel", label: "Cancel", type: "cancel", action: "navigate", target: "/app/suppliers" }

    suppliers_edit:
      route: "/app/suppliers/{id}/edit"
      title: "Edit Supplier"
      layout: "form"
      permission: "suppliers.edit"
      data_source: "GET /api/suppliers/{id}"
      note: "Same fields as create form, pre-populated."

    suppliers_details:
      route: "/app/suppliers/{id}"
      title: "Supplier Profile"
      layout: "detail_with_tabs"
      permission: "suppliers.view"
      data_source: "GET /api/suppliers/{id}"
      header:
        title_field: "full_name"
        subtitle_field: "company_name"
        status_badge: "status_id"
        meta_fields:
          - { key: "supplier_number", label: "Supplier #" }
          - { key: "balance_due", label: "Balance Due", type: "currency" }
      header_actions:
        - { id: "edit", label: "Edit", icon: "edit", type: "button_primary", action: "navigate", target: "/app/suppliers/{id}/edit" }
        - { id: "create_expense", label: "New Expense", icon: "receipt", type: "button_secondary", action: "navigate", target: "/app/finance/expense-documents/create?supplier_id={id}" }
        - { id: "create_po", label: "New PO", icon: "local_shipping", type: "button_secondary", action: "navigate", target: "/app/purchasing/purchase-orders/create?supplier_id={id}" }
        - { id: "log_activity", label: "Log Activity", icon: "event", type: "button_secondary", action: "open_modal", target: "create_activity_modal" }
        - { id: "delete", label: "Delete", icon: "delete", type: "button_danger", action: "api_call", target: "DELETE /api/suppliers/{id}", confirmation: "Delete this supplier?" }
      tabs:
        - id: "details"
          label: "Details"
          icon: "info"
          content:
            layout: "two_column"
            left_column:
              - section: "Contact"
                fields:
                  - { key: "full_name", label: "Name", type: "text" }
                  - { key: "company_name", label: "Company", type: "text" }
                  - { key: "phone", label: "Phone", type: "phone", clickable: true }
                  - { key: "email", label: "Email", type: "email", clickable: true }
                  - { key: "tax_id", label: "Tax ID", type: "text" }
              - section: "Address"
                fields: [{ key: "address" }, { key: "city" }, { key: "zip_code" }, { key: "country" }]
            right_column:
              - section: "Banking"
                fields: [{ key: "bank_name", label: "Bank" }, { key: "bank_branch", label: "Branch" }, { key: "bank_account", label: "Account #" }]
              - section: "Terms"
                fields: [{ key: "payment_terms", label: "Payment Terms", display: "{value} days" }, { key: "default_currency", label: "Currency" }]
              - section: "Notes"
                fields: [{ key: "notes", type: "rich_text" }]
              - section: "System"
                fields: [{ key: "supplier_number" }, { key: "created_at", type: "datetime" }, { key: "updated_at", type: "datetime" }]
        - id: "expense_documents"
          label: "Expense Documents"
          icon: "receipt_long"
          content:
            layout: "table"
            data_source: "GET /api/finance/expense-documents?supplier_id={id}"
            table_columns:
              - { key: "document_number", label: "Doc #", clickable: true, click_action: { type: "navigate", target: "/app/finance/expense-documents/{id}" } }
              - { key: "document_type", label: "Type", type: "enum_badge" }
              - { key: "document_date", label: "Date", type: "date", sortable: true }
              - { key: "total_amount", label: "Amount", type: "currency", sortable: true }
              - { key: "balance_due", label: "Balance", type: "currency" }
              - { key: "status_id", label: "Status", type: "enum_badge" }
        - id: "purchase_orders"
          label: "Purchase Orders"
          icon: "local_shipping"
          content:
            layout: "table"
            data_source: "GET /api/purchasing/purchase-orders?supplier_id={id}"
            table_columns:
              - { key: "po_number", label: "PO #", clickable: true, click_action: { type: "navigate", target: "/app/purchasing/purchase-orders/{id}" } }
              - { key: "order_date", label: "Date", type: "date" }
              - { key: "total_amount", label: "Amount", type: "currency" }
              - { key: "status_id", label: "Status", type: "enum_badge" }
        - id: "goods_receipts"
          label: "Goods Receipts"
          icon: "inventory"
          content:
            layout: "table"
            data_source: "GET /api/purchasing/goods-receipts?supplier_id={id}"
            table_columns:
              - { key: "receipt_number", label: "GR #", type: "text" }
              - { key: "receipt_date", label: "Date", type: "date" }
              - { key: "po_number", label: "PO #", clickable: true }
              - { key: "status_id", label: "Status", type: "enum_badge" }
        - id: "payments"
          label: "Payments"
          icon: "payments"
          content:
            layout: "table"
            data_source: "GET /api/payments?supplier_id={id}"
            table_columns:
              - { key: "payment_reference", label: "Ref", type: "text" }
              - { key: "payment_date", label: "Date", type: "date" }
              - { key: "amount", label: "Amount", type: "currency" }
              - { key: "payment_method", label: "Method", type: "text" }
              - { key: "status_id", label: "Status", type: "enum_badge" }
        - id: "contacts"
          label: "Contacts"
          icon: "contacts"
          content:
            layout: "table"
            data_source: "GET /api/crm/contacts?supplier_id={id}"
            table_columns:
              - { key: "first_name", label: "First Name", clickable: true, click_action: { type: "navigate", target: "/app/crm/contacts/{id}" } }
              - { key: "last_name", label: "Last Name" }
              - { key: "position", label: "Position" }
              - { key: "phone", label: "Phone", type: "phone" }
              - { key: "email", label: "Email", type: "email" }
              - { key: "is_primary", label: "Primary", type: "boolean_icon" }
            actions:
              - { id: "add_contact", label: "Add Contact", icon: "add", action: "navigate", target: "/app/crm/contacts/create?supplier_id={id}" }
        - id: "performance"
          label: "Performance"
          icon: "insights"
          content:
            layout: "metrics_cards"
            metrics:
              - { key: "delivery_on_time_percent", label: "On-Time Delivery", type: "percentage", target: 95, color_rule: "green if >= 95, orange if >= 80, red if < 80" }
              - { key: "quality_score", label: "Quality Score", type: "percentage", target: 90, color_rule: "green if >= 90, orange if >= 70, red if < 70" }
              - { key: "average_response_time", label: "Avg Response Time", type: "duration_days", target: 2, color_rule: "green if <= 2, orange if <= 5, red if > 5" }
              - { key: "total_orders", label: "Total Orders", type: "integer" }
              - { key: "total_value", label: "Total Value", type: "currency" }
              - { key: "defect_rate", label: "Defect Rate", type: "percentage", target: 2, color_rule: "green if <= 2, orange if <= 5, red if > 5" }
        - id: "activity_log"
          label: "Activity Log"
          icon: "history"
          content:
            layout: "timeline"
            data_source: "GET /api/activity-log?entity_type=supplier&entity_id={id}"

    supplier_categories:
      route: "/app/suppliers/categories"
      title: "Supplier Categories"
      layout: "tag_management"
      permission: "suppliers.categories.view"
      description: "Grouping by type: raw_materials, services, logistics, etc."
      table_columns:
        - { key: "name", label: "Category Name", type: "text", sortable: true }
        - { key: "description", label: "Description", type: "text" }
        - { key: "supplier_count", label: "Suppliers", type: "integer", sortable: true }
        - { key: "created_at", label: "Created", type: "datetime" }
      predefined_categories: ["raw_materials", "services", "logistics", "technology", "office_supplies", "utilities", "professional_services", "marketing", "other"]
      actions:
        - { id: "create_category", label: "New Category", icon: "add", type: "button_primary" }
      create_form:
        fields:
          - { key: "name", label: "Category Name", type: "text", required: true, max_length: 100 }
          - { key: "description", label: "Description", type: "textarea", required: false, max_length: 500 }

    supplier_balances:
      route: "/app/suppliers/balances"
      title: "Supplier Balances"
      layout: "table_with_filters"
      permission: "suppliers.balances.view"
      default_sort: "balance_due desc"
      table_columns:
        - { key: "supplier_number", label: "Supplier #", clickable: true, click_action: { type: "navigate", target: "/app/suppliers/{id}" } }
        - { key: "full_name", label: "Name", type: "text", sortable: true }
        - { key: "total_ordered", label: "Total Ordered", type: "currency", sortable: true }
        - { key: "total_paid", label: "Total Paid", type: "currency", sortable: true }
        - { key: "balance_due", label: "Balance Due", type: "currency", sortable: true, color_rule: "red if > 0" }
        - { key: "overdue_amount", label: "Overdue", type: "currency", color_rule: "red if > 0" }
      filters:
        - { key: "balance_due_min", label: "Min Balance", type: "decimal" }
        - { key: "has_overdue", label: "Has Overdue", type: "checkbox" }
        - { key: "search", label: "Search", type: "text" }
      actions:
        - { id: "export", label: "Export", icon: "download", action: "export", formats: ["csv","xlsx","pdf"] }

    supplier_documents:
      route: "/app/suppliers/documents"
      title: "Supplier Documents"
      layout: "table_with_filters"
      permission: "suppliers.documents.view"
      description: "All expense documents across all suppliers."
      table_columns:
        - { key: "document_number", label: "Doc #", clickable: true, click_action: { type: "navigate", target: "/app/finance/expense-documents/{id}" } }
        - { key: "document_type", label: "Type", type: "enum_badge" }
        - { key: "supplier_name", label: "Supplier", clickable: true, click_action: { type: "navigate", target: "/app/suppliers/{supplier_id}" } }
        - { key: "document_date", label: "Date", type: "date", sortable: true }
        - { key: "total_amount", label: "Amount", type: "currency", sortable: true }
        - { key: "balance_due", label: "Balance", type: "currency" }
        - { key: "status_id", label: "Status", type: "enum_badge" }
      filters:
        - { key: "supplier_id", label: "Supplier", type: "searchable_select", data_source: "suppliers" }
        - { key: "date_range", label: "Date", type: "date_range" }
        - { key: "status_id", label: "Status", type: "multi_select" }

    supplier_performance:
      route: "/app/suppliers/performance"
      title: "Supplier Performance"
      layout: "table_with_filters"
      permission: "suppliers.performance.view"
      description: "Comparative performance metrics across all suppliers."
      table_columns:
        - { key: "supplier_number", label: "Supplier #", clickable: true, click_action: { type: "navigate", target: "/app/suppliers/{id}" } }
        - { key: "full_name", label: "Name", type: "text", sortable: true }
        - { key: "delivery_on_time_percent", label: "On-Time %", type: "percentage", sortable: true, color_rule: "green >= 95, orange >= 80, red < 80" }
        - { key: "quality_score", label: "Quality", type: "percentage", sortable: true, color_rule: "green >= 90, orange >= 70, red < 70" }
        - { key: "average_response_time", label: "Avg Response (days)", type: "decimal", sortable: true }
        - { key: "total_orders", label: "Orders", type: "integer", sortable: true }
        - { key: "total_value", label: "Total Value", type: "currency", sortable: true }
        - { key: "defect_rate", label: "Defect Rate", type: "percentage", sortable: true }
      filters:
        - { key: "category_id", label: "Category", type: "multi_select", data_source: "supplier_categories" }
        - { key: "date_range", label: "Period", type: "date_range" }
        - { key: "search", label: "Search", type: "text" }
      actions:
        - { id: "export", label: "Export", icon: "download", action: "export", formats: ["csv","xlsx","pdf"] }

# ============================================================================
# MODULE 6: PRODUCTS & SERVICES
# ============================================================================
module_6_products:
  id: 6
  name: "Products & Services"
  icon: "inventory_2"
  route: "/app/products"
  description: "Full catalog management with categories, price lists, units of measure, bundles, and service definitions."
  permissions: { view: "products.view", create: "products.create", edit: "products.edit", delete: "products.delete" }
  submenus:
    - { id: "catalog", label: "Catalog", icon: "inventory_2", route: "/app/products" }
    - { id: "categories", label: "Categories", icon: "category", route: "/app/products/categories" }
    - { id: "price_lists", label: "Price Lists", icon: "sell", route: "/app/products/price-lists" }
    - { id: "units_of_measure", label: "Units of Measure", icon: "straighten", route: "/app/products/units" }
    - { id: "bundles", label: "Bundles", icon: "inventory", route: "/app/products/bundles" }
    - { id: "service_definitions", label: "Services", icon: "miscellaneous_services", route: "/app/products/services" }

  entities:
    products:
      table_name: "products"
      primary_key: "id"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "sku", type: "string", max_length: 50, required: true, unique: true, label: "SKU" }
        - { key: "name", type: "string", max_length: 255, required: true, label: "Name" }
        - { key: "description", type: "text", required: false, label: "Description" }
        - { key: "product_type", type: "enum", enum_values: ["physical","service","bundle"], required: true, label: "Type" }
        - { key: "category_id", type: "uuid", foreign_key: "categories.id", required: false, label: "Category" }
        - { key: "unit_of_measure_id", type: "uuid", foreign_key: "units_of_measure.id", required: false, label: "Unit" }
        - { key: "default_price", type: "decimal", precision: 2, required: true, label: "Default Price" }
        - { key: "cost_price", type: "decimal", precision: 2, required: false, label: "Cost Price" }
        - { key: "tax_rate", type: "decimal", precision: 2, required: true, label: "Tax Rate %" }
        - { key: "min_stock_level", type: "integer", required: false, nullable: true, label: "Min Stock Level" }
        - { key: "is_active", type: "boolean", default: true, label: "Active" }
        - { key: "barcode", type: "string", max_length: 100, required: false, nullable: true, label: "Barcode" }
        - { key: "weight", type: "decimal", precision: 3, required: false, nullable: true, label: "Weight (kg)" }
        - { key: "dimensions", type: "string", max_length: 100, required: false, nullable: true, label: "Dimensions (LxWxH)" }
        - { key: "image_url", type: "string", max_length: 500, required: false, nullable: true, label: "Image URL" }
        - { key: "created_at", type: "datetime", auto_generated: true }
        - { key: "updated_at", type: "datetime", auto_generated: true, auto_updated: true }

    categories:
      table_name: "categories"
      primary_key: "id"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "name", type: "string", max_length: 100, required: true, label: "Name" }
        - { key: "parent_category_id", type: "uuid", foreign_key: "categories.id", nullable: true, label: "Parent Category (self-ref)" }
        - { key: "description", type: "text", required: false, label: "Description" }
        - { key: "is_active", type: "boolean", default: true, label: "Active" }
        - { key: "sort_order", type: "integer", required: true, default: 0, label: "Sort Order" }

    price_lists:
      table_name: "price_lists"
      primary_key: "id"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "name", type: "string", max_length: 100, required: true, label: "Name" }
        - { key: "description", type: "text", required: false, label: "Description" }
        - { key: "currency", type: "string", max_length: 3, required: true, label: "Currency" }
        - { key: "effective_from", type: "date", required: true, label: "Effective From" }
        - { key: "effective_to", type: "date", required: false, nullable: true, label: "Effective To" }
        - { key: "is_default", type: "boolean", default: false, label: "Default" }
        - { key: "is_active", type: "boolean", default: true, label: "Active" }
        - { key: "created_at", type: "datetime", auto_generated: true }

    price_list_items:
      table_name: "price_list_items"
      primary_key: "id"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "price_list_id", type: "uuid", foreign_key: "price_lists.id", required: true }
        - { key: "product_id", type: "uuid", foreign_key: "products.id", required: true }
        - { key: "price", type: "decimal", precision: 2, required: true, label: "Price" }
        - { key: "min_quantity", type: "integer", default: 1, label: "Min Quantity" }
        - { key: "created_at", type: "datetime", auto_generated: true }

    units_of_measure:
      table_name: "units_of_measure"
      primary_key: "id"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "name", type: "string", max_length: 50, required: true, label: "Name" }
        - { key: "abbreviation", type: "string", max_length: 10, required: true, label: "Abbreviation" }
        - { key: "is_active", type: "boolean", default: true, label: "Active" }

    bundles:
      table_name: "bundles"
      primary_key: "id"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "name", type: "string", max_length: 255, required: true, label: "Bundle Name" }
        - { key: "description", type: "text", required: false, label: "Description" }
        - { key: "bundle_price", type: "decimal", precision: 2, required: true, label: "Bundle Price" }
        - { key: "is_active", type: "boolean", default: true, label: "Active" }
        - { key: "created_at", type: "datetime", auto_generated: true }

    bundle_items:
      table_name: "bundle_items"
      primary_key: "id"
      fields:
        - { key: "id", type: "uuid", primary_key: true, auto_generated: true }
        - { key: "bundle_id", type: "uuid", foreign_key: "bundles.id", required: true }
        - { key: "product_id", type: "uuid", foreign_key: "products.id", required: true }
        - { key: "quantity", type: "decimal", precision: 3, required: true }
        - { key: "sort_order", type: "integer", required: true, default: 0 }

  pages:
    catalog_list:
      route: "/app/products"
      title: "Product & Service Catalog"
      layout: "table_with_filters"
      permission: "products.view"
      default_sort: "name asc"
      table_columns:
        - { key: "image_url", label: "", type: "thumbnail", width: "50px" }
        - { key: "sku", label: "SKU", type: "text", sortable: true }
        - { key: "name", label: "Name", type: "text", sortable: true, clickable: true, click_action: { type: "navigate", target: "/app/products/{id}" } }
        - { key: "product_type", label: "Type", type: "enum_badge", colors: { physical: "blue", service: "green", bundle: "purple" }, sortable: true }
        - { key: "category_name", label: "Category", type: "text", sortable: true }
        - { key: "default_price", label: "Price", type: "currency", sortable: true }
        - { key: "cost_price", label: "Cost", type: "currency", sortable: true }
        - { key: "margin", label: "Margin", type: "percentage", calculated: "((default_price - cost_price) / default_price) * 100", sortable: true }
        - { key: "tax_rate", label: "Tax %", type: "percentage" }
        - { key: "current_stock", label: "Stock", type: "integer", visible_when: "product_type='physical'", color_rule: "red if <= min_stock_level" }
        - { key: "is_active", label: "Active", type: "boolean_icon", sortable: true }
        - { key: "barcode", label: "Barcode", type: "text" }
      filters:
        - { key: "product_type", label: "Type", type: "multi_select", options: ["physical","service","bundle"] }
        - { key: "category_id", label: "Category", type: "tree_select", data_source: "categories" }
        - { key: "is_active", label: "Active Only", type: "checkbox", default: true }
        - { key: "price_min", label: "Min Price", type: "decimal" }
        - { key: "price_max", label: "Max Price", type: "decimal" }
        - { key: "low_stock", label: "Low Stock Only", type: "checkbox" }
        - { key: "search", label: "Search", type: "text", placeholder: "Search by name, SKU, barcode...", search_fields: ["name","sku","barcode","description"] }
      actions:
        - { id: "create_product", label: "New Product", icon: "add", type: "button_primary", action: "navigate", target: "/app/products/create" }
        - { id: "import", label: "Import", icon: "upload", type: "button_secondary", action: "navigate", target: "/app/products/import" }
        - { id: "export", label: "Export", icon: "download", type: "button_secondary", action: "export", formats: ["csv","xlsx"] }
        - { id: "bulk_activate", label: "Activate", type: "bulk_action", requires_selection: true }
        - { id: "bulk_deactivate", label: "Deactivate", type: "bulk_action", requires_selection: true }

    catalog_create:
      route: "/app/products/create"
      title: "Create Product / Service"
      layout: "form"
      permission: "products.create"
      form_fields:
        - { key: "product_type", label: "Product Type", type: "select", required: true, options: [{value: "physical", label: "Physical Product"},{value: "service", label: "Service"},{value: "bundle", label: "Bundle"}], grid_column: "1/2" }
        - { key: "sku", label: "SKU", type: "text", required: true, max_length: 50, unique: true, grid_column: "2/2" }
        - { key: "name", label: "Product Name", type: "text", required: true, max_length: 255, grid_column: "1/1" }
        - { key: "description", label: "Description", type: "textarea", required: false, max_length: 5000, rows: 3, grid_column: "1/1" }
        - { key: "category_id", label: "Category", type: "tree_select", data_source: "categories", required: false, grid_column: "1/2" }
        - { key: "unit_of_measure_id", label: "Unit of Measure", type: "select", data_source: "units_of_measure", display_field: "name + ' (' + abbreviation + ')'", required: false, grid_column: "2/2" }
        - { key: "default_price", label: "Default Price", type: "decimal", required: true, precision: 2, min: 0, grid_column: "1/3" }
        - { key: "cost_price", label: "Cost Price", type: "decimal", required: false, precision: 2, min: 0, grid_column: "2/3" }
        - { key: "tax_rate", label: "Tax Rate (%)", type: "decimal", required: true, precision: 2, min: 0, max: 100, grid_column: "3/3" }
        - { key: "min_stock_level", label: "Min Stock Level", type: "integer", required: false, min: 0, visible_when: "product_type='physical'", grid_column: "1/3" }
        - { key: "barcode", label: "Barcode", type: "text", required: false, max_length: 100, visible_when: "product_type='physical'", grid_column: "2/3" }
        - { key: "weight", label: "Weight (kg)", type: "decimal", required: false, precision: 3, visible_when: "product_type='physical'", grid_column: "3/3" }
        - { key: "dimensions", label: "Dimensions (LxWxH cm)", type: "text", required: false, max_length: 100, visible_when: "product_type='physical'", grid_column: "1/2" }
        - { key: "image_url", label: "Product Image", type: "image_upload", required: false, max_size_mb: 5, grid_column: "2/2" }
        - { key: "is_active", label: "Active", type: "checkbox", default: true, grid_column: "1/2" }
      actions:
        - { id: "save", label: "Create Product", type: "submit", color: "primary", action: "api_call", target: "POST /api/products", on_success: "navigate", success_target: "/app/products/{id}" }
        - { id: "save_and_new", label: "Save & Create Another", type: "submit", color: "secondary", on_success: "reset_form" }
        - { id: "cancel", label: "Cancel", type: "cancel", action: "navigate", target: "/app/products" }

    catalog_edit:
      route: "/app/products/{id}/edit"
      title: "Edit Product / Service"
      layout: "form"
      permission: "products.edit"
      data_source: "GET /api/products/{id}"
      note: "Same fields as create form, pre-populated."

    catalog_details:
      route: "/app/products/{id}"
      title: "Product Details"
      layout: "detail_with_tabs"
      permission: "products.view"
      data_source: "GET /api/products/{id}"
      header:
        title_field: "name"
        subtitle_field: "sku"
        status_badge_field: "product_type"
        meta_fields:
          - { key: "default_price", label: "Price", type: "currency" }
          - { key: "category_name", label: "Category" }
          - { key: "is_active", label: "Active", type: "boolean_badge" }
      header_actions:
        - { id: "edit", label: "Edit", icon: "edit", type: "button_primary", action: "navigate", target: "/app/products/{id}/edit" }
        - { id: "duplicate", label: "Duplicate", icon: "content_copy", type: "button_secondary", action: "api_call", target: "POST /api/products/{id}/duplicate" }
        - { id: "toggle_active", label: "Deactivate", icon: "block", type: "button_warning", action: "api_call", target: "PATCH /api/products/{id}", payload: { "is_active": false }, visible_when: "is_active = true" }
        - { id: "delete", label: "Delete", icon: "delete", type: "button_danger", action: "api_call", target: "DELETE /api/products/{id}", confirmation: "Delete this product?" }
      tabs:
        - id: "details"
          label: "Details"
          icon: "info"
          content:
            layout: "two_column"
            left_column:
              - section: "Product Information"
                fields:
                  - { key: "name", label: "Name" }
                  - { key: "sku", label: "SKU" }
                  - { key: "product_type", label: "Type", type: "enum_badge" }
                  - { key: "description", label: "Description", type: "rich_text" }
                  - { key: "category_name", label: "Category" }
                  - { key: "unit_name", label: "Unit of Measure" }
                  - { key: "is_active", label: "Active", type: "boolean" }
              - section: "Physical Properties"
                visible_when: "product_type = 'physical'"
                fields:
                  - { key: "barcode", label: "Barcode" }
                  - { key: "weight", label: "Weight (kg)" }
                  - { key: "dimensions", label: "Dimensions" }
                  - { key: "min_stock_level", label: "Min Stock Level" }
                  - { key: "current_stock", label: "Current Stock" }
            right_column:
              - section: "Pricing"
                fields:
                  - { key: "default_price", label: "Default Price", type: "currency" }
                  - { key: "cost_price", label: "Cost Price", type: "currency" }
                  - { key: "margin", label: "Margin", type: "percentage", calculated: "((default_price-cost_price)/default_price)*100" }
                  - { key: "tax_rate", label: "Tax Rate", type: "percentage" }
              - section: "Image"
                fields:
                  - { key: "image_url", label: "", type: "image" }
              - section: "System"
                fields:
                  - { key: "created_at", label: "Created", type: "datetime" }
                  - { key: "updated_at", label: "Updated", type: "datetime" }
        - id: "price_lists"
          label: "Price Lists"
          icon: "sell"
          content:
            layout: "table"
            data_source: "GET /api/products/price-list-items?product_id={id}"
            table_columns:
              - { key: "price_list_name", label: "Price List", clickable: true, click_action: { type: "navigate", target: "/app/products/price-lists/{price_list_id}" } }
              - { key: "currency", label: "Currency" }
              - { key: "price", label: "Price", type: "currency" }
              - { key: "min_quantity", label: "Min Qty", type: "integer" }
              - { key: "effective_from", label: "From", type: "date" }
              - { key: "effective_to", label: "To", type: "date" }
        - id: "stock_movements"
          label: "Stock"
          icon: "inventory"
          visible_when: "product_type = 'physical'"
          content:
            layout: "table"
            data_source: "GET /api/inventory/movements?product_id={id}"
            table_columns:
              - { key: "date", label: "Date", type: "datetime", sortable: true }
              - { key: "movement_type", label: "Type", type: "enum_badge", colors: { in: "green", out: "red", adjustment: "orange" } }
              - { key: "quantity", label: "Qty", type: "decimal" }
              - { key: "reference", label: "Reference", type: "text" }
              - { key: "balance_after", label: "Balance After", type: "decimal" }
        - id: "sales_history"
          label: "Sales History"
          icon: "trending_up"
          content:
            layout: "table"
            data_source: "GET /api/sales/sales-order-items?product_id={id}"
            table_columns:
              - { key: "order_number", label: "Order #", clickable: true, click_action: { type: "navigate", target: "/app/sales/sales-orders/{sales_order_id}" } }
              - { key: "customer_name", label: "Customer" }
              - { key: "quantity", label: "Qty", type: "decimal" }
              - { key: "unit_price", label: "Price", type: "currency" }
              - { key: "line_total", label: "Total", type: "currency" }
              - { key: "order_date", label: "Date", type: "date", sortable: true }
        - { id: "files", label: "Files", icon: "attach_file", content: { layout: "file_grid", data_source: "GET /api/files?entity_type=product&entity_id={id}" } }
        - { id: "activity_log", label: "Activity Log", icon: "history", content: { layout: "timeline", data_source: "GET /api/activity-log?entity_type=product&entity_id={id}" } }

    categories_list:
      route: "/app/products/categories"
      title: "Product Categories"
      layout: "tree_table"
      permission: "products.categories.view"
      tree_config:
        parent_field: "parent_category_id"
        sortable: true
        drag_and_drop_reorder: true
      table_columns:
        - { key: "name", label: "Category Name", type: "text", sortable: true, clickable: true, click_action: { type: "navigate", target: "/app/products/categories/{id}" } }
        - { key: "description", label: "Description", type: "text" }
        - { key: "product_count", label: "Products", type: "integer" }
        - { key: "is_active", label: "Active", type: "boolean_icon" }
        - { key: "sort_order", label: "Order", type: "integer" }
      actions:
        - { id: "create_category", label: "New Category", icon: "add", type: "button_primary" }
      create_form:
        fields:
          - { key: "name", label: "Category Name", type: "text", required: true, max_length: 100 }
          - { key: "parent_category_id", label: "Parent Category", type: "tree_select", data_source: "categories", required: false, nullable: true }
          - { key: "description", label: "Description", type: "textarea", required: false }
          - { key: "is_active", label: "Active", type: "checkbox", default: true }
          - { key: "sort_order", label: "Sort Order", type: "integer", default: 0 }

    price_lists_list:
      route: "/app/products/price-lists"
      title: "Price Lists"
      layout: "table_with_filters"
      permission: "products.price_lists.view"
      default_sort: "created_at desc"
      table_columns:
        - { key: "name", label: "Price List Name", type: "text", sortable: true, clickable: true, click_action: { type: "navigate", target: "/app/products/price-lists/{id}" } }
        - { key: "description", label: "Description", type: "text" }
        - { key: "currency", label: "Currency", type: "text" }
        - { key: "effective_from", label: "From", type: "date", sortable: true }
        - { key: "effective_to", label: "To", type: "date" }
        - { key: "item_count", label: "Items", type: "integer" }
        - { key: "is_default", label: "Default", type: "boolean_icon" }
        - { key: "is_active", label: "Active", type: "boolean_icon" }
      filters:
        - { key: "is_active", label: "Active Only", type: "checkbox", default: true }
        - { key: "currency", label: "Currency", type: "select" }
      actions:
        - { id: "create_price_list", label: "New Price List", icon: "add", type: "button_primary", action: "navigate", target: "/app/products/price-lists/create" }
      create_form:
        fields:
          - { key: "name", label: "Name", type: "text", required: true, max_length: 100 }
          - { key: "description", label: "Description", type: "textarea", required: false }
          - { key: "currency", label: "Currency", type: "currency_select", required: true }
          - { key: "effective_from", label: "Effective From", type: "date", required: true }
          - { key: "effective_to", label: "Effective To", type: "date", required: false }
          - { key: "is_default", label: "Set as Default", type: "checkbox", default: false }
          - { key: "is_active", label: "Active", type: "checkbox", default: true }

    price_lists_details:
      route: "/app/products/price-lists/{id}"
      title: "Price List Details"
      layout: "detail_with_tabs"
      permission: "products.price_lists.view"
      data_source: "GET /api/products/price-lists/{id}?include=items"
      header:
        title_field: "name"
        meta_fields: [{ key: "currency" }, { key: "effective_from", type: "date" }, { key: "effective_to", type: "date" }, { key: "is_default", type: "boolean_badge" }]
      tabs:
        - id: "items"
          label: "Price Items"
          icon: "list"
          content:
            layout: "editable_table"
            data_source: "GET /api/products/price-list-items?price_list_id={id}"
            table_columns:
              - { key: "product_name", label: "Product", type: "text", clickable: true, click_action: { type: "navigate", target: "/app/products/{product_id}" } }
              - { key: "product_sku", label: "SKU", type: "text" }
              - { key: "price", label: "Price", type: "currency", editable: true }
              - { key: "min_quantity", label: "Min Qty", type: "integer", editable: true }
            actions:
              - { id: "add_item", label: "Add Product", icon: "add", type: "button_primary" }
              - { id: "import_items", label: "Import Prices", icon: "upload", type: "button_secondary" }

    units_of_measure_list:
      route: "/app/products/units"
      title: "Units of Measure"
      layout: "simple_table"
      permission: "products.units.view"
      table_columns:
        - { key: "name", label: "Unit Name", type: "text", sortable: true }
        - { key: "abbreviation", label: "Abbreviation", type: "text" }
        - { key: "product_count", label: "Used By", type: "integer" }
        - { key: "is_active", label: "Active", type: "boolean_icon" }
      actions:
        - { id: "create_unit", label: "New Unit", icon: "add", type: "button_primary" }
      create_form:
        fields:
          - { key: "name", label: "Unit Name", type: "text", required: true, max_length: 50, placeholder: "e.g. Kilogram" }
          - { key: "abbreviation", label: "Abbreviation", type: "text", required: true, max_length: 10, placeholder: "e.g. kg" }
          - { key: "is_active", label: "Active", type: "checkbox", default: true }

    bundles_list:
      route: "/app/products/bundles"
      title: "Product Bundles"
      layout: "table_with_filters"
      permission: "products.bundles.view"
      default_sort: "name asc"
      table_columns:
        - { key: "name", label: "Bundle Name", type: "text", sortable: true, clickable: true, click_action: { type: "navigate", target: "/app/products/bundles/{id}" } }
        - { key: "description", label: "Description", type: "text" }
        - { key: "bundle_price", label: "Bundle Price", type: "currency", sortable: true }
        - { key: "items_total", label: "Items Total", type: "currency", calculated: "SUM(bundle_items.product.default_price * bundle_items.quantity)" }
        - { key: "savings", label: "Savings", type: "currency", calculated: "items_total - bundle_price" }
        - { key: "item_count", label: "Items", type: "integer" }
        - { key: "is_active", label: "Active", type: "boolean_icon" }
      filters:
        - { key: "is_active", label: "Active Only", type: "checkbox", default: true }
        - { key: "search", label: "Search", type: "text" }
      actions:
        - { id: "create_bundle", label: "New Bundle", icon: "add", type: "button_primary", action: "navigate", target: "/app/products/bundles/create" }

    bundles_create:
      route: "/app/products/bundles/create"
      title: "Create Bundle"
      layout: "form_with_line_items"
      permission: "products.bundles.create"
      form_fields:
        - { key: "name", label: "Bundle Name", type: "text", required: true, max_length: 255, grid_column: "1/2" }
        - { key: "bundle_price", label: "Bundle Price", type: "decimal", required: true, precision: 2, min: 0, grid_column: "2/2" }
        - { key: "description", label: "Description", type: "textarea", required: false, max_length: 2000, rows: 3, grid_column: "1/1" }
        - { key: "is_active", label: "Active", type: "checkbox", default: true, grid_column: "1/2" }
      line_items:
        entity: "bundle_items"
        label: "Bundle Items"
        add_button_label: "Add Product"
        columns:
          - { key: "product_id", label: "Product", type: "searchable_select", data_source: "products", display_field: "name", required: true, width: "40%" }
          - { key: "quantity", label: "Quantity", type: "decimal", required: true, precision: 3, default: 1, width: "20%" }
          - { key: "product_price", label: "Unit Price", type: "currency", read_only: true, auto_fill_from: "product.default_price", width: "20%" }
          - { key: "subtotal", label: "Subtotal", type: "currency", calculated: "quantity * product_price", read_only: true, width: "20%" }
        row_actions: ["move_up", "move_down", "remove"]
      actions:
        - { id: "save", label: "Create Bundle", type: "submit", color: "primary", action: "api_call", target: "POST /api/products/bundles", on_success: "navigate", success_target: "/app/products/bundles/{id}" }
        - { id: "cancel", label: "Cancel", type: "cancel", action: "navigate", target: "/app/products/bundles" }

    bundles_details:
      route: "/app/products/bundles/{id}"
      title: "Bundle Details"
      layout: "detail_with_tabs"
      permission: "products.bundles.view"
      data_source: "GET /api/products/bundles/{id}?include=items"
      header:
        title_field: "name"
        meta_fields: [{ key: "bundle_price", label: "Price", type: "currency" }, { key: "is_active", label: "Active", type: "boolean_badge" }]
      header_actions:
        - { id: "edit", label: "Edit", icon: "edit", type: "button_primary", action: "navigate", target: "/app/products/bundles/{id}/edit" }
        - { id: "delete", label: "Delete", icon: "delete", type: "button_danger", action: "api_call", target: "DELETE /api/products/bundles/{id}" }
      tabs:
        - id: "items"
          label: "Bundle Items"
          icon: "list"
          content:
            table_columns:
              - { key: "product_name", label: "Product", clickable: true, click_action: { type: "navigate", target: "/app/products/{product_id}" } }
              - { key: "product_sku", label: "SKU" }
              - { key: "quantity", label: "Qty", type: "decimal" }
              - { key: "unit_price", label: "Unit Price", type: "currency" }
              - { key: "subtotal", label: "Subtotal", type: "currency", calculated: "quantity * unit_price" }
        - { id: "activity_log", label: "Activity Log", icon: "history", content: { layout: "timeline", data_source: "GET /api/activity-log?entity_type=bundle&entity_id={id}" } }

    service_definitions:
      route: "/app/products/services"
      title: "Service Definitions"
      layout: "table_with_filters"
      permission: "products.services.view"
      description: "Filtered view of products where product_type = 'service'."
      data_source: "GET /api/products?product_type=service"
      table_columns:
        - { key: "sku", label: "SKU", type: "text", sortable: true }
        - { key: "name", label: "Service Name", type: "text", sortable: true, clickable: true, click_action: { type: "navigate", target: "/app/products/{id}" } }
        - { key: "description", label: "Description", type: "text" }
        - { key: "category_name", label: "Category", type: "text" }
        - { key: "default_price", label: "Rate", type: "currency", sortable: true }
        - { key: "unit_name", label: "Unit", type: "text" }
        - { key: "tax_rate", label: "Tax %", type: "percentage" }
        - { key: "is_active", label: "Active", type: "boolean_icon" }
      filters:
        - { key: "category_id", label: "Category", type: "tree_select", data_source: "categories" }
        - { key: "is_active", label: "Active Only", type: "checkbox", default: true }
        - { key: "search", label: "Search", type: "text", placeholder: "Search services..." }
      actions:
        - { id: "create_service", label: "New Service", icon: "add", type: "button_primary", action: "navigate", target: "/app/products/create?product_type=service" }
        - { id: "export", label: "Export", icon: "download", type: "button_secondary", action: "export", formats: ["csv","xlsx"] }

# ============================================================================
# ASSUMPTIONS & NOTES
# ============================================================================
assumptions:
  - "All monetary values use the system's default currency unless a specific currency field is set on the entity."
  - "Auto-number sequences (customer_number, supplier_number, etc.) are configured in system settings and are sequential."
  - "The 'assigned_to' and 'created_by' fields reference the users table which is part of the System Administration module (not covered here)."
  - "File upload storage backend (S3, local, Azure Blob) is configured at the system level."
  - "Email sending requires SMTP or email service integration configured in system settings."
  - "Credit card processing requires a payment gateway integration (e.g., Stripe, PayPlus, etc.)."
  - "Activity log (audit trail) is automatically populated by database triggers or application middleware on every create, update, and delete operation."
  - "The 'balance_due' fields on customer and supplier list pages are computed views joining income/expense documents with payments."
  - "Inventory current_stock for products is maintained by the Inventory module (not covered in modules 1-6)."
  - "SLA tracking entity referenced in Dashboard alerts is part of the Projects or Support module."
  - "Contracts entity referenced in Dashboard alerts is part of a Contracts module."
  - "Follow-ups entity referenced in My Calendar is derived from activities with a follow_up_date field."
  - "All searchable_select fields support type-ahead with a minimum of 2 characters."
  - "Pagination is server-side with configurable page sizes: 10, 25, 50, 100."
  - "All date/time values are stored in UTC and displayed in the user's configured timezone."
  - "Permissions listed are granular RBAC permissions that can be assigned to roles."
