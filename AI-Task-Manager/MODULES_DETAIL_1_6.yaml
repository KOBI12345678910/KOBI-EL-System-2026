          click_action:
            type: "navigate"
            target: "/{account_type_route}/{id}"
        - key: "account_type"
          label: "Type"
          type: "enum_badge"
          enum_values: ["customer", "supplier"]
          colors:
            customer: "blue"
            supplier: "purple"
          sortable: true
        - key: "full_name"
          label: "Name"
          type: "text"
          sortable: true
        - key: "company_name"
          label: "Company"
          type: "text"
          sortable: true
        - key: "phone"
          label: "Phone"
          type: "phone"
          clickable: true
          click_action: { type: "tel" }
        - key: "email"
          label: "Email"
          type: "email"
          clickable: true
          click_action: { type: "mailto" }
        - key: "city"
          label: "City"
          type: "text"
          sortable: true
        - key: "total_contacts"
          label: "Contacts"
          type: "integer"
        - key: "total_activities"
          label: "Activities"
          type: "integer"
        - key: "last_interaction"
          label: "Last Interaction"
          type: "relative_time"
          sortable: true
        - key: "status_id"
          label: "Status"
          type: "enum_badge"
          sortable: true

      filters:
        - key: "account_type"
          label: "Account Type"
          type: "multi_select"
          options: ["customer", "supplier"]
        - key: "status_id"
          label: "Status"
          type: "multi_select"
          options: ["active", "inactive", "suspended"]
        - key: "city"
          label: "City"
          type: "text"
        - key: "search"
          label: "Search"
          type: "text"
          placeholder: "Search by name, company, phone, email..."

      actions:
        - id: "create_customer"
          label: "New Customer"
          icon: "person_add"
          type: "button_primary"
          action: "navigate"
          target: "/app/customers/create"
        - id: "create_supplier"
          label: "New Supplier"
          icon: "business"
