# ============================================================================
# ERP SYSTEM - DETAILED MODULE SPECIFICATION (MODULES 1-6)
# Generated: 2026-04-08
# Scope: Dashboard, CRM, Sales, Customers, Suppliers, Products & Services
# Every page, form field, table column, action, tab, and navigation target
# is fully specified. Nothing is deferred or abbreviated.
# ============================================================================

system:
  name: "Enterprise ERP System"
  version: "2.0"
  modules_covered: [1, 2, 3, 4, 5, 6]
  base_url: "/app"
  default_pagination: 25
  default_sort_direction: "desc"
  date_format: "YYYY-MM-DD"
  datetime_format: "YYYY-MM-DD HH:mm:ss"
  currency_format: "###,###,##0.00"
  decimal_precision: 2

# ============================================================================
# MODULE 1: DASHBOARD
# ============================================================================
module_1_dashboard:
  id: 1
  name: "Dashboard"
  icon: "dashboard"
  route: "/app/dashboard"
  description: "Central command center providing executive overview, personal workspace, alerts, activity feed, and quick-action launchers."
  permissions:
    view: "dashboard.view"
    customize: "dashboard.customize"

  # --------------------------------------------------------------------------
  # SECTION 1.1: EXECUTIVE OVERVIEW
  # --------------------------------------------------------------------------
  executive_overview:
    route: "/app/dashboard/executive-overview"
    description: "Top-level KPI cards showing real-time financial and operational metrics for the current month."
    layout: "grid_4x2"
    refresh_interval_seconds: 300

    kpi_cards:
      - id: "total_revenue_mtd"
        label: "Total Revenue (MTD)"
        description: "Sum of all finalized income documents (invoices, receipts, invoice-receipts) for the current calendar month."
        data_source: "income_documents"
        aggregation: "SUM(total_amount) WHERE document_date >= first_day_of_current_month AND document_date <= today AND status_id IN ('finalized','paid')"
        display_format: "currency"
        currency_source: "system_settings.default_currency"
        icon: "trending_up"
        color: "green"
        click_action:
          type: "navigate"
          target: "/app/finance/income-documents?date_from={first_day_of_current_month}&date_to={today}"
        comparison:
          type: "previous_period"
          label: "vs. Last Month"
          calculation: "percentage_change"
          positive_direction: "up"

      - id: "total_expenses_mtd"
        label: "Total Expenses (MTD)"
        description: "Sum of all finalized expense documents for the current calendar month."
        data_source: "expense_documents"
        aggregation: "SUM(total_amount) WHERE document_date >= first_day_of_current_month AND document_date <= today AND status_id IN ('finalized','paid')"
        display_format: "currency"
        currency_source: "system_settings.default_currency"
        icon: "trending_down"
        color: "red"
        click_action:
          type: "navigate"
          target: "/app/finance/expense-documents?date_from={first_day_of_current_month}&date_to={today}"
        comparison:
          type: "previous_period"
          label: "vs. Last Month"
          calculation: "percentage_change"
          positive_direction: "down"

      - id: "net_profit_mtd"
        label: "Net Profit (MTD)"
        description: "Total Revenue MTD minus Total Expenses MTD."
        data_source: "calculated"
        aggregation: "total_revenue_mtd - total_expenses_mtd"
        display_format: "currency"
        currency_source: "system_settings.default_currency"
        icon: "account_balance"
        color: "dynamic"
        color_rule: "green if value >= 0, red if value < 0"
        click_action:
          type: "navigate"
          target: "/app/reports/profit-and-loss?period=current_month"
        comparison:
          type: "previous_period"
          label: "vs. Last Month"
          calculation: "percentage_change"
          positive_direction: "up"

      - id: "open_receivables"
        label: "Open Receivables"
        description: "Total outstanding balance on all unpaid or partially paid customer invoices."
        data_source: "income_documents"
        aggregation: "SUM(balance_due) WHERE status_id IN ('sent','partially_paid','overdue')"
        display_format: "currency"
        currency_source: "system_settings.default_currency"
        icon: "payments"
        color: "orange"
        click_action:
          type: "navigate"
          target: "/app/finance/income-documents?status=sent,partially_paid,overdue"
        comparison:
          type: "previous_period"
          label: "vs. Last Month"
          calculation: "absolute_change"
          positive_direction: "down"

      - id: "open_payables"
        label: "Open Payables"
        description: "Total outstanding balance on all unpaid or partially paid supplier invoices."
        data_source: "expense_documents"
        aggregation: "SUM(balance_due) WHERE status_id IN ('received','partially_paid','overdue')"
        display_format: "currency"
        currency_source: "system_settings.default_currency"
        icon: "receipt_long"
        color: "orange"
        click_action:
          type: "navigate"
          target: "/app/finance/expense-documents?status=received,partially_paid,overdue"
        comparison:
          type: "previous_period"
          label: "vs. Last Month"
          calculation: "absolute_change"
          positive_direction: "down"

      - id: "active_projects"
        label: "Active Projects"
        description: "Count of projects with status_id = 'active'."
        data_source: "projects"
        aggregation: "COUNT(*) WHERE status_id = 'active'"
        display_format: "integer"
        icon: "folder_open"
        color: "blue"
        click_action:
          type: "navigate"
          target: "/app/projects?status=active"
        comparison:
          type: "previous_period"
          label: "vs. Last Month"
          calculation: "absolute_change"
          positive_direction: "up"

      - id: "pending_approvals"
        label: "Pending Approvals"
        description: "Count of all approval workflow items awaiting action by the current user."
        data_source: "approval_workflows"
        aggregation: "COUNT(*) WHERE approver_id = {current_user_id} AND status_id = 'pending'"
        display_format: "integer"
        icon: "pending_actions"
        color: "yellow"
        click_action:
          type: "navigate"
          target: "/app/dashboard/my-approvals"
        comparison:
          type: "none"

      - id: "overdue_tasks"
        label: "Overdue Tasks"
        description: "Count of tasks where due_date < today AND status_id NOT IN ('completed','cancelled')."
        data_source: "tasks"
        aggregation: "COUNT(*) WHERE due_date < today AND status_id NOT IN ('completed','cancelled')"
        display_format: "integer"
        icon: "warning"
        color: "red"
        click_action:
          type: "navigate"
          target: "/app/dashboard/my-tasks?filter=overdue"
        comparison:
          type: "none"

  # --------------------------------------------------------------------------
  # SECTION 1.2: PERSONAL WORKSPACE
  # --------------------------------------------------------------------------
  personal_workspace:
    route: "/app/dashboard/personal-workspace"
    description: "User-specific area showing tasks, approvals, calendar, and recently accessed items."

    # -- 1.2.1 My Tasks --
    my_tasks:
      route: "/app/dashboard/my-tasks"
      description: "List of all tasks assigned to or created by the current user."
      layout: "table_with_filters"
      default_sort: "due_date asc"
      default_filter: "status_id NOT IN ('completed','cancelled')"

      table_columns:
        - key: "subject"
          label: "Subject"
          type: "text"
          sortable: true
          clickable: true
          click_action:
            type: "navigate"
            target: "/app/tasks/{id}"
        - key: "entity_type"
          label: "Related To"
          type: "text"
          sortable: true
          display: "entity_type + ': ' + entity_name"
          clickable: true
          click_action:
            type: "navigate"
            target: "/{entity_type_route}/{entity_id}"
        - key: "due_date"
          label: "Due Date"
          type: "date"
          sortable: true
          highlight_rule: "red if due_date < today AND status_id NOT IN ('completed','cancelled')"
        - key: "priority"
          label: "Priority"
          type: "enum_badge"
          enum_values: ["low", "medium", "high", "urgent"]
          colors:
            low: "gray"
            medium: "blue"
            high: "orange"
            urgent: "red"
          sortable: true
        - key: "status_id"
          label: "Status"
          type: "enum_badge"
          enum_values: ["not_started", "in_progress", "waiting", "completed", "cancelled"]
          colors:
            not_started: "gray"
            in_progress: "blue"
            waiting: "yellow"
            completed: "green"
            cancelled: "red"
          sortable: true
        - key: "assigned_to"
          label: "Assigned To"
          type: "user_avatar_name"
          sortable: true
        - key: "created_at"
          label: "Created"
          type: "datetime"
          sortable: true

      filters:
        - key: "status_id"
          label: "Status"
          type: "multi_select"
          options: ["not_started", "in_progress", "waiting", "completed", "cancelled"]
          default: ["not_started", "in_progress", "waiting"]
        - key: "priority"
          label: "Priority"
          type: "multi_select"
          options: ["low", "medium", "high", "urgent"]
        - key: "due_date_range"
          label: "Due Date"
          type: "date_range"
        - key: "entity_type"
          label: "Related Entity"
          type: "select"
          options: ["customer", "supplier", "lead", "opportunity", "project", "invoice", "quote"]
        - key: "search"
          label: "Search"
          type: "text"
          placeholder: "Search by subject..."
        - key: "view_mode"
          label: "View"
          type: "toggle"
          options: ["my_tasks", "created_by_me", "all_team"]

      actions:
        - id: "create_task"
          label: "New Task"
          icon: "add"
          type: "button_primary"
          action: "open_modal"
          target: "task_create_modal"
        - id: "mark_complete"
          label: "Mark Complete"
          icon: "check"
          type: "bulk_action"
          requires_selection: true
          action: "api_call"
          target: "PATCH /api/tasks/bulk-update"
          payload: { "status_id": "completed", "completed_at": "{now}" }
        - id: "export_tasks"
          label: "Export"
          icon: "download"
          type: "button_secondary"
          action: "export"
          formats: ["csv", "xlsx"]

      task_create_modal:
        title: "Create New Task"
        fields:
          - key: "subject"
            label: "Subject"
            type: "text"
            required: true
            max_length: 255
          - key: "description"
            label: "Description"
            type: "textarea"
            required: false
            max_length: 2000
          - key: "entity_type"
            label: "Related Entity Type"
            type: "select"
            options: ["customer", "supplier", "lead", "contact", "opportunity", "project", "invoice", "quote", "sales_order", "purchase_order"]
            required: false
          - key: "entity_id"
            label: "Related Record"
            type: "searchable_select"
            depends_on: "entity_type"
            required: false
          - key: "assigned_to"
            label: "Assigned To"
            type: "user_select"
            required: true
            default: "{current_user_id}"
          - key: "due_date"
            label: "Due Date"
            type: "date"
            required: false
          - key: "priority"
            label: "Priority"
            type: "select"
            options: ["low", "medium", "high", "urgent"]
            default: "medium"
            required: true
          - key: "status_id"
            label: "Status"
            type: "select"
            options: ["not_started", "in_progress", "waiting"]
            default: "not_started"
            required: true
        actions:
          - id: "save"
            label: "Create Task"
            type: "submit"
            action: "api_call"
            target: "POST /api/tasks"
          - id: "cancel"
            label: "Cancel"
            type: "cancel"
            action: "close_modal"

    # -- 1.2.2 My Approvals --
    my_approvals:
      route: "/app/dashboard/my-approvals"
      description: "All pending approval requests awaiting the current user's decision."
      layout: "table_with_filters"
      default_sort: "created_at desc"

      table_columns:
        - key: "request_type"
          label: "Type"
          type: "enum_badge"
          enum_values: ["expense_approval", "purchase_order", "quote_approval", "credit_note", "discount_override", "document_approval", "leave_request"]
          sortable: true
        - key: "entity_reference"
          label: "Reference"
          type: "text"
          clickable: true
          click_action:
            type: "navigate"
            target: "/{entity_type_route}/{entity_id}"
        - key: "requested_by"
          label: "Requested By"
          type: "user_avatar_name"
          sortable: true
        - key: "amount"
          label: "Amount"
          type: "currency"
          sortable: true
          visible_when: "request_type IN ('expense_approval','purchase_order','quote_approval','credit_note','discount_override')"
        - key: "description"
          label: "Description"
          type: "text"
          max_display_length: 80
        - key: "created_at"
          label: "Submitted"
          type: "datetime"
          sortable: true
        - key: "urgency"
          label: "Urgency"
          type: "enum_badge"
          enum_values: ["normal", "high", "critical"]
          colors:
            normal: "gray"
            high: "orange"
            critical: "red"
          sortable: true

      filters:
        - key: "request_type"
          label: "Request Type"
          type: "multi_select"
          options: ["expense_approval", "purchase_order", "quote_approval", "credit_note", "discount_override", "document_approval", "leave_request"]
        - key: "urgency"
          label: "Urgency"
          type: "multi_select"
          options: ["normal", "high", "critical"]
        - key: "date_range"
          label: "Submitted Date"
          type: "date_range"
        - key: "search"
          label: "Search"
          type: "text"
          placeholder: "Search by reference or description..."

      row_actions:
        - id: "approve"
          label: "Approve"
          icon: "check_circle"
          color: "green"
          action: "api_call"
          target: "POST /api/approvals/{id}/approve"
          confirmation: "Are you sure you want to approve this request?"
        - id: "reject"
          label: "Reject"
          icon: "cancel"
          color: "red"
          action: "open_modal"
          target: "rejection_reason_modal"
        - id: "view_details"
          label: "View Details"
          icon: "visibility"
          action: "navigate"
          target: "/{entity_type_route}/{entity_id}"

      rejection_reason_modal:
        title: "Reject Approval Request"
        fields:
          - key: "rejection_reason"
            label: "Reason for Rejection"
            type: "textarea"
            required: true
            max_length: 1000
            placeholder: "Please provide a reason for rejecting this request..."
        actions:
          - id: "confirm_reject"
            label: "Reject"
            type: "submit"
            color: "red"
            action: "api_call"
            target: "POST /api/approvals/{id}/reject"
          - id: "cancel"
            label: "Cancel"
            type: "cancel"
            action: "close_modal"

    # -- 1.2.3 My Calendar --
    my_calendar:
      route: "/app/dashboard/my-calendar"
      description: "Personal calendar displaying meetings, task due dates, follow-ups, and reminders."
      layout: "calendar"
      views: ["month", "week", "day", "agenda"]
      default_view: "week"

      event_sources:
        - id: "activities"
          label: "Activities"
          color: "blue"
          data_source: "activities"
          filter: "assigned_to = {current_user_id} AND status_id = 'planned'"
          title_field: "subject"
          date_field: "due_date"
          click_action:
            type: "navigate"
            target: "/app/crm/activities/{id}"
        - id: "task_deadlines"
          label: "Task Deadlines"
          color: "orange"
          data_source: "tasks"
          filter: "assigned_to = {current_user_id} AND status_id NOT IN ('completed','cancelled') AND due_date IS NOT NULL"
          title_field: "subject"
          date_field: "due_date"
          click_action:
            type: "navigate"
            target: "/app/tasks/{id}"
        - id: "invoice_due_dates"
          label: "Invoice Due Dates"
          color: "red"
          data_source: "income_documents"
          filter: "created_by = {current_user_id} AND status_id IN ('sent','partially_paid') AND due_date IS NOT NULL"
          title_field: "document_number"
          date_field: "due_date"
          click_action:
            type: "navigate"
            target: "/app/finance/income-documents/{id}"
        - id: "follow_ups"
          label: "Follow-ups"
          color: "purple"
          data_source: "follow_ups"
          filter: "assigned_to = {current_user_id} AND status_id = 'pending'"
          title_field: "subject"
          date_field: "follow_up_date"
          click_action:
            type: "navigate"
            target: "/{entity_type_route}/{entity_id}"

      actions:
        - id: "create_activity"
          label: "New Activity"
          icon: "add"
          type: "button_primary"
          action: "navigate"
          target: "/app/crm/activities/create"
        - id: "sync_calendar"
          label: "Sync External Calendar"
          icon: "sync"
          type: "button_secondary"
          action: "open_modal"
          target: "calendar_sync_modal"

      calendar_sync_modal:
        title: "Sync External Calendar"
        fields:
          - key: "provider"
            label: "Calendar Provider"
            type: "select"
            options: ["google_calendar", "outlook", "ical_url"]
            required: true
          - key: "calendar_url"
            label: "Calendar URL / ID"
            type: "text"
            required: true
            visible_when: "provider = 'ical_url'"
          - key: "sync_direction"
            label: "Sync Direction"
            type: "select"
            options: ["import_only", "export_only", "bidirectional"]
            default: "import_only"
            required: true
        actions:
          - id: "connect"
            label: "Connect"
            type: "submit"
            action: "api_call"
            target: "POST /api/calendar/sync"
          - id: "cancel"
            label: "Cancel"
            type: "cancel"
            action: "close_modal"

    # -- 1.2.4 My Recent Items --
    my_recent_items:
      route: "/app/dashboard/recent-items"
      description: "List of the last 50 records viewed or edited by the current user across all modules."
      layout: "list"
      max_items: 50
      default_sort: "accessed_at desc"

      list_item_fields:
        - key: "entity_icon"
          label: ""
          type: "icon"
          source: "entity_type"
          icon_map:
            customer: "person"
            supplier: "business"
            lead: "person_search"
            invoice: "receipt"
            quote: "request_quote"
            sales_order: "shopping_cart"
            purchase_order: "local_shipping"
            project: "folder"
            product: "inventory_2"
            contact: "contacts"
            opportunity: "flag"
        - key: "entity_name"
          label: "Name"
          type: "text"
          clickable: true
          click_action:
            type: "navigate"
            target: "/{entity_type_route}/{entity_id}"
        - key: "entity_type"
          label: "Type"
          type: "enum_badge"
        - key: "accessed_at"
          label: "Last Accessed"
          type: "relative_time"
        - key: "action_type"
          label: "Action"
          type: "enum_badge"
          enum_values: ["viewed", "edited", "created"]
          colors:
            viewed: "gray"
            edited: "blue"
            created: "green"

      filters:
        - key: "entity_type"
          label: "Type"
          type: "multi_select"
          options: ["customer", "supplier", "lead", "contact", "invoice", "quote", "sales_order", "purchase_order", "project", "product", "opportunity"]
        - key: "action_type"
          label: "Action"
          type: "multi_select"
          options: ["viewed", "edited", "created"]

  # --------------------------------------------------------------------------
  # SECTION 1.3: ALERTS CENTER
  # --------------------------------------------------------------------------
  alerts_center:
    route: "/app/dashboard/alerts"
    description: "Centralized alert panel showing actionable warnings across all modules."
    layout: "categorized_list"
    refresh_interval_seconds: 120

    alert_categories:
      - id: "overdue_invoices"
        label: "Overdue Invoices"
        icon: "warning"
        color: "red"
        description: "Customer invoices where due_date < today AND status_id IN ('sent','partially_paid')."
        data_source: "income_documents"
        query: "SELECT * FROM income_documents WHERE due_date < CURRENT_DATE AND status_id IN ('sent','partially_paid') ORDER BY due_date ASC"
        count_query: "SELECT COUNT(*) FROM income_documents WHERE due_date < CURRENT_DATE AND status_id IN ('sent','partially_paid')"
        display_fields:
          - key: "document_number"
            label: "Invoice #"
            type: "text"
            clickable: true
            click_action:
              type: "navigate"
              target: "/app/finance/income-documents/{id}"
          - key: "customer_name"
            label: "Customer"
            type: "text"
            clickable: true
            click_action:
              type: "navigate"
              target: "/app/customers/{customer_id}"
          - key: "total_amount"
            label: "Amount"
            type: "currency"
          - key: "balance_due"
            label: "Balance Due"
            type: "currency"
          - key: "due_date"
            label: "Due Date"
            type: "date"
          - key: "days_overdue"
            label: "Days Overdue"
            type: "integer"
            calculated: "CURRENT_DATE - due_date"
            color_rule: "orange if < 30, red if >= 30"
        row_actions:
          - id: "send_reminder"
            label: "Send Reminder"
            icon: "mail"
            action: "api_call"
            target: "POST /api/income-documents/{id}/send-reminder"
            confirmation: "Send payment reminder to the customer?"
          - id: "view_invoice"
            label: "View"
            icon: "visibility"
            action: "navigate"
            target: "/app/finance/income-documents/{id}"

      - id: "low_stock"
        label: "Low Stock Alerts"
        icon: "inventory_alert"
        color: "orange"
        description: "Products where current_stock <= min_stock_level AND product_type = 'physical'."
        data_source: "products"
        query: "SELECT p.*, COALESCE(i.current_stock, 0) as current_stock FROM products p LEFT JOIN inventory i ON p.id = i.product_id WHERE p.product_type = 'physical' AND p.min_stock_level IS NOT NULL AND COALESCE(i.current_stock, 0) <= p.min_stock_level AND p.is_active = true ORDER BY (COALESCE(i.current_stock, 0) - p.min_stock_level) ASC"
        count_query: "SELECT COUNT(*) FROM products p LEFT JOIN inventory i ON p.id = i.product_id WHERE p.product_type = 'physical' AND p.min_stock_level IS NOT NULL AND COALESCE(i.current_stock, 0) <= p.min_stock_level AND p.is_active = true"
        display_fields:
          - key: "sku"
            label: "SKU"
            type: "text"
          - key: "name"
            label: "Product"
            type: "text"
            clickable: true
            click_action:
              type: "navigate"
              target: "/app/products/{id}"
          - key: "current_stock"
            label: "Current Stock"
            type: "integer"
            color_rule: "red if current_stock = 0, orange if current_stock > 0"
          - key: "min_stock_level"
            label: "Min Level"
            type: "integer"
          - key: "deficit"
            label: "Deficit"
            type: "integer"
            calculated: "min_stock_level - current_stock"
        row_actions:
          - id: "create_po"
            label: "Create PO"
            icon: "add_shopping_cart"
            action: "navigate"
            target: "/app/purchasing/purchase-orders/create?product_id={id}&quantity={deficit}"
          - id: "view_product"
            label: "View"
            icon: "visibility"
            action: "navigate"
            target: "/app/products/{id}"

      - id: "sla_breaches"
        label: "SLA Breaches"
        icon: "timer_off"
        color: "red"
        description: "Support tickets or project milestones that have exceeded their SLA deadline."
        data_source: "sla_tracking"
        query: "SELECT * FROM sla_tracking WHERE breach_status = 'breached' AND resolved_at IS NULL ORDER BY breach_time ASC"
        count_query: "SELECT COUNT(*) FROM sla_tracking WHERE breach_status = 'breached' AND resolved_at IS NULL"
        display_fields:
          - key: "entity_reference"
            label: "Reference"
            type: "text"
            clickable: true
            click_action:
              type: "navigate"
              target: "/{entity_type_route}/{entity_id}"
          - key: "sla_type"
            label: "SLA Type"
            type: "text"
          - key: "deadline"
            label: "Deadline"
            type: "datetime"
          - key: "breach_duration"
            label: "Breach Duration"
            type: "duration"
            calculated: "NOW() - deadline"
          - key: "assigned_to"
            label: "Assigned To"
            type: "user_avatar_name"
        row_actions:
          - id: "escalate"
            label: "Escalate"
            icon: "priority_high"
            action: "api_call"
            target: "POST /api/sla-tracking/{id}/escalate"
          - id: "view_record"
            label: "View"
            icon: "visibility"
            action: "navigate"
            target: "/{entity_type_route}/{entity_id}"

      - id: "failed_payments"
        label: "Failed Payments"
        icon: "credit_card_off"
        color: "red"
        description: "Payment transactions that returned an error or were declined."
        data_source: "payment_transactions"
        query: "SELECT * FROM payment_transactions WHERE status_id = 'failed' AND resolved_at IS NULL ORDER BY created_at DESC"
        count_query: "SELECT COUNT(*) FROM payment_transactions WHERE status_id = 'failed' AND resolved_at IS NULL"
        display_fields:
          - key: "transaction_reference"
            label: "Transaction Ref"
            type: "text"
          - key: "customer_name"
            label: "Customer"
            type: "text"
            clickable: true
            click_action:
              type: "navigate"
              target: "/app/customers/{customer_id}"
          - key: "amount"
            label: "Amount"
            type: "currency"
          - key: "payment_method"
            label: "Method"
            type: "text"
          - key: "failure_reason"
            label: "Reason"
            type: "text"
          - key: "created_at"
            label: "Date"
            type: "datetime"
        row_actions:
          - id: "retry_payment"
            label: "Retry"
            icon: "refresh"
            action: "api_call"
            target: "POST /api/payments/{id}/retry"
            confirmation: "Retry this payment transaction?"
          - id: "contact_customer"
            label: "Contact"
            icon: "mail"
            action: "navigate"
            target: "/app/customers/{customer_id}?tab=communications"

      - id: "expiring_contracts"
        label: "Expiring Contracts"
        icon: "event_busy"
        color: "yellow"
        description: "Contracts or agreements expiring within the next 30 days."
        data_source: "contracts"
        query: "SELECT * FROM contracts WHERE end_date BETWEEN CURRENT_DATE AND CURRENT_DATE + INTERVAL '30 days' AND status_id = 'active' ORDER BY end_date ASC"
        count_query: "SELECT COUNT(*) FROM contracts WHERE end_date BETWEEN CURRENT_DATE AND CURRENT_DATE + INTERVAL '30 days' AND status_id = 'active'"
        display_fields:
          - key: "contract_number"
            label: "Contract #"
            type: "text"
            clickable: true
            click_action:
              type: "navigate"
              target: "/app/contracts/{id}"
          - key: "entity_name"
            label: "Customer/Supplier"
            type: "text"
            clickable: true
            click_action:
              type: "navigate"
              target: "/{entity_type_route}/{entity_id}"
          - key: "contract_type"
            label: "Type"
            type: "text"
          - key: "end_date"
            label: "Expires"
            type: "date"
          - key: "days_remaining"
            label: "Days Left"
            type: "integer"
            calculated: "end_date - CURRENT_DATE"
            color_rule: "red if <= 7, orange if <= 14, yellow if <= 30"
          - key: "total_value"
            label: "Value"
            type: "currency"
        row_actions:
          - id: "renew"
            label: "Initiate Renewal"
            icon: "autorenew"
            action: "navigate"
            target: "/app/contracts/{id}/renew"
          - id: "view_contract"
            label: "View"
            icon: "visibility"
            action: "navigate"
            target: "/app/contracts/{id}"

  # --------------------------------------------------------------------------
  # SECTION 1.4: RECENT ACTIVITY
  # --------------------------------------------------------------------------
  recent_activity:
    route: "/app/dashboard/activity"
    description: "Real-time timeline of all system activity logs, filterable by entity type, user, and date."
    layout: "timeline"
    default_sort: "created_at desc"
    max_items: 200
    refresh_interval_seconds: 60

    timeline_item_fields:
      - key: "user_avatar"
        type: "avatar"
        source: "user_id"
      - key: "user_name"
        type: "text"
        source: "user_id"
      - key: "action"
        type: "text"
        description: "Human-readable action description, e.g. 'created Invoice #INV-2026-0042'"
      - key: "entity_type"
        type: "enum_badge"
      - key: "entity_name"
        type: "text"
        clickable: true
        click_action:
          type: "navigate"
          target: "/{entity_type_route}/{entity_id}"
      - key: "created_at"
        type: "relative_time"
      - key: "details"
        type: "expandable_json"
        description: "Shows field-level changes when expanded, e.g. status changed from 'draft' to 'sent'."

    filters:
      - key: "entity_type"
        label: "Entity Type"
        type: "multi_select"
        options: ["customer", "supplier", "lead", "contact", "invoice", "receipt", "expense", "quote", "sales_order", "purchase_order", "product", "project", "task", "payment", "opportunity", "activity", "contract"]
      - key: "user_id"
        label: "User"
        type: "user_select"
        allow_multiple: true
      - key: "action_type"
        label: "Action"
        type: "multi_select"
        options: ["created", "updated", "deleted", "status_changed", "assigned", "commented", "uploaded", "sent", "approved", "rejected"]
      - key: "date_range"
        label: "Date Range"
        type: "date_range"
      - key: "search"
        label: "Search"
        type: "text"
        placeholder: "Search activity..."

  # --------------------------------------------------------------------------
  # SECTION 1.5: QUICK ACTIONS
  # --------------------------------------------------------------------------
  quick_actions:
    route: "/app/dashboard"
    description: "Quick-launch buttons on the dashboard for frequently used creation flows."
    layout: "action_grid"

    actions:
      - id: "create_customer"
        label: "New Customer"
        icon: "person_add"
        color: "blue"
        action: "navigate"
        target: "/app/customers/create"
        permission: "customers.create"

      - id: "create_supplier"
        label: "New Supplier"
        icon: "business"
        color: "purple"
        action: "navigate"
        target: "/app/suppliers/create"
        permission: "suppliers.create"

      - id: "create_income_document"
        label: "New Income Document"
        icon: "description"
        color: "green"
        action: "open_modal"
        target: "income_document_type_selector"
        permission: "income_documents.create"

      - id: "upload_expense"
        label: "Upload Expense"
        icon: "upload_file"
        color: "red"
        action: "navigate"
        target: "/app/finance/expense-documents/upload"
        permission: "expense_documents.create"

      - id: "create_invoice"
        label: "New Invoice"
        icon: "receipt"
        color: "green"
        action: "navigate"
        target: "/app/finance/income-documents/create?type=invoice"
        permission: "income_documents.create"

      - id: "create_receipt"
        label: "New Receipt"
        icon: "receipt_long"
        color: "teal"
        action: "navigate"
        target: "/app/finance/income-documents/create?type=receipt"
        permission: "income_documents.create"

      - id: "create_invoice_receipt"
        label: "New Invoice-Receipt"
        icon: "note_add"
        color: "cyan"
        action: "navigate"
        target: "/app/finance/income-documents/create?type=invoice_receipt"
        permission: "income_documents.create"

      - id: "create_recurring_document"
        label: "Recurring Document"
        icon: "autorenew"
        color: "indigo"
        action: "navigate"
        target: "/app/finance/recurring-documents/create"
        permission: "recurring_documents.create"

      - id: "create_standing_order"
        label: "Standing Order"
        icon: "event_repeat"
        color: "deep_purple"
        action: "navigate"
        target: "/app/finance/standing-orders/create"
        permission: "standing_orders.create"

      - id: "quick_credit_charge"
        label: "Quick Credit Charge"
        icon: "credit_card"
        color: "amber"
        action: "open_modal"
        target: "quick_credit_charge_modal"
        permission: "payments.create"

      - id: "create_quote"
        label: "New Quote"
        icon: "request_quote"
        color: "orange"
        action: "navigate"
        target: "/app/sales/quotations/create"
        permission: "quotations.create"

      - id: "create_purchase_order"
        label: "New Purchase Order"
        icon: "local_shipping"
        color: "brown"
        action: "navigate"
        target: "/app/purchasing/purchase-orders/create"
        permission: "purchase_orders.create"

    income_document_type_selector:
      title: "Select Document Type"
      description: "Choose the type of income document to create."
      options:
        - id: "invoice"
          label: "Invoice"
          description: "Tax invoice for goods or services delivered."
          icon: "receipt"
          action: "navigate"
          target: "/app/finance/income-documents/create?type=invoice"
        - id: "receipt"
          label: "Receipt"
          description: "Payment receipt confirming payment received."
          icon: "receipt_long"
          action: "navigate"
          target: "/app/finance/income-documents/create?type=receipt"
        - id: "invoice_receipt"
          label: "Invoice-Receipt"
          description: "Combined tax invoice and receipt in one document."
          icon: "note_add"
          action: "navigate"
          target: "/app/finance/income-documents/create?type=invoice_receipt"
        - id: "credit_note"
          label: "Credit Note"
          description: "Credit memo reducing a previously issued invoice."
          icon: "money_off"
          action: "navigate"
          target: "/app/finance/income-documents/create?type=credit_note"
        - id: "delivery_note"
          label: "Delivery Note"
          description: "Document accompanying goods shipped to customer."
          icon: "local_shipping"
          action: "navigate"
          target: "/app/finance/income-documents/create?type=delivery_note"
        - id: "proforma_invoice"
          label: "Proforma Invoice"
          description: "Preliminary invoice before final billing."
          icon: "description"
          action: "navigate"
          target: "/app/finance/income-documents/create?type=proforma_invoice"

    quick_credit_charge_modal:
      title: "Quick Credit Card Charge"
      description: "Charge a customer's credit card and optionally generate a receipt."
      fields:
        - key: "customer_id"
          label: "Customer"
          type: "searchable_select"
          data_source: "customers"
          display_field: "full_name"
          search_fields: ["full_name", "company_name", "customer_number", "email", "phone"]
          required: true
        - key: "amount"
          label: "Amount"
          type: "decimal"
          required: true
          min: 0.01
          precision: 2
        - key: "currency"
          label: "Currency"
          type: "select"
          options_source: "system_settings.currencies"
          default: "{system_settings.default_currency}"
          required: true
        - key: "description"
          label: "Description"
          type: "text"
          required: true
          max_length: 255
        - key: "payment_method_id"
          label: "Saved Card"
          type: "select"
          data_source: "customer_payment_methods"
          depends_on: "customer_id"
          filter: "customer_id = {customer_id} AND method_type = 'credit_card' AND is_active = true"
          display_field: "card_last_four"
          required: false
          placeholder: "Select saved card or enter new"
        - key: "card_number"
          label: "Card Number"
          type: "credit_card"
          required: false
          visible_when: "payment_method_id IS NULL"
        - key: "card_expiry"
          label: "Expiry (MM/YY)"
          type: "text"
          mask: "##/##"
          required: false
          visible_when: "payment_method_id IS NULL"
        - key: "card_cvv"
          label: "CVV"
          type: "password"
          max_length: 4
          required: false
          visible_when: "payment_method_id IS NULL"
        - key: "generate_receipt"
          label: "Generate Receipt"
          type: "checkbox"
          default: true
        - key: "send_receipt_email"
          label: "Email Receipt to Customer"
          type: "checkbox"
          default: true
          visible_when: "generate_receipt = true"
        - key: "number_of_payments"
          label: "Number of Payments"
          type: "integer"
          default: 1
          min: 1
          max: 36
      actions:
        - id: "charge"
          label: "Charge Card"
          type: "submit"
          color: "green"
          action: "api_call"
          target: "POST /api/payments/quick-charge"
        - id: "cancel"
          label: "Cancel"
          type: "cancel"
          action: "close_modal"

# ============================================================================
# MODULE 2: CRM
# ============================================================================
module_2_crm:
  id: 2
  name: "CRM"
  icon: "people"
  route: "/app/crm"
  description: "Customer Relationship Management module for leads, contacts, accounts, activities, and communication tracking."
  permissions:
    view: "crm.view"
    create: "crm.create"
    edit: "crm.edit"
    delete: "crm.delete"

  submenus:
    - id: "leads"
      label: "Leads"
      icon: "person_search"
      route: "/app/crm/leads"
    - id: "contacts"
      label: "Contacts"
      icon: "contacts"
      route: "/app/crm/contacts"
    - id: "accounts"
      label: "Accounts"
      icon: "business"
      route: "/app/crm/accounts"
    - id: "activities"
      label: "Activities"
      icon: "event"
      route: "/app/crm/activities"
    - id: "communication_log"
      label: "Communication Log"
      icon: "forum"
      route: "/app/crm/communication-log"

  # --------------------------------------------------------------------------
  # ENTITY: LEADS
  # --------------------------------------------------------------------------
  entities:
    leads:
      table_name: "leads"
      primary_key: "id"
      auto_number_field: "lead_number"
      auto_number_prefix: "LD"
      fields:
        - key: "id"
          type: "uuid"
          primary_key: true
          auto_generated: true
        - key: "lead_number"
          type: "string"
          auto_generated: true
          unique: true
          label: "Lead #"
        - key: "first_name"
          type: "string"
          max_length: 100
          required: true
          label: "First Name"
        - key: "last_name"
          type: "string"
          max_length: 100
          required: true
          label: "Last Name"
        - key: "company"
          type: "string"
          max_length: 200
          required: false
          label: "Company"
        - key: "phone"
          type: "string"
          max_length: 30
          required: false
          label: "Phone"
        - key: "email"
          type: "string"
          max_length: 255
          required: false
          format: "email"
          label: "Email"
        - key: "source"
          type: "enum"
          enum_values: ["website", "referral", "cold_call", "event", "social", "advertisement", "other"]
          required: true
          label: "Source"
        - key: "estimated_value"
          type: "decimal"
          precision: 2
          required: false
          label: "Estimated Value"
        - key: "assigned_to"
          type: "uuid"
          foreign_key: "users.id"
          required: true
          label: "Assigned To"
        - key: "status_id"
          type: "enum"
          enum_values: ["new", "contacted", "qualified", "unqualified", "converted", "lost"]
          required: true
          default: "new"
          label: "Status"
        - key: "notes"
          type: "text"
          required: false
          label: "Notes"
        - key: "converted_customer_id"
          type: "uuid"
          foreign_key: "customers.id"
          nullable: true
          label: "Converted Customer"
        - key: "created_at"
          type: "datetime"
          auto_generated: true
          label: "Created At"
        - key: "updated_at"
          type: "datetime"
          auto_generated: true
          auto_updated: true
          label: "Updated At"

    contacts:
      table_name: "contacts"
      primary_key: "id"
      fields:
        - key: "id"
          type: "uuid"
          primary_key: true
          auto_generated: true
        - key: "first_name"
          type: "string"
          max_length: 100
          required: true
          label: "First Name"
        - key: "last_name"
          type: "string"
          max_length: 100
          required: true
          label: "Last Name"
        - key: "phone"
          type: "string"
          max_length: 30
          required: false
          label: "Phone"
        - key: "mobile"
          type: "string"
          max_length: 30
          required: false
          label: "Mobile"
        - key: "email"
          type: "string"
          max_length: 255
          required: false
          format: "email"
          label: "Email"
        - key: "company"
          type: "string"
          max_length: 200
          required: false
          label: "Company"
        - key: "position"
          type: "string"
          max_length: 100
          required: false
          label: "Position"
        - key: "customer_id"
          type: "uuid"
          foreign_key: "customers.id"
          nullable: true
          label: "Customer"
        - key: "supplier_id"
          type: "uuid"
          foreign_key: "suppliers.id"
          nullable: true
          label: "Supplier"
        - key: "lead_id"
          type: "uuid"
          foreign_key: "leads.id"
          nullable: true
          label: "Lead"
        - key: "notes"
          type: "text"
          required: false
          label: "Notes"
        - key: "is_primary"
          type: "boolean"
          default: false
          label: "Primary Contact"
        - key: "created_at"
          type: "datetime"
          auto_generated: true
          label: "Created At"
        - key: "updated_at"
          type: "datetime"
          auto_generated: true
          auto_updated: true
          label: "Updated At"

    activities:
      table_name: "activities"
      primary_key: "id"
      fields:
        - key: "id"
          type: "uuid"
          primary_key: true
          auto_generated: true
        - key: "activity_type"
          type: "enum"
          enum_values: ["call", "meeting", "email", "task", "note"]
          required: true
          label: "Activity Type"
        - key: "subject"
          type: "string"
          max_length: 255
          required: true
          label: "Subject"
        - key: "description"
          type: "text"
          required: false
          label: "Description"
        - key: "entity_type"
          type: "string"
          required: true
          label: "Related Entity Type"
        - key: "entity_id"
          type: "uuid"
          required: true
          label: "Related Entity ID"
        - key: "contact_id"
          type: "uuid"
          foreign_key: "contacts.id"
          nullable: true
          label: "Contact"
        - key: "assigned_to"
          type: "uuid"
          foreign_key: "users.id"
          required: true
          label: "Assigned To"
        - key: "due_date"
          type: "datetime"
          required: false
          label: "Due Date"
        - key: "completed_at"
          type: "datetime"
          nullable: true
          label: "Completed At"
        - key: "status_id"
          type: "enum"
          enum_values: ["planned", "completed", "cancelled"]
          required: true
          default: "planned"
          label: "Status"
        - key: "created_at"
          type: "datetime"
          auto_generated: true
          label: "Created At"

    communication_log:
      table_name: "communication_log"
      primary_key: "id"
      fields:
        - key: "id"
          type: "uuid"
          primary_key: true
          auto_generated: true
        - key: "entity_type"
          type: "string"
          required: true
          label: "Related Entity Type"
        - key: "entity_id"
          type: "uuid"
          required: true
          label: "Related Entity ID"
        - key: "channel"
          type: "enum"
          enum_values: ["email", "phone", "whatsapp", "sms", "meeting", "other"]
          required: true
          label: "Channel"
        - key: "direction"
          type: "enum"
          enum_values: ["inbound", "outbound"]
          required: true
          label: "Direction"
        - key: "subject"
          type: "string"
          max_length: 255
          required: true
          label: "Subject"
        - key: "content"
          type: "text"
          required: false
          label: "Content"
        - key: "contact_id"
          type: "uuid"
          foreign_key: "contacts.id"
          nullable: true
          label: "Contact"
        - key: "created_by"
          type: "uuid"
          foreign_key: "users.id"
          required: true
          label: "Created By"
        - key: "created_at"
          type: "datetime"
          auto_generated: true
          label: "Created At"

  # --------------------------------------------------------------------------
  # CRM PAGES
  # --------------------------------------------------------------------------
  pages:
    # ========== LEADS ==========
    leads_list:
      route: "/app/crm/leads"
      title: "Leads"
      layout: "table_with_filters"
      permission: "crm.leads.view"
      default_sort: "created_at desc"

      table_columns:
        - key: "lead_number"
          label: "Lead #"
          type: "text"
          sortable: true
          clickable: true
          click_action:
            type: "navigate"
            target: "/app/crm/leads/{id}"
        - key: "first_name"
          label: "First Name"
          type: "text"
          sortable: true
        - key: "last_name"
          label: "Last Name"
          type: "text"
          sortable: true
        - key: "company"
          label: "Company"
          type: "text"
          sortable: true
        - key: "phone"
          label: "Phone"
          type: "phone"
          clickable: true
          click_action:
            type: "tel"
        - key: "email"
          label: "Email"
          type: "email"
          clickable: true
          click_action:
            type: "mailto"
        - key: "source"
          label: "Source"
          type: "enum_badge"
          enum_values: ["website", "referral", "cold_call", "event", "social", "advertisement", "other"]
          colors:
            website: "blue"
            referral: "green"
            cold_call: "orange"
            event: "purple"
            social: "cyan"
            advertisement: "pink"
            other: "gray"
          sortable: true
        - key: "estimated_value"
          label: "Est. Value"
          type: "currency"
          sortable: true
        - key: "assigned_to"
          label: "Assigned To"
          type: "user_avatar_name"
          sortable: true
        - key: "status_id"
          label: "Status"
          type: "enum_badge"
          enum_values: ["new", "contacted", "qualified", "unqualified", "converted", "lost"]
          colors:
            new: "blue"
            contacted: "cyan"
            qualified: "green"
            unqualified: "gray"
            converted: "purple"
            lost: "red"
          sortable: true
        - key: "created_at"
          label: "Created"
          type: "datetime"
          sortable: true

      filters:
        - key: "status_id"
          label: "Status"
          type: "multi_select"
          options: ["new", "contacted", "qualified", "unqualified", "converted", "lost"]
        - key: "source"
          label: "Source"
          type: "multi_select"
          options: ["website", "referral", "cold_call", "event", "social", "advertisement", "other"]
        - key: "assigned_to"
          label: "Assigned To"
          type: "user_select"
          allow_multiple: true
        - key: "estimated_value_min"
          label: "Min Value"
          type: "decimal"
        - key: "estimated_value_max"
          label: "Max Value"
          type: "decimal"
        - key: "created_date_range"
          label: "Created Date"
          type: "date_range"
        - key: "search"
          label: "Search"
          type: "text"
          placeholder: "Search by name, company, phone, email..."
          search_fields: ["first_name", "last_name", "company", "phone", "email", "lead_number"]

      actions:
        - id: "create_lead"
          label: "New Lead"
          icon: "add"
          type: "button_primary"
          action: "navigate"
          target: "/app/crm/leads/create"
          permission: "crm.leads.create"
        - id: "import_leads"
          label: "Import"
          icon: "upload"
          type: "button_secondary"
          action: "navigate"
          target: "/app/crm/leads/import"
          permission: "crm.leads.import"
        - id: "export_leads"
          label: "Export"
          icon: "download"
          type: "button_secondary"
          action: "export"
          formats: ["csv", "xlsx"]
          permission: "crm.leads.export"
        - id: "bulk_assign"
          label: "Assign"
          icon: "person_add"
          type: "bulk_action"
          requires_selection: true
          action: "open_modal"
          target: "bulk_assign_modal"
          permission: "crm.leads.edit"
        - id: "bulk_delete"
          label: "Delete"
          icon: "delete"
          type: "bulk_action"
          requires_selection: true
          action: "api_call"
          target: "DELETE /api/crm/leads/bulk"
          confirmation: "Are you sure you want to delete the selected leads? This action cannot be undone."
          permission: "crm.leads.delete"

      bulk_assign_modal:
        title: "Assign Leads"
        fields:
          - key: "assigned_to"
            label: "Assign To"
            type: "user_select"
            required: true
        actions:
          - id: "assign"
            label: "Assign"
            type: "submit"
            action: "api_call"
            target: "PATCH /api/crm/leads/bulk-assign"
          - id: "cancel"
            label: "Cancel"
            type: "cancel"
            action: "close_modal"

    leads_create:
      route: "/app/crm/leads/create"
      title: "Create Lead"
      layout: "form"
      permission: "crm.leads.create"

      form_fields:
        - key: "first_name"
          label: "First Name"
          type: "text"
          required: true
          max_length: 100
          placeholder: "Enter first name"
          grid_column: "1/2"
        - key: "last_name"
          label: "Last Name"
          type: "text"
          required: true
          max_length: 100
          placeholder: "Enter last name"
          grid_column: "2/2"
        - key: "company"
          label: "Company"
          type: "text"
          required: false
          max_length: 200
          placeholder: "Enter company name"
          grid_column: "1/1"
        - key: "phone"
          label: "Phone"
          type: "tel"
          required: false
          max_length: 30
          placeholder: "+972-XX-XXX-XXXX"
          grid_column: "1/2"
        - key: "email"
          label: "Email"
          type: "email"
          required: false
          max_length: 255
          placeholder: "email@example.com"
          validation: "email_format"
          grid_column: "2/2"
        - key: "source"
          label: "Source"
          type: "select"
          required: true
          options:
            - value: "website"
              label: "Website"
            - value: "referral"
              label: "Referral"
            - value: "cold_call"
              label: "Cold Call"
            - value: "event"
              label: "Event"
            - value: "social"
              label: "Social Media"
            - value: "advertisement"
              label: "Advertisement"
            - value: "other"
              label: "Other"
          grid_column: "1/2"
        - key: "estimated_value"
          label: "Estimated Value"
          type: "decimal"
          required: false
          precision: 2
          min: 0
          placeholder: "0.00"
          grid_column: "2/2"
        - key: "assigned_to"
          label: "Assigned To"
          type: "user_select"
          required: true
          default: "{current_user_id}"
          grid_column: "1/2"
        - key: "status_id"
          label: "Status"
          type: "select"
          required: true
          default: "new"
          options:
            - value: "new"
              label: "New"
            - value: "contacted"
              label: "Contacted"
            - value: "qualified"
              label: "Qualified"
            - value: "unqualified"
              label: "Unqualified"
          grid_column: "2/2"
        - key: "notes"
          label: "Notes"
          type: "textarea"
          required: false
          max_length: 5000
          rows: 4
          placeholder: "Add any notes about this lead..."
          grid_column: "1/1"

      actions:
        - id: "save"
          label: "Create Lead"
          type: "submit"
          color: "primary"
          action: "api_call"
          target: "POST /api/crm/leads"
          on_success: "navigate"
          success_target: "/app/crm/leads/{id}"
        - id: "save_and_new"
          label: "Save & Create Another"
          type: "submit"
          color: "secondary"
          action: "api_call"
          target: "POST /api/crm/leads"
          on_success: "reset_form"
        - id: "cancel"
          label: "Cancel"
          type: "cancel"
          action: "navigate"
          target: "/app/crm/leads"

    leads_edit:
      route: "/app/crm/leads/{id}/edit"
      title: "Edit Lead"
      layout: "form"
      permission: "crm.leads.edit"
      data_source: "GET /api/crm/leads/{id}"

      form_fields:
        - key: "first_name"
          label: "First Name"
          type: "text"
          required: true
          max_length: 100
          grid_column: "1/2"
        - key: "last_name"
          label: "Last Name"
          type: "text"
          required: true
          max_length: 100
          grid_column: "2/2"
        - key: "company"
          label: "Company"
          type: "text"
          required: false
          max_length: 200
          grid_column: "1/1"
        - key: "phone"
          label: "Phone"
          type: "tel"
          required: false
          max_length: 30
          grid_column: "1/2"
        - key: "email"
          label: "Email"
          type: "email"
          required: false
          max_length: 255
          validation: "email_format"
          grid_column: "2/2"
        - key: "source"
          label: "Source"
          type: "select"
          required: true
          options:
            - value: "website"
              label: "Website"
            - value: "referral"
              label: "Referral"
            - value: "cold_call"
              label: "Cold Call"
            - value: "event"
              label: "Event"
            - value: "social"
              label: "Social Media"
            - value: "advertisement"
              label: "Advertisement"
            - value: "other"
              label: "Other"
          grid_column: "1/2"
        - key: "estimated_value"
          label: "Estimated Value"
          type: "decimal"
          required: false
          precision: 2
          min: 0
          grid_column: "2/2"
        - key: "assigned_to"
          label: "Assigned To"
          type: "user_select"
          required: true
          grid_column: "1/2"
        - key: "status_id"
          label: "Status"
          type: "select"
          required: true
          options:
            - value: "new"
              label: "New"
            - value: "contacted"
              label: "Contacted"
            - value: "qualified"
              label: "Qualified"
            - value: "unqualified"
              label: "Unqualified"
            - value: "converted"
              label: "Converted"
            - value: "lost"
              label: "Lost"
          grid_column: "2/2"
        - key: "notes"
          label: "Notes"
          type: "textarea"
          required: false
          max_length: 5000
          rows: 4
          grid_column: "1/1"

      actions:
        - id: "save"
          label: "Save Changes"
          type: "submit"
          color: "primary"
          action: "api_call"
          target: "PUT /api/crm/leads/{id}"
          on_success: "navigate"
          success_target: "/app/crm/leads/{id}"
        - id: "cancel"
          label: "Cancel"
          type: "cancel"
          action: "navigate"
          target: "/app/crm/leads/{id}"

    leads_details:
      route: "/app/crm/leads/{id}"
      title: "Lead Details"
      layout: "detail_with_tabs"
      permission: "crm.leads.view"
      data_source: "GET /api/crm/leads/{id}"

      header:
        title_field: "first_name + ' ' + last_name"
        subtitle_field: "company"
        status_badge: "status_id"
        meta_fields:
          - key: "lead_number"
            label: "Lead #"
          - key: "assigned_to"
            label: "Assigned To"
            type: "user_avatar_name"
          - key: "created_at"
            label: "Created"
            type: "relative_time"

      header_actions:
        - id: "edit"
          label: "Edit"
          icon: "edit"
          type: "button_primary"
          action: "navigate"
          target: "/app/crm/leads/{id}/edit"
          permission: "crm.leads.edit"
        - id: "convert"
          label: "Convert to Customer"
          icon: "person_add"
          type: "button_secondary"
          action: "open_modal"
          target: "convert_lead_modal"
          permission: "crm.leads.convert"
          visible_when: "status_id NOT IN ('converted','lost')"
        - id: "create_activity"
          label: "Log Activity"
          icon: "event"
          type: "button_secondary"
          action: "open_modal"
          target: "create_activity_modal"
          permission: "crm.activities.create"
        - id: "send_email"
          label: "Send Email"
          icon: "mail"
          type: "button_secondary"
          action: "open_modal"
          target: "send_email_modal"
          visible_when: "email IS NOT NULL"
        - id: "delete"
          label: "Delete"
          icon: "delete"
          type: "button_danger"
          action: "api_call"
          target: "DELETE /api/crm/leads/{id}"
          confirmation: "Are you sure you want to delete this lead? This action cannot be undone."
          on_success: "navigate"
          success_target: "/app/crm/leads"
          permission: "crm.leads.delete"

      convert_lead_modal:
        title: "Convert Lead to Customer"
        description: "This will create a new customer record from this lead's information."
        fields:
          - key: "customer_type"
            label: "Customer Type"
            type: "select"
            options:
              - value: "individual"
                label: "Individual"
              - value: "company"
                label: "Company"
            required: true
            default: "individual"
          - key: "full_name"
            label: "Full Name"
            type: "text"
            required: true
            default: "{first_name} {last_name}"
          - key: "company_name"
            label: "Company Name"
            type: "text"
            required: false
            default: "{company}"
          - key: "create_opportunity"
            label: "Also Create Opportunity"
            type: "checkbox"
            default: false
          - key: "opportunity_name"
            label: "Opportunity Name"
            type: "text"
            visible_when: "create_opportunity = true"
            default: "{company} - Initial Opportunity"
          - key: "opportunity_amount"
            label: "Expected Amount"
            type: "decimal"
            visible_when: "create_opportunity = true"
            default: "{estimated_value}"
        actions:
          - id: "convert"
            label: "Convert"
            type: "submit"
            color: "primary"
            action: "api_call"
            target: "POST /api/crm/leads/{id}/convert"
            on_success: "navigate"
            success_target: "/app/customers/{converted_customer_id}"
          - id: "cancel"
            label: "Cancel"
            type: "cancel"
            action: "close_modal"

      tabs:
        - id: "details"
          label: "Details"
          icon: "info"
          content:
            layout: "two_column"
            left_column:
              - section: "Contact Information"
                fields:
                  - key: "first_name"
                    label: "First Name"
                    type: "text"
                  - key: "last_name"
                    label: "Last Name"
                    type: "text"
                  - key: "company"
                    label: "Company"
                    type: "text"
                  - key: "phone"
                    label: "Phone"
                    type: "phone"
                    clickable: true
                    click_action: { type: "tel" }
                  - key: "email"
                    label: "Email"
                    type: "email"
                    clickable: true
                    click_action: { type: "mailto" }
              - section: "Lead Details"
                fields:
                  - key: "source"
                    label: "Source"
                    type: "enum_badge"
                  - key: "estimated_value"
                    label: "Estimated Value"
                    type: "currency"
                  - key: "status_id"
                    label: "Status"
                    type: "enum_badge"
                  - key: "assigned_to"
                    label: "Assigned To"
                    type: "user_avatar_name"
            right_column:
              - section: "Notes"
                fields:
                  - key: "notes"
                    label: ""
                    type: "rich_text"
              - section: "System Information"
                fields:
                  - key: "lead_number"
                    label: "Lead #"
                    type: "text"
                  - key: "converted_customer_id"
                    label: "Converted Customer"
                    type: "link"
                    click_action:
                      type: "navigate"
                      target: "/app/customers/{converted_customer_id}"
                    visible_when: "converted_customer_id IS NOT NULL"
                  - key: "created_at"
                    label: "Created At"
                    type: "datetime"
                  - key: "updated_at"
                    label: "Last Updated"
                    type: "datetime"

        - id: "activities"
          label: "Activities"
          icon: "event"
          content:
            layout: "table"
            data_source: "GET /api/crm/activities?entity_type=lead&entity_id={id}"
            table_columns:
              - key: "activity_type"
                label: "Type"
                type: "enum_badge"
                enum_values: ["call", "meeting", "email", "task", "note"]
                colors:
                  call: "green"
                  meeting: "blue"
                  email: "cyan"
                  task: "orange"
                  note: "gray"
                sortable: true
              - key: "subject"
                label: "Subject"
                type: "text"
                clickable: true
                click_action:
                  type: "navigate"
                  target: "/app/crm/activities/{id}"
              - key: "assigned_to"
                label: "Assigned To"
                type: "user_avatar_name"
              - key: "due_date"
                label: "Due Date"
                type: "datetime"
                sortable: true
              - key: "status_id"
                label: "Status"
                type: "enum_badge"
                enum_values: ["planned", "completed", "cancelled"]
                colors:
                  planned: "blue"
                  completed: "green"
                  cancelled: "red"
              - key: "created_at"
                label: "Created"
                type: "datetime"
                sortable: true
            actions:
              - id: "create_activity"
                label: "Log Activity"
                icon: "add"
                type: "button_primary"
                action: "open_modal"
                target: "create_activity_modal"

        - id: "communications"
          label: "Communications"
          icon: "forum"
          content:
            layout: "timeline"
            data_source: "GET /api/crm/communication-log?entity_type=lead&entity_id={id}"
            timeline_item_fields:
              - key: "channel"
                type: "icon"
                icon_map:
                  email: "mail"
                  phone: "phone"
                  whatsapp: "chat"
                  sms: "sms"
                  meeting: "groups"
                  other: "more_horiz"
              - key: "direction"
                type: "enum_badge"
                enum_values: ["inbound", "outbound"]
                colors:
                  inbound: "blue"
                  outbound: "green"
              - key: "subject"
                type: "text"
                bold: true
              - key: "content"
                type: "text"
                truncate: 200
                expandable: true
              - key: "contact_name"
                type: "text"
              - key: "created_by"
                type: "user_avatar_name"
              - key: "created_at"
                type: "relative_time"
            actions:
              - id: "log_communication"
                label: "Log Communication"
                icon: "add"
                type: "button_primary"
                action: "open_modal"
                target: "create_communication_modal"

        - id: "files"
          label: "Files"
          icon: "attach_file"
          content:
            layout: "file_grid"
            data_source: "GET /api/files?entity_type=lead&entity_id={id}"
            display_fields:
              - key: "file_name"
                label: "Name"
                type: "text"
              - key: "file_type"
                label: "Type"
                type: "file_icon"
              - key: "file_size"
                label: "Size"
                type: "file_size"
              - key: "uploaded_by"
                label: "Uploaded By"
                type: "user_avatar_name"
              - key: "created_at"
                label: "Uploaded"
                type: "relative_time"
            row_actions:
              - id: "download"
                label: "Download"
                icon: "download"
                action: "download"
                target: "/api/files/{file_id}/download"
              - id: "preview"
                label: "Preview"
                icon: "visibility"
                action: "open_modal"
                target: "file_preview_modal"
              - id: "delete"
                label: "Delete"
                icon: "delete"
                action: "api_call"
                target: "DELETE /api/files/{file_id}"
                confirmation: "Delete this file?"
            actions:
              - id: "upload_file"
                label: "Upload File"
                icon: "upload"
                type: "button_primary"
                action: "open_file_picker"
                target: "POST /api/files"
                payload: { "entity_type": "lead", "entity_id": "{id}" }
                allowed_types: ["pdf", "doc", "docx", "xls", "xlsx", "csv", "jpg", "jpeg", "png", "gif", "txt"]
                max_size_mb: 25

        - id: "activity_log"
          label: "Activity Log"
          icon: "history"
          content:
            layout: "timeline"
            data_source: "GET /api/activity-log?entity_type=lead&entity_id={id}"
            timeline_item_fields:
              - key: "user_avatar"
                type: "avatar"
              - key: "user_name"
                type: "text"
              - key: "action"
                type: "text"
              - key: "created_at"
                type: "relative_time"
              - key: "details"
                type: "expandable_json"

      related_records:
        - entity: "contacts"
          label: "Contacts"
          relationship: "contacts.lead_id = leads.id"
          display_in: "details_tab"
          fields: ["first_name", "last_name", "email", "phone", "position"]
          click_action:
            type: "navigate"
            target: "/app/crm/contacts/{contact_id}"

    # ========== CONTACTS ==========
    contacts_list:
      route: "/app/crm/contacts"
      title: "Contacts"
      layout: "table_with_filters"
      permission: "crm.contacts.view"
      default_sort: "created_at desc"

      table_columns:
        - key: "first_name"
          label: "First Name"
          type: "text"
          sortable: true
          clickable: true
          click_action:
            type: "navigate"
            target: "/app/crm/contacts/{id}"
        - key: "last_name"
          label: "Last Name"
          type: "text"
          sortable: true
        - key: "phone"
          label: "Phone"
          type: "phone"
          clickable: true
          click_action: { type: "tel" }
        - key: "mobile"
          label: "Mobile"
          type: "phone"
          clickable: true
          click_action: { type: "tel" }
        - key: "email"
          label: "Email"
          type: "email"
          clickable: true
          click_action: { type: "mailto" }
        - key: "company"
          label: "Company"
          type: "text"
          sortable: true
        - key: "position"
          label: "Position"
          type: "text"
          sortable: true
        - key: "is_primary"
          label: "Primary"
          type: "boolean_icon"
          true_icon: "star"
          false_icon: ""
        - key: "customer_name"
          label: "Customer"
          type: "text"
          clickable: true
          click_action:
            type: "navigate"
            target: "/app/customers/{customer_id}"
          visible_when: "customer_id IS NOT NULL"
        - key: "supplier_name"
          label: "Supplier"
          type: "text"
          clickable: true
          click_action:
            type: "navigate"
            target: "/app/suppliers/{supplier_id}"
          visible_when: "supplier_id IS NOT NULL"
        - key: "created_at"
          label: "Created"
          type: "datetime"
          sortable: true

      filters:
        - key: "is_primary"
          label: "Primary Only"
          type: "checkbox"
        - key: "has_customer"
          label: "Has Customer"
          type: "checkbox"
        - key: "has_supplier"
          label: "Has Supplier"
          type: "checkbox"
        - key: "has_lead"
          label: "Has Lead"
          type: "checkbox"
        - key: "created_date_range"
          label: "Created Date"
          type: "date_range"
        - key: "search"
          label: "Search"
          type: "text"
          placeholder: "Search by name, email, phone, company..."
          search_fields: ["first_name", "last_name", "email", "phone", "mobile", "company", "position"]

      actions:
        - id: "create_contact"
          label: "New Contact"
          icon: "add"
          type: "button_primary"
          action: "navigate"
          target: "/app/crm/contacts/create"
          permission: "crm.contacts.create"
        - id: "import_contacts"
          label: "Import"
          icon: "upload"
          type: "button_secondary"
          action: "navigate"
          target: "/app/crm/contacts/import"
          permission: "crm.contacts.import"
        - id: "export_contacts"
          label: "Export"
          icon: "download"
          type: "button_secondary"
          action: "export"
          formats: ["csv", "xlsx", "vcard"]
          permission: "crm.contacts.export"
        - id: "bulk_delete"
          label: "Delete"
          icon: "delete"
          type: "bulk_action"
          requires_selection: true
          action: "api_call"
          target: "DELETE /api/crm/contacts/bulk"
          confirmation: "Are you sure you want to delete the selected contacts?"
          permission: "crm.contacts.delete"

    contacts_create:
      route: "/app/crm/contacts/create"
      title: "Create Contact"
      layout: "form"
      permission: "crm.contacts.create"

      form_fields:
        - key: "first_name"
          label: "First Name"
          type: "text"
          required: true
          max_length: 100
          placeholder: "Enter first name"
          grid_column: "1/2"
        - key: "last_name"
          label: "Last Name"
          type: "text"
          required: true
          max_length: 100
          placeholder: "Enter last name"
          grid_column: "2/2"
        - key: "phone"
          label: "Phone"
          type: "tel"
          required: false
          max_length: 30
          placeholder: "+972-XX-XXX-XXXX"
          grid_column: "1/3"
        - key: "mobile"
          label: "Mobile"
          type: "tel"
          required: false
          max_length: 30
          placeholder: "+972-5X-XXX-XXXX"
          grid_column: "2/3"
        - key: "email"
          label: "Email"
          type: "email"
          required: false
          max_length: 255
          validation: "email_format"
          placeholder: "email@example.com"
          grid_column: "3/3"
        - key: "company"
          label: "Company"
          type: "text"
          required: false
          max_length: 200
          placeholder: "Enter company name"
          grid_column: "1/2"
        - key: "position"
          label: "Position / Title"
          type: "text"
          required: false
          max_length: 100
          placeholder: "e.g. Sales Manager"
          grid_column: "2/2"
        - key: "customer_id"
          label: "Link to Customer"
          type: "searchable_select"
          data_source: "customers"
          display_field: "full_name"
          search_fields: ["full_name", "company_name", "customer_number"]
          required: false
          nullable: true
          grid_column: "1/3"
        - key: "supplier_id"
          label: "Link to Supplier"
          type: "searchable_select"
          data_source: "suppliers"
          display_field: "full_name"
          search_fields: ["full_name", "company_name", "supplier_number"]
          required: false
          nullable: true
          grid_column: "2/3"
        - key: "lead_id"
          label: "Link to Lead"
          type: "searchable_select"
          data_source: "leads"
          display_field: "first_name + ' ' + last_name"
          search_fields: ["first_name", "last_name", "company", "lead_number"]
          required: false
          nullable: true
          grid_column: "3/3"
        - key: "is_primary"
          label: "Set as Primary Contact"
          type: "checkbox"
          default: false
          grid_column: "1/1"
        - key: "notes"
          label: "Notes"
          type: "textarea"
          required: false
          max_length: 5000
          rows: 4
          placeholder: "Add any notes about this contact..."
          grid_column: "1/1"

      actions:
        - id: "save"
          label: "Create Contact"
          type: "submit"
          color: "primary"
          action: "api_call"
          target: "POST /api/crm/contacts"
          on_success: "navigate"
          success_target: "/app/crm/contacts/{id}"
        - id: "save_and_new"
          label: "Save & Create Another"
          type: "submit"
          color: "secondary"
          action: "api_call"
          target: "POST /api/crm/contacts"
          on_success: "reset_form"
        - id: "cancel"
          label: "Cancel"
          type: "cancel"
          action: "navigate"
          target: "/app/crm/contacts"

    contacts_edit:
      route: "/app/crm/contacts/{id}/edit"
      title: "Edit Contact"
      layout: "form"
      permission: "crm.contacts.edit"
      data_source: "GET /api/crm/contacts/{id}"

      form_fields:
        - key: "first_name"
          label: "First Name"
          type: "text"
          required: true
          max_length: 100
          grid_column: "1/2"
        - key: "last_name"
          label: "Last Name"
          type: "text"
          required: true
          max_length: 100
          grid_column: "2/2"
        - key: "phone"
          label: "Phone"
          type: "tel"
          required: false
          max_length: 30
          grid_column: "1/3"
        - key: "mobile"
          label: "Mobile"
          type: "tel"
          required: false
          max_length: 30
          grid_column: "2/3"
        - key: "email"
          label: "Email"
          type: "email"
          required: false
          max_length: 255
          validation: "email_format"
          grid_column: "3/3"
        - key: "company"
          label: "Company"
          type: "text"
          required: false
          max_length: 200
          grid_column: "1/2"
        - key: "position"
          label: "Position / Title"
          type: "text"
          required: false
          max_length: 100
          grid_column: "2/2"
        - key: "customer_id"
          label: "Link to Customer"
          type: "searchable_select"
          data_source: "customers"
          display_field: "full_name"
          search_fields: ["full_name", "company_name", "customer_number"]
          required: false
          nullable: true
          grid_column: "1/3"
        - key: "supplier_id"
          label: "Link to Supplier"
          type: "searchable_select"
          data_source: "suppliers"
          display_field: "full_name"
          search_fields: ["full_name", "company_name", "supplier_number"]
          required: false
          nullable: true
          grid_column: "2/3"
        - key: "lead_id"
          label: "Link to Lead"
          type: "searchable_select"
          data_source: "leads"
          display_field: "first_name + ' ' + last_name"
          search_fields: ["first_name", "last_name", "company", "lead_number"]
          required: false
          nullable: true
          grid_column: "3/3"
        - key: "is_primary"
          label: "Set as Primary Contact"
          type: "checkbox"
          grid_column: "1/1"
        - key: "notes"
          label: "Notes"
          type: "textarea"
          required: false
          max_length: 5000
          rows: 4
          grid_column: "1/1"

      actions:
        - id: "save"
          label: "Save Changes"
          type: "submit"
          color: "primary"
          action: "api_call"
          target: "PUT /api/crm/contacts/{id}"
          on_success: "navigate"
          success_target: "/app/crm/contacts/{id}"
        - id: "cancel"
          label: "Cancel"
          type: "cancel"
          action: "navigate"
          target: "/app/crm/contacts/{id}"

    contacts_details:
      route: "/app/crm/contacts/{id}"
      title: "Contact Details"
      layout: "detail_with_tabs"
      permission: "crm.contacts.view"
      data_source: "GET /api/crm/contacts/{id}"

      header:
        title_field: "first_name + ' ' + last_name"
        subtitle_field: "position + ' at ' + company"
        meta_fields:
          - key: "is_primary"
            label: "Primary"
            type: "boolean_badge"
          - key: "created_at"
            label: "Created"
            type: "relative_time"

      header_actions:
        - id: "edit"
          label: "Edit"
          icon: "edit"
          type: "button_primary"
          action: "navigate"
          target: "/app/crm/contacts/{id}/edit"
          permission: "crm.contacts.edit"
        - id: "create_activity"
          label: "Log Activity"
          icon: "event"
          type: "button_secondary"
          action: "open_modal"
          target: "create_activity_modal"
        - id: "send_email"
          label: "Send Email"
          icon: "mail"
          type: "button_secondary"
          action: "open_modal"
          target: "send_email_modal"
          visible_when: "email IS NOT NULL"
        - id: "call"
          label: "Call"
          icon: "phone"
          type: "button_secondary"
          action: "tel"
          target: "{phone}"
          visible_when: "phone IS NOT NULL OR mobile IS NOT NULL"
        - id: "delete"
          label: "Delete"
          icon: "delete"
          type: "button_danger"
          action: "api_call"
          target: "DELETE /api/crm/contacts/{id}"
          confirmation: "Are you sure you want to delete this contact?"
          on_success: "navigate"
          success_target: "/app/crm/contacts"
          permission: "crm.contacts.delete"

      tabs:
        - id: "details"
          label: "Details"
          icon: "info"
          content:
            layout: "two_column"
            left_column:
              - section: "Contact Information"
                fields:
                  - key: "first_name"
                    label: "First Name"
                    type: "text"
                  - key: "last_name"
                    label: "Last Name"
                    type: "text"
                  - key: "phone"
                    label: "Phone"
                    type: "phone"
                    clickable: true
                  - key: "mobile"
                    label: "Mobile"
                    type: "phone"
                    clickable: true
                  - key: "email"
                    label: "Email"
                    type: "email"
                    clickable: true
                  - key: "company"
                    label: "Company"
                    type: "text"
                  - key: "position"
                    label: "Position"
                    type: "text"
                  - key: "is_primary"
                    label: "Primary Contact"
                    type: "boolean"
            right_column:
              - section: "Linked Records"
                fields:
                  - key: "customer_name"
                    label: "Customer"
                    type: "link"
                    click_action:
                      type: "navigate"
                      target: "/app/customers/{customer_id}"
                    visible_when: "customer_id IS NOT NULL"
                  - key: "supplier_name"
                    label: "Supplier"
                    type: "link"
                    click_action:
                      type: "navigate"
                      target: "/app/suppliers/{supplier_id}"
                    visible_when: "supplier_id IS NOT NULL"
                  - key: "lead_name"
                    label: "Lead"
                    type: "link"
                    click_action:
                      type: "navigate"
                      target: "/app/crm/leads/{lead_id}"
                    visible_when: "lead_id IS NOT NULL"
              - section: "Notes"
                fields:
                  - key: "notes"
                    label: ""
                    type: "rich_text"
              - section: "System Information"
                fields:
                  - key: "created_at"
                    label: "Created At"
                    type: "datetime"
                  - key: "updated_at"
                    label: "Last Updated"
                    type: "datetime"

        - id: "activities"
          label: "Activities"
          icon: "event"
          content:
            layout: "table"
            data_source: "GET /api/crm/activities?contact_id={id}"
            table_columns:
              - key: "activity_type"
                label: "Type"
                type: "enum_badge"
                enum_values: ["call", "meeting", "email", "task", "note"]
                colors:
                  call: "green"
                  meeting: "blue"
                  email: "cyan"
                  task: "orange"
                  note: "gray"
              - key: "subject"
                label: "Subject"
                type: "text"
                clickable: true
                click_action:
                  type: "navigate"
                  target: "/app/crm/activities/{id}"
              - key: "assigned_to"
                label: "Assigned To"
                type: "user_avatar_name"
              - key: "due_date"
                label: "Due Date"
                type: "datetime"
              - key: "status_id"
                label: "Status"
                type: "enum_badge"
                enum_values: ["planned", "completed", "cancelled"]
                colors:
                  planned: "blue"
                  completed: "green"
                  cancelled: "red"
              - key: "created_at"
                label: "Created"
                type: "datetime"
            actions:
              - id: "create_activity"
                label: "Log Activity"
                icon: "add"
                type: "button_primary"
                action: "open_modal"
                target: "create_activity_modal"

        - id: "communications"
          label: "Communications"
          icon: "forum"
          content:
            layout: "timeline"
            data_source: "GET /api/crm/communication-log?contact_id={id}"
            timeline_item_fields:
              - key: "channel"
                type: "icon"
                icon_map:
                  email: "mail"
                  phone: "phone"
                  whatsapp: "chat"
                  sms: "sms"
                  meeting: "groups"
                  other: "more_horiz"
              - key: "direction"
                type: "enum_badge"
                enum_values: ["inbound", "outbound"]
                colors:
                  inbound: "blue"
                  outbound: "green"
              - key: "subject"
                type: "text"
                bold: true
              - key: "content"
                type: "text"
                truncate: 200
                expandable: true
              - key: "created_by"
                type: "user_avatar_name"
              - key: "created_at"
                type: "relative_time"
            actions:
              - id: "log_communication"
                label: "Log Communication"
                icon: "add"
                type: "button_primary"
                action: "open_modal"
                target: "create_communication_modal"

        - id: "files"
          label: "Files"
          icon: "attach_file"
          content:
            layout: "file_grid"
            data_source: "GET /api/files?entity_type=contact&entity_id={id}"
            display_fields:
              - key: "file_name"
                label: "Name"
                type: "text"
              - key: "file_type"
                label: "Type"
                type: "file_icon"
              - key: "file_size"
                label: "Size"
                type: "file_size"
              - key: "uploaded_by"
                label: "Uploaded By"
                type: "user_avatar_name"
              - key: "created_at"
                label: "Uploaded"
                type: "relative_time"
            row_actions:
              - id: "download"
                label: "Download"
                icon: "download"
                action: "download"
                target: "/api/files/{file_id}/download"
              - id: "delete"
                label: "Delete"
                icon: "delete"
                action: "api_call"
                target: "DELETE /api/files/{file_id}"
                confirmation: "Delete this file?"
            actions:
              - id: "upload_file"
                label: "Upload File"
                icon: "upload"
                type: "button_primary"
                action: "open_file_picker"
                target: "POST /api/files"
                payload: { "entity_type": "contact", "entity_id": "{id}" }
                allowed_types: ["pdf", "doc", "docx", "xls", "xlsx", "csv", "jpg", "jpeg", "png", "gif", "txt"]
                max_size_mb: 25

        - id: "activity_log"
          label: "Activity Log"
          icon: "history"
          content:
            layout: "timeline"
            data_source: "GET /api/activity-log?entity_type=contact&entity_id={id}"
            timeline_item_fields:
              - key: "user_avatar"
                type: "avatar"
              - key: "user_name"
                type: "text"
              - key: "action"
                type: "text"
              - key: "created_at"
                type: "relative_time"
              - key: "details"
                type: "expandable_json"

    # ========== ACCOUNTS (CRM view of Customers + Suppliers) ==========
    accounts_list:
      route: "/app/crm/accounts"
