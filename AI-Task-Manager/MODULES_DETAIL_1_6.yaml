        - key: "cc"
          label: "CC"
          type: "email_multi"
          required: false
        - key: "subject"
          label: "Subject"
          type: "text"
          required: true
          max_length: 255
        - key: "body"
          label: "Body"
          type: "rich_text_editor"
          required: true
        - key: "attachments"
          label: "Attachments"
          type: "file_upload_multi"
