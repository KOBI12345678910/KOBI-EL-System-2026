          grid_column: "1/2"
        - key: "completed_at"
          label: "Completed At"
          type: "datetime"
          required: false
          visible_when: "status_id = 'completed'"
          grid_column: "2/2"

      actions:
        - id: "save"
          label: "Save Changes"
          type: "submit"
          color: "primary"
          action: "api_call"
          target: "PUT /api/crm/activities/{id}"
          on_success: "navigate"
          success_target: "/app/crm/activities/{id}"
        - id: "cancel"
          label: "Cancel"
          type: "cancel"
          action: "navigate"
          target: "/app/crm/activities/{id}"

    activities_details:
      route: "/app/crm/activities/{id}"
      title: "Activity Details"
      layout: "detail_with_tabs"
      permission: "crm.activities.view"
      data_source: "GET /api/crm/activities/{id}"

      header:
        title_field: "subject"
        subtitle_field: "activity_type_label"
        status_badge: "status_id"
        meta_fields:
          - key: "assigned_to"
            label: "Assigned To"
            type: "user_avatar_name"
          - key: "due_date"
            label: "Due"
            type: "datetime"
          - key: "created_at"
            label: "Created"
            type: "relative_time"

      header_actions:
        - id: "edit"
          label: "Edit"
          icon: "edit"
          type: "button_primary"
          action: "navigate"
          target: "/app/crm/activities/{id}/edit"
          permission: "crm.activities.edit"
        - id: "mark_complete"
          label: "Mark Complete"
          icon: "check_circle"
          type: "button_secondary"
          action: "api_call"
          target: "PATCH /api/crm/activities/{id}"
          payload: { "status_id": "completed", "completed_at": "{now}" }
          visible_when: "status_id = 'planned'"
        - id: "delete"
          label: "Delete"
          icon: "delete"
          type: "button_danger"
          action: "api_call"
          target: "DELETE /api/crm/activities/{id}"
          confirmation: "Delete this activity?"
          on_success: "navigate"
          success_target: "/app/crm/activities"
          permission: "crm.activities.delete"

      tabs:
        - id: "details"
          label: "Details"
          icon: "info"
          content:
            layout: "two_column"
            left_column:
              - section: "Activity Information"
                fields:
                  - key: "activity_type"
                    label: "Type"
                    type: "enum_badge"
                  - key: "subject"
                    label: "Subject"
                    type: "text"
                  - key: "description"
                    label: "Description"
                    type: "rich_text"
                  - key: "status_id"
                    label: "Status"
                    type: "enum_badge"
                  - key: "due_date"
                    label: "Due Date"
                    type: "datetime"
                  - key: "completed_at"
                    label: "Completed At"
                    type: "datetime"
                    visible_when: "completed_at IS NOT NULL"
            right_column:
              - section: "Linked Records"
                fields:
                  - key: "entity_type"
                    label: "Related Type"
                    type: "text"
                  - key: "entity_name"
                    label: "Related Record"
                    type: "link"
                    clickable: true
                    click_action:
                      type: "navigate"
                      target: "/{entity_type_route}/{entity_id}"
                  - key: "contact_name"
                    label: "Contact"
                    type: "link"
                    clickable: true
                    click_action:
                      type: "navigate"
                      target: "/app/crm/contacts/{contact_id}"
                    visible_when: "contact_id IS NOT NULL"
                  - key: "assigned_to"
                    label: "Assigned To"
                    type: "user_avatar_name"
              - section: "System Information"
                fields:
                  - key: "created_at"
                    label: "Created"
                    type: "datetime"

        - id: "files"
          label: "Files"
          icon: "attach_file"
          content:
            layout: "file_grid"
            data_source: "GET /api/files?entity_type=activity&entity_id={id}"
            display_fields:
              - key: "file_name"
                label: "Name"
                type: "text"
              - key: "file_size"
                label: "Size"
                type: "file_size"
              - key: "uploaded_by"
                label: "Uploaded By"
                type: "user_avatar_name"
              - key: "created_at"
                label: "Uploaded"
                type: "relative_time"
            actions:
              - id: "upload_file"
                label: "Upload File"
                icon: "upload"
                type: "button_primary"
                action: "open_file_picker"
                target: "POST /api/files"
                payload: { "entity_type": "activity", "entity_id": "{id}" }
                allowed_types: ["pdf", "doc", "docx", "xls", "xlsx", "csv", "jpg", "jpeg", "png", "gif", "txt"]
                max_size_mb: 25

        - id: "activity_log"
          label: "Activity Log"
          icon: "history"
          content:
            layout: "timeline"
            data_source: "GET /api/activity-log?entity_type=activity&entity_id={id}"
            timeline_item_fields:
              - key: "user_avatar"
                type: "avatar"
              - key: "user_name"
                type: "text"
              - key: "action"
                type: "text"
              - key: "created_at"
                type: "relative_time"
              - key: "details"
                type: "expandable_json"

    # ========== COMMUNICATION LOG ==========
    communication_log_list:
      route: "/app/crm/communication-log"
      title: "Communication Log"
      layout: "table_with_filters"
      permission: "crm.communication_log.view"
      default_sort: "created_at desc"

      table_columns:
        - key: "channel"
          label: "Channel"
          type: "enum_badge"
          enum_values: ["email", "phone", "whatsapp", "sms", "meeting", "other"]
          colors:
            email: "blue"
            phone: "green"
            whatsapp: "teal"
            sms: "orange"
            meeting: "purple"
            other: "gray"
          sortable: true
        - key: "direction"
          label: "Direction"
          type: "enum_badge"
          enum_values: ["inbound", "outbound"]
          colors:
            inbound: "blue"
            outbound: "green"
          sortable: true
        - key: "subject"
          label: "Subject"
          type: "text"
          sortable: true
        - key: "entity_type"
          label: "Related Type"
          type: "text"
        - key: "entity_name"
          label: "Related To"
          type: "text"
          clickable: true
          click_action:
            type: "navigate"
            target: "/{entity_type_route}/{entity_id}"
        - key: "contact_name"
          label: "Contact"
          type: "text"
          clickable: true
          click_action:
            type: "navigate"
            target: "/app/crm/contacts/{contact_id}"
          visible_when: "contact_id IS NOT NULL"
        - key: "created_by"
          label: "Logged By"
          type: "user_avatar_name"
          sortable: true
        - key: "created_at"
          label: "Date"
          type: "datetime"
          sortable: true

      filters:
        - key: "channel"
          label: "Channel"
          type: "multi_select"
          options: ["email", "phone", "whatsapp", "sms", "meeting", "other"]
        - key: "direction"
          label: "Direction"
          type: "multi_select"
          options: ["inbound", "outbound"]
        - key: "entity_type"
          label: "Related Type"
          type: "select"
          options: ["lead", "contact", "customer", "supplier", "opportunity"]
        - key: "created_by"
          label: "Logged By"
          type: "user_select"
          allow_multiple: true
        - key: "date_range"
          label: "Date Range"
          type: "date_range"
        - key: "search"
          label: "Search"
          type: "text"
          placeholder: "Search by subject or content..."
          search_fields: ["subject", "content"]

      actions:
        - id: "log_communication"
          label: "Log Communication"
          icon: "add"
          type: "button_primary"
          action: "navigate"
          target: "/app/crm/communication-log/create"
          permission: "crm.communication_log.create"
        - id: "export"
          label: "Export"
          icon: "download"
          type: "button_secondary"
          action: "export"
          formats: ["csv", "xlsx"]

    communication_log_create:
      route: "/app/crm/communication-log/create"
      title: "Log Communication"
      layout: "form"
      permission: "crm.communication_log.create"

      form_fields:
        - key: "channel"
          label: "Channel"
          type: "select"
          required: true
          options:
            - value: "email"
              label: "Email"
              icon: "mail"
            - value: "phone"
              label: "Phone"
              icon: "phone"
            - value: "whatsapp"
              label: "WhatsApp"
              icon: "chat"
            - value: "sms"
              label: "SMS"
              icon: "sms"
            - value: "meeting"
              label: "Meeting"
              icon: "groups"
            - value: "other"
              label: "Other"
              icon: "more_horiz"
          grid_column: "1/2"
        - key: "direction"
          label: "Direction"
          type: "select"
          required: true
          options:
            - value: "inbound"
              label: "Inbound (Received)"
            - value: "outbound"
              label: "Outbound (Sent)"
          grid_column: "2/2"
        - key: "subject"
          label: "Subject"
          type: "text"
          required: true
          max_length: 255
          placeholder: "Communication subject"
          grid_column: "1/1"
        - key: "content"
          label: "Content / Notes"
          type: "textarea"
          required: false
          max_length: 10000
          rows: 6
          placeholder: "Enter communication content or summary..."
          grid_column: "1/1"
        - key: "entity_type"
          label: "Related Entity Type"
          type: "select"
          required: true
          options:
            - value: "lead"
              label: "Lead"
            - value: "contact"
              label: "Contact"
            - value: "customer"
              label: "Customer"
            - value: "supplier"
              label: "Supplier"
            - value: "opportunity"
              label: "Opportunity"
          grid_column: "1/3"
        - key: "entity_id"
          label: "Related Record"
          type: "searchable_select"
          depends_on: "entity_type"
          required: true
          grid_column: "2/3"
        - key: "contact_id"
          label: "Contact Person"
          type: "searchable_select"
          data_source: "contacts"
          display_field: "first_name + ' ' + last_name"
          search_fields: ["first_name", "last_name", "email"]
          required: false
          nullable: true
          grid_column: "3/3"

      actions:
        - id: "save"
          label: "Log Communication"
          type: "submit"
          color: "primary"
          action: "api_call"
          target: "POST /api/crm/communication-log"
          on_success: "navigate"
          success_target: "/app/crm/communication-log"
        - id: "save_and_new"
          label: "Save & Log Another"
          type: "submit"
          color: "secondary"
          action: "api_call"
          target: "POST /api/crm/communication-log"
          on_success: "reset_form"
        - id: "cancel"
          label: "Cancel"
          type: "cancel"
          action: "navigate"
          target: "/app/crm/communication-log"

  # -- SHARED MODALS (used across CRM pages) --
  shared_modals:
    create_activity_modal:
      title: "Log Activity"
      fields:
        - key: "activity_type"
          label: "Type"
          type: "select"
          required: true
          options:
            - value: "call"
              label: "Phone Call"
            - value: "meeting"
              label: "Meeting"
            - value: "email"
              label: "Email"
            - value: "task"
              label: "Task"
            - value: "note"
              label: "Note"
        - key: "subject"
          label: "Subject"
          type: "text"
          required: true
          max_length: 255
        - key: "description"
          label: "Description"
          type: "textarea"
          required: false
          max_length: 5000
          rows: 3
        - key: "contact_id"
          label: "Contact Person"
          type: "searchable_select"
          data_source: "contacts"
          display_field: "first_name + ' ' + last_name"
          required: false
        - key: "assigned_to"
          label: "Assigned To"
          type: "user_select"
          required: true
          default: "{current_user_id}"
        - key: "due_date"
          label: "Due Date"
          type: "datetime"
          required: false
        - key: "status_id"
          label: "Status"
          type: "select"
          required: true
          default: "planned"
          options:
            - value: "planned"
