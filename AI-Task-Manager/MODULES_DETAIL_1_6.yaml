        - { key: "customer_id", label: "Customer", type: "searchable_select", data_source: "customers", display_field: "full_name" }
        - { key: "expected_amount_min", label: "Min Amount", type: "decimal" }
        - { key: "expected_amount_max", label: "Max Amount", type: "decimal" }
        - { key: "expected_close_date_range", label: "Close Date", type: "date_range" }
        - { key: "probability_min", label: "Min Probability", type: "integer", min: 0, max: 100 }
        - { key: "search", label: "Search", type: "text", placeholder: "Search by name, number, customer...", search_fields: ["name","opportunity_number","customer_name"] }
      actions:
        - { id: "create_opportunity", label: "New Opportunity", icon: "add", type: "button_primary", action: "navigate", target: "/app/sales/opportunities/create", permission: "sales.opportunities.create" }
        - { id: "export", label: "Export", icon: "download", type: "button_secondary", action: "export", formats: ["csv","xlsx"] }
        - { id: "view_pipeline", label: "Pipeline View", icon: "view_kanban", type: "button_secondary", action: "navigate", target: "/app/sales/pipeline" }
        - { id: "bulk_delete", label: "Delete", icon: "delete", type: "bulk_action", requires_selection: true, action: "api_call", target: "DELETE /api/sales/opportunities/bulk", confirmation: "Delete selected?", permission: "sales.opportunities.delete" }

    opportunities_create:
      route: "/app/sales/opportunities/create"
      title: "Create Opportunity"
      layout: "form"
      permission: "sales.opportunities.create"
      form_fields:
        - { key: "name", label: "Opportunity Name", type: "text", required: true, max_length: 255, grid_column: "1/1" }
        - { key: "customer_id", label: "Customer", type: "searchable_select", data_source: "customers", display_field: "full_name", required: true, grid_column: "1/2" }
        - { key: "contact_id", label: "Contact", type: "searchable_select", data_source: "contacts", filter: "customer_id = {customer_id}", depends_on: "customer_id", required: false, nullable: true, grid_column: "2/2" }
        - { key: "stage", label: "Stage", type: "select", required: true, default: "new", options: [{value: "new", label: "New"},{value: "qualification", label: "Qualification"},{value: "proposal", label: "Proposal"},{value: "negotiation", label: "Negotiation"}], grid_column: "1/3" }
        - { key: "probability", label: "Probability (%)", type: "integer", required: true, min: 0, max: 100, default: 10, grid_column: "2/3" }
        - { key: "expected_amount", label: "Expected Amount", type: "decimal", required: true, precision: 2, min: 0, grid_column: "3/3" }
        - { key: "expected_close_date", label: "Expected Close Date", type: "date", required: true, grid_column: "1/2" }
        - { key: "assigned_to", label: "Assigned To", type: "user_select", required: true, default: "{current_user_id}", grid_column: "2/2" }
        - { key: "source", label: "Source", type: "text", required: false, max_length: 100, grid_column: "1/2" }
        - { key: "notes", label: "Notes", type: "textarea", required: false, max_length: 5000, rows: 4, grid_column: "1/1" }
      actions:
        - { id: "save", label: "Create Opportunity", type: "submit", color: "primary", action: "api_call", target: "POST /api/sales/opportunities", on_success: "navigate", success_target: "/app/sales/opportunities/{id}" }
        - { id: "save_and_new", label: "Save & Create Another", type: "submit", color: "secondary", action: "api_call", target: "POST /api/sales/opportunities", on_success: "reset_form" }
        - { id: "cancel", label: "Cancel", type: "cancel", action: "navigate", target: "/app/sales/opportunities" }

    opportunities_edit:
      route: "/app/sales/opportunities/{id}/edit"
      title: "Edit Opportunity"
      layout: "form"
      permission: "sales.opportunities.edit"
      data_source: "GET /api/sales/opportunities/{id}"
      note: "Same fields as create form plus closed_won/closed_lost stage options. Pre-populated."
      actions:
        - { id: "save", label: "Save Changes", type: "submit", color: "primary", action: "api_call", target: "PUT /api/sales/opportunities/{id}", on_success: "navigate", success_target: "/app/sales/opportunities/{id}" }
        - { id: "cancel", label: "Cancel", type: "cancel", action: "navigate", target: "/app/sales/opportunities/{id}" }

    opportunities_details:
      route: "/app/sales/opportunities/{id}"
      title: "Opportunity Details"
      layout: "detail_with_tabs"
      permission: "sales.opportunities.view"
      data_source: "GET /api/sales/opportunities/{id}"
      header:
        title_field: "name"
        subtitle_field: "customer_name"
        status_badge: "stage"
        meta_fields:
          - { key: "opportunity_number", label: "Opp #" }
          - { key: "expected_amount", label: "Amount", type: "currency" }
          - { key: "probability", label: "Probability", type: "percentage" }
          - { key: "expected_close_date", label: "Close Date", type: "date" }
          - { key: "assigned_to", label: "Owner", type: "user_avatar_name" }
      header_actions:
        - { id: "edit", label: "Edit", icon: "edit", type: "button_primary", action: "navigate", target: "/app/sales/opportunities/{id}/edit" }
        - { id: "create_quote", label: "Create Quote", icon: "request_quote", type: "button_secondary", action: "navigate", target: "/app/sales/quotations/create?opportunity_id={id}&customer_id={customer_id}", visible_when: "stage NOT IN ('closed_won','closed_lost')" }
        - { id: "mark_won", label: "Won", icon: "emoji_events", type: "button_success", action: "api_call", target: "PATCH /api/sales/opportunities/{id}", payload: { "stage": "closed_won", "probability": 100 }, confirmation: "Mark as Won?", visible_when: "stage NOT IN ('closed_won','closed_lost')" }
        - { id: "mark_lost", label: "Lost", icon: "cancel", type: "button_danger", action: "open_modal", target: "lost_reason_modal", visible_when: "stage NOT IN ('closed_won','closed_lost')" }
        - { id: "delete", label: "Delete", icon: "delete", type: "button_danger", action: "api_call", target: "DELETE /api/sales/opportunities/{id}", confirmation: "Delete?", on_success: "navigate", success_target: "/app/sales/opportunities" }
      lost_reason_modal:
        title: "Mark as Lost"
        fields:
          - { key: "lost_reason", label: "Reason", type: "select", required: true, options: ["price","competitor","no_budget","no_response","timing","requirements","other"] }
          - { key: "lost_notes", label: "Notes", type: "textarea", required: false, max_length: 1000 }
        actions:
          - { id: "confirm", label: "Mark Lost", type: "submit", color: "red", action: "api_call", target: "PATCH /api/sales/opportunities/{id}", payload: { "stage": "closed_lost", "probability": 0 } }
          - { id: "cancel", label: "Cancel", type: "cancel", action: "close_modal" }
      tabs:
        - id: "details"
          label: "Details"
          icon: "info"
          content:
            layout: "two_column"
            left_column:
              - section: "Opportunity Information"
                fields:
                  - { key: "name", label: "Name", type: "text" }
                  - { key: "stage", label: "Stage", type: "enum_badge" }
                  - { key: "probability", label: "Probability", type: "percentage" }
                  - { key: "expected_amount", label: "Expected Amount", type: "currency" }
                  - { key: "weighted_amount", label: "Weighted Amount", type: "currency", calculated: "expected_amount * probability / 100" }
                  - { key: "expected_close_date", label: "Close Date", type: "date" }
                  - { key: "source", label: "Source", type: "text" }
            right_column:
              - section: "Related"
                fields:
                  - { key: "customer_name", label: "Customer", type: "link", click_action: { type: "navigate", target: "/app/customers/{customer_id}" } }
                  - { key: "contact_name", label: "Contact", type: "link", click_action: { type: "navigate", target: "/app/crm/contacts/{contact_id}" }, visible_when: "contact_id IS NOT NULL" }
                  - { key: "assigned_to", label: "Owner", type: "user_avatar_name" }
              - section: "Notes"
                fields: [{ key: "notes", label: "", type: "rich_text" }]
              - section: "System"
                fields:
                  - { key: "opportunity_number", label: "Opp #", type: "text" }
                  - { key: "created_at", label: "Created", type: "datetime" }
                  - { key: "updated_at", label: "Updated", type: "datetime" }
        - id: "quotations"
          label: "Quotations"
          icon: "request_quote"
          content:
            layout: "table"
            data_source: "GET /api/sales/quotations?opportunity_id={id}"
            table_columns:
              - { key: "quote_number", label: "Quote #", type: "text", clickable: true, click_action: { type: "navigate", target: "/app/sales/quotations/{id}" } }
              - { key: "issue_date", label: "Date", type: "date" }
              - { key: "total_amount", label: "Amount", type: "currency" }
              - { key: "status_id", label: "Status", type: "enum_badge", colors: { draft: "gray", sent: "blue", accepted: "green", rejected: "red", expired: "orange" } }
            actions:
              - { id: "create_quote", label: "Create Quote", icon: "add", type: "button_primary", action: "navigate", target: "/app/sales/quotations/create?opportunity_id={id}&customer_id={customer_id}" }
        - id: "activities"
          label: "Activities"
          icon: "event"
          content:
            layout: "table"
            data_source: "GET /api/crm/activities?entity_type=opportunity&entity_id={id}"
            table_columns:
              - { key: "activity_type", label: "Type", type: "enum_badge" }
              - { key: "subject", label: "Subject", type: "text", clickable: true, click_action: { type: "navigate", target: "/app/crm/activities/{id}" } }
              - { key: "due_date", label: "Due", type: "datetime" }
              - { key: "status_id", label: "Status", type: "enum_badge" }
        - id: "communications"
          label: "Communications"
          icon: "forum"
          content:
            layout: "timeline"
            data_source: "GET /api/crm/communication-log?entity_type=opportunity&entity_id={id}"
        - id: "files"
          label: "Files"
          icon: "attach_file"
          content:
            layout: "file_grid"
            data_source: "GET /api/files?entity_type=opportunity&entity_id={id}"
            actions:
              - { id: "upload_file", label: "Upload", icon: "upload", type: "button_primary", action: "open_file_picker", target: "POST /api/files", payload: { "entity_type": "opportunity", "entity_id": "{id}" } }
        - id: "activity_log"
          label: "Activity Log"
          icon: "history"
          content:
            layout: "timeline"
            data_source: "GET /api/activity-log?entity_type=opportunity&entity_id={id}"

    quotations_list:
      route: "/app/sales/quotations"
      title: "Quotations"
      layout: "table_with_filters"
      permission: "sales.quotations.view"
      default_sort: "created_at desc"
      table_columns:
        - { key: "quote_number", label: "Quote #", type: "text", sortable: true, clickable: true, click_action: { type: "navigate", target: "/app/sales/quotations/{id}" } }
        - { key: "customer_name", label: "Customer", type: "text", sortable: true, clickable: true, click_action: { type: "navigate", target: "/app/customers/{customer_id}" } }
        - { key: "issue_date", label: "Issue Date", type: "date", sortable: true }
        - { key: "valid_until", label: "Valid Until", type: "date", sortable: true, highlight_rule: "red if < today AND status IN ('draft','sent')" }
        - { key: "subtotal", label: "Subtotal", type: "currency" }
        - { key: "discount_amount", label: "Discount", type: "currency" }
        - { key: "tax_amount", label: "Tax", type: "currency" }
        - { key: "total_amount", label: "Total", type: "currency", sortable: true }
        - { key: "status_id", label: "Status", type: "enum_badge", colors: { draft: "gray", sent: "blue", accepted: "green", rejected: "red", expired: "orange" }, sortable: true }
        - { key: "created_at", label: "Created", type: "datetime", sortable: true }
      filters:
        - { key: "status_id", label: "Status", type: "multi_select", options: ["draft","sent","accepted","rejected","expired"] }
        - { key: "customer_id", label: "Customer", type: "searchable_select", data_source: "customers" }
        - { key: "issue_date_range", label: "Issue Date", type: "date_range" }
        - { key: "total_amount_min", label: "Min Amount", type: "decimal" }
        - { key: "total_amount_max", label: "Max Amount", type: "decimal" }
        - { key: "search", label: "Search", type: "text", placeholder: "Search by quote #, customer..." }
      actions:
        - { id: "create_quote", label: "New Quote", icon: "add", type: "button_primary", action: "navigate", target: "/app/sales/quotations/create" }
        - { id: "export", label: "Export", icon: "download", type: "button_secondary", action: "export", formats: ["csv","xlsx"] }

    quotations_create:
      route: "/app/sales/quotations/create"
      title: "Create Quotation"
      layout: "document_form"
      permission: "sales.quotations.create"
      header_fields:
        - { key: "customer_id", label: "Customer", type: "searchable_select", data_source: "customers", required: true, grid_column: "1/2", on_change: "auto_fill_customer_details" }
        - { key: "contact_id", label: "Contact", type: "searchable_select", data_source: "contacts", filter: "customer_id={customer_id}", depends_on: "customer_id", required: false, grid_column: "2/2" }
        - { key: "opportunity_id", label: "Opportunity", type: "searchable_select", data_source: "opportunities", filter: "customer_id={customer_id}", depends_on: "customer_id", required: false, grid_column: "1/2" }
        - { key: "issue_date", label: "Issue Date", type: "date", required: true, default: "{today}", grid_column: "1/3" }
        - { key: "valid_until", label: "Valid Until", type: "date", required: true, default: "{today+30}", grid_column: "2/3" }
        - { key: "status_id", label: "Status", type: "select", required: true, default: "draft", options: ["draft","sent"], grid_column: "3/3" }
      line_items:
        entity: "quote_items"
        add_button_label: "Add Line Item"
        columns:
          - { key: "product_id", label: "Product/Service", type: "searchable_select", data_source: "products", required: true, width: "30%", on_change: "auto_fill_product_details" }
          - { key: "description", label: "Description", type: "text", width: "20%", auto_fill_from: "product.description" }
          - { key: "quantity", label: "Qty", type: "decimal", required: true, precision: 3, default: 1, width: "8%" }
          - { key: "unit_price", label: "Unit Price", type: "decimal", required: true, precision: 2, width: "12%", auto_fill_from: "product.default_price" }
          - { key: "discount_percent", label: "Disc %", type: "decimal", precision: 2, default: 0, width: "8%" }
          - { key: "tax_rate", label: "Tax %", type: "decimal", required: true, precision: 2, width: "8%", auto_fill_from: "product.tax_rate" }
          - { key: "line_total", label: "Total", type: "decimal", calculated: true, calculation: "(qty*price)*(1-disc/100)", read_only: true, width: "14%" }
        row_actions: ["move_up", "move_down", "duplicate", "remove"]
      summary_fields:
        - { key: "subtotal", label: "Subtotal", type: "currency", calculated: "SUM(line_totals)", read_only: true }
        - { key: "discount_amount", label: "Additional Discount", type: "decimal", precision: 2, default: 0 }
        - { key: "tax_amount", label: "Tax Total", type: "currency", calculated: "SUM(tax per line)", read_only: true }
        - { key: "total_amount", label: "Grand Total", type: "currency", calculated: "subtotal - discount + tax", read_only: true, bold: true }
      footer_fields:
        - { key: "notes", label: "Notes/Terms", type: "textarea", required: false, max_length: 5000, rows: 3 }
      actions:
        - { id: "save_draft", label: "Save Draft", type: "submit", color: "secondary", action: "api_call", target: "POST /api/sales/quotations", payload_override: { "status_id": "draft" }, on_success: "navigate", success_target: "/app/sales/quotations/{id}" }
        - { id: "save_send", label: "Save & Send", type: "submit", color: "primary", action: "api_call", target: "POST /api/sales/quotations", payload_override: { "status_id": "sent" }, on_success: "open_modal", success_target: "send_quote_email_modal" }
        - { id: "cancel", label: "Cancel", type: "cancel", action: "navigate", target: "/app/sales/quotations" }

    quotations_edit:
      route: "/app/sales/quotations/{id}/edit"
      title: "Edit Quotation"
      layout: "document_form"
      permission: "sales.quotations.edit"
      data_source: "GET /api/sales/quotations/{id}?include=items"
      note: "Same as create form, pre-populated."

    quotations_details:
      route: "/app/sales/quotations/{id}"
      title: "Quotation Details"
      layout: "document_detail"
      permission: "sales.quotations.view"
      data_source: "GET /api/sales/quotations/{id}?include=items"
      header:
        title_field: "quote_number"
        subtitle_field: "customer_name"
        status_badge: "status_id"
        meta_fields: [{ key: "issue_date", label: "Issued", type: "date" }, { key: "valid_until", label: "Valid Until", type: "date" }, { key: "total_amount", label: "Total", type: "currency" }]
      header_actions:
        - { id: "edit", label: "Edit", icon: "edit", type: "button_primary", action: "navigate", target: "/app/sales/quotations/{id}/edit", visible_when: "status_id='draft'" }
        - { id: "send", label: "Send", icon: "send", type: "button_secondary", action: "open_modal", target: "send_quote_email_modal", visible_when: "status_id IN ('draft','sent')" }
        - { id: "mark_accepted", label: "Accepted", icon: "check_circle", type: "button_success", action: "api_call", target: "PATCH /api/sales/quotations/{id}", payload: { "status_id": "accepted" }, visible_when: "status_id='sent'" }
        - { id: "mark_rejected", label: "Rejected", icon: "cancel", type: "button_danger", action: "api_call", target: "PATCH /api/sales/quotations/{id}", payload: { "status_id": "rejected" }, visible_when: "status_id='sent'" }
        - { id: "convert_to_order", label: "Convert to Sales Order", icon: "shopping_cart", type: "button_primary", action: "api_call", target: "POST /api/sales/quotations/{id}/convert-to-order", on_success: "navigate", success_target: "/app/sales/sales-orders/{new_order_id}", visible_when: "status_id='accepted'" }
        - { id: "duplicate", label: "Duplicate", icon: "content_copy", type: "button_secondary", action: "api_call", target: "POST /api/sales/quotations/{id}/duplicate" }
        - { id: "print_pdf", label: "PDF", icon: "print", type: "button_secondary", action: "download", target: "/api/sales/quotations/{id}/pdf" }
