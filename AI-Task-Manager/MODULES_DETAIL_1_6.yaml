    create_communication_modal:
      title: "Log Communication"
      fields:
        - key: "channel"
          label: "Channel"
          type: "select"
          required: true
          options:
            - value: "email"
              label: "Email"
            - value: "phone"
              label: "Phone"
            - value: "whatsapp"
              label: "WhatsApp"
            - value: "sms"
              label: "SMS"
            - value: "meeting"
              label: "Meeting"
            - value: "other"
              label: "Other"
        - key: "direction"
          label: "Direction"
          type: "select"
          required: true
          options:
            - value: "inbound"
              label: "Inbound"
            - value: "outbound"
              label: "Outbound"
        - key: "subject"
          label: "Subject"
          type: "text"
          required: true
          max_length: 255
        - key: "content"
          label: "Content"
          type: "textarea"
          required: false
          max_length: 10000
          rows: 4
        - key: "contact_id"
          label: "Contact Person"
          type: "searchable_select"
          data_source: "contacts"
          display_field: "first_name + ' ' + last_name"
          required: false
      actions:
        - id: "save"
          label: "Log"
          type: "submit"
          action: "api_call"
          target: "POST /api/crm/communication-log"
          payload_includes: { "entity_type": "{context_entity_type}", "entity_id": "{context_entity_id}" }
        - id: "cancel"
          label: "Cancel"
          type: "cancel"
          action: "close_modal"

    send_email_modal:
      title: "Send Email"
      fields:
        - key: "to"
          label: "To"
          type: "email"
