          action: "navigate"
          target: "/app/suppliers/create"
        - id: "export"
          label: "Export"
          icon: "download"
          type: "button_secondary"
          action: "export"
          formats: ["csv", "xlsx"]

    # ========== ACTIVITIES ==========
    activities_list:
      route: "/app/crm/activities"
      title: "Activities"
      layout: "table_with_filters"
      permission: "crm.activities.view"
      default_sort: "due_date asc"

      table_columns:
        - key: "activity_type"
          label: "Type"
          type: "enum_badge"
          enum_values: ["call", "meeting", "email", "task", "note"]
          colors:
            call: "green"
            meeting: "blue"
            email: "cyan"
            task: "orange"
            note: "gray"
          sortable: true
        - key: "subject"
          label: "Subject"
          type: "text"
          sortable: true
          clickable: true
          click_action:
            type: "navigate"
            target: "/app/crm/activities/{id}"
        - key: "entity_type"
          label: "Related To"
          type: "text"
          display: "entity_type_label"
        - key: "entity_name"
          label: "Entity"
          type: "text"
          clickable: true
          click_action:
            type: "navigate"
            target: "/{entity_type_route}/{entity_id}"
        - key: "contact_name"
          label: "Contact"
          type: "text"
          clickable: true
          click_action:
            type: "navigate"
            target: "/app/crm/contacts/{contact_id}"
          visible_when: "contact_id IS NOT NULL"
        - key: "assigned_to"
          label: "Assigned To"
          type: "user_avatar_name"
          sortable: true
        - key: "due_date"
          label: "Due Date"
          type: "datetime"
          sortable: true
          highlight_rule: "red if due_date < now AND status_id = 'planned'"
        - key: "status_id"
          label: "Status"
          type: "enum_badge"
          enum_values: ["planned", "completed", "cancelled"]
          colors:
            planned: "blue"
            completed: "green"
            cancelled: "red"
          sortable: true
        - key: "created_at"
          label: "Created"
          type: "datetime"
          sortable: true

      filters:
        - key: "activity_type"
          label: "Activity Type"
          type: "multi_select"
          options: ["call", "meeting", "email", "task", "note"]
        - key: "status_id"
          label: "Status"
          type: "multi_select"
          options: ["planned", "completed", "cancelled"]
          default: ["planned"]
        - key: "assigned_to"
          label: "Assigned To"
          type: "user_select"
          allow_multiple: true
        - key: "entity_type"
          label: "Related Entity Type"
          type: "select"
          options: ["lead", "contact", "customer", "supplier", "opportunity"]
        - key: "due_date_range"
          label: "Due Date"
          type: "date_range"
        - key: "search"
          label: "Search"
          type: "text"
          placeholder: "Search by subject..."

      actions:
        - id: "create_activity"
          label: "New Activity"
          icon: "add"
          type: "button_primary"
          action: "navigate"
          target: "/app/crm/activities/create"
          permission: "crm.activities.create"
        - id: "bulk_complete"
          label: "Mark Complete"
          icon: "check"
          type: "bulk_action"
          requires_selection: true
          action: "api_call"
          target: "PATCH /api/crm/activities/bulk-update"
          payload: { "status_id": "completed", "completed_at": "{now}" }
        - id: "export"
          label: "Export"
          icon: "download"
          type: "button_secondary"
          action: "export"
          formats: ["csv", "xlsx"]

