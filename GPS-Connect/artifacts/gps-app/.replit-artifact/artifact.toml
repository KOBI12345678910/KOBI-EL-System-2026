kind = "web"
previewPath = "/"
title = "GPS Tracker"
version = "1.0.0"
id = "artifacts/gps-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21597

[services.development]
run = "pnpm --filter @workspace/gps-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gps-app", "run", "build" ]
publicDir = "artifacts/gps-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21597"
BASE_PATH = "/"
