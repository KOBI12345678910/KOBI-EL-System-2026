name: erp-2026-kobi-el
services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-2026-kobi-el-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - 5432:5432
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
      restart_policy:
        condition: any
        max_attempts: 5
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: false
  redis:
    image: redis:7-alpine
    container_name: erp-2026-kobi-el-redis
    restart: unless-stopped
    env_file: .env
    command:
      - redis-server
      - "--appendonly"
      - "yes"
      - "--maxmemory"
      - 512mb
      - "--maxmemory-policy"
      - allkeys-lru
    ports:
      - 6379:6379
    volumes:
      - ./data/redis:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 256M
      restart_policy:
        condition: any
        max_attempts: 5
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: false
  onyx-procurement:
    image: ${IMAGE_PREFIX:-erp}/onyx-procurement:${IMAGE_TAG:-latest}
    container_name: erp-2026-kobi-el-onyx-procurement
    restart: unless-stopped
    env_file: .env
    ports:
      - 3100:3100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/onyx-procurement:/app/data
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://localhost:3100/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 1.5G
        reservations:
          cpus: "0.20"
          memory: 384M
      restart_policy:
        condition: any
        max_attempts: 5
    networks:
      - frontend
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: false
  techno-kol-ops:
    image: ${IMAGE_PREFIX:-erp}/techno-kol-ops:${IMAGE_TAG:-latest}
    container_name: erp-2026-kobi-el-techno-kol-ops
    restart: unless-stopped
