<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BANK OPS — התאמות בנקאיות • טכנו כל עוזי</title>
    <meta name="description" content="דשבורד התאמות בנקאיות — ניהול חשבונות, תנועות, התאמות אוטומטיות ואי התאמות" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: #0c0f1a; color: #e2e8f0; font-family: 'Rubik', sans-serif; min-height: 100vh; }
      #root { min-height: 100vh; }
      .boot {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 100vh; gap: 14px; color: #64748b; font-family: 'Rubik', sans-serif;
      }
      .boot .logo {
        width: 56px; height: 56px; border-radius: 16px;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; font-weight: 900; color: #0c0f1a;
        animation: pulse 2s ease-in-out infinite;
      }
      .boot .title { font-size: 20px; font-weight: 900; color: #38bdf8; letter-spacing: -0.5px; }
      .boot .sub { font-size: 12px; color: #64748b; }
      @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.95); } }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot">
        <div class="logo">₪</div>
        <div class="title">BANK OPS</div>
        <div class="sub">טוען דשבורד התאמות בנקאיות...</div>
      </div>
    </div>

    <!-- Configure API base + key before loading the app -->
    <script>
      // Override the API base here if backend is on a different host.
      // window.ONYX_API_URL = "http://localhost:3100";
      // To set the API key via the browser console, run:
      //   localStorage.setItem("onyx_api_key", "YOUR_KEY")
    </script>

    <!-- React 18 + Babel standalone (CDN only, no npm deps) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Shim the module-style imports that bank-dashboard.jsx uses -->
    <script>
      window.__reactHooks = {
        useState: React.useState,
        useEffect: React.useEffect,
        useCallback: React.useCallback,
        useMemo: React.useMemo,
      };
    </script>

    <!-- Load and transpile bank-dashboard.jsx on the fly -->
    <script type="text/babel" data-presets="env,react" data-type="module">
      // Resolve `import { ... } from "react"` to globals
      const { useState, useEffect, useCallback, useMemo } = React;

      // Inline-fetch the JSX source and eval it after stripping the ES import
      (async () => {
        try {
          const res = await fetch("./bank-dashboard.jsx");
          if (!res.ok) throw new Error("לא ניתן לטעון bank-dashboard.jsx (" + res.status + ")");
          let src = await res.text();

          // Strip the top ES-module React hooks import — hooks are already in scope.
          src = src.replace(/^\s*import\s*\{[^}]*\}\s*from\s*["']react["'];?\s*/m, "");

          // Replace `export default function BankDashboard` with a plain declaration
          src = src.replace(/export\s+default\s+function\s+BankDashboard/, "function BankDashboard");

          // Replace any `import.meta?.env?...` references (unsupported in Babel standalone)
          src = src.replace(/import\.meta\?\.env\?\.[A-Z_]+/g, "undefined");
          src = src.replace(/import\.meta/g, "({})");

          // Transpile JSX via Babel
          const compiled = Babel.transform(src, {
            presets: ["env", "react"],
          }).code;

          // Execute in a scope that exposes React hooks + mounts BankDashboard
          const fn = new Function(
            "React", "useState", "useEffect", "useCallback", "useMemo",
            compiled + "\n;return BankDashboard;"
          );
          const BankDashboard = fn(React, useState, useEffect, useCallback, useMemo);

          const root = ReactDOM.createRoot(document.getElementById("root"));
          root.render(React.createElement(BankDashboard));
        } catch (err) {
          console.error("Bank dashboard boot failure:", err);
          document.getElementById("root").innerHTML =
            '<div class="boot"><div class="logo" style="background:#dc2626">!</div>' +
            '<div class="title" style="color:#ef4444">שגיאה בטעינה</div>' +
            '<div class="sub">' + (err && err.message ? err.message : String(err)) + '</div></div>';
        }
      })();
    </script>
  </body>
</html>
