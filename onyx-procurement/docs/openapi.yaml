  /webhook/whatsapp:
    get:
      tags: [Webhooks]
      summary: WhatsApp Business verification handshake
      security: []
      parameters:
        - in: query
          name: hub.mode
          schema: { type: string }
        - in: query
          name: hub.verify_token
          schema: { type: string }
        - in: query
          name: hub.challenge
          schema: { type: string }
      responses:
        "200":
          description: Challenge echoed
        "403":
          description: Token mismatch
    post:
      tags: [Webhooks]
      summary: Inbound WhatsApp messages (HMAC-SHA256 verified)
      security: []
      parameters:
        - in: header
          name: X-Hub-Signature-256
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Acknowledged
        "401":
          description: Invalid signature
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
