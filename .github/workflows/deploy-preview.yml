name: Deploy Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-frontends:
    name: Build frontend — ${{ matrix.frontend.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        frontend:
          - name: onyx-procurement-web
            path: onyx-procurement/web
          - name: payroll-autonomous
            path: payroll-autonomous
          - name: techno-kol-ops-client
            path: techno-kol-ops/client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify frontend path exists
        id: check
        shell: bash
        run: |
          if [ -d "${{ matrix.frontend.path }}" ] && [ -f "${{ matrix.frontend.path }}/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Frontend path '${{ matrix.frontend.path }}' missing package.json — skipping"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache node_modules
        if: steps.check.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ matrix.frontend.path }}/node_modules
          key: ${{ runner.os }}-node20-${{ matrix.frontend.name }}-${{ hashFiles(format('{0}/package-lock.json', matrix.frontend.path), format('{0}/package.json', matrix.frontend.path)) }}
          restore-keys: |
            ${{ runner.os }}-node20-${{ matrix.frontend.name }}-

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.frontend.path }}
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.frontend.path }}
        shell: bash
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
            npm run build
          else
            echo "No build script for ${{ matrix.frontend.name }} — skipping"
          fi

      - name: Upload preview artifact
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: preview-${{ matrix.frontend.name }}-${{ github.event.pull_request.number }}
          path: |
            ${{ matrix.frontend.path }}/dist
            ${{ matrix.frontend.path }}/build
          if-no-files-found: ignore
          retention-days: 7

  comment-pr:
    name: Comment preview link placeholder
    runs-on: ubuntu-latest
    needs: build-frontends
    if: always()
    steps:
      - name: Post / update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) { core.info('No PR context — skipping'); return; }
            const marker = '<!-- deploy-preview-comment -->';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = [
              marker,
              '## Preview Build Summary',
              '',
              `Commit: \`${context.sha.substring(0,7)}\``,
              `Workflow: ${runUrl}`,
              '',
              '| Frontend | Preview URL |',
              '| --- | --- |',
              '| onyx-procurement/web | _TBD — preview link placeholder_ |',
              '| payroll-autonomous | _TBD — preview link placeholder_ |',
              '| techno-kol-ops/client | _TBD — preview link placeholder_ |',
              '',
              '_Artifacts from this run are attached to the workflow summary._',
              '_Auto-generated by `.github/workflows/deploy-preview.yml`._',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated comment ${existing.id}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
              core.info(`Created comment ${created.data.id}`);
            }
