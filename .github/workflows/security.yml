name: Security

on:
  schedule:
    # Every Monday at 04:17 UTC
    - cron: '17 4 * * 1'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm audit — ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - onyx-procurement
          - onyx-ai
          - techno-kol-ops
          - payroll-autonomous

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (no audit on install)
        working-directory: ${{ matrix.project }}
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Run npm audit (high)
        id: audit
        working-directory: ${{ matrix.project }}
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high --json > audit-report.json
          STATUS=$?
          echo "audit_status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "---- audit summary ----"
          npm audit --audit-level=high || true
          exit ${STATUS}
        continue-on-error: true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-${{ matrix.project }}-${{ github.run_id }}
          path: ${{ matrix.project }}/audit-report.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Open security issue on audit failure
        if: steps.audit.outputs.audit_status != '0' && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const project = '${{ matrix.project }}';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            let reportSnippet = '_No audit-report.json produced._';
            try {
              const reportPath = path.join(project, 'audit-report.json');
              if (fs.existsSync(reportPath)) {
                const raw = fs.readFileSync(reportPath, 'utf8');
                reportSnippet = '```json\n' + raw.slice(0, 6000) + '\n```';
              }
            } catch (e) {
              core.warning(`Could not read audit report: ${e.message}`);
            }
            const title = `[security] npm audit high/critical findings in ${project}`;
            const body = [
              `## npm audit failure — \`${project}\``,
              '',
              `Workflow run: ${runUrl}`,
              `Commit: \`${context.sha}\``,
              `Triggered by: \`${context.eventName}\``,
              '',
              '### Audit report (truncated)',
              reportSnippet,
              '',
              '_Auto-generated by `.github/workflows/security.yml`._',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,automated',
              per_page: 100,
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body,
              });
              core.info(`Updated existing issue #${dup.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security', 'automated', project],
              });
              core.info(`Created issue #${created.data.number}`);
            }

      - name: Fail job if audit failed
        if: steps.audit.outputs.audit_status != '0'
        shell: bash
        run: |
          echo "npm audit reported high/critical vulnerabilities for ${{ matrix.project }}" >&2
          exit 1

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
