version: 2

updates:
  # GitHub Actions themselves
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # onyx-procurement (Node/Express)
  - package-ecosystem: "npm"
    directory: "/onyx-procurement"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Jerusalem"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "onyx-procurement"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      onyx-procurement-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

