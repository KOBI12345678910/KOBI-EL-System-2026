# ═══════════════════════════════════════════════════════════════════════════
# ERP 2026 — Unified reverse proxy
# Profile: proxy    (docker compose --profile proxy up -d)
# Routes:
#   /                         -> payroll-autonomous (SPA)
#   /api/procurement/*        -> onyx-procurement:3100
#   /api/ops/*                -> techno-kol-ops:3200
#   /api/ai/*                 -> onyx-ai:3300
#   /healthz                  -> 200 OK (nginx own healthcheck)
# ═══════════════════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout  65;
    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/x-javascript;
    gzip_min_length 1024;

    # ─── Upstreams ────────────────────────────────────────────────────────
    upstream onyx_procurement   { server onyx-procurement:3100; keepalive 32; }
    upstream techno_kol_ops     { server techno-kol-ops:3200;   keepalive 32; }
    upstream onyx_ai            { server onyx-ai:3300;          keepalive 32; }
    upstream payroll_autonomous { server payroll-autonomous:80; keepalive 32; }

    server {
        listen 80 default_server;
        server_name _;

        # Nginx own liveness probe
        location = /healthz {
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        # ─── Service APIs ─────────────────────────────────────────────────
        location /api/procurement/ {
            proxy_pass http://onyx_procurement/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_read_timeout 120s;
        }

        location /api/ops/ {
            proxy_pass http://techno_kol_ops/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_read_timeout 120s;
        }

        location /api/ai/ {
            proxy_pass http://onyx_ai/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_read_timeout 300s;
        }

        # ─── Payroll SPA (fallback) ──────────────────────────────────────
        location / {
            proxy_pass http://payroll_autonomous/;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
